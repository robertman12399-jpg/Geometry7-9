          <div class="tg-fields"><span>Фамилия, имя: _____________________</span><span>Класс: _____</span><span>Дата: _____________</span></div>
        </div>
        ${body}
        ${tg.includeKey ? `<div class="tg-key"><h3>Лист ответов</h3>${keyRows}</div>` : ""}
      </div>`;
  }

  function screenTeacher() {
    const students = getTeacherDemo();
    const rows = students.map((s) => {
      const vals = Object.values(s.progress);
      const avg = Math.round(vals.reduce((a, b) => a + b, 0) / vals.length);
      return `<tr><td>${esc(s.name)}</td><td><div class="hud-bar sm"><div class="hud-fill" style="width:${avg}%"></div></div> ${avg}%</td>
        <td><button class="btn btn-ghost btn-sm" data-act="teacher-assign" data-name="${esc(s.name)}">Назначить тему</button></td></tr>`;
    }).join("");
    // сложные темы: где средний прогресс ниже всего
    const hard = GAME.topics.map((t) => {
      const avg = students.reduce((sum, s) => sum + s.progress[t.id], 0) / students.length;
      return { t, avg };
    }).sort((a, b) => a.avg - b.avg).slice(0, 3);
    return `<div class="mq-top"><button class="btn btn-ghost" data-act="nav" data-view="dashboard">← Главная</button></div>
      <h2>🧑‍🏫 Кабинет учителя</h2>
      <div class="panel dash-hero">
        <h3>📝 Генератор контрольных работ</h3>
        <p>Собери вариант из готовых заданий курса и распечатай — или сохрани как PDF.</p>
        <button class="btn btn-gold" data-act="testgen-open" data-from="teacher">Создать контрольную →</button>
      </div>
      <p class="creation-sub">Ниже — демонстрационные ученики, данные условные, для показа на уроке.</p>
      <div class="panel"><table class="teacher-table"><thead><tr><th>Ученик</th><th>Прогресс</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
      <div class="panel"><h3>📉 Темы, вызывающие больше всего затруднений</h3>
        <ul>${hard.map((h) => `<li>${esc(h.t.title)} — средний прогресс ${Math.round(h.avg)}%</li>`).join("")}</ul></div>`;
  }

  function screenSettings() {
    const s = State.data.settings;
    return `<div class="mq-top"><button class="btn btn-ghost" data-act="nav" data-view="dashboard">← Главная</button></div>
      <h2>⚙️ Настройки</h2>
      <div class="panel">
        <label class="fig-chk"><input type="checkbox" data-act="toggle-theme" ${s.theme === "dark" ? "checked" : ""}> Тёмная тема</label><br>
        <label class="fig-chk"><input type="checkbox" data-act="toggle-sound" ${s.sound ? "checked" : ""}> Звук</label>
      </div>
      <div class="panel">
        <h3>Сохранение</h3>
        <button class="btn btn-ghost btn-sm" data-act="export-save">⬇ Скачать сохранение</button>
        <label class="btn btn-ghost btn-sm" style="cursor:pointer">⬆ Загрузить сохранение<input type="file" id="import-file" accept="application/json" style="display:none"></label>
        <br><br>
        <button class="btn btn-ghost btn-sm" data-act="reset-progress">🗑 Сбросить весь прогресс</button>
      </div>`;
  }

  /* ================= рендер / роутинг ================= */
  function screenHTML() {
    switch (ui.view) {
      case "dashboard": return screenDashboard();
      case "chapters": return screenChapters();
      case "workshop": return screenWorkshop();
      case "chapter": return screenChapter();
      case "chapterProblems": return screenChapterProblems();
      case "chapterPractice": return screenChapterPractice();
      case "chapterTest": return screenChapterTest();
      case "review": return screenReview();
      case "speed": return screenSpeed();
      case "warmup": return screenWarmup();
      case "topic": return screenTopic();
      case "theorems": return screenTheorems();
      case "theorem": return screenTheorem();
      case "reference": return screenReference();
      case "formulaSheet": return screenFormulaSheet();
      case "exam": return screenExam();
      case "teacher": return screenTeacher();
      case "testgenConfig": return screenTestgenConfig();
      case "testgenPreview": return screenTestgenPreview();
      case "settings": return screenSettings();
      case "certificate": return screenCertificate();
      default: return screenDashboard();
    }
  }

  let workshopTimer = null;
  function stopWorkshopTimer() { if (workshopTimer) { clearInterval(workshopTimer); workshopTimer = null; } }

  function render() {
    destroyFigures();
    stopWorkshopTimer();
    if (!State.data.hero) {
      root.innerHTML = screenCreation();
      return;
    }
    root.innerHTML = hud() + navTabs() + `<main class="screen">${screenHTML()}</main>`;
    // "Назад" (.mq-top) прилипает сразу под шапкой (.hud) — но высота шапки может отличаться
    // (перенос на 2 строки на очень узком экране), поэтому меряем её реально, а не гадаем пикселями.
    const hudEl = root.querySelector(".hud");
    const mqTopEl = root.querySelector(".mq-top");
    if (hudEl && mqTopEl) mqTopEl.style.top = (hudEl.offsetHeight + 16) + "px";
    // монтируем чертежи темы/reference — оборачиваем в try/catch, чтобы сбой одного
    // чертежа не ронял рендер всего экрана
    root.querySelectorAll(".fig-mount[data-figure]").forEach((el) => {
      let spec; try { spec = JSON.parse(el.getAttribute("data-figure")); } catch (e) { spec = { type: "triangle" }; }
      const isHero = el.classList.contains("fig-mount-hero");
      try {
        let inst;
        if (isHero) {
          const heroW = Math.max(260, Math.min(560, el.clientWidth || 520));
          const heroH = Math.max(320, Math.min(460, Math.round(heroW * 0.85)));
          inst = Figures.mount(el, spec, { h: heroH });
        } else {
          inst = Figures.mount(el, spec);
        }
        App.trackFigure(inst); el.__figureInst = inst;
      }
      catch (e) { el.innerHTML = '<div class="fig-error">⚠️ Чертёж временно недоступен</div>'; console.error("Figure mount failed:", spec, e); }
    });
    root.querySelectorAll(".fig-mount[data-theorem]").forEach((el) => {
      try { App.trackFigure(Theorems.mount(el, el.getAttribute("data-theorem"))); }
      catch (e) { el.innerHTML = '<div class="fig-error">⚠️ Анимация временно недоступна</div>'; console.error("Theorem mount failed:", e); }
    });
    try { Tasks.mountFigures(root); } catch (e) { console.error("Task figures mount failed:", e); }
    if (ui.view === "workshop") {
      const mountEl = document.getElementById("workshop-mount");
      const statsEl = document.getElementById("workshop-stats-body");
      if (mountEl && statsEl) {
        workshopTimer = setInterval(() => {
          if (!mountEl.__figureInst) return;
          try { statsEl.innerHTML = formatWorkshopStats(ui.workshopShape || "triangle", mountEl.__figureInst.metrics()); }
          catch (e) { /* игнорируем — просто не обновляем в этом тике */ }
        }, 200);
      }
    }
  }

  function go(view, opts) {
    ui.view = view;
    if (opts) Object.assign(ui, opts);
    render();
    window.scrollTo(0, 0);
  }

  document.documentElement.setAttribute("data-theme", State.data && State.data.settings ? State.data.settings.theme : "light");

  root.addEventListener("click", function (e) {
    const node = e.target.closest("[data-act]");
    if (!node) return;
    const act = node.getAttribute("data-act");

    if (act === "pick-grade") {
      root.querySelectorAll(".grade-btn").forEach((b) => b.classList.remove("active"));
      node.classList.add("active");
      const startBtn = root.querySelector('[data-act="create-hero"]');
      if (startBtn) startBtn.disabled = false;
      const hint = document.getElementById("creation-hint");
      if (hint) hint.style.display = "none";
      return;
    }
    if (act === "create-hero") {
      const gradeBtn = root.querySelector(".grade-btn.active");
      if (!gradeBtn) return; // на всякий случай — кнопка и так должна быть disabled без выбора класса
      const nameEl = document.getElementById("hero-name");
      State.createHero(nameEl ? nameEl.value.trim() : "", +gradeBtn.dataset.g);
      ui.grade = State.data.hero.grade;
      go("dashboard");
      return;
    }
    if (act === "nav") { go(node.getAttribute("data-view")); return; }
    if (act === "testgen-open") { ui.testgenReturnTo = node.getAttribute("data-from") || "dashboard"; go("testgenConfig"); return; }
    if (act === "open-grade") { go("chapters", { grade: +node.getAttribute("data-g") }); return; }
    if (act === "open-certificate") { ui.certGrade = +node.getAttribute("data-g"); ui.view = "certificate"; render(); window.scrollTo(0, 0); return; }
    if (act === "print-certificate") { window.print(); return; }
    if (act === "open-chapter") { go("chapter", { chapterId: node.getAttribute("data-ch") }); return; }
    if (act === "workshop-cat") {
      const catId = node.getAttribute("data-cat");
      ui.workshopCategory = catId;
      const cat = WORKSHOP_CATALOG.find((c) => c.id === catId);
      if (cat) ui.workshopShape = cat.shapes[0].key;
      render();
      return;
    }
    if (act === "testgen-grade") {
      const g = +node.getAttribute("data-g");
      ui.testgen = testgenDefaults(g);
      render();
      return;
    }
    if (act === "testgen-toggle") {
      const group = node.getAttribute("data-group"), val = node.getAttribute("data-value");
      const tg = ui.testgen;
      const arr = tg[group];
      const idx = arr.indexOf(val);
      if (node.checked && idx === -1) arr.push(val);
      if (!node.checked && idx !== -1) arr.splice(idx, 1);
      render();
      return;
    }
    if (act === "testgen-generate") {
      const tg = ui.testgen;
      const countEl = document.getElementById("tg-count");
      const titleEl = document.getElementById("tg-title");
      const freshEl = document.getElementById("tg-fresh");
      const keyEl = document.getElementById("tg-key");
      if (countEl) tg.count = Geo.clamp(parseInt(countEl.value, 10) || 10, 1, 40);
      if (titleEl) tg.title = titleEl.value.trim() || "Контрольная работа";
      if (freshEl) tg.fresh = freshEl.checked;
      if (keyEl) tg.includeKey = keyEl.checked;
      const pool = TestGen.pool({ grade: tg.grade, chapters: tg.chapters, difficulties: tg.difficulties, types: tg.types });
      const picked = TestGen.pick(pool, tg.count);
      tg.generated = picked.map((entry) => {
        const m = TestGen.materialize(entry, tg.fresh);
        if (m.type === "error" && m.figure) m.figureImg = renderFigureToImage(m.figure);
        return m;
      });
      tg.step = "preview";
      ui.view = "testgenPreview";
      render();
      return;
    }
    if (act === "testgen-back") { ui.view = "testgenConfig"; render(); return; }
    if (act === "testgen-print") { window.print(); return; }
    if (act === "workshop-shape") { ui.workshopShape = node.getAttribute("data-shape"); render(); return; }
    if (act === "chapter-practice-start") { startChapterPractice(node.getAttribute("data-ch")); return; }
    if (act === "review-start") { reviewStart(); return; }
    if (act === "formula-practice-start") { formulaPracticeStart(); return; }
    if (act === "formula-sheet-grade") { ui.formulaGrade = +node.getAttribute("data-g"); render(); return; }
    if (act === "review-flip") { reviewFlip(); return; }
    if (act === "review-rate") { reviewRate(+node.getAttribute("data-q")); return; }
    if (act === "review-token-pick") { reviewTokenPick(+node.getAttribute("data-idx")); return; }
    if (act === "review-token-remove") { reviewTokenRemove(+node.getAttribute("data-idx")); return; }
    if (act === "review-formula-retry") { reviewFormulaRetry(); return; }
    if (act === "review-formula-giveup") { reviewFormulaGiveUp(); return; }
    if (act === "review-card-next") { reviewCardNext(); return; }
    if (act === "review-confuse-check") { reviewConfuseCheck(); return; }
    if (act === "review-confuse-retry") { reviewConfuseRetry(); return; }
    if (act === "review-confuse-giveup") { reviewConfuseGiveUp(); return; }
    if (act === "review-exit") { reviewExit(); return; }
    if (act === "speed-start") { speedStart(); return; }
    if (act === "speed-flip") { speedFlip(); return; }
    if (act === "speed-answer") { speedAnswer(node.getAttribute("data-known") === "1"); return; }
    if (act === "speed-exit") { speedExit(); return; }
    if (act === "warmup-start") { startWarmup(node.getAttribute("data-ch")); return; }
    if (act === "warmup-flip") { warmupFlip(); return; }
    if (act === "warmup-next") { warmupNext(); return; }
    if (act === "warmup-exit") { warmupExit(); return; }
    if (act === "chapter-test-start") { startChapterTest(node.getAttribute("data-ch")); return; }
    if (act === "ct-answer") { ctAnswer(+node.getAttribute("data-idx")); return; }
    if (act === "ct-answer-input") { const input = document.getElementById("ct-input"); ctAnswerInput(input ? input.value : ""); return; }
    if (act === "ct-next") { ctNext(); return; }
    if (act === "cp-answer") { cpAnswer(+node.getAttribute("data-idx")); return; }
    if (act === "cp-answer-input") { const input = document.getElementById("cp-input"); cpAnswerInput(input ? input.value : ""); return; }
    if (act === "cp-next") { cpNext(); return; }
    if (act === "open-topic") {
      const tid = node.getAttribute("data-topic");
      const topicObj = topicById(tid);
      if (topicObj) ui.grade = topicObj.grade; // синхронизируем класс — иначе "Продолжить" с главной может открыть тему другого класса, и кнопка "Назад к главе" собьётся
      State.setLastTopic(tid);
      go("topic", { topicId: tid });
      return;
    }
    if (act === "open-theorem") { go("theorem", { thId: node.getAttribute("data-th") }); return; }
    if (act === "ref-toggle") {
      const id = node.getAttribute("data-topic");
      ui.refOpen = ui.refOpen === id ? null : id;
      render();
      return;
    }
    if (act === "ref-copy") {
      const txt = node.getAttribute("data-copy");
      if (navigator.clipboard) navigator.clipboard.writeText(txt).then(() => toast("Формула скопирована", "⧉")).catch(() => {});
      else toast("Формула: " + txt, "⧉");
      return;
    }

    /* --- задания --- */
    if (act === "task-choice") {
      const task = findTask(node.getAttribute("data-task"));
      const res = Tasks.checkChoice(task, node.getAttribute("data-topic"), +node.getAttribute("data-idx"), ui);
      ui.taskFb[task.id].correct ? Sound.correct() : Sound.wrong();
      if (res && !res.already) { toast(`+${res.xp} XP`, "⭐"); announceUnlocks(res.unlocked); announceStreak(res.streak); }
      render();
      return;
    }
    if (act === "task-error") {
      const task = findTask(node.getAttribute("data-task"));
      const res = Tasks.checkError(task, node.getAttribute("data-topic"), +node.getAttribute("data-idx"), ui);
      ui.taskFb[task.id].correct ? Sound.correct() : Sound.wrong();
      if (res && !res.already) { toast(`+${res.xp} XP`, "⭐"); announceUnlocks(res.unlocked); announceStreak(res.streak); }
      render();
      return;
    }
    if (act === "task-input") {
      const taskId = node.getAttribute("data-task"), topicId = node.getAttribute("data-topic");
      const card = node.closest(".task-card");
      const input = root.querySelector(`.task-input[data-task="${taskId}"]`);
      const figEl = card ? card.querySelector(".task-figure") : null;
      const task = findTask(taskId);
      const res = Tasks.checkInput(task, topicId, input ? input.value : "", ui, figEl);
      ui.taskFb[taskId].correct ? Sound.correct() : Sound.wrong();
      if (res && !res.already) { toast(`+${res.xp} XP`, "⭐"); announceUnlocks(res.unlocked); announceStreak(res.streak); }
      render();
      return;
    }
    if (act === "task-explore") {
      const taskId = node.getAttribute("data-task"), topicId = node.getAttribute("data-topic");
      const ta = root.querySelector(`.task-note[data-task="${taskId}"]`);
      const text = ta ? ta.value.trim() : "";
      if (!text) { toast("Сначала запиши свой вывод", "✏️"); return; }
      const predictTa = root.querySelector(`.task-predict[data-task="${taskId}"]`);
      if (predictTa) State.saveExploreNote(taskId + "_predict", predictTa.value.trim());
      const task = findTask(taskId);
      const res = Tasks.saveExplore(task, topicId, text);
      if (res && !res.already) { Sound.correct(); toast(`+${res.xp} XP`, "⭐"); announceUnlocks(res.unlocked); announceStreak(res.streak); }
      render();
      return;
    }
    if (act === "task-build") {
      const taskId = node.getAttribute("data-task"), topicId = node.getAttribute("data-topic");
      const card = node.closest(".task-card");
      const figEl = card ? card.querySelector(".task-figure") : null;
      const task = findTask(taskId);
      const res = Tasks.checkBuild(task, topicId, figEl, ui);
      ui.taskFb[taskId].correct ? Sound.correct() : Sound.wrong();
      if (res && !res.already) { toast(`+${res.xp} XP`, "⭐"); announceUnlocks(res.unlocked); announceStreak(res.streak); }
      render();
      return;
    }
    if (act === "task-match") {
      const taskId = node.getAttribute("data-task"), topicId = node.getAttribute("data-topic");
      const card = node.closest(".task-card");
      const selMap = {};
      if (card) card.querySelectorAll(".match-select").forEach((sel) => { selMap[+sel.getAttribute("data-idx")] = sel.value; });
      const task = findTask(taskId);
      const res = Tasks.checkMatch(task, topicId, selMap, ui);
      ui.taskFb[taskId].correct ? Sound.correct() : Sound.wrong();
      if (res && !res.already) { toast(`+${res.xp} XP`, "⭐"); announceUnlocks(res.unlocked); announceStreak(res.streak); }
      render();
      return;
    }
    if (act === "proofstep-add") {
      const taskId = node.getAttribute("data-task"), idx = +node.getAttribute("data-idx");
      ui.proofPick = ui.proofPick || {};
      const arr = ui.proofPick[taskId] || (ui.proofPick[taskId] = []);
      if (!arr.includes(idx)) arr.push(idx);
      render();
      return;
    }
    if (act === "proofstep-remove") {
      const taskId = node.getAttribute("data-task"), pos = +node.getAttribute("data-pos");
      ui.proofPick = ui.proofPick || {};
      const arr = ui.proofPick[taskId];
      if (arr) arr.splice(pos, 1);
      render();
      return;
    }
    if (act === "task-proofsteps") {
      const taskId = node.getAttribute("data-task"), topicId = node.getAttribute("data-topic");
      const task = findTask(taskId);
      const res = Tasks.checkProofSteps(task, topicId, ui);
      ui.taskFb[taskId].correct ? Sound.correct() : Sound.wrong();
      if (res && !res.already) { toast(`+${res.xp} XP`, "⭐"); announceUnlocks(res.unlocked); announceStreak(res.streak); }
      render();
      return;
    }

    /* --- экзамен --- */
    if (act === "exam-start") { startExam(); return; }
    if (act === "exam-answer") {
      const ex = ui.exam; const q = ex.items[ex.idx].task;
      const idx = +node.getAttribute("data-idx");
      ex.answered = idx;
      const ok = idx === q.correct;
      Sound[ok ? "correct" : "wrong"]();
      if (ok) ex.score++; else ex.mistakes.push({ q: q.q, correctText: q.options[q.correct] });
      render();
      return;
    }
    if (act === "exam-answer-input") {
      const ex = ui.exam; const q = ex.items[ex.idx].task;
      const input = document.getElementById("exam-input");
      const val = parseFloat(String(input ? input.value : "").replace(",", "."));
      const ok = !isNaN(val) && Math.abs(val - q.answer) <= (q.tol || 0.5);
      ex.answered = ok ? "ok" : "bad";
      Sound[ok ? "correct" : "wrong"]();
      if (ok) ex.score++; else ex.mistakes.push({ q: q.q, correctText: String(q.answer) });
      render();
      return;
    }
    if (act === "exam-next") {
      const ex = ui.exam;
      if (ex.idx + 1 < ex.items.length) { ex.idx++; ex.answered = null; render(); }
      else finishExam();
      return;
    }

    /* --- учитель --- */
    if (act === "teacher-assign") { toast(`Тема назначена ученику ${node.getAttribute("data-name")}`, "📌"); return; }

    /* --- настройки --- */
    if (act === "export-save") {
      const blob = new Blob([JSON.stringify(State.data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "geometry-save.json"; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 2000);
      return;
    }
    if (act === "reset-progress") {
      if (confirm("Точно сбросить весь прогресс?")) { State.reset(); go("dashboard"); }
      return;
    }
  });

  root.addEventListener("change", function (e) {
    if (e.target.id === "tg-count" && ui.testgen) { ui.testgen.count = Geo.clamp(parseInt(e.target.value, 10) || 10, 1, 40); }
    if (e.target.id === "tg-title" && ui.testgen) { ui.testgen.title = e.target.value.trim() || "Контрольная работа"; }
    if (e.target.id === "tg-fresh" && ui.testgen) { ui.testgen.fresh = e.target.checked; }
    if (e.target.id === "tg-key" && ui.testgen) { ui.testgen.includeKey = e.target.checked; }
    if (e.target.getAttribute("data-act") === "toggle-theme") {
      const th = State.toggleTheme();
      document.documentElement.setAttribute("data-theme", th);
    }
    if (e.target.getAttribute("data-act") === "toggle-sound") { State.toggleSound(); }
    if (e.target.id === "import-file" && e.target.files && e.target.files[0]) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          State.data = Object.assign(State.defaults(), parsed);
          State.save();
          toast("Сохранение загружено", "⬆");
          go("dashboard");
        } catch (err) { toast("Не удалось прочитать файл", "⚠️"); }
      };
      reader.readAsText(e.target.files[0]);
    }
  });

  function findTask(id) {
    for (const t of GAME.topics) { const f = t.tasks.find((x) => x.id === id); if (f) return f; }
    return null;
  }

  /* ---------- кнопка "Наверх" — создаётся один раз, не зависит от render() ---------- */
  function setupScrollTopButton() {
    const btn = document.createElement("button");
    btn.id = "scroll-top-btn";
    btn.className = "scroll-top-btn";
    btn.setAttribute("aria-label", "Наверх");
    btn.setAttribute("type", "button");
    btn.textContent = "↑";
    btn.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
    document.body.appendChild(btn);
    window.addEventListener("scroll", () => {
      if (window.scrollY > 420) btn.classList.add("visible");
      else btn.classList.remove("visible");
    }, { passive: true });
  }

  /* ---------- запуск ---------- */
  State.load();
  document.documentElement.setAttribute("data-theme", State.data.settings.theme);
  if (State.data.hero) ui.grade = State.data.hero.grade;
