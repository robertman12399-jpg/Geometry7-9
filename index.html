<style>
/* style.css — «Интерактивная геометрия» */
:root {
  --bg: #f3f4fb;
  --panel: #ffffff;
  --ink: #1b1f3b;
  --ink-soft: #565c8a;
  --primary: #5b6bd6;
  --primary-dark: #3a4bcf;
  --accent: #ff9f43;
  --good: #2ecc71;
  --good-dark: #199a53;
  --bad: #e6572e;
  --border: #e1e3f5;
  --radius: 16px;
  --font-display: "Russo One", "Rubik", sans-serif;
  --font-body: "Rubik", sans-serif;
}
[data-theme="dark"] {
  --bg: #0f1226;
  --panel: #171a38;
  --ink: #eef0ff;
  --ink-soft: #a4a9df;
  --border: #2b2f5c;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  line-height: 1.5;
  min-height: 100vh;
}
h1, h2, h3 { font-family: var(--font-display); font-weight: 400; letter-spacing: 0.2px; margin: 0 0 8px; }
h2 { font-size: clamp(20px, 4vw, 28px); }
h3 { font-size: clamp(16px, 3vw, 19px); }
p { margin: 0 0 10px; color: var(--ink-soft); }
ul { margin: 6px 0; padding-left: 20px; color: var(--ink-soft); }
a { color: var(--primary); }

button { font-family: inherit; color: inherit; }
input, select, textarea { font-family: inherit; color: inherit; }
:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }

.app-wrap { max-width: 760px; margin: 0 auto; padding: 14px 14px 60px; }

/* ---------- кнопки ---------- */
.btn {
  border: none; border-radius: 12px; padding: 12px 18px; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: transform 0.12s ease, opacity 0.12s ease; display: inline-flex; align-items: center; gap: 6px;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-gold { background: linear-gradient(135deg, var(--accent), #ffb066); color: #402400; }
.btn-ghost { background: var(--panel); color: var(--ink); border: 1px solid var(--border); }
.btn-sm { padding: 8px 12px; font-size: 13px; }

/* ---------- шапка / прогресс ---------- */
.hud {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 10px 16px; margin-bottom: 10px; position: sticky; top: 8px; z-index: 5;
}
.hud-hero { font-weight: 600; }
.hud-progress { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 120px; }
.hud-bar { flex: 1; height: 8px; background: var(--border); border-radius: 6px; overflow: hidden; }
.hud-bar.sm { height: 6px; width: 100px; display: inline-block; }
.hud-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 6px; transition: width 0.4s ease; }
.hud-xp { font-weight: 700; color: var(--accent); }

.nav-tabs { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 12px; padding-bottom: 4px; }
.nav-tab {
  background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 9px 13px;
  font-size: 13px; font-weight: 600; color: var(--ink-soft); cursor: pointer; white-space: nowrap;
}
.nav-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* ---------- панели / карточки ---------- */
.panel { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
.dash-hero { background: linear-gradient(135deg, rgba(91,107,214,0.10), rgba(255,159,67,0.10)); }

.grade-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 14px; }
.grade-card {
  background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px;
  text-align: left; cursor: pointer; display: flex; flex-direction: column; gap: 4px;
}
.grade-card:hover { border-color: var(--primary); }
.gc-ico { font-size: 26px; }
.gc-title { font-weight: 700; }
.gc-sub { color: var(--ink-soft); font-size: 13px; }

.ach-row { display: flex; flex-wrap: wrap; gap: 8px; }
.ach-badge { display: flex; align-items: center; gap: 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 999px; padding: 6px 12px; font-size: 12px; opacity: 0.4; }
.ach-badge.got { opacity: 1; border-color: var(--accent); }

.mq-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 8px; flex-wrap: wrap; }
.mq-badge { font-size: 12px; font-weight: 700; color: var(--good-dark); background: rgba(46,204,113,0.15); padding: 4px 10px; border-radius: 999px; }

.topic-list { display: flex; flex-direction: column; gap: 8px; }
.chapter-cards { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
.chapter-cta-row { display: flex; gap: 10px; flex-wrap: wrap; }
.chapter-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; text-align: left; cursor: pointer; display: flex; flex-direction: column; gap: 8px; }
.chapter-card:hover { border-color: var(--primary); }
.cc-title { font-weight: 700; }
.cc-progress { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-soft); }
.cc-progress .hud-bar { flex: 1; }
.topic-row {
  display: flex; align-items: center; gap: 10px; background: var(--panel); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 14px; cursor: pointer; text-align: left; width: 100%;
}
.topic-row.done { border-color: var(--good); }
.topic-ico { font-size: 20px; }
.topic-title { flex: 1; font-weight: 600; }
.topic-st { font-size: 13px; color: var(--ink-soft); font-weight: 700; }

.theory-block p { color: var(--ink); }
.formula-box { background: rgba(91,107,214,0.10); border: 1px dashed var(--primary); border-radius: 12px; padding: 10px 14px; font-weight: 700; margin-bottom: 12px; }
.remember-box { background: rgba(255,159,67,0.10); border-radius: 12px; padding: 10px 14px; margin-bottom: 12px; }
.remember-box ul { color: var(--ink); }
.example-box { background: rgba(46,204,113,0.08); border: 1px solid rgba(46,204,113,0.3); border-radius: 12px; padding: 12px 14px; margin-bottom: 14px; }
.example-h { font-weight: 700; color: var(--good-dark); margin-bottom: 6px; }
.example-q { font-weight: 600; margin-bottom: 6px; }
.example-steps { margin: 0; padding-left: 20px; color: var(--ink); }
.example-steps li { margin-bottom: 4px; }
.review-item { border-bottom: 1px solid var(--border); padding: 8px 0; font-size: 14px; }
.review-item summary { cursor: pointer; font-weight: 600; }
.review-a { margin-top: 6px; color: var(--ink-soft); }

/* ---------- чертежи (canvas) ---------- */
.fig-mount, .task-figure { margin: 10px 0 14px; }
.fig-wrap { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; }
.fig-canvas { width: 100%; height: auto; touch-action: none; border-radius: 10px; background: #fdfdff; cursor: grab; }
[data-theme="dark"] .fig-canvas { background: #10142c; }
.fig-controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 8px; font-size: 13px; }
.fig-chk { display: flex; align-items: center; gap: 5px; cursor: pointer; }
.fig-select { border-radius: 8px; border: 1px solid var(--border); padding: 5px 8px; background: var(--panel); color: var(--ink); }

/* ---------- задания ---------- */
.task-list { display: flex; flex-direction: column; gap: 12px; }
.task-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.task-card-done { border-color: var(--good); }
.task-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.task-type { font-size: 12px; font-weight: 700; color: var(--ink-soft); }
.task-diff { font-size: 11px; color: var(--accent); margin-left: 6px; letter-spacing: 1px; }
.task-done { font-size: 12px; font-weight: 700; color: var(--good-dark); }
.task-q { font-weight: 600; margin-bottom: 10px; }
.task-opts { display: flex; flex-direction: column; gap: 8px; }
.task-opt, .task-label {
  background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px;
  text-align: left; cursor: pointer; font-size: 14px;
}
.task-opt.opt-correct, .task-label.opt-correct { border-color: var(--good); background: rgba(46,204,113,0.14); }
.task-opt.opt-wrong, .task-label.opt-wrong { border-color: var(--bad); background: rgba(230,87,46,0.14); }
.task-input-row { display: flex; gap: 8px; flex-wrap: wrap; }
.task-input { flex: 1; min-width: 140px; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--ink); font-size: 14px; }
.task-fb { margin-top: 8px; font-weight: 700; font-size: 13px; }
.fb-ok { color: var(--good-dark); }
.fb-bad { color: var(--bad); }
.task-labels { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
.task-hints { margin: 8px 0; font-size: 13px; color: var(--ink-soft); }
.task-note { width: 100%; min-height: 70px; border-radius: 10px; border: 1px solid var(--border); padding: 10px; font-family: inherit; background: var(--bg); color: var(--ink); margin-bottom: 8px; }
.task-explain { margin-top: 10px; padding: 10px 12px; background: rgba(255,159,67,0.10); border-radius: 10px; font-size: 13px; color: var(--ink); }
.match-rows { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
.match-row { display: flex; align-items: center; gap: 10px; justify-content: space-between; }
.match-left { flex: 1; font-size: 14px; }
.match-select { min-width: 130px; padding: 8px 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--ink); font-size: 13px; }
.match-select.match-ok { border-color: var(--good); }
.match-select.match-bad { border-color: var(--bad); }
.match-hint { font-size: 12px; color: var(--good-dark); white-space: nowrap; }

/* ---------- экзамен ---------- */
.exam-top { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 10px; }
.exam-timer { color: var(--accent); }

/* ---------- учитель ---------- */
.teacher-table { width: 100%; border-collapse: collapse; }
.teacher-table th, .teacher-table td { text-align: left; padding: 8px 6px; border-bottom: 1px solid var(--border); font-size: 13px; }

/* ---------- справочник ---------- */
.ref-row { border-bottom: 1px solid var(--border); padding: 10px 0; }
.ref-row:last-child { border-bottom: none; }
.ref-formula { background: none; border: none; color: var(--ink); text-align: left; cursor: pointer; font-size: 14px; padding: 0; display: block; margin-bottom: 6px; }
.ref-formula:hover { color: var(--primary); }

/* ---------- создание героя ---------- */
.creation { max-width: 480px; margin: 40px auto; text-align: center; padding: 0 14px; }
.creation-hero { font-size: 40px; margin-bottom: 6px; }
.creation-sub { margin-bottom: 18px; }
.creation-form { display: flex; flex-direction: column; gap: 12px; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
.grade-pick { display: flex; align-items: center; gap: 8px; justify-content: center; }
.grade-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* ---------- тосты ---------- */
#toasts { position: fixed; top: 16px; right: 16px; z-index: 50; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px;
  box-shadow: 0 8px 24px rgba(20,20,50,0.15); display: flex; gap: 8px; align-items: center; font-size: 13px; font-weight: 600;
  animation: toast-in 0.25s ease;
}
.toast.out { opacity: 0; transform: translateX(20px); transition: all 0.3s ease; }
@keyframes toast-in { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

@media (prefers-reduced-motion: reduce) {
  .hud-fill, .toast { transition: none; animation: none; }
}

@media (max-width: 480px) {
  .app-wrap { padding: 10px 8px 50px; }
  .hud { flex-direction: row; flex-wrap: wrap; }
}

</style>
</head>

<script>

<script>

const GAME = {

  topics: [

       ГЛАВА I. НАЧАЛЬНЫЕ ГЕОМЕТРИЧЕСКИЕ СВЕДЕНИЯ (7 класс)

        "Точка не имеет размеров (ширины, длины). Прямая — это бесконечный ряд точек, у неё нет ни начала, ни конца, поэтому изображают только её часть, а подразумевают, что она продолжается в обе стороны неограниченно.",

<script>
/* shapes.js — интерактивные чертежи на Canvas: перетаскивание точек, живые метрики */
const Geo = {
  UNIT: 40, // px на условную единицу длины
  dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y) / this.UNIT; },
  distPx(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); },
  angleDeg(vertex, p1, p2) {
    const v1 = { x: p1.x - vertex.x, y: p1.y - vertex.y };
    const v2 = { x: p2.x - vertex.x, y: p2.y - vertex.y };
    const dot = v1.x * v2.x + v1.y * v2.y;
    const m1 = Math.hypot(v1.x, v1.y), m2 = Math.hypot(v2.x, v2.y);
    if (m1 < 1e-6 || m2 < 1e-6) return 0;
    let c = dot / (m1 * m2);
    c = Math.max(-1, Math.min(1, c));
    return Math.acos(c) * 180 / Math.PI;
  },
  areaShoelace(pts) {
    let s = 0;
    for (let i = 0; i < pts.length; i++) {
      const p1 = pts[i], p2 = pts[(i + 1) % pts.length];
      s += p1.x * p2.y - p2.x * p1.y;
    }
    return Math.abs(s) / 2 / (this.UNIT * this.UNIT);
  },
  midpoint(a, b) { return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 }; },
  fmt(n) { return (Math.round(n * 100) / 100).toString().replace(".", ","); },
  clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); },
  isDark() {
    return typeof document !== "undefined" && document.documentElement.getAttribute("data-theme") === "dark";
  },
  ink() { return this.isDark() ? "#eef0ff" : "#1b1f3b"; },
  dotFill() { return this.isDark() ? "#aab4ff" : "#2b3a8f"; },
  /* Направление дуги (anticlockwise-флаг для ctx.arc), чтобы дуга всегда
     шла по МЕНЬШЕЙ (внутренней) стороне угла между двумя лучами, а не по большей. */
  arcSweep(a1, a2) {
    let d = a2 - a1;
    d = ((d % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
    return d > Math.PI;
  },
};

const Figures = {
  active: null,

  /* Универсальное подключение перетаскивания точек к canvas */
  wireDrag(canvas, points, onMove) {
    let dragIdx = -1;
    const rectOf = () => canvas.getBoundingClientRect();
    const posFromEvt = (e) => {
      const r = rectOf();
      const cx = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
      const cy = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
      return { x: cx * (canvas.width / r.width), y: cy * (canvas.height / r.height) };
    };
    const findNear = (p) => {
      let best = -1, bd = 26 * 26;
      points.forEach((pt, i) => {
        if (pt.fixed) return;
        const d = (pt.x - p.x) ** 2 + (pt.y - p.y) ** 2;
        if (d < bd) { bd = d; best = i; }
      });
      return best;
    };
    const down = (e) => {
      const p = posFromEvt(e);
      dragIdx = findNear(p);
      if (dragIdx >= 0) e.preventDefault();
    };
    const move = (e) => {
      if (dragIdx < 0) return;
      e.preventDefault();
      const p = posFromEvt(e);
      points[dragIdx].x = Geo.clamp(p.x, 24, canvas.width - 24);
      points[dragIdx].y = Geo.clamp(p.y, 24, canvas.height - 24);
      onMove();
    };
    const up = () => { dragIdx = -1; };
    canvas.addEventListener("mousedown", down);
    canvas.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
    canvas.addEventListener("touchstart", down, { passive: false });
    canvas.addEventListener("touchmove", move, { passive: false });
    window.addEventListener("touchend", up);
    return () => {
      canvas.removeEventListener("mousedown", down);
      canvas.removeEventListener("mousemove", move);
      window.removeEventListener("mouseup", up);
      canvas.removeEventListener("touchstart", down);
      canvas.removeEventListener("touchmove", move);
      window.removeEventListener("touchend", up);
    };
  },

  drawBase(ctx, w, h) {
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = "rgba(120,140,255,0.05)";
    ctx.fillRect(0, 0, w, h);
  },
  poly(ctx, pts, opts) {
    opts = opts || {};
    ctx.beginPath();
    pts.forEach((p, i) => (i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y)));
    ctx.closePath();
    if (opts.fill) { ctx.fillStyle = opts.fill; ctx.fill(); }
    ctx.strokeStyle = opts.stroke || "#5b6bd6";
    ctx.lineWidth = opts.lw || 2.5;
    ctx.stroke();
  },
  line(ctx, a, b, opts) {
    opts = opts || {};
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = opts.stroke || "#5b6bd6"; ctx.lineWidth = opts.lw || 2;
    if (opts.dash) ctx.setLineDash(opts.dash); else ctx.setLineDash([]);
    ctx.stroke(); ctx.setLineDash([]);
  },
  dot(ctx, p, opts) {
    opts = opts || {};
    ctx.beginPath(); ctx.arc(p.x, p.y, opts.r || 7, 0, Math.PI * 2);
    ctx.fillStyle = opts.fill || Geo.dotFill(); ctx.fill();
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
  },
  label(ctx, p, text, opts) {
    opts = opts || {};
    ctx.font = opts.font || "600 14px Rubik, sans-serif";
    ctx.fillStyle = opts.color || Geo.ink();
    ctx.textAlign = opts.align || "center";
    ctx.fillText(text, p.x + (opts.dx || 0), p.y + (opts.dy || 0));
  },

  /* ------------------------------------------------------------------ */
  /* Точка входа: монтирует конкретный тип чертежа в контейнер           */
  /* ------------------------------------------------------------------ */
  mount(container, spec, opts) {
    spec = spec || { type: "triangle" };
    const w = (opts && opts.w) || Math.min(560, container.clientWidth || 520);
    const h = (opts && opts.h) || 360;
    container.innerHTML = `
      <div class="fig-wrap">
        <canvas class="fig-canvas" width="${w}" height="${h}"></canvas>
        <div class="fig-controls"></div>
      </div>`;
    const canvas = container.querySelector(".fig-canvas");
    const ctrl = container.querySelector(".fig-controls");
    const ctx = canvas.getContext("2d");
    const builder = BUILDERS[spec.type] || BUILDERS.triangle;
    const inst = builder(ctx, canvas, ctrl, spec, w, h);
    inst.render();
    return inst;
  },
};

const BUILDERS = {
  segment(ctx, canvas, ctrl, spec, w, h) {
    let A, B;
    if (spec.withRuler) {
      // Фиксированный чертёж «отрезок на линейке»: точки не двигаются,
      // чтобы напечатанный ответ совпадал с тем, что ученик видит.
      A = { x: w * 0.15, y: h * 0.55, fixed: true };
      const lenPx = (spec.fixedLen != null ? spec.fixedLen : 5.5) * Geo.UNIT;
      B = { x: A.x + lenPx, y: h * 0.55, fixed: true };
    } else {
      A = { x: w * 0.22, y: h * 0.55 };
      B = { x: w * 0.78, y: h * 0.45 };
    }
    const pts = [A, B];
    let unbind;
    function render() {
      Figures.drawBase(ctx, w, h);
      Figures.line(ctx, A, B, { stroke: "#5b6bd6", lw: 3 });
      if (spec.withRuler) {
        // деления линейки — сантиметры вдоль отрезка, с более длинными штрихами на целых см
        const dx = B.x - A.x, dy = B.y - A.y;
        const lenUnits = Geo.dist(A, B);
        const rulerLen = Math.ceil(lenUnits) + 1;
        const ux = dx / (Geo.distPx(A, B) || 1), uy = dy / (Geo.distPx(A, B) || 1); // единичный вектор
        const nx = -uy, ny = ux; // нормаль для штрихов
        const rulerY = h * 0.75;
        const start = { x: A.x, y: rulerY };
        for (let cm = 0; cm <= rulerLen; cm++) {
          const p = { x: start.x + cm * Geo.UNIT, y: rulerY };
          const tick = cm % 5 === 0 ? 14 : 8;
          Figures.line(ctx, { x: p.x, y: p.y - tick }, { x: p.x, y: p.y + tick }, { stroke: Geo.ink(), lw: 1.5 });
          Figures.label(ctx, { x: p.x, y: p.y + 26 }, String(cm), { font: "11px Rubik, sans-serif", color: Geo.ink() });
        }
        Figures.line(ctx, { x: start.x, y: rulerY }, { x: start.x + rulerLen * Geo.UNIT, y: rulerY }, { stroke: Geo.ink(), lw: 2 });
        // переносим отрезок AB прямо на линейку, чтобы концы совпадали с делениями
        Figures.line(ctx, { x: A.x, y: rulerY - 22 }, { x: B.x, y: rulerY - 22 }, { stroke: "#5b6bd6", lw: 4 });
        Figures.label(ctx, { x: A.x, y: rulerY - 30 }, "A", { color: "#3a4bcf" });
        Figures.label(ctx, { x: B.x, y: rulerY - 30 }, "B", { color: "#3a4bcf" });
      }
      Figures.dot(ctx, A); Figures.dot(ctx, B);
      Figures.label(ctx, A, "A", { dy: -14 });
      Figures.label(ctx, B, "B", { dy: -14 });
      if (!spec.withRuler) {
        const mid = Geo.midpoint(A, B);
        Figures.label(ctx, mid, `AB = ${Geo.fmt(Geo.dist(A, B))}`, { dy: -12, color: "#3a4bcf" });
      }
    }
    unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => ({ AB: Geo.dist(A, B) }) };
  },

  /* Три точки на прямой — для задания «отметь точки так, чтобы B лежала между A и C».
     Проверка построения (checkBuild): коллинеарны ли A, B, C и лежит ли B между A и C. */
  collinear3(ctx, canvas, ctrl, spec, w, h) {
    const A = { x: w * 0.15, y: h * 0.6 };
    const B = { x: w * 0.5, y: h * 0.45 };
    const C = { x: w * 0.85, y: h * 0.3 };
    const pts = [A, B, C];
    function render() {
      Figures.drawBase(ctx, w, h);
      Figures.line(ctx, A, C, { stroke: "#dfe1f5", lw: 1.5, dash: [4, 4] });
      Figures.line(ctx, A, B, { stroke: "#5b6bd6", lw: 3 });
      Figures.line(ctx, B, C, { stroke: "#5b6bd6", lw: 3 });
      [["A", A], ["B", B], ["C", C]].forEach(([nm, p]) => { Figures.dot(ctx, p); Figures.label(ctx, p, nm, { dy: -14 }); });
      Figures.label(ctx, Geo.midpoint(A, B), `AB=${Geo.fmt(Geo.dist(A, B))}`, { dy: 18, color: "#3a4bcf" });
      Figures.label(ctx, Geo.midpoint(B, C), `BC=${Geo.fmt(Geo.dist(B, C))}`, { dy: 18, color: "#3a4bcf" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return {
      render, destroy: unbind,
      metrics: () => {
        // "коллинеарность" через площадь треугольника ABC: чем ближе к 0, тем точнее на одной прямой
        const area = Geo.areaShoelace([A, B, C]);
        const ab = Geo.dist(A, B), bc = Geo.dist(B, C), ac = Geo.dist(A, C);
        return { area, ab, bc, ac, betweenB: Math.abs(ab + bc - ac) < 0.15 * ac };
      },
    };
  },

  /* Два фиксированных отрезка-образца + один растягиваемый — для задания "построй отрезок,
     равный сумме двух данных". */
  segmentSum(ctx, canvas, ctrl, spec, w, h) {
    const len1 = spec.len1 || 3, len2 = spec.len2 || 5;
    const S1a = { x: w * 0.12, y: h * 0.2, fixed: true };
    const S1b = { x: S1a.x + len1 * Geo.UNIT, y: h * 0.2, fixed: true };
    const S2a = { x: w * 0.12, y: h * 0.42, fixed: true };
    const S2b = { x: S2a.x + len2 * Geo.UNIT, y: h * 0.42, fixed: true };
    const P = { x: w * 0.12, y: h * 0.75, fixed: true };
    const Q = { x: w * 0.12 + 2 * Geo.UNIT, y: h * 0.75 };
    const pts = [S1a, S1b, S2a, S2b, P, Q];
    function render() {
      Figures.drawBase(ctx, w, h);
      Figures.line(ctx, S1a, S1b, { stroke: "#2ecc71", lw: 3 });
      Figures.label(ctx, Geo.midpoint(S1a, S1b), `AB = ${Geo.fmt(len1)}`, { dy: -12, color: "#199a53" });
      Figures.line(ctx, S2a, S2b, { stroke: "#ff9f43", lw: 3 });
      Figures.label(ctx, Geo.midpoint(S2a, S2b), `CD = ${Geo.fmt(len2)}`, { dy: -12, color: "#c9740f" });
      Figures.line(ctx, P, Q, { stroke: "#5b6bd6", lw: 3 });
      Figures.dot(ctx, Q);
      Figures.label(ctx, Geo.midpoint(P, Q), `Твой отрезок = ${Geo.fmt(Geo.dist(P, Q))}`, { dy: 20, color: "#3a4bcf" });
      Figures.label(ctx, { x: w / 2, y: h * 0.95 }, `Цель: AB + CD = ${Geo.fmt(len1 + len2)}`, { color: Geo.ink() });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => ({ length: Geo.dist(P, Q), target: len1 + len2 }) };
  },

  /* Прямая m (фиксирована) и точка P вне неё; ученик тянет точку Q, строя прямую PQ,
     перпендикулярную m — классическая задача на построение перпендикуляра из внешней точки. */
  perpFromPoint(ctx, canvas, ctrl, spec, w, h) {
    const M1 = { x: w * 0.1, y: h * 0.75, fixed: true };
    const M2 = { x: w * 0.9, y: h * 0.68, fixed: true };
    const P = { x: w * 0.62, y: h * 0.22, fixed: true };
    const Q = { x: w * 0.3, y: h * 0.45 };
    const pts = [M1, M2, P, Q];
    function render() {
      Figures.drawBase(ctx, w, h);
      Figures.line(ctx, M1, M2, { stroke: "#5b6bd6", lw: 3 });
      Figures.label(ctx, M2, "m", { dy: -12, color: "#3a4bcf" });
      Figures.line(ctx, P, Q, { stroke: "#ff9f43", lw: 3 });
      Figures.dot(ctx, P, { r: 6 }); Figures.dot(ctx, Q, { r: 6 });
      Figures.label(ctx, P, "P", { dy: -14 });
      Figures.label(ctx, Q, "Q", { dy: -14 });
      const dm = Math.atan2(M2.y - M1.y, M2.x - M1.x);
      const dq = Math.atan2(Q.y - P.y, Q.x - P.x);
      let diff = Math.abs((dm - dq) * 180 / Math.PI) % 180;
      if (diff > 90) diff = 180 - diff;
      Figures.label(ctx, { x: w / 2, y: h * 0.06 }, `Угол между PQ и m: ${Geo.fmt(diff)}° (цель — 90°)`, { color: Geo.ink() });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return {
      render, destroy: unbind,
      metrics: () => {
        const dm = Math.atan2(M2.y - M1.y, M2.x - M1.x);
        const dq = Math.atan2(Q.y - P.y, Q.x - P.x);
        let diff = Math.abs((dm - dq) * 180 / Math.PI) % 180;
        if (diff > 90) diff = 180 - diff;
        return { angleToLine: diff };
      },
    };
  },

  /* Две пересекающиеся прямые: 4 угла — смежные (в сумме 180°) и вертикальные (равны).
     Отдельный чертёж именно под §6 «Перпендикулярные прямые», а не общий "angle". */
  linepair(ctx, canvas, ctrl, spec, w, h) {
    const O = { x: w / 2, y: h / 2, fixed: true };
    const R = Math.min(w, h) * 0.38;
    let a0 = -0.35, a1 = 1.15; // начальные направления двух прямых (радианы)
    const A = { x: O.x + R * Math.cos(a0), y: O.y + R * Math.sin(a0) };
    const B = { x: O.x + R * Math.cos(a1), y: O.y + R * Math.sin(a1) };
    const pts = [O, A, B];
    let perp = false;
    ctrl.innerHTML = `<label class="fig-chk"><input type="checkbox" data-k="perp"> Сделать прямые перпендикулярными</label>`;
    ctrl.querySelector('[data-k="perp"]').addEventListener("change", (e) => { perp = e.target.checked; render(); });
    function render() {
      Figures.drawBase(ctx, w, h);
      let dirA = Math.atan2(A.y - O.y, A.x - O.x);
      let dirB = Math.atan2(B.y - O.y, B.x - O.x);
      if (perp) {
        dirB = dirA + Math.PI / 2;
        B.x = O.x + Geo.distPx(O, B) * Math.cos(dirB);
        B.y = O.y + Geo.distPx(O, B) * Math.sin(dirB);
      }
      const far = Math.max(w, h);
      const Aext = { x: O.x - far * Math.cos(dirA), y: O.y - far * Math.sin(dirA) };
      const Bext = { x: O.x - far * Math.cos(dirB), y: O.y - far * Math.sin(dirB) };
      const A2 = { x: O.x + far * Math.cos(dirA), y: O.y + far * Math.sin(dirA) };
      const B2 = { x: O.x + far * Math.cos(dirB), y: O.y + far * Math.sin(dirB) };
      Figures.line(ctx, Aext, A2, { stroke: "#5b6bd6", lw: 2.5 });
      Figures.line(ctx, Bext, B2, { stroke: "#5b6bd6", lw: 2.5 });
      // 4 направления вокруг точки O, отсортированные по углу
      const rays = [dirA, dirB, dirA + Math.PI, dirB + Math.PI].map((a) => ((a % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI));
      rays.sort((x, y) => x - y);
      const colors = ["#ff9f43", "#2ecc71", "#ff9f43", "#2ecc71"]; // соседние сектора чередуются (смежные), через один — совпадают (вертикальные)
      for (let i = 0; i < 4; i++) {
        const s = rays[i], e = i < 3 ? rays[i + 1] : rays[0] + 2 * Math.PI;
        const mid = (s + e) / 2;
        const deg = Geo.fmt((e - s) * 180 / Math.PI);
        ctx.beginPath(); ctx.arc(O.x, O.y, 30, s, e, false);
        ctx.strokeStyle = colors[i]; ctx.lineWidth = 2.5; ctx.stroke();
        Figures.label(ctx, { x: O.x + 52 * Math.cos(mid), y: O.y + 52 * Math.sin(mid) }, `${deg}°`, { color: colors[i], font: "700 13px Rubik, sans-serif" });
      }
      Figures.dot(ctx, O, { r: 6 });
      Figures.dot(ctx, A); Figures.dot(ctx, B);
      Figures.label(ctx, A, "A", { dy: A.y < O.y ? -14 : 20 });
      Figures.label(ctx, B, "B", { dy: B.y < O.y ? -14 : 20 });
      if (perp) Figures.label(ctx, { x: O.x, y: O.y - R - 20 }, "прямые перпендикулярны (⊥) — все 4 угла по 90°", { color: Geo.ink() });
      else Figures.label(ctx, { x: O.x, y: O.y - R - 20 }, "одинаковый цвет — вертикальные углы (равны); соседние цвета — смежные (в сумме 180°)", { color: Geo.ink(), font: "600 12px Rubik, sans-serif" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => ({}) };
  },

  angle(ctx, canvas, ctrl, spec, w, h) {
    const O = { x: w * 0.28, y: h * 0.72, fixed: !!spec.withProtractor };
    let A, B;
    if (spec.withProtractor) {
      const deg = spec.fixedDeg != null ? spec.fixedDeg : 45;
      A = { x: O.x + 150, y: O.y, fixed: true };
      const rad = deg * Math.PI / 180;
      B = { x: O.x + 150 * Math.cos(-rad), y: O.y + 150 * Math.sin(-rad), fixed: true };
    } else {
      A = { x: w * 0.85, y: h * 0.72 };
      B = { x: w * 0.4, y: h * 0.18 };
    }
    const pts = [O, A, B];
    let showBisector = false;
    if (!spec.withProtractor) {
      ctrl.innerHTML = `<label class="fig-chk"><input type="checkbox" data-k="bis"> Показать биссектрису</label>`;
      ctrl.querySelector('[data-k="bis"]').addEventListener("change", (e) => { showBisector = e.target.checked; render(); });
    }
    function render() {
      Figures.drawBase(ctx, w, h);
      if (spec.withProtractor) {
        // полукруг транспортира с делениями по 10°, ноль совмещён со стороной OA
        ctx.beginPath(); ctx.arc(O.x, O.y, 100, -Math.PI, 0, false);
        ctx.strokeStyle = Geo.ink(); ctx.lineWidth = 1.5; ctx.stroke();
        for (let d = 0; d <= 180; d += 10) {
          const rad = d * Math.PI / 180;
          const r1 = 100, r2 = d % 30 === 0 ? 86 : 92;
          const p1 = { x: O.x + r1 * Math.cos(-rad), y: O.y + r1 * Math.sin(-rad) };
          const p2 = { x: O.x + r2 * Math.cos(-rad), y: O.y + r2 * Math.sin(-rad) };
          Figures.line(ctx, p1, p2, { stroke: Geo.ink(), lw: 1 });
          if (d % 30 === 0) Figures.label(ctx, { x: O.x + 112 * Math.cos(-rad), y: O.y + 112 * Math.sin(-rad) }, String(d), { font: "10px Rubik, sans-serif", color: Geo.ink() });
        }
      }
      Figures.line(ctx, O, A, { stroke: "#5b6bd6", lw: 3 });
      Figures.line(ctx, O, B, { stroke: "#5b6bd6", lw: 3 });
      const ang = Geo.angleDeg(O, A, B);
      // дуга угла
      const a1 = Math.atan2(A.y - O.y, A.x - O.x), a2 = Math.atan2(B.y - O.y, B.x - O.x);
      ctx.beginPath(); ctx.arc(O.x, O.y, 34, a1, a2, Geo.arcSweep(a1, a2)); ctx.strokeStyle = "#ff9f43"; ctx.lineWidth = 2.5; ctx.stroke();
      if (showBisector) {
        const mid = { x: (Math.cos(a1) + Math.cos(a2)) / 2, y: (Math.sin(a1) + Math.sin(a2)) / 2 };
        const len = Math.hypot(mid.x, mid.y) || 1;
        const K = { x: O.x + mid.x / len * 140, y: O.y + mid.y / len * 140 };
        Figures.line(ctx, O, K, { stroke: "#2ecc71", lw: 2, dash: [6, 4] });
        Figures.label(ctx, K, "K", { dy: -10, color: "#199a53" });
      }
      Figures.dot(ctx, O, { r: 6 }); Figures.dot(ctx, A, { r: 6 }); Figures.dot(ctx, B, { r: 6 });
      Figures.label(ctx, O, "O", { dy: 20 });
      Figures.label(ctx, A, "A", { dy: 20 });
      Figures.label(ctx, B, "B", { dy: -12 });
      if (!spec.withProtractor) Figures.label(ctx, { x: O.x + 46, y: O.y - 26 }, `∠AOB = ${Geo.fmt(ang)}°`, { color: "#c9740f", align: "left" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => ({ angle: Geo.angleDeg(O, A, B) }) };
  },

  triangle(ctx, canvas, ctrl, spec, w, h) {
    let A = { x: w * 0.5, y: h * 0.15 };
    let B = { x: w * 0.18, y: h * 0.85 };
    let C = { x: w * 0.82, y: h * 0.85 };
    const pts = [A, B, C];
    const show = { sides: true, angles: false, area: false };
    let lineFrom = null; // 'height' | 'median' | 'bisector' | null
    let fromVertex = "A";
    ctrl.innerHTML = `
      <label class="fig-chk"><input type="checkbox" data-k="sides" checked> Стороны</label>
      <label class="fig-chk"><input type="checkbox" data-k="angles"> Углы</label>
      <label class="fig-chk"><input type="checkbox" data-k="area"> Площадь</label>
      <select class="fig-select" data-k="vertex"><option value="A">из A</option><option value="B">из B</option><option value="C">из C</option></select>
      <select class="fig-select" data-k="line">
        <option value="">Доп. линия…</option>
        <option value="height">Высота</option>
        <option value="median">Медиана</option>
        <option value="bisector">Биссектриса</option>
      </select>`;
    ctrl.querySelector('[data-k="sides"]').addEventListener("change", (e) => { show.sides = e.target.checked; render(); });
    ctrl.querySelector('[data-k="angles"]').addEventListener("change", (e) => { show.angles = e.target.checked; render(); });
    ctrl.querySelector('[data-k="area"]').addEventListener("change", (e) => { show.area = e.target.checked; render(); });
    ctrl.querySelector('[data-k="vertex"]').addEventListener("change", (e) => { fromVertex = e.target.value; render(); });
    ctrl.querySelector('[data-k="line"]').addEventListener("change", (e) => { lineFrom = e.target.value || null; render(); });

    function vmap() { return { A, B, C }; }
    function extraLine() {
      if (!lineFrom) return;
      const V = vmap()[fromVertex];
      const others = ["A", "B", "C"].filter((k) => k !== fromVertex).map((k) => vmap()[k]);
      const [P, Q] = others;
      if (lineFrom === "median") {
        const M = Geo.midpoint(P, Q);
        Figures.line(ctx, V, M, { stroke: "#2ecc71", lw: 2, dash: [7, 5] });
        Figures.label(ctx, M, "M", { dy: 16, color: "#199a53" });
      } else if (lineFrom === "height") {
        // проекция V на прямую PQ
        const dx = Q.x - P.x, dy = Q.y - P.y;
        const t = ((V.x - P.x) * dx + (V.y - P.y) * dy) / (dx * dx + dy * dy || 1);
        const H = { x: P.x + t * dx, y: P.y + t * dy };
        Figures.line(ctx, V, H, { stroke: "#e6572e", lw: 2, dash: [7, 5] });
        Figures.label(ctx, H, "H", { dy: 16, color: "#c8451f" });
      } else if (lineFrom === "bisector") {
        const dP = Geo.distPx(V, P), dQ = Geo.distPx(V, Q);
        const t = dP / (dP + dQ);
        const K = { x: P.x + t * (Q.x - P.x), y: P.y + t * (Q.y - P.y) };
        Figures.line(ctx, V, K, { stroke: "#8b5cf6", lw: 2, dash: [7, 5] });
        Figures.label(ctx, K, "K", { dy: 16, color: "#6d3fd6" });
      }
    }
    function render() {
      Figures.drawBase(ctx, w, h);
      Figures.poly(ctx, [A, B, C], { fill: "rgba(91,107,214,0.10)" });
      extraLine();
      [["A", A], ["B", B], ["C", C]].forEach(([name, p]) => {
        Figures.dot(ctx, p);
        Figures.label(ctx, p, name, { dy: p.y < h / 2 ? -14 : 20 });
      });
      if (show.sides) {
        const pairs = [["c", A, B], ["a", B, C], ["b", C, A]];
        pairs.forEach(([nm, p1, p2]) => {
          const mid = Geo.midpoint(p1, p2);
          Figures.label(ctx, mid, `${nm}=${Geo.fmt(Geo.dist(p1, p2))}`, { color: "#3a4bcf" });
        });
      }
      if (show.angles) {
        Figures.label(ctx, { x: A.x, y: A.y + (A.y < h / 2 ? 34 : -30) }, `${Geo.fmt(Geo.angleDeg(A, B, C))}°`, { color: "#c9740f" });
        Figures.label(ctx, { x: B.x, y: B.y + (B.y < h / 2 ? 34 : -30) }, `${Geo.fmt(Geo.angleDeg(B, A, C))}°`, { color: "#c9740f" });
        Figures.label(ctx, { x: C.x, y: C.y + (C.y < h / 2 ? 34 : -30) }, `${Geo.fmt(Geo.angleDeg(C, A, B))}°`, { color: "#c9740f" });
      }
      if (show.area) {
        const cen = { x: (A.x + B.x + C.x) / 3, y: (A.y + B.y + C.y) / 3 };
        Figures.label(ctx, cen, `S=${Geo.fmt(Geo.areaShoelace([A, B, C]))}`, { color: "#199a53", font: "700 15px Rubik, sans-serif" });
      }
    }
    if (spec.showHeightFrom) { lineFrom = "height"; fromVertex = spec.showHeightFrom; }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return {
      render, destroy: unbind,
      metrics: () => ({ a: Geo.dist(B, C), b: Geo.dist(C, A), c: Geo.dist(A, B), area: Geo.areaShoelace([A, B, C]) }),
    };
  },

  quad(ctx, canvas, ctrl, spec, w, h) {
    const presets = {
      rectangle: [[0.2, 0.25], [0.8, 0.25], [0.8, 0.78], [0.2, 0.78]],
      square: [[0.28, 0.22], [0.74, 0.22], [0.74, 0.68], [0.28, 0.68]],
      parallelogram: [[0.3, 0.22], [0.82, 0.22], [0.66, 0.8], [0.14, 0.8]],
      trapezoid: [[0.38, 0.18], [0.66, 0.18], [0.86, 0.8], [0.14, 0.8]],
      rhombus: [[0.5, 0.14], [0.85, 0.5], [0.5, 0.86], [0.15, 0.5]],
    };
    const preset = presets[spec.variant] || presets.parallelogram;
    const pts = preset.map(([px, py]) => ({ x: px * w, y: py * h }));
    const [A, B, C, D] = pts;
    const show = { sides: true, diagonals: false, angles: false, area: false };
    ctrl.innerHTML = `
      <label class="fig-chk"><input type="checkbox" data-k="sides" checked> Стороны</label>
      <label class="fig-chk"><input type="checkbox" data-k="diagonals"> Диагонали</label>
      <label class="fig-chk"><input type="checkbox" data-k="angles"> Углы</label>
      <label class="fig-chk"><input type="checkbox" data-k="area"> Площадь</label>`;
    ["sides", "diagonals", "angles", "area"].forEach((k) => {
      ctrl.querySelector(`[data-k="${k}"]`).addEventListener("change", (e) => { show[k] = e.target.checked; render(); });
    });
    function render() {
      Figures.drawBase(ctx, w, h);
      Figures.poly(ctx, pts, { fill: "rgba(91,107,214,0.10)" });
      if (show.diagonals) { Figures.line(ctx, A, C, { stroke: "#ff9f43", dash: [6, 4] }); Figures.line(ctx, B, D, { stroke: "#ff9f43", dash: [6, 4] }); }
      ["A", "B", "C", "D"].forEach((name, i) => {
        Figures.dot(ctx, pts[i]);
        Figures.label(ctx, pts[i], name, { dy: pts[i].y < h / 2 ? -14 : 20 });
      });
      if (show.sides) {
        for (let i = 0; i < 4; i++) {
          const p1 = pts[i], p2 = pts[(i + 1) % 4];
          const mid = Geo.midpoint(p1, p2);
          Figures.label(ctx, mid, Geo.fmt(Geo.dist(p1, p2)), { color: "#3a4bcf" });
        }
      }
      if (show.angles) {
        for (let i = 0; i < 4; i++) {
          const prev = pts[(i + 3) % 4], cur = pts[i], next = pts[(i + 1) % 4];
          Figures.label(ctx, { x: cur.x, y: cur.y + (cur.y < h / 2 ? 30 : -26) }, `${Geo.fmt(Geo.angleDeg(cur, prev, next))}°`, { color: "#c9740f" });
        }
      }
      if (show.area) {
        const cen = { x: pts.reduce((s, p) => s + p.x, 0) / 4, y: pts.reduce((s, p) => s + p.y, 0) / 4 };
        Figures.label(ctx, cen, `S=${Geo.fmt(Geo.areaShoelace(pts))}`, { color: "#199a53", font: "700 15px Rubik, sans-serif" });
      }
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => ({ area: Geo.areaShoelace(pts) }) };
  },

  circle(ctx, canvas, ctrl, spec, w, h) {
    const O = { x: w / 2, y: h / 2, fixed: true };
    const R = { x: w / 2 + 120, y: h / 2 };
    const pts = [O, R];
    let n = spec.polygon || 0;
    let mode = spec.mode || "inscribed";
    ctrl.innerHTML = `
      <label class="fig-chk">Вписанный n-угольник:
        <input type="range" min="0" max="8" value="${n}" data-k="n">
        <span data-k="nval">${n || "—"}</span>
      </label>
      <select class="fig-select" data-k="mode">
        <option value="inscribed">Вписан в окружность</option>
        <option value="circumscribed">Описан вокруг окружности</option>
      </select>`;
    ctrl.querySelector('[data-k="n"]').addEventListener("input", (e) => {
      n = +e.target.value; ctrl.querySelector('[data-k="nval"]').textContent = n || "—"; render();
    });
    ctrl.querySelector('[data-k="mode"]').value = mode;
    ctrl.querySelector('[data-k="mode"]').addEventListener("change", (e) => { mode = e.target.value; render(); });
    function render() {
      Figures.drawBase(ctx, w, h);
      const r = Geo.distPx(O, R);
      ctx.beginPath(); ctx.arc(O.x, O.y, r, 0, Math.PI * 2);
      ctx.strokeStyle = "#5b6bd6"; ctx.lineWidth = 2.5; ctx.stroke();
      if (n >= 3) {
        const poly = [];
        const rr = mode === "circumscribed" ? r / Math.cos(Math.PI / n) : r;
        for (let i = 0; i < n; i++) {
          const a = -Math.PI / 2 + i * (2 * Math.PI / n);
          poly.push({ x: O.x + rr * Math.cos(a), y: O.y + rr * Math.sin(a) });
        }
        Figures.poly(ctx, poly, { stroke: "#ff9f43", fill: "rgba(255,159,67,0.08)" });
      }
      Figures.dot(ctx, O, { r: 6 }); Figures.dot(ctx, R, { r: 6 });
      Figures.line(ctx, O, R, { stroke: "#8b93d6", dash: [4, 4] });
      const rUnits = r / Geo.UNIT;
      Figures.label(ctx, { x: O.x, y: O.y - r - 14 }, `r=${Geo.fmt(rUnits)}  C=${Geo.fmt(2 * Math.PI * rUnits)}  S=${Geo.fmt(Math.PI * rUnits * rUnits)}`, { color: "#3a4bcf" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => ({ r: Geo.distPx(O, R) / Geo.UNIT }) };
  },

  pytriangle(ctx, canvas, ctrl, spec, w, h) {
    const C = { x: w * 0.22, y: h * 0.82, fixed: true }; // прямой угол
    const A = { x: w * 0.78, y: h * 0.82, dragAxis: "x" };
    const B = { x: w * 0.22, y: h * 0.18, dragAxis: "y" };
    const pts = [C, A, B];
    let showSquares = true;
    ctrl.innerHTML = `<label class="fig-chk"><input type="checkbox" data-k="sq" checked> Квадраты на сторонах</label>`;
    ctrl.querySelector('[data-k="sq"]').addEventListener("change", (e) => { showSquares = e.target.checked; render(); });
    function squareOn(p1, p2, side) {
      const dx = p2.x - p1.x, dy = p2.y - p1.y;
      const nx = -dy, ny = dx; // нормаль
      const sign = side;
      const p3 = { x: p2.x + nx * sign, y: p2.y + ny * sign };
      const p4 = { x: p1.x + nx * sign, y: p1.y + ny * sign };
      return [p1, p2, p3, p4];
    }
    function render() {
      Figures.drawBase(ctx, w, h);
      if (showSquares) {
        Figures.poly(ctx, squareOn(C, A, 1), { fill: "rgba(46,204,113,0.18)", stroke: "#2ecc71" });
        Figures.poly(ctx, squareOn(B, C, 1), { fill: "rgba(255,159,67,0.18)", stroke: "#ff9f43" });
        Figures.poly(ctx, squareOn(A, B, -1), { fill: "rgba(91,107,214,0.18)", stroke: "#5b6bd6" });
      }
      Figures.poly(ctx, [A, B, C], { fill: "rgba(255,255,255,0.5)" });
      // прямой угол — маленький квадратик
      ctx.strokeStyle = Geo.ink(); ctx.lineWidth = 1.5;
      ctx.strokeRect(C.x, C.y - 14, 14, 14);
      [["A", A], ["B", B], ["C", C]].forEach(([nm, p]) => { Figures.dot(ctx, p); Figures.label(ctx, p, nm, { dy: p.y < h / 2 ? -14 : 20 }); });
      const a = Geo.dist(B, C), b = Geo.dist(C, A), c = Geo.dist(A, B);
      Figures.label(ctx, Geo.midpoint(B, C), `a=${Geo.fmt(a)}`, { color: "#199a53" });
      Figures.label(ctx, Geo.midpoint(C, A), `b=${Geo.fmt(b)}`, { color: "#c9740f" });
      Figures.label(ctx, Geo.midpoint(A, B), `c=${Geo.fmt(c)}`, { color: "#3a4bcf" });
      if (spec.showTrig) {
        Figures.label(ctx, { x: w * 0.5, y: h * 0.06 }, `sin α=${Geo.fmt(a / c)}  cos α=${Geo.fmt(b / c)}  tg α=${Geo.fmt(a / b)}`, { color: Geo.ink() });
      } else {
        Figures.label(ctx, { x: w * 0.5, y: h * 0.06 }, `a²+b² = ${Geo.fmt(a * a + b * b)}   c² = ${Geo.fmt(c * c)}`, { color: Geo.ink() });
      }
    }
    // ограничим перетаскивание A по горизонтали, B по вертикали, чтобы угол C оставался прямым
    let unbindBase;
    function wire() {
      unbindBase = Figures.wireDrag(canvas, pts, () => {
        A.y = C.y; B.x = C.x; render();
      });
    }
    wire();
    return { render, destroy: () => unbindBase(), metrics: () => ({ a: Geo.dist(B, C), b: Geo.dist(C, A), c: Geo.dist(A, B) }) };
  },

  thales(ctx, canvas, ctrl, spec, w, h) {
    const O = { x: w * 0.12, y: h * 0.88, fixed: true };
    const P1 = { x: w * 0.5, y: h * 0.42 }; // точка на первом луче (двигаем)
    const P2 = { x: w * 0.9, y: h * 0.08, fixed: true }; // конец первого луча
    const Q2 = { x: w * 0.92, y: h * 0.5, fixed: true }; // конец второго луча
    const pts = [O, P1, P2, Q2];
    function project(pt) {
      // точка на втором луче, соответствующая P1, через сохранение параллельности OP2 к прямым через P1/Q
      const t = Geo.distPx(O, pt) / Geo.distPx(O, P2);
      return { x: O.x + t * (Q2.x - O.x), y: O.y + t * (Q2.y - O.y) };
    }
    function render() {
      Figures.drawBase(ctx, w, h);
      Figures.line(ctx, O, P2, { stroke: "#5b6bd6", lw: 2.5 });
      Figures.line(ctx, O, Q2, { stroke: "#5b6bd6", lw: 2.5 });
      const Q1 = project(P1);
      Figures.line(ctx, P1, Q1, { stroke: "#ff9f43", dash: [6, 4] });
      Figures.line(ctx, P2, Q2, { stroke: "#ff9f43", dash: [6, 4] });
      [O, P1, P2, Q2].forEach((p) => Figures.dot(ctx, p, { r: 6 }));
      Figures.dot(ctx, Q1, { r: 6, fill: "#c9740f" });
      const OB = Geo.dist(O, P1), BC = Geo.dist(P1, P2);
      const OB2 = Geo.dist(O, Q1), BC2 = Geo.dist(Q1, Q2);
      Figures.label(ctx, { x: w * 0.5, y: h * 0.94 }, `OB/BC = ${Geo.fmt(OB / (BC || 1))}   OB'/B'C' = ${Geo.fmt(OB2 / (BC2 || 1))}`, { color: Geo.ink() });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => ({}) };
  },

  vectors(ctx, canvas, ctrl, spec, w, h) {
    const O = { x: w * 0.22, y: h * 0.8, fixed: true };
    const A = { x: w * 0.55, y: h * 0.35 };
    const B = { x: w * 0.75, y: h * 0.68 };
    const pts = [O, A, B];
    function arrow(p1, p2, color) {
      Figures.line(ctx, p1, p2, { stroke: color, lw: 2.5 });
      const ang = Math.atan2(p2.y - p1.y, p2.x - p1.x);
      const s = 10;
      ctx.beginPath();
      ctx.moveTo(p2.x, p2.y);
      ctx.lineTo(p2.x - s * Math.cos(ang - 0.4), p2.y - s * Math.sin(ang - 0.4));
      ctx.lineTo(p2.x - s * Math.cos(ang + 0.4), p2.y - s * Math.sin(ang + 0.4));
      ctx.closePath(); ctx.fillStyle = color; ctx.fill();
    }
    function render() {
      Figures.drawBase(ctx, w, h);
      arrow(O, A, "#5b6bd6");
      arrow(O, B, "#ff9f43");
      const sum = { x: A.x + (B.x - O.x), y: A.y + (B.y - O.y) };
      arrow(O, sum, "#2ecc71");
      Figures.label(ctx, A, "a", { color: "#3a4bcf", dy: -10 });
      Figures.label(ctx, B, "b", { color: "#c9740f", dy: 16 });
      Figures.label(ctx, sum, "a+b", { color: "#199a53", dy: -10 });
      const la = Geo.dist(O, A), lb = Geo.dist(O, B);
      Figures.label(ctx, { x: w * 0.5, y: h * 0.06 }, `|a|=${Geo.fmt(la)}  |b|=${Geo.fmt(lb)}`, { color: Geo.ink() });
    }
    const unbind = Figures.wireDrag(canvas, [O, A, B], render);
    return { render, destroy: unbind, metrics: () => ({}) };
  },
};

</script>
<script>
/* theorems.js — анимации-симуляции ключевых теорем на Canvas */
const Theorems = {
  mount(container, anim) {
    const w = Math.min(560, container.clientWidth || 520), h = 380;
    container.innerHTML = `
      <div class="fig-wrap">
        <canvas class="fig-canvas" width="${w}" height="${h}"></canvas>
        <div class="fig-controls">
          <button class="btn btn-primary btn-sm" data-act="th-play">▶ Запустить анимацию</button>
          <button class="btn btn-ghost btn-sm" data-act="th-reset">⟲ Сброс</button>
        </div>
      </div>`;
    const canvas = container.querySelector(".fig-canvas");
    const ctx = canvas.getContext("2d");
    const fn = ANIMATORS[anim] || ANIMATORS.pythagoras;
    const inst = fn(ctx, canvas, w, h);
    let raf = null;
    function loop(ts) {
      const done = inst.step(ts);
      inst.draw();
      if (!done) raf = requestAnimationFrame(loop);
      else raf = null;
    }
    container.querySelector('[data-act="th-play"]').addEventListener("click", () => {
      inst.play();
      if (!raf) raf = requestAnimationFrame(loop);
    });
    container.querySelector('[data-act="th-reset"]').addEventListener("click", () => {
      if (raf) cancelAnimationFrame(raf);
      raf = null;
      inst.reset();
      inst.draw();
    });
    inst.draw();
    return { destroy: () => { if (raf) cancelAnimationFrame(raf); } };
  },
};

function easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }

const ANIMATORS = {
  /* --- Теорема Пифагора: квадраты на сторонах заполняются по очереди --- */
  pythagoras(ctx, canvas, w, h) {
    const C = { x: w * 0.28, y: h * 0.78 }, A = { x: w * 0.68, y: h * 0.78 }, B = { x: w * 0.28, y: h * 0.30 };
    let t0 = null, prog = 0, playing = false;
    function squareOn(p1, p2, sign) {
      const dx = p2.x - p1.x, dy = p2.y - p1.y;
      const nx = -dy, ny = dx;
      return [p1, p2, { x: p2.x + nx * sign, y: p2.y + ny * sign }, { x: p1.x + nx * sign, y: p1.y + ny * sign }];
    }
    function draw() {
      Figures.drawBase(ctx, w, h);
      const a = Geo.dist(B, C), b = Geo.dist(C, A), c = Geo.dist(A, B);
      const stages = [
        { poly: squareOn(C, A, 1), color: "46,204,113", val: b * b, lbl: "b²" },
        { poly: squareOn(B, C, 1), color: "255,159,67", val: a * a, lbl: "a²" },
        { poly: squareOn(A, B, -1), color: "91,107,214", val: c * c, lbl: "c²" },
      ];
      stages.forEach((s, i) => {
        const local = Geo.clamp(prog * 3 - i, 0, 1);
        Figures.poly(ctx, s.poly, { fill: `rgba(${s.color},${0.10 + 0.35 * local})`, stroke: `rgb(${s.color})` });
        if (local > 0.4) {
          const cen = { x: s.poly.reduce((sum, p) => sum + p.x, 0) / 4, y: s.poly.reduce((sum, p) => sum + p.y, 0) / 4 };
          Figures.label(ctx, cen, `${s.lbl}=${Geo.fmt(s.val)}`, { color: `rgb(${s.color})`, font: "700 15px Rubik, sans-serif" });
        }
      });
      Figures.poly(ctx, [A, B, C], { fill: "rgba(255,255,255,0.6)" });
      ctx.strokeRect(C.x, C.y - 14, 14, 14);
      if (prog >= 1) {
        Figures.label(ctx, { x: w / 2, y: h * 0.06 }, `a² + b² = ${Geo.fmt(a * a + b * b)}   c² = ${Geo.fmt(c * c)}  ✓ равны`, { color: Geo.ink(), font: "700 16px Rubik, sans-serif" });
      } else {
        Figures.label(ctx, { x: w / 2, y: h * 0.06 }, "Квадраты на катетах вместе равны квадрату на гипотенузе", { color: "#5b6bd6" });
      }
    }
    return {
      play() { playing = true; t0 = null; prog = 0; },
      reset() { playing = false; prog = 0; },
      step(ts) {
        if (!playing) return true;
        if (t0 == null) t0 = ts;
        prog = Geo.clamp((ts - t0) / 2400, 0, 1);
        if (prog >= 1) playing = false;
        return !playing;
      },
      draw,
    };
  },

  /* --- Сумма углов треугольника: углы «переносятся» к развёрнутому углу --- */
  anglesum(ctx, canvas, w, h) {
    const A = { x: w * 0.5, y: h * 0.15 }, B = { x: w * 0.15, y: h * 0.82 }, C = { x: w * 0.85, y: h * 0.82 };
    let t0 = null, prog = 0, playing = false;
    const baseY = h * 0.55, baseX0 = w * 0.2, baseLen = w * 0.6;
    function wedge(vertex, p1, p2, r) {
      const a1 = Math.atan2(p1.y - vertex.y, p1.x - vertex.x);
      const a2 = Math.atan2(p2.y - vertex.y, p2.x - vertex.x);
      return { a1, a2, ang: Geo.angleDeg(vertex, p1, p2) };
    }
    function draw() {
      Figures.drawBase(ctx, w, h);
      Figures.poly(ctx, [A, B, C], { fill: "rgba(91,107,214,0.08)" });
      [["A", A, B, C, "#5b6bd6"], ["B", B, A, C, "#ff9f43"], ["C", C, A, B, "#2ecc71"]].forEach(([nm, v, p1, p2]) => {
        Figures.dot(ctx, v); Figures.label(ctx, v, nm, { dy: v.y < h / 2 ? -14 : 20 });
      });
      // линия для сборки углов
      ctx.strokeStyle = "#c8c8e6"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(baseX0, baseY); ctx.lineTo(baseX0 + baseLen, baseY); ctx.stroke();
      const angA = Geo.angleDeg(A, B, C), angB = Geo.angleDeg(B, A, C), angC = Geo.angleDeg(C, A, B);
      const angs = [{ v: angA, color: "#5b6bd6", name: "A" }, { v: angB, color: "#ff9f43", name: "B" }, { v: angC, color: "#2ecc71", name: "C" }];
      let cursor = baseX0;
      angs.forEach((a) => {
        const rad = a.v * Math.PI / 180;
        const localProg = Geo.clamp(prog, 0, 1);
        // рисуем сектор угла, "перелетающий" от исходной вершины на базовую линию
        const cx = cursor, cy = baseY;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, 46, Math.PI, Math.PI - rad * localProg, true);
        ctx.closePath();
        ctx.fillStyle = a.color + "55";
        ctx.fill();
        ctx.strokeStyle = a.color; ctx.lineWidth = 1.5; ctx.stroke();
        cursor += 46 * Math.sin(rad * localProg) * 1.15 + 4;
      });
      if (prog >= 1) {
        Figures.label(ctx, { x: w / 2, y: baseY + 34 }, `∠A+∠B+∠C = ${Geo.fmt(angA + angB + angC)}° = 180° (развёрнутый угол)`, { color: Geo.ink(), font: "700 15px Rubik, sans-serif" });
      } else {
        Figures.label(ctx, { x: w / 2, y: h * 0.06 }, "Углы треугольника «переносятся» на прямую линию", { color: "#5b6bd6" });
      }
    }
    return {
      play() { playing = true; t0 = null; prog = 0; },
      reset() { playing = false; prog = 0; },
      step(ts) {
        if (!playing) return true;
        if (t0 == null) t0 = ts;
        prog = Geo.clamp((ts - t0) / 2200, 0, 1);
        if (prog >= 1) playing = false;
        return !playing;
      },
      draw,
    };
  },

  /* --- Теорема Фалеса: точка скользит, отношения сохраняются --- */
  thales(ctx, canvas, w, h) {
    const O = { x: w * 0.12, y: h * 0.88 };
    const P2 = { x: w * 0.9, y: h * 0.08 };
    const Q2 = { x: w * 0.92, y: h * 0.5 };
    let t0 = null, prog = 0, playing = false;
    function draw() {
      Figures.drawBase(ctx, w, h);
      Figures.line(ctx, O, P2, { stroke: "#5b6bd6", lw: 2.5 });
      Figures.line(ctx, O, Q2, { stroke: "#5b6bd6", lw: 2.5 });
      const t = 0.25 + 0.5 * (0.5 - 0.5 * Math.cos(prog * Math.PI * 2)); // туда-обратно
      const P1 = { x: O.x + t * (P2.x - O.x), y: O.y + t * (P2.y - O.y) };
      const Q1 = { x: O.x + t * (Q2.x - O.x), y: O.y + t * (Q2.y - O.y) };
      Figures.line(ctx, P1, Q1, { stroke: "#ff9f43", dash: [6, 4] });
      [O, P1, P2, Q1, Q2].forEach((p) => Figures.dot(ctx, p, { r: 6 }));
      const OB = Geo.dist(O, P1), BC = Geo.dist(P1, P2);
      const OB2 = Geo.dist(O, Q1), BC2 = Geo.dist(Q1, Q2);
      Figures.label(ctx, { x: w * 0.5, y: h * 0.06 }, `OB/BC = ${Geo.fmt(OB / (BC || 1))}   OB'/B'C' = ${Geo.fmt(OB2 / (BC2 || 1))} — равны при любом t`, { color: Geo.ink() });
    }
    return {
      play() { playing = true; t0 = null; prog = 0; },
      reset() { playing = false; prog = 0; },
      step(ts) {
        if (!playing) return true;
        if (t0 == null) t0 = ts;
        prog = Geo.clamp((ts - t0) / 3200, 0, 1);
        if (prog >= 1) playing = false;
        return !playing;
      },
      draw,
    };
  },

  /* --- Площадь параллелограмма: треугольник переносится, получаем прямоугольник --- */
  parallelogram(ctx, canvas, w, h) {
    const A = { x: w * 0.3, y: h * 0.22 }, B = { x: w * 0.82, y: h * 0.22 }, C = { x: w * 0.66, y: h * 0.8 }, D = { x: w * 0.14, y: h * 0.8 };
    // отрезаем треугольник A-D-D' (где D' — проекция D на AB) слева и переносим его вправо
    let t0 = null, prog = 0, playing = false;
    // высота от D к прямой AB
    const dx = B.x - A.x, dy = B.y - A.y;
    const tproj = ((D.x - A.x) * dx + (D.y - A.y) * dy) / (dx * dx + dy * dy);
    const Dp = { x: A.x + tproj * dx, y: A.y + tproj * dy }; // основание высоты из D
    const shift = { x: C.x - D.x, y: C.y - D.y }; // на сколько сдвинуть отрезанный треугольник вправо (чтобы AD встало на BC)
    function draw() {
      Figures.drawBase(ctx, w, h);
      const e = easeInOut(prog);
      // основная часть параллелограмма, которая остаётся на месте (трапеция A' B C D с учётом сдвига)
      Figures.poly(ctx, [A, B, C, D], { fill: "rgba(91,107,214,0.06)", stroke: "#c8c8e6" });
      // отрезанный треугольник A-D-Dp, анимированно сдвигается к месту B-C-(Dp+shift)
      const An = { x: A.x + shift.x * e, y: A.y + shift.y * e };
      const Dn = { x: D.x + shift.x * e, y: D.y + shift.y * e };
      const Dpn = { x: Dp.x + shift.x * e, y: Dp.y + shift.y * e };
      Figures.poly(ctx, [A, D, Dp], { fill: "rgba(255,159,67,0.10)", stroke: "#dfe1f5" });
      Figures.poly(ctx, [An, Dn, Dpn], { fill: "rgba(255,159,67,0.35)", stroke: "#ff9f43" });
      // неподвижная часть (трапеция Dp-B-C-D)
      Figures.poly(ctx, [Dp, B, C, D], { fill: "rgba(91,107,214,0.18)", stroke: "#5b6bd6" });
      const area = Geo.areaShoelace([A, B, C, D]);
      Figures.label(ctx, { x: w / 2, y: h * 0.06 }, prog >= 1
        ? `Прямоугольник той же площади: S = ${Geo.fmt(area)}`
        : "Отрезаем треугольник слева и прикладываем справа →", { color: Geo.ink(), font: "600 14px Rubik, sans-serif" });
    }
    return {
      play() { playing = true; t0 = null; prog = 0; },
      reset() { playing = false; prog = 0; },
      step(ts) {
        if (!playing) return true;
        if (t0 == null) t0 = ts;
        prog = Geo.clamp((ts - t0) / 2200, 0, 1);
        if (prog >= 1) playing = false;
        return !playing;
      },
      draw,
    };
  },
};

</script>
<script>
/* tasks.js — рендер и проверка заданий: choice / input / explore / build / error / match / proof */
const TYPE_LABEL = { choice: "Выбор ответа", input: "Введи число", explore: "Исследование", build: "Построение", error: "Найди ошибку", match: "Соотнеси", proof: "Докажи" };
const TYPE_ICO = { choice: "🎯", input: "🔢", explore: "🔬", build: "📐", error: "🕵️", match: "🔗", proof: "🧠" };
const DIFF_STARS = { easy: "★☆☆", medium: "★★☆", hard: "★★★" };

const Tasks = {
  render(task, topicId, ui) {
    const done = State.taskDone(task.id, topicId);
    const fb = ui.taskFb && ui.taskFb[task.id];
    const diff = task.difficulty ? `<span class="task-diff" title="Сложность">${DIFF_STARS[task.difficulty] || ""}</span>` : "";
    const head = `<div class="task-head"><span class="task-type">${TYPE_ICO[task.type]} ${TYPE_LABEL[task.type]}</span>${diff}${done ? '<span class="task-done">✓ выполнено</span>' : ""}</div>`;
    const q = `<div class="task-q">${esc2(task.q)}</div>`;
    let body = "";
    if (task.type === "choice" || task.type === "proof") {
      body = `<div class="task-opts">${(task.options || []).map((op, i) => {
        let cls = "task-opt";
        if (fb) { if (i === task.correct) cls += " opt-correct"; else if (i === fb.choice) cls += " opt-wrong"; }
        return `<button class="${cls}" data-act="task-choice" data-task="${task.id}" data-topic="${topicId}" data-idx="${i}" ${fb ? "disabled" : ""}>${esc2(op)}</button>`;
      }).join("")}</div>
        ${fb ? `<div class="task-fb ${fb.correct ? "fb-ok" : "fb-bad"}">${fb.correct ? "Верно! ✅" : "Неверно — правильный ответ подсвечен зелёным"}</div>` : ""}`;
    } else if (task.type === "input") {
      body = `<div class="task-input-row">
          <input type="text" inputmode="decimal" class="task-input" data-task="${task.id}" placeholder="Ответ${task.unit ? " (" + task.unit + ")" : ""}" ${fb && fb.correct ? "disabled" : ""} value="${fb ? esc2(fb.val || "") : ""}">
          <button class="btn btn-primary btn-sm" data-act="task-input" data-task="${task.id}" data-topic="${topicId}">Проверить</button>
        </div>
        ${fb ? `<div class="task-fb ${fb.correct ? "fb-ok" : "fb-bad"}">${fb.correct ? "Верно! ✅" : "Пока не так, попробуй ещё раз"}</div>` : ""}`;
    } else if (task.type === "error") {
      body = `<div class="task-figure" data-figure='${JSON.stringify(task.figure || { type: "triangle" })}'></div>
        <div class="task-labels">${(task.labels || []).map((l, i) => {
          let cls = "task-label";
          if (fb) { if (l.wrong) cls += " opt-correct"; else if (i === fb.choice && !l.wrong) cls += " opt-wrong"; }
          return `<button class="${cls}" data-act="task-error" data-task="${task.id}" data-topic="${topicId}" data-idx="${i}" ${fb ? "disabled" : ""}>${esc2(l.text)}</button>`;
        }).join("")}</div>
        ${fb ? `<div class="task-fb ${fb.correct ? "fb-ok" : "fb-bad"}">${fb.correct ? "Точно, это и есть ошибка! ✅" : "Это утверждение верное — ищи другое"}</div>` : ""}`;
    } else if (task.type === "explore") {
      const note = State.data.exploreNotes[task.id] || "";
      body = `<div class="task-figure" data-figure='${JSON.stringify(task.figure || { type: "triangle" })}'></div>
        ${task.hints ? `<details class="task-hints"><summary>💡 Подсказки</summary><ul>${task.hints.map((hnt) => `<li>${esc2(hnt)}</li>`).join("")}</ul></details>` : ""}
        <textarea class="task-note" data-task="${task.id}" placeholder="Запиши свой вывод здесь…">${esc2(note)}</textarea>
        <button class="btn btn-primary btn-sm" data-act="task-explore" data-task="${task.id}" data-topic="${topicId}" ${done ? "disabled" : ""}>${done ? "Вывод сохранён ✓" : "Сохранить вывод"}</button>
        ${done && task.insight ? `<div class="task-explain">📎 Общий вывод: ${esc2(task.insight)}</div>` : ""}`;
    } else if (task.type === "build") {
      body = `<div class="task-figure" data-figure='${JSON.stringify(task.figure || { type: "triangle" })}'></div>
        <button class="btn btn-primary btn-sm" data-act="task-build" data-task="${task.id}" data-topic="${topicId}">Проверить построение</button>
        ${fb ? `<div class="task-fb ${fb.correct ? "fb-ok" : "fb-bad"}">${fb.correct ? "Отлично, построение подходит! ✅" : "Пока не совпадает — подвинь точки ещё"}</div>` : ""}`;
    } else if (task.type === "match") {
      const order = matchOrder(task);
      const rightTexts = order.map((origIdx) => task.pairs[origIdx].right);
      const sel = (fb && fb.sel) || {};
      body = `<div class="match-rows">${task.pairs.map((p, i) => {
        const isWrong = fb && fb.rowCorrect && !fb.rowCorrect[i];
        const rowState = fb ? (fb.rowCorrect && fb.rowCorrect[i] ? "match-ok" : "match-bad") : "";
        return `<div class="match-row">
            <span class="match-left">${esc2(p.left)}</span>
            <select class="match-select ${rowState}" data-task="${task.id}" data-idx="${i}" ${fb && fb.correct ? "disabled" : ""}>
              <option value="">…</option>
              ${rightTexts.map((r, pos) => `<option value="${pos}" ${String(sel[i]) === String(pos) ? "selected" : ""}>${esc2(r)}</option>`).join("")}
            </select>
            ${isWrong ? `<span class="match-hint">верно: «${esc2(p.right)}»</span>` : ""}
          </div>`;
      }).join("")}</div>
        <button class="btn btn-primary btn-sm" data-act="task-match" data-task="${task.id}" data-topic="${topicId}">Проверить</button>
        ${fb ? `<div class="task-fb ${fb.correct ? "fb-ok" : "fb-bad"}">${fb.correct ? "Все пары верны! ✅" : "Есть ошибки — верный ответ подсказан у неверных строк"}</div>` : ""}`;
    }
    const explain = (fb && task.explain) ? `<div class="task-explain">💡 ${esc2(task.explain)}</div>` : "";
    return `<div class="task-card ${done ? "task-card-done" : ""}" data-task-card="${task.id}">${head}${q}${body}${explain}</div>`;
  },

  mountFigures(root, topic) {
    root.querySelectorAll(".task-figure[data-figure]").forEach((el) => {
      let spec;
      try { spec = JSON.parse(el.getAttribute("data-figure")); } catch (e) { spec = { type: "triangle" }; }
      const inst = Figures.mount(el, spec);
      App.trackFigure(inst);
      el.__figureInst = inst;
    });
  },

  checkChoice(task, topicId, idx, ui) {
    ui.taskFb = ui.taskFb || {};
    const correct = idx === task.correct;
    ui.taskFb[task.id] = { choice: idx, correct };
    let result = null;
    if (correct) result = State.completeTask(task, topicId);
    return result;
  },

  checkError(task, topicId, idx, ui) {
    ui.taskFb = ui.taskFb || {};
    const correct = !!(task.labels[idx] && task.labels[idx].wrong);
    ui.taskFb[task.id] = { choice: idx, correct };
    let result = null;
    if (correct) result = State.completeTask(task, topicId);
    return result;
  },

  checkInput(task, topicId, rawVal, ui) {
    ui.taskFb = ui.taskFb || {};
    const val = parseFloat(String(rawVal).replace(",", ".").replace(/\s/g, ""));
    const tol = task.tol != null ? task.tol : 0.5;
    const correct = !isNaN(val) && Math.abs(val - task.answer) <= tol;
    ui.taskFb[task.id] = { val: rawVal, correct };
    let result = null;
    if (correct) result = State.completeTask(task, topicId);
    return result;
  },

  saveExplore(task, topicId, text) {
    State.saveExploreNote(task.id, text);
    return State.completeTask(task, topicId);
  },

  checkBuild(task, topicId, figEl, ui) {
    ui.taskFb = ui.taskFb || {};
    const inst = figEl ? figEl.__figureInst : null;
    const m = inst ? inst.metrics() : {};
    const target = task.target || {};
    let correct = false;
    if (target.type === "triangle" && target.kind === "isosceles" && m.a != null) {
      const sides = [m.a, m.b, m.c].sort((a, b) => a - b);
      correct = Math.abs(sides[0] - sides[1]) <= (task.tol || 0.08) * sides[2] || Math.abs(sides[1] - sides[2]) <= (task.tol || 0.08) * sides[2];
    } else if (target.type === "segment" && target.points === 3) {
      // три точки коллинеарны и B лежит между A и C
      correct = m.area != null && m.area <= (task.tol || 0.15) && !!m.betweenB;
    } else if (target.type === "angle" && target.degrees != null) {
      correct = m.angle != null && Math.abs(m.angle - target.degrees) <= (task.tol || 2);
    } else if (target.type === "segment" && target.operation === "sum") {
      correct = m.length != null && Math.abs(m.length - m.target) <= (task.tol || 0.15) * m.target;
    } else if (target.type === "perpendicular") {
      correct = m.angleToLine != null && Math.abs(m.angleToLine - 90) <= (task.tol || 2);
    }
    ui.taskFb[task.id] = { correct };
    let result = null;
    if (correct) result = State.completeTask(task, topicId);
    return result;
  },

  checkMatch(task, topicId, selMap, ui) {
    ui.taskFb = ui.taskFb || {};
    const order = matchOrder(task);
    const rowCorrect = {};
    let allOk = task.pairs.length > 0;
    task.pairs.forEach((p, i) => {
      const pos = selMap[i];
      const ok = pos != null && pos !== "" && order[+pos] === i;
      rowCorrect[i] = ok;
      if (!ok) allOk = false;
    });
    ui.taskFb[task.id] = { sel: selMap, rowCorrect, correct: allOk };
    let result = null;
    if (allOk) result = State.completeTask(task, topicId);
    return result;
  },
};

/* Порядок правого столбца для задания "match" перемешивается один раз и
   кэшируется на самом объекте задания, чтобы не переме­шиваться заново при каждом рендере. */
function matchOrder(task) {
  if (!task._matchOrder) {
    const idxs = task.pairs.map((_, i) => i);
    for (let i = idxs.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [idxs[i], idxs[j]] = [idxs[j], idxs[i]];
    }
    task._matchOrder = idxs;
  }
  return task._matchOrder;
}

function esc2(s) {
  return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

</script>
<script>
/* state.js — сохранение прогресса пользователя (localStorage) */
const State = {
  data: null,

  defaults() {
    return {
      hero: null, // { name, grade }
      settings: { theme: "light", sound: true },
      progress: {}, // topicId -> { doneTasks: {taskId:true}, completed: bool, stars: 0 }
      achievements: {}, // achId -> true
      stats: { xp: 0, areaTasksSolved: 0, bestExamPct: 0, examsTaken: 0 },
      exploreNotes: {}, // taskId -> текст пользователя
      lastExamMistakes: [],
    };
  },

  load() {
    try {
      const raw = localStorage.getItem(APP.storageKey);
      this.data = raw ? Object.assign(this.defaults(), JSON.parse(raw)) : this.defaults();
      // глубокое слияние вложенных объектов на случай старого сохранения
      const d = this.defaults();
      for (const k of Object.keys(d)) {
        if (typeof d[k] === "object" && d[k] !== null && !Array.isArray(d[k])) {
          this.data[k] = Object.assign({}, d[k], this.data[k] || {});
        }
      }
    } catch (e) {
      this.data = this.defaults();
    }
  },

  save() {
    try { localStorage.setItem(APP.storageKey, JSON.stringify(this.data)); } catch (e) { /* хранилище недоступно */ }
  },

  reset() { this.data = this.defaults(); this.save(); },

  createHero(name, grade) {
    this.data.hero = { name: name || "Исследователь", grade: grade || 7 };
    this.save();
  },

  /* ---------- прогресс по темам ---------- */
  topicProgress(topicId) {
    if (!this.data.progress[topicId]) this.data.progress[topicId] = { doneTasks: {}, completed: false, stars: 0 };
    return this.data.progress[topicId];
  },
  isTopicDone(topicId) { return !!this.topicProgress(topicId).completed; },
  topicsDone() { return Object.values(this.data.progress).filter((p) => p.completed).length; },

  taskDone(taskId, topicId) { return !!this.topicProgress(topicId).doneTasks[taskId]; },

  completeTask(task, topicId) {
    const p = this.topicProgress(topicId);
    if (p.doneTasks[task.id]) return { already: true, xp: 0 };
    p.doneTasks[task.id] = true;
    const xp = APP.taskXP[task.type] || 10;
    this.data.stats.xp += xp;
    p.stars = Object.keys(p.doneTasks).length;
    if (/area|circlelen|quad|pyth/i.test(topicId)) this.data.stats.areaTasksSolved++;
    const topic = GAME.topics.find((t) => t.id === topicId);
    if (topic && topic.tasks.every((t) => p.doneTasks[t.id])) p.completed = true;
    this.save();
    const unlocked = this.checkAchievements();
    return { already: false, xp, unlocked };
  },

  saveExploreNote(taskId, text) { this.data.exploreNotes[taskId] = text; this.save(); },

  checkAchievements() {
    const unlocked = [];
    (GAME.achievements || []).forEach((a) => {
      if (!this.data.achievements[a.id] && a.cond(this)) {
        this.data.achievements[a.id] = true;
        unlocked.push(a);
      }
    });
    if (unlocked.length) this.save();
    return unlocked;
  },

  overallPct() {
    const total = GAME.topics.length;
    return total ? Math.round((this.topicsDone() / total) * 100) : 0;
  },

  /* ---------- настройки ---------- */
  toggleTheme() { this.data.settings.theme = this.data.settings.theme === "dark" ? "light" : "dark"; this.save(); return this.data.settings.theme; },
  toggleSound() { this.data.settings.sound = !this.data.settings.sound; this.save(); return this.data.settings.sound; },

  /* ---------- экзамен ---------- */
  recordExam(pct, mistakes) {
    this.data.stats.examsTaken++;
    if (pct > this.data.stats.bestExamPct) this.data.stats.bestExamPct = pct;
    this.data.lastExamMistakes = mistakes || [];
    this.save();
    return this.checkAchievements();
  },
};

</script>
<script>
/* app.js — точка входа: рендер экранов, навигация, экзамен, кабинет учителя */
(function () {
  "use strict";

  const root = document.getElementById("app");
  const ui = { view: "dashboard", grade: 7, topicId: null, taskFb: {}, refOpen: null, exam: null, teacherTab: "roster" };
  let figInstances = [];

  const App = window.App = {
    trackFigure(inst) { figInstances.push(inst); },
  };

  function destroyFigures() { figInstances.forEach((f) => f && f.destroy && f.destroy()); figInstances = []; }

  /* ---------- утилиты ---------- */
  function esc(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
  function topicById(id) { return GAME.topics.find((t) => t.id === id); }
  function topicsForGrade(g) { return GAME.topics.filter((t) => t.grade === g); }
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function toast(msg, ico) {
    let box = document.getElementById("toasts");
    if (!box) { box = document.createElement("div"); box.id = "toasts"; document.body.appendChild(box); }
    const el = document.createElement("div");
    el.className = "toast";
    el.innerHTML = `<span class="t-ico">${ico || "✨"}</span><span>${esc(msg)}</span>`;
    box.appendChild(el);
    setTimeout(() => { el.classList.add("out"); setTimeout(() => el.remove(), 300); }, 2600);
  }

  function announceUnlocks(unlocked) {
    if (!unlocked) return;
    unlocked.forEach((a) => setTimeout(() => toast(`Достижение: ${a.title}`, a.ico), 300));
  }

  /* ================= экраны ================= */

  function screenCreation() {
    return `
      <div class="creation">
        <div class="creation-hero">📐📏🧭</div>
        <h1>${esc(APP.name)}</h1>
        <p class="creation-sub">Изучай геометрию через интерактивные чертежи, симуляции теорем и задания — вместо зубрёжки формул.</p>
        <div class="creation-form">
          <input type="text" id="hero-name" class="task-input" placeholder="Как тебя зовут?" maxlength="24">
          <div class="grade-pick">
            <span>Класс:</span>
            <button class="btn btn-ghost grade-btn" data-act="pick-grade" data-g="7">7</button>
            <button class="btn btn-ghost grade-btn" data-act="pick-grade" data-g="8">8</button>
            <button class="btn btn-ghost grade-btn" data-act="pick-grade" data-g="9">9</button>
          </div>
          <button class="btn btn-gold" data-act="create-hero">Начать изучение →</button>
        </div>
      </div>`;
  }

  function navTabs() {
    const tabs = [
      ["dashboard", "🏠 Главная"],
      ["chapters", "📚 Курс"],
      ["theorems", "🧩 Теоремы"],
      ["reference", "📖 Справочник"],
      ["exam", "⏱ Экзамен"],
      ["teacher", "🧑‍🏫 Учителю"],
      ["settings", "⚙️ Настройки"],
    ];
    return `<nav class="nav-tabs">${tabs.map(([v, t]) =>
      `<button class="nav-tab ${ui.view === v ? "active" : ""}" data-act="nav" data-view="${v}">${t}</button>`).join("")}</nav>`;
  }

  function hud() {
    const h = State.data.hero || { name: "Гость", grade: 7 };
    return `<div class="hud">
        <div class="hud-hero">👋 ${esc(h.name)} · ${h.grade} класс</div>
        <div class="hud-progress"><div class="hud-bar"><div class="hud-fill" style="width:${State.overallPct()}%"></div></div><span>${State.overallPct()}%</span></div>
        <div class="hud-xp">⭐ ${State.data.stats.xp} XP</div>
      </div>`;
  }

  function screenDashboard() {
    const cards = GAME.worlds.map((w) => {
      const tps = topicsForGrade(w.grade);
      const done = tps.filter((t) => State.isTopicDone(t.id)).length;
      return `<button class="grade-card" data-act="open-grade" data-g="${w.grade}">
          <div class="gc-ico">${w.ico}</div>
          <div class="gc-title">${w.grade} класс — ${esc(w.title)}</div>
          <div class="gc-sub">${done}/${tps.length} тем пройдено</div>
        </button>`;
    }).join("");
    const achRow = (GAME.achievements || []).map((a) => {
      const got = !!State.data.achievements[a.id];
      return `<div class="ach-badge ${got ? "got" : ""}" title="${esc(a.desc)}"><span>${a.ico}</span><b>${esc(a.title)}</b></div>`;
    }).join("");
    return `
      <div class="panel dash-hero">
        <h2>Продолжим изучение геометрии?</h2>
        <p>Пройдено тем: <b>${State.topicsDone()}</b> из ${GAME.topics.length}. Общий прогресс — ${State.overallPct()}%.</p>
      </div>
      <div class="grade-cards">${cards}</div>
      <div class="panel">
        <h3>Достижения</h3>
        <div class="ach-row">${achRow}</div>
      </div>`;
  }

  function chaptersForGrade(g) {
    return (GAME.chapters || []).filter((c) => c.grade === g || c.id === "misc").sort((a, b) => a.order - b.order);
  }
  function topicsOfChapter(chId) { return GAME.topics.filter((t) => (t.chapter || "misc") === chId); }
  function chapterProgress(ch) {
    const tps = topicsOfChapter(ch.id);
    const done = tps.filter((t) => State.isTopicDone(t.id)).length;
    return { done, total: tps.length };
  }

  function screenChapters() {
    const chaps = chaptersForGrade(ui.grade).filter((ch) => topicsOfChapter(ch.id).length);
    const rows = chaps.map((ch) => {
      const { done, total } = chapterProgress(ch);
      const pct = total ? Math.round((done / total) * 100) : 0;
      return `<button class="chapter-card" data-act="open-chapter" data-ch="${ch.id}">
          <div class="cc-title">${esc(ch.title)}</div>
          <div class="cc-progress"><div class="hud-bar sm"><div class="hud-fill" style="width:${pct}%"></div></div><span>${done}/${total}</span></div>
        </button>`;
    }).join("");
    return `
      <div class="mq-top"><button class="btn btn-ghost" data-act="nav" data-view="dashboard">← Главная</button></div>
      <h2>${ui.grade} класс — курс геометрии</h2>
      <p class="creation-sub">Выбери главу — темы внутри идут в том же порядке, что и в учебнике.</p>
      <div class="chapter-cards">${rows}</div>`;
  }

  function screenChapter() {
    const ch = (GAME.chapters || []).find((c) => c.id === ui.chapterId);
    if (!ch) return screenChapters();
    const tps = topicsOfChapter(ch.id);
    const { done, total } = chapterProgress(ch);
    const rows = tps.map((t) => {
      const doneT = State.isTopicDone(t.id);
      const p = State.topicProgress(t.id);
      return `<button class="topic-row ${doneT ? "done" : ""}" data-act="open-topic" data-topic="${t.id}">
          <span class="topic-ico">${t.ico}</span>
          <span class="topic-title">${esc(t.title)}</span>
          <span class="topic-st">${doneT ? "✓" : `${Object.keys(p.doneTasks).length}/${t.tasks.length}`}</span>
        </button>`;
    }).join("");
    const poolSize = chapterTaskPool(ch.id).length;
    const reviewHTML = (ch.review && ch.review.length) ? `<div class="panel">
        <h3>❓ Вопросы для повторения главы</h3>
        ${ch.review.map((r) => `<details class="review-item"><summary>${esc(r.q)}</summary><div class="review-a">${esc(r.a)}</div></details>`).join("")}
      </div>` : "";
    return `
      <div class="mq-top"><button class="btn btn-ghost" data-act="open-grade" data-g="${ch.grade}">← К главам</button></div>
      <h2>${esc(ch.title)}</h2>
      <p class="creation-sub">Пройдено тем: ${done}/${total}</p>
      <div class="topic-list">${rows}</div>
      ${poolSize ? `<div class="panel dash-hero">
        <h3>🎯 Практика по главе</h3>
        <p>Ещё ${poolSize} задач по темам этой главы — вперемешку, для закрепления.</p>
        <div class="chapter-cta-row">
          <button class="btn btn-gold" data-act="chapter-practice-start" data-ch="${ch.id}">Начать практику →</button>
          ${poolSize >= 5 ? `<button class="btn btn-primary" data-act="chapter-test-start" data-ch="${ch.id}">📝 Итоговый тест (5 вопросов)</button>` : ""}
        </div>
      </div>` : ""}
      ${reviewHTML}`;
  }

  function renderBlocksText(theory) { return theory.map((p) => `<p>${esc(p)}</p>`).join(""); }

  function screenTopic() {
    const t = topicById(ui.topicId);
    if (!t) return screenChapters();
    const done = State.isTopicDone(t.id);
    const tasksHTML = t.tasks.map((task) => Tasks.render(task, t.id, ui)).join("");
    return `
      <div class="mq-top">
        <button class="btn btn-ghost" data-act="open-chapter" data-ch="${t.chapter || "misc"}">← К главе</button>
        <span class="mq-badge">${done ? "✓ Пройдено" : "В процессе"}</span>
      </div>
      <h2>${t.ico} ${esc(t.title)}</h2>
      <div class="panel theory-block">${renderBlocksText(t.theory)}</div>
      <div class="formula-box">📎 ${esc(t.formula)}</div>
      <div class="fig-mount" data-figure='${JSON.stringify(t.figure || { type: "triangle" })}'></div>
      ${t.remember ? `<div class="remember-box"><b>📌 Запомни:</b><ul>${t.remember.map((r) => `<li>${esc(r)}</li>`).join("")}</ul></div>` : ""}
      ${t.example ? `<div class="example-box">
          <div class="example-h">✏️ Пример решения</div>
          <div class="example-q">${esc(t.example.q)}</div>
          <ol class="example-steps">${t.example.steps.map((s) => `<li>${esc(s)}</li>`).join("")}</ol>
        </div>` : ""}
      <h3>⚔️ Практика</h3>
      <div class="task-list">${tasksHTML}</div>`;
  }

  function screenTheorems() {
    const rows = GAME.theorems.map((th) => `
      <button class="topic-row" data-act="open-theorem" data-th="${th.id}">
