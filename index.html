        <textarea class="task-note" data-task="${task.id}" placeholder="Теперь запиши, что получилось на самом деле…">${esc2(note)}</textarea>
        <button class="btn btn-primary btn-sm" data-act="task-explore" data-task="${task.id}" data-topic="${topicId}" ${done ? "disabled" : ""}>${done ? "Вывод сохранён ✓" : "Сохранить вывод"}</button>
        ${done && task.insight ? `<div class="task-explain">📎 Общий вывод: ${esc2(task.insight)}</div>` : ""}`;
    } else if (task.type === "build") {
      body = `<div class="task-figure" data-figure='${JSON.stringify(task.figure || { type: "triangle" })}'></div>
        <button class="btn btn-primary btn-sm" data-act="task-build" data-task="${task.id}" data-topic="${topicId}">Проверить построение</button>
        ${fb ? `<div class="task-fb ${fb.correct ? "fb-ok" : "fb-bad"}" role="status">${fb.correct ? "Отлично, построение подходит! ✅" : "Пока не совпадает — подвинь точки ещё"}</div>` : ""}`;
    } else if (task.type === "match") {
      const order = matchOrder(task);
      const rightTexts = order.map((origIdx) => task.pairs[origIdx].right);
      const sel = (fb && fb.sel) || {};
      body = `<div class="match-rows">${task.pairs.map((p, i) => {
        const isWrong = fb && fb.rowCorrect && !fb.rowCorrect[i];
        const rowState = fb ? (fb.rowCorrect && fb.rowCorrect[i] ? "match-ok" : "match-bad") : "";
        return `<div class="match-row">
            <span class="match-left">${esc2(p.left)}</span>
            <select class="match-select ${rowState}" data-task="${task.id}" data-idx="${i}" ${fb && fb.correct ? "disabled" : ""}>
              <option value="">…</option>
              ${rightTexts.map((r, pos) => `<option value="${pos}" ${String(sel[i]) === String(pos) ? "selected" : ""}>${esc2(r)}</option>`).join("")}
            </select>
            ${isWrong ? `<span class="match-hint">верно: «${esc2(p.right)}»</span>` : ""}
          </div>`;
      }).join("")}</div>
        <button class="btn btn-primary btn-sm" data-act="task-match" data-task="${task.id}" data-topic="${topicId}">Проверить</button>
        ${fb ? `<div class="task-fb ${fb.correct ? "fb-ok" : "fb-bad"}" role="status">${fb.correct ? "Все пары верны! ✅" : "Есть ошибки — верный ответ подсказан у неверных строк"}</div>` : ""}`;
    } else if (task.type === "proofSteps") {
      const order = stepOrder(task);
      ui.proofPick = ui.proofPick || {};
      const picked = ui.proofPick[task.id] || (ui.proofPick[task.id] = []);
      const poolIdxs = order.filter((origIdx) => !picked.includes(origIdx));
      const allPlaced = picked.length === task.steps.length;
      const builtList = `<ol class="proof-built">${picked.map((origIdx, pos) => {
        let cls = "proof-built-item";
        if (fb) cls += (fb.order && fb.order[pos] === origIdx) ? " step-ok" : " step-bad";
        return `<li class="${cls}"><button class="proof-step-btn" data-act="proofstep-remove" data-task="${task.id}" data-pos="${pos}" ${fb ? "disabled" : ""}>${esc2(task.steps[origIdx])}${fb ? (cls.includes("step-ok") ? " ✓" : " ✗") : " ✕"}</button></li>`;
      }).join("")}</ol>`;
      const poolList = (!fb && poolIdxs.length) ? `<div class="proof-pool"><div class="proof-pool-label">Тапни по карточкам по порядку:</div>${poolIdxs.map((origIdx) => `<button class="proof-step-btn proof-pool-btn" data-act="proofstep-add" data-task="${task.id}" data-idx="${origIdx}">${esc2(task.steps[origIdx])}</button>`).join("")}</div>` : "";
      body = `${task.figure ? `<div class="task-figure" data-figure='${JSON.stringify(task.figure)}'></div>` : ""}
        ${builtList}
        ${poolList}
        ${!fb ? `<button class="btn btn-primary btn-sm" data-act="task-proofsteps" data-task="${task.id}" data-topic="${topicId}" ${allPlaced ? "" : "disabled"}>Проверить порядок</button>` : ""}
        ${fb ? `<div class="task-fb ${fb.correct ? "fb-ok" : "fb-bad"}" role="status">${fb.correct ? "Доказательство собрано верно! ✅" : "Порядок пока не совсем верный — красным отмечены шаги не на своём месте"}</div>` : ""}`;
    }
    const explain = (fb && task.explain) ? `<div class="task-explain">💡 ${esc2(task.explain)}</div>` : "";
    return `<div class="task-card ${done ? "task-card-done" : ""}" data-task-card="${task.id}">${head}${q}${body}${explain}</div>`;
  },

  mountFigures(root, topic) {
    root.querySelectorAll(".task-figure[data-figure]").forEach((el) => {
      let spec;
      try { spec = JSON.parse(el.getAttribute("data-figure")); } catch (e) { spec = { type: "triangle" }; }
      try {
        const inst = Figures.mount(el, spec);
        App.trackFigure(inst);
        el.__figureInst = inst;
      } catch (e) {
        el.innerHTML = '<div class="fig-error">⚠️ Чертёж временно недоступен</div>';
        console.error("Task figure mount failed:", spec, e);
      }
    });
  },

  checkChoice(task, topicId, idx, ui) {
    ui.taskFb = ui.taskFb || {};
    const correct = idx === task.correct;
    ui.taskFb[task.id] = { choice: idx, correct };
    let result = null;
    if (correct) result = State.completeTask(task, topicId);
    return result;
  },

  checkError(task, topicId, idx, ui) {
    ui.taskFb = ui.taskFb || {};
    const correct = !!(task.labels[idx] && task.labels[idx].wrong);
    ui.taskFb[task.id] = { choice: idx, correct };
    let result = null;
    if (correct) result = State.completeTask(task, topicId);
    return result;
  },

  checkInput(task, topicId, rawVal, ui, figEl) {
    ui.taskFb = ui.taskFb || {};
    const val = parseFloat(String(rawVal).replace(",", ".").replace(/\s/g, ""));
    let target = task.answer;
    if (task.readFromFigure && figEl && figEl.__figureInst) {
      const m = figEl.__figureInst.metrics();
      if (m && m[task.metricKey] != null) target = m[task.metricKey];
    }
    const tol = task.tol != null ? task.tol : 0.5;
    const correct = !isNaN(val) && target != null && Math.abs(val - target) <= tol;
    ui.taskFb[task.id] = { val: rawVal, correct };
    let result = null;
    if (correct) result = State.completeTask(task, topicId);
    return result;
  },

  saveExplore(task, topicId, text) {
    State.saveExploreNote(task.id, text);
    return State.completeTask(task, topicId);
  },

  checkBuild(task, topicId, figEl, ui) {
    ui.taskFb = ui.taskFb || {};
    const inst = figEl ? figEl.__figureInst : null;
    const m = inst ? inst.metrics() : {};
    const target = task.target || {};
    let correct = false;
    if (target.type === "triangle" && target.kind === "isosceles" && m.a != null) {
      const sides = [m.a, m.b, m.c].sort((a, b) => a - b);
      correct = Math.abs(sides[0] - sides[1]) <= (task.tol || 0.08) * sides[2] || Math.abs(sides[1] - sides[2]) <= (task.tol || 0.08) * sides[2];
    } else if (target.type === "segment" && target.points === 3) {
      // три точки коллинеарны и B лежит между A и C
      correct = m.area != null && m.area <= (task.tol || 0.15) && !!m.betweenB;
    } else if (target.type === "angle" && target.degrees != null) {
      correct = m.angle != null && Math.abs(m.angle - target.degrees) <= (task.tol || 2);
    } else if (target.type === "segment" && target.operation === "sum") {
      correct = m.length != null && Math.abs(m.length - m.target) <= (task.tol || 0.15) * m.target;
    } else if (target.type === "segment" && target.operation === "length") {
      correct = m.AB != null && Math.abs(m.AB - target.value) <= (task.tol || 0.15);
    } else if (target.type === "perpendicular") {
      correct = m.angleToLine != null && Math.abs(m.angleToLine - 90) <= (task.tol || 2);
    } else if (target.type === "bisector") {
      correct = m.a1 != null && Math.abs(m.a1 - m.a2) <= (task.tol || 2);
    } else if (target.type === "copyAngle") {
      correct = m.angRef != null && Math.abs(m.angRef - m.angCopy) <= (task.tol || 2);
    } else if (target.type === "triangleGiven") {
      // Построение треугольника по трём элементам (стороны и/или углы) — проверяем
      // только те элементы, что заданы в задаче (это позволяет собрать SSS/SAS/ASA одной функцией).
      const tl = task.tol || 0.15, ta = task.tolAng || 4;
      const checks = [];
      if (target.a != null) checks.push(Math.abs(m.a - target.a) <= tl * target.a);
      if (target.b != null) checks.push(Math.abs(m.b - target.b) <= tl * target.b);
      if (target.c != null) checks.push(Math.abs(m.c - target.c) <= tl * target.c);
      if (target.angleA != null) checks.push(Math.abs(m.angleA - target.angleA) <= ta);
      if (target.angleB != null) checks.push(Math.abs(m.angleB - target.angleB) <= ta);
      if (target.angleC != null) checks.push(Math.abs(m.angleC - target.angleC) <= ta);
      correct = checks.length > 0 && checks.every((c) => c);
    } else if (target.type === "triangleInequality") {
      correct = !!m.canForm;
    } else if (target.type === "quadProperty") {
      correct = !!m[target.property];
    } else if (target.type === "areaValue") {
      correct = m.area != null && Math.abs(m.area - target.value) <= (task.tol || 0.15) * target.value;
    } else if (target.type === "similarTriangles") {
      const tl = task.tol || 0.08;
      const k1 = m.DE / (m.AB || 0.01), k2 = m.EF / (m.BC || 0.01), k3 = m.DF / (m.AC || 0.01);
      const closeR = (x, y) => Math.abs(x - y) <= tl * Math.max(x, y, 0.01);
      correct = closeR(k1, k2) && closeR(k2, k3);
    } else if (target.type === "tangent") {
      correct = m.d != null && m.r != null && Math.abs(m.d - m.r) <= (task.tol || 4);
    } else if (target.type === "congruentTriangles") {
      const tl = task.tol || 0.15, ta = task.tolAng || 3;
      const closeL = (x, y) => Math.abs(x - y) <= tl * Math.max(x, y, 0.01);
      const closeA = (x, y) => Math.abs(x - y) <= ta;
      if (target.criterion === "sas") correct = closeL(m.AB, m.DE) && closeL(m.AC, m.DF) && closeA(m.angA, m.angD);
      else if (target.criterion === "asa") correct = closeL(m.AB, m.DE) && closeA(m.angA, m.angD) && closeA(m.angB, m.angE);
      else if (target.criterion === "sss") correct = closeL(m.AB, m.DE) && closeL(m.BC, m.EF) && closeL(m.AC, m.DF);
      else if (target.criterion === "hl") correct = closeL(m.AC, m.DF) && closeL(m.AB, m.DE);
    }
    ui.taskFb[task.id] = { correct };
    let result = null;
    if (correct) result = State.completeTask(task, topicId);
    return result;
  },

  checkMatch(task, topicId, selMap, ui) {
    ui.taskFb = ui.taskFb || {};
    const order = matchOrder(task);
    const rowCorrect = {};
    let allOk = task.pairs.length > 0;
    task.pairs.forEach((p, i) => {
      const pos = selMap[i];
      const ok = pos != null && pos !== "" && order[+pos] === i;
      rowCorrect[i] = ok;
      if (!ok) allOk = false;
    });
    ui.taskFb[task.id] = { sel: selMap, rowCorrect, correct: allOk };
    let result = null;
    if (allOk) result = State.completeTask(task, topicId);
    return result;
  },

  checkProofSteps(task, topicId, ui) {
    ui.taskFb = ui.taskFb || {};
    ui.proofPick = ui.proofPick || {};
    const picked = ui.proofPick[task.id] || [];
    const correct = picked.length === task.steps.length && picked.every((origIdx, pos) => origIdx === pos);
    ui.taskFb[task.id] = { order: picked.slice(), correct };
    let result = null;
    if (correct) result = State.completeTask(task, topicId);
    return result;
  },
};

/* Порядок правого столбца для задания "match" перемешивается один раз и
   кэшируется на самом объекте задания, чтобы не переме­шиваться заново при каждом рендере. */
function matchOrder(task) {
  if (!task._matchOrder) {
    const idxs = task.pairs.map((_, i) => i);
    for (let i = idxs.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [idxs[i], idxs[j]] = [idxs[j], idxs[i]];
    }
    task._matchOrder = idxs;
  }
  return task._matchOrder;
}

/* Порядок карточек-шагов доказательства перемешивается один раз для показа —
   при этом task.steps в данных всегда хранится в ПРАВИЛЬНОМ порядке. */
function stepOrder(task) {
  if (!task._stepOrder) {
    const idxs = task.steps.map((_, i) => i);
    // перемешиваем, но следим, чтобы не получился (случайно) уже верный порядок —
    // иначе задание было бы тривиальным с первого взгляда
    do {
      for (let i = idxs.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [idxs[i], idxs[j]] = [idxs[j], idxs[i]];
      }
    } while (idxs.length > 1 && idxs.every((v, i) => v === i));
    task._stepOrder = idxs;
  }
  return task._stepOrder;
}

function esc2(s) {
  return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

</script>
<script>
/* state.js — сохранение прогресса пользователя (localStorage) */
const State = {
  data: null,

  defaults() {
    return {
      hero: null, // { name, grade }
      settings: { theme: "light", sound: true },
      progress: {}, // topicId -> { doneTasks: {taskId:true}, completed: bool, stars: 0 }
      achievements: {}, // achId -> true
      stats: { xp: 0, areaTasksSolved: 0, bestExamPct: 0, examsTaken: 0 },
      exploreNotes: {}, // taskId -> текст пользователя
      lastExamMistakes: [],
      lastTopicId: null, // для кнопки "Продолжить" на дашборде
      srs: {}, // cardId -> { ef, reps, interval, due, lastReviewed } — состояние интервального повторения
      speedBest: 0, // личный рекорд режима "На скорость" (число верных ответов за 60 секунд)
      streak: { current: 0, longest: 0, lastActiveDay: null }, // серия дней подряд с хоть каким-то занятием
    };
  },

  load() {
    try {
      const raw = localStorage.getItem(APP.storageKey);
      this.data = raw ? Object.assign(this.defaults(), JSON.parse(raw)) : this.defaults();
      // глубокое слияние вложенных объектов на случай старого сохранения
      const d = this.defaults();
      for (const k of Object.keys(d)) {
        if (typeof d[k] === "object" && d[k] !== null && !Array.isArray(d[k])) {
          this.data[k] = Object.assign({}, d[k], this.data[k] || {});
        }
      }
    } catch (e) {
      this.data = this.defaults();
    }
  },

  save() {
    try { localStorage.setItem(APP.storageKey, JSON.stringify(this.data)); } catch (e) { /* хранилище недоступно */ }
  },

  reset() { this.data = this.defaults(); this.save(); },

  createHero(name, grade) {
    this.data.hero = { name: name || "Исследователь", grade: grade || 7 };
    this.save();
  },

  setLastTopic(topicId) { this.data.lastTopicId = topicId; this.save(); },

  /* ---------- интервальное повторение ---------- */
  srsRate(cardId, quality) {
    const prev = this.data.srs[cardId] || null;
    const next = SRS.schedule(prev, quality);
    this.data.srs[cardId] = next;
    this.touchStreak();
    this.save();
    return next;
  },

  /* ---------- прогресс по темам ---------- */
  topicProgress(topicId) {
    if (!this.data.progress[topicId]) this.data.progress[topicId] = { doneTasks: {}, completed: false, stars: 0 };
    return this.data.progress[topicId];
  },
  isTopicDone(topicId) { return !!this.topicProgress(topicId).completed; },
  topicsDone() { return Object.values(this.data.progress).filter((p) => p.completed).length; },

  taskDone(taskId, topicId) { return !!this.topicProgress(topicId).doneTasks[taskId]; },

  completeTask(task, topicId) {
    const p = this.topicProgress(topicId);
    if (p.doneTasks[task.id]) return { already: true, xp: 0 };
    p.doneTasks[task.id] = true;
    const xp = APP.taskXP[task.type] || 10;
    this.data.stats.xp += xp;
    p.stars = Object.keys(p.doneTasks).length;
    if (/area|circlelen|quad|pyth|ch2_s4|ch4_s[23]|ch6/i.test(topicId)) this.data.stats.areaTasksSolved++;
    const topic = GAME.topics.find((t) => t.id === topicId);
    if (topic && topic.tasks.every((t) => p.doneTasks[t.id])) p.completed = true;
    const streak = this.touchStreak();
    this.save();
    const unlocked = this.checkAchievements();
    return { already: false, xp, unlocked, streak };
  },

  saveExploreNote(taskId, text) { this.data.exploreNotes[taskId] = text; this.save(); },

  /* ---------- серия дней (streak) ---------- */
  // Вызывается при любом содержательном действии (задание, повторение, разминка, "на
  // скорость"). Идемпотентно в пределах одного дня — повторные вызовы в тот же день
  // ничего не меняют. Использует то же представление "дня" (эпоха/86400000), что и SRS,
  // чтобы оба модуля были согласованы друг с другом.
  touchStreak() {
    const today = Math.floor(Date.now() / 86400000);
    const s = this.data.streak;
    if (s.lastActiveDay === today) return { isNewDay: false, current: s.current, longest: s.longest };
    if (s.lastActiveDay === today - 1) s.current += 1;
    else s.current = 1; // пропуск дня (или самый первый раз) — серия начинается заново
    s.longest = Math.max(s.longest, s.current);
    s.lastActiveDay = today;
    this.save();
    return { isNewDay: true, current: s.current, longest: s.longest };
  },

  checkAchievements() {
    const unlocked = [];
    (GAME.achievements || []).forEach((a) => {
      if (!this.data.achievements[a.id] && a.cond(this)) {
        this.data.achievements[a.id] = true;
        unlocked.push(a);
      }
    });
    if (unlocked.length) this.save();
    return unlocked;
  },

  overallPct() {
    const total = GAME.topics.length;
    return total ? Math.round((this.topicsDone() / total) * 100) : 0;
  },

  /* ---------- настройки ---------- */
  toggleTheme() { this.data.settings.theme = this.data.settings.theme === "dark" ? "light" : "dark"; this.save(); return this.data.settings.theme; },
  toggleSound() { this.data.settings.sound = !this.data.settings.sound; this.save(); return this.data.settings.sound; },

  /* ---------- экзамен ---------- */
  recordExam(pct, mistakes) {
    this.data.stats.examsTaken++;
    if (pct > this.data.stats.bestExamPct) this.data.stats.bestExamPct = pct;
    this.data.lastExamMistakes = mistakes || [];
    this.save();
    return this.checkAchievements();
  },
};

</script>
<script>
/* app.js — точка входа: рендер экранов, навигация, экзамен, кабинет учителя */
(function () {
  "use strict";

  const root = document.getElementById("app");
  const ui = { view: "dashboard", grade: 7, topicId: null, taskFb: {}, refOpen: null, exam: null, warmup: null, review: null, speed: null, teacherTab: "roster" };
  let figInstances = [];

  const App = window.App = {
    trackFigure(inst) { figInstances.push(inst); },
  };

  function destroyFigures() { figInstances.forEach((f) => f && f.destroy && f.destroy()); figInstances = []; }

  /* Рендерит фигуру в отсоединённом (не в DOM) контейнере и возвращает PNG data URL —
     для печатной версии заданий типа error, где чертёж — часть вопроса. */
  function renderFigureToImage(spec) {
    try {
      const container = document.createElement("div");
      const w = 380, h = 280; // фиксированный размер, не зависит от экрана (контейнер вне DOM)
      const inst = Figures.mount(container, spec, { w, h });
      const canvas = container.querySelector(".fig-canvas");
      if (!canvas) return null;
      const url = canvas.toDataURL("image/png");
      if (inst.destroy) inst.destroy();
      return url;
    } catch (e) {
      return null;
    }
  }

  /* ---------- утилиты ---------- */
  function esc(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
  function topicById(id) { return GAME.topics.find((t) => t.id === id); }
  function topicsForGrade(g) { return GAME.topics.filter((t) => t.grade === g); }
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function toast(msg, ico) {
    let box = document.getElementById("toasts");
    if (!box) { box = document.createElement("div"); box.id = "toasts"; box.setAttribute("aria-live", "polite"); document.body.appendChild(box); }
    const el = document.createElement("div");
    el.className = "toast";
    el.innerHTML = `<span class="t-ico">${ico || "✨"}</span><span>${esc(msg)}</span>`;
    box.appendChild(el);
    setTimeout(() => { el.classList.add("out"); setTimeout(() => el.remove(), 300); }, 2600);
  }

  /* ---------- звук: короткие тоны через Web Audio, с уважением к настройке "sound" ---------- */
  const Sound = {
    ctx: null,
    ensureCtx() {
      if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (this.ctx.state === "suspended") this.ctx.resume();
      return this.ctx;
    },
    tone(freq, dur, type, peak) {
      if (!State.data.settings.sound) return;
      try {
        const ctx = this.ensureCtx();
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.type = type || "sine"; osc.frequency.value = freq;
        osc.connect(gain); gain.connect(ctx.destination);
        const now = ctx.currentTime;
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.linearRampToValueAtTime(peak || 0.15, now + 0.012);
        gain.gain.linearRampToValueAtTime(0.0001, now + dur);
        osc.start(now); osc.stop(now + dur + 0.02);
      } catch (e) { /* нет Web Audio на устройстве — просто без звука */ }
    },
    correct() { this.tone(660, 0.11, "sine", 0.14); setTimeout(() => this.tone(880, 0.13, "sine", 0.14), 85); },
    wrong() { this.tone(200, 0.16, "sawtooth", 0.09); },
    achievement() { [523, 659, 784, 1046].forEach((f, i) => setTimeout(() => this.tone(f, 0.15, "triangle", 0.15), i * 85)); },
  };

  function announceUnlocks(unlocked) {
    if (!unlocked) return;
    if (unlocked.length) Sound.achievement();
    unlocked.forEach((a) => setTimeout(() => toast(`Достижение: ${a.title}`, a.ico), 300));
  }

  function dayWord(n) {
    const mod10 = n % 10, mod100 = n % 100;
    if (mod100 >= 11 && mod100 <= 14) return "дней";
    if (mod10 === 1) return "день";
    if (mod10 >= 2 && mod10 <= 4) return "дня";
    return "дней";
  }
  function announceStreak(r) {
    if (r && r.isNewDay && r.current > 1) toast(`🔥 Серия: ${r.current} ${dayWord(r.current)} подряд!`, "🔥");
  }
  function streakTouch() { announceStreak(State.touchStreak()); }

  /* ================= экраны ================= */

  function screenCreation() {
    return `
      <div class="creation">
        <div class="creation-hero">📐📏🧭</div>
        <h1>${esc(APP.name)}</h1>
        <p class="creation-sub">Изучай геометрию через интерактивные чертежи, симуляции теорем и задания — вместо зубрёжки формул.</p>
        <div class="creation-form">
          <input type="text" id="hero-name" class="task-input" placeholder="Как тебя зовут?" maxlength="24">
          <div class="grade-pick">
            <span>Класс:</span>
            <button class="btn btn-ghost grade-btn" data-act="pick-grade" data-g="7">7</button>
            <button class="btn btn-ghost grade-btn" data-act="pick-grade" data-g="8">8</button>
            <button class="btn btn-ghost grade-btn" data-act="pick-grade" data-g="9">9</button>
          </div>
          <button class="btn btn-gold" data-act="create-hero" disabled>Начать изучение →</button>
          <p class="creation-hint" id="creation-hint">Выбери класс, чтобы продолжить</p>
        </div>
      </div>`;
  }

  function navTabs() {
    const tabs = [
      ["dashboard", "🏠 Главная"],
      ["chapters", "📚 Курс"],
      ["workshop", "🎨 Мастерская"],
      ["theorems", "🧩 Теоремы"],
      ["reference", "📖 Справочник"],
      ["exam", "⏱ Экзамен"],
      ["teacher", "🧑‍🏫 Учителю"],
      ["settings", "⚙️ Настройки"],
    ];
    return `<nav class="nav-tabs">${tabs.map(([v, t]) =>
      `<button class="nav-tab ${ui.view === v ? "active" : ""}" data-act="nav" data-view="${v}">${t}</button>`).join("")}</nav>`;
  }

  function hud() {
    const h = State.data.hero || { name: "Гость", grade: 7 };
    return `<div class="hud">
        <div class="hud-hero">👋 ${esc(h.name)} · ${h.grade} класс</div>
        <div class="hud-progress"><div class="hud-bar"><div class="hud-fill" style="width:${State.overallPct()}%"></div></div><span>${State.overallPct()}%</span></div>
        <div class="hud-xp">⭐ ${State.data.stats.xp} XP</div>
      </div>`;
  }

  function screenDashboard() {
    const cards = GAME.worlds.map((w) => {
      const tps = topicsForGrade(w.grade);
      const done = tps.filter((t) => State.isTopicDone(t.id)).length;
      return `<button class="grade-card" data-act="open-grade" data-g="${w.grade}">
          <div class="gc-ico">${w.ico}</div>
          <div class="gc-title">${w.grade} класс — ${esc(w.title)}</div>
          <div class="gc-sub"><span class="num">${done}/${tps.length}</span> тем пройдено</div>
        </button>`;
    }).join("");
    const gotCount = (GAME.achievements || []).filter((a) => State.data.achievements[a.id]).length;
    const achRow = (GAME.achievements || []).map((a) => {
      const got = !!State.data.achievements[a.id];
      return `<details class="ach-card ${got ? "got" : "locked"}">
          <summary><span class="ach-ico">${a.ico}</span><span class="ach-title">${esc(a.title)}</span></summary>
          <div class="ach-desc">${esc(a.desc)}${got ? "" : " <i>· пока не открыто</i>"}</div>
        </details>`;
    }).join("");
    const lastTopic = State.data.lastTopicId ? topicById(State.data.lastTopicId) : null;
    const continueBtn = lastTopic
      ? `<button class="btn btn-gold" data-act="open-topic" data-topic="${lastTopic.id}">▶ Продолжить: ${esc(lastTopic.title)}</button>`
      : "";
    const srsStats = SRS.stats();
    const reviewCard = srsStats.total ? `<div class="panel dash-hero review-hero">
        <h3>🔁 Повторение</h3>
        <p>${srsStats.due ? `Сегодня к повторению: <b>${srsStats.due}</b> карточек (формулы, факты, узнавание чертежей).` : "На сегодня всё повторено — загляни завтра."}</p>
        <div class="chapter-cta-row">
          ${srsStats.due ? `<button class="btn btn-gold" data-act="review-start">Повторить →</button>` : ""}
          <button class="btn btn-ghost" data-act="speed-start">⚡ На скорость (60с)${State.data.speedBest ? ` · рекорд ${State.data.speedBest}` : ""}</button>
          <button class="btn btn-ghost" data-act="formula-practice-start">🧩 Формулы</button>
        </div>
      </div>` : "";
    const weak = SRS.weakTopics();
    const weakCard = weak.length ? `<div class="panel dash-hero weak-hero">
        <h3>🎯 Тут стоит перечитать теорию</h3>
        <p class="creation-sub">Не ощущение — по тому, как часто ты забываешь карточки этих тем на повторении:</p>
        <div class="weak-topic-list">
          ${weak.slice(0, 4).map((w) => {
            const t = topicById(w.topicId);
            if (!t) return "";
            return `<button class="weak-topic-row" data-act="open-topic" data-topic="${t.id}">
                <span>${esc(t.title)}</span>
                <span class="weak-topic-frac">${w.struggling}/${w.total} карточек забыты</span>
              </button>`;
          }).join("")}
        </div>
      </div>` : "";
    const certRow = GAME.worlds.filter((w) => {
      const tps = topicsForGrade(w.grade);
      return tps.length && tps.every((t) => State.isTopicDone(t.id));
    }).map((w) => `<div class="panel dash-hero cert-hero">
        <h3>🎓 Класс завершён!</h3>
        <p>Все темы ${w.grade} класса пройдены — можно получить сертификат.</p>
        <button class="btn btn-gold" data-act="open-certificate" data-g="${w.grade}">🎓 Получить сертификат ${w.grade} класса</button>
      </div>`).join("");
    const streak = State.data.streak;
    const streakLine = streak.current > 1 ? ` · 🔥 Серия: <span class="num">${streak.current}</span> ${dayWord(streak.current)} подряд` : "";
    return `
      <div class="panel dash-hero">
        <h2>Продолжим изучение геометрии?</h2>
        <p>Пройдено тем: <b>${State.topicsDone()}</b> из ${GAME.topics.length}. Общий прогресс — ${State.overallPct()}%${streakLine}.</p>
        ${continueBtn}
      </div>
      ${certRow}
      ${reviewCard}
      ${weakCard}
      <div class="panel testgen-entry">
        <h3>📝 Составь свою контрольную</h3>
        <p class="creation-sub">Выбери темы и сложность, распечатай или сохрани как PDF — удобно порепетировать перед настоящей контрольной в школе.</p>
        <button class="btn btn-ghost btn-sm" data-act="testgen-open" data-from="dashboard">Собрать вариант →</button>
      </div>
      <div class="grade-cards">${cards}</div>
      <div class="panel">
        <h3>Достижения <span class="ach-count num">${gotCount}/${GAME.achievements.length}</span></h3>
        <div class="ach-row">${achRow}</div>
      </div>`;
  }

  function chaptersForGrade(g) {
    return (GAME.chapters || []).filter((c) => c.grade === g || c.id === "misc").sort((a, b) => a.order - b.order);
  }
  // grade обязателен для "misc" — иначе темы 7/8/9 класса из общего временного
  // раздела перемешаются и утекут друг в друга (7-классник увидит темы 9 класса и т.п.).
  function topicsOfChapter(chId, grade) {
    return GAME.topics.filter((t) => (t.chapter || "misc") === chId && (chId !== "misc" || t.grade === grade));
  }
  function chapterProgress(ch, grade) {
    const tps = topicsOfChapter(ch.id, grade);
    const done = tps.filter((t) => State.isTopicDone(t.id)).length;
    return { done, total: tps.length };
  }

  function screenChapters() {
    const chaps = chaptersForGrade(ui.grade).filter((ch) => topicsOfChapter(ch.id, ui.grade).length);
    const rows = chaps.map((ch) => {
      const { done, total } = chapterProgress(ch, ui.grade);
      const pct = total ? Math.round((done / total) * 100) : 0;
      const dots = topicsOfChapter(ch.id, ui.grade).map((t) =>
        `<span class="cc-dot ${State.isTopicDone(t.id) ? "done" : ""}"></span>`).join("");
      return `<button class="chapter-card" data-act="open-chapter" data-ch="${ch.id}">
          <div class="cc-title">${esc(ch.title)}</div>
          <div class="cc-progress"><div class="hud-bar sm"><div class="hud-fill" style="width:${pct}%"></div></div><span class="num">${done}/${total}</span></div>
          <div class="cc-dots">${dots}</div>
        </button>`;
    }).join("");
    const empty = `<div class="panel dash-hero">
        <h3>🚧 Этот класс пока в разработке</h3>
        <p>Мы наполняем курс по порядку, глава за главой. Загляни в 7 класс — там уже готовы все 4 главы, или вернись сюда позже.</p>
        <button class="btn btn-gold" data-act="open-grade" data-g="7">Перейти к 7 классу →</button>
      </div>`;
    return `
      <div class="mq-top"><button class="btn btn-ghost" data-act="nav" data-view="dashboard">← Главная</button></div>
      <h2>${ui.grade} класс — курс геометрии</h2>
      ${chaps.length ? `<p class="creation-sub">Выбери главу — темы внутри идут в том же порядке, что и в учебнике.</p>
      <div class="chapter-cards">${rows}</div>` : empty}`;
  }

  function screenChapter() {
    const ch = (GAME.chapters || []).find((c) => c.id === ui.chapterId);
    if (!ch) return screenChapters();
    const tps = topicsOfChapter(ch.id, ui.grade);
    const { done, total } = chapterProgress(ch, ui.grade);
    const rows = tps.map((t) => {
      const doneT = State.isTopicDone(t.id);
      const p = State.topicProgress(t.id);
      return `<button class="topic-row ${doneT ? "done" : ""}" data-act="open-topic" data-topic="${t.id}">
          <span class="topic-ico">${t.ico}</span>
          <span class="topic-title">${esc(t.title)}</span>
          <span class="topic-st">${doneT ? "✓" : `${Object.keys(p.doneTasks).length}/${t.tasks.length}`}</span>
        </button>`;
    }).join("");
    const poolSize = chapterTaskPool(ch.id, ui.grade).length;
    const hasReview = ch.review && ch.review.length;
    const reviewHTML = hasReview ? `<div class="panel">
        <h3>❓ Вопросы для повторения главы</h3>
        ${ch.review.map((r) => `<details class="review-item"><summary>${esc(r.q)}</summary><div class="review-a">${esc(r.a)}</div></details>`).join("")}
      </div>` : "";
    return `
      <div class="mq-top"><button class="btn btn-ghost" data-act="open-grade" data-g="${ui.grade}">← К главам</button></div>
      <h2>${esc(ch.title)}</h2>
      <p class="creation-sub">Пройдено тем: ${done}/${total}</p>
      <div class="topic-list">${rows}</div>
      ${(poolSize || hasReview) ? `<div class="panel dash-hero">
        <h3>🎯 Практика по главе</h3>
        <p>Ещё ${poolSize} задач по темам этой главы — вперемешку, для закрепления.</p>
        <div class="chapter-cta-row">
          ${poolSize ? `<button class="btn btn-gold" data-act="chapter-practice-start" data-ch="${ch.id}">Начать практику →</button>` : ""}
          ${poolSize >= 5 ? `<button class="btn btn-primary" data-act="chapter-test-start" data-ch="${ch.id}">📝 Итоговый тест (5 вопросов)</button>` : ""}
          ${hasReview ? `<button class="btn btn-ghost" data-act="warmup-start" data-ch="${ch.id}">⚡ Разминка (2 мин)</button>` : ""}
        </div>
      </div>` : ""}
      ${(ch.problemSet && ch.problemSet.length) ? `<div class="panel dash-hero pb-hero">
        <h3>📚 Задачник главы</h3>
        <p>${ch.problemSet.length} задач от простого до уровня ОГЭ — с подробным решением рядом с каждой.</p>
        <button class="btn btn-gold" data-act="nav" data-view="chapterProblems">Открыть задачник →</button>
      </div>` : ""}
      ${reviewHTML}`;
  }

  function screenChapterProblems() {
    const ch = (GAME.chapters || []).find((c) => c.id === ui.chapterId);
    if (!ch || !ch.problemSet) return screenChapter();

  function workshopFindShape(key) {

  function workshopSpec(shape) {

  function formatWorkshopStats(shape, m) {
    if (!m) return "…";
    if (shape === "triangle") {
      return `Стороны: a=${Geo.fmt(m.a)}, b=${Geo.fmt(m.b)}, c=${Geo.fmt(m.c)} · Периметр: ${Geo.fmt(m.perimeter)}<br>`
        + `Углы: ∠A=${Geo.fmt(m.angleA)}°, ∠B=${Geo.fmt(m.angleB)}°, ∠C=${Geo.fmt(m.angleC)}° (сумма ${Geo.fmt(m.angleA + m.angleB + m.angleC)}°)<br>`
        + `Площадь: ${Geo.fmt(m.area)}`;
    }
    if (shape === "quad") {
      return `Периметр: ${Geo.fmt(m.perimeter)} · Площадь: ${Geo.fmt(m.area)}<br>Диагонали: ${Geo.fmt(m.diag1)} и ${Geo.fmt(m.diag2)}`;
    }
    if (shape === "circle") {
      return `Радиус: ${Geo.fmt(m.r)} · Длина окружности: ${Geo.fmt(m.circumference)} · Площадь круга: ${Geo.fmt(m.area)}`;
    }
    if (shape === "angle") {
      return `Величина угла: ${Geo.fmt(m.angle)}°`;
    }
    if (shape === "free") {
      if (!m.points || !m.points.length) return "Построй что-нибудь — точки, отрезки, окружности или многоугольники.";
      const parts = [`Точки: ${m.points.join(", ")}`];
      if (m.segments && m.segments.length) parts.push(m.segments.map((s) => `${s.from}${s.to}=${Geo.fmt(s.length)}`).join(", "));
      if (m.circles && m.circles.length) parts.push(m.circles.map((c) => `окружность(${c.center}), r=${Geo.fmt(c.r)}`).join(", "));
      if (m.polygons && m.polygons.length) parts.push(m.polygons.map((p) => `${p.labels}: P=${Geo.fmt(p.perimeter)}, S=${Geo.fmt(p.area)}`).join("; "));
      return parts.join("<br>");
    }
    // общий вариант для всех остальных (специализированных) чертежей — показываем то, что
    // реально вернула фигура через metrics(), не требуя отдельного форматтера на каждую из 30+
    const keys = Object.keys(m);
    if (!keys.length) return "Двигай точки чертежа и наблюдай, что меняется, а что — нет.";
    const parts = keys.map((k) => {
      const v = m[k];
      if (typeof v === "number") return `${k} = ${Geo.fmt(v)}`;
      if (typeof v === "boolean") return `${k}: ${v ? "да" : "нет"}`;
      return null;
    }).filter(Boolean);
    return parts.length ? parts.join(" · ") : "Двигай точки чертежа и наблюдай, что меняется, а что — нет.";
  }

  /* ---------- Экзамен ---------- */
  /* Параметрическая генерация: если у задания есть task.generate(), при каждом построении
     пула практики/экзамена вычисляем СВЕЖИЕ q/answer — числа меняются при каждой попытке,
     а не остаются одними и теми же навсегда. Исходный объект в GAME.topics не трогаем —
     тема при обычном просмотре по-прежнему показывает канонический пример из учебника. */
  function materialize(task) {
    if (!task.generate) return task;
    try { return Object.assign({}, task, task.generate()); }
    catch (e) { console.error("generate() failed for", task.id, e); return task; }
  }
  function allTasksPool() {
    const pool = [];
    GAME.topics.forEach((t) => t.tasks.forEach((task) => { if (task.type === "choice" || task.type === "input") pool.push({ task: materialize(task), topic: t }); }));
    return pool;
  }
  function buildExam() {
    const pool = allTasksPool().slice();
    for (let i = pool.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [pool[i], pool[j]] = [pool[j], pool[i]]; }
    const n = Math.min(APP.examQuestions, pool.length);
    return pool.slice(0, n);
  }
  function screenExam() {
    const ex = ui.exam;
    if (!ex || ex.phase === "intro") {
      return `<div class="mq-top"><button class="btn btn-ghost" data-act="nav" data-view="dashboard">← Главная</button></div>
        <div class="panel dash-hero">
          <h2>⏱ Режим «Экзамен»</h2>
          <p>${APP.examQuestions} случайных заданий из всех пройденных тем. Время: ${APP.examMinutes} минут. Лучший результат: ${State.data.stats.bestExamPct}%.</p>
          <button class="btn btn-gold" data-act="exam-start">Начать экзамен →</button>
        </div>`;
    }
    if (ex.phase === "running") {
      const q = ex.items[ex.idx];
      const t = q.task;
      const mins = Math.floor(ex.timeLeft / 60), secs = String(ex.timeLeft % 60).padStart(2, "0");
      let body = "";
      if (t.type === "choice") {
        body = `<div class="task-opts">${t.options.map((op, i) =>
          `<button class="task-opt ${ex.answered != null ? (i === t.correct ? "opt-correct" : (i === ex.answered ? "opt-wrong" : "")) : ""}" data-act="exam-answer" data-idx="${i}" ${ex.answered != null ? "disabled" : ""}>${esc(op)}</button>`).join("")}</div>`;
      } else {
        body = `<div class="task-input-row"><input type="text" inputmode="decimal" class="task-input" id="exam-input" placeholder="Ответ${t.unit ? " (" + t.unit + ")" : ""}" ${ex.answered != null ? "disabled" : ""}>
          <button class="btn btn-primary btn-sm" data-act="exam-answer-input" ${ex.answered != null ? "disabled" : ""}>Ответить</button></div>`;
      }
      return `
        <div class="exam-top"><span class="num">Вопрос ${ex.idx + 1} / ${ex.items.length}</span><span class="exam-timer num">⏳ ${mins}:${secs}</span></div>
        <div class="panel"><div class="task-q">${esc(t.q)}</div>${body}</div>
        ${ex.answered != null ? `<button class="btn btn-primary" data-act="exam-next">${ex.idx + 1 < ex.items.length ? "Следующий вопрос →" : "Завершить экзамен"}</button>` : ""}`;
    }
    // result
    const pct = Math.round((ex.score / ex.items.length) * 100);
    return `<div class="panel dash-hero">
        <h2>Экзамен завершён!</h2>
        <p>Правильных ответов: <b>${ex.score}</b> из ${ex.items.length} (${pct}%)</p>
        <button class="btn btn-gold" data-act="exam-start">Пройти ещё раз</button>
        <button class="btn btn-ghost" data-act="nav" data-view="dashboard">К главной</button>
      </div>
      ${ex.mistakes.length ? `<div class="panel"><h3>Ошибки для повторения</h3><ul>${ex.mistakes.map((m) => `<li>${esc(m.q)} — правильный ответ: ${m.correctText}</li>`).join("")}</ul></div>` : ""}`;
  }

  /* ---------- Повторение (интервальный движок, SM-2) ---------- */
  function reviewSetupCard(r) {
    const card = r.queue[r.idx];
    r.flipped = false; r.built = []; r.attempts = 0; r.builtResult = null; r.confuseRowOk = null;
    r.shuffledOrder = card && card.kind === "formulaBuild" ? shuffleArr(card.tokens.map((_, i) => i)) : null;
    r.rightShuffled = card && card.kind === "confusable" ? shuffleArr(card.pairs.map((_, i) => i)) : null;
  }
  function checkConfusableSelections(card, selMap) {
    let allOk = card.pairs.length > 0;
    const rowOk = {};
    card.pairs.forEach((p, i) => {
      const val = selMap[i];
      const ok = val != null && val !== "" && +val === i;
      rowOk[i] = ok;
      if (!ok) allOk = false;
    });
    return { allOk, rowOk };
  }
  function reviewConfuseCheck() {
    const r = ui.review; if (!r || r.builtResult) return;
    const card = r.queue[r.idx];
    if (card.kind !== "confusable") return;
    const selMap = {};
    root.querySelectorAll(".confuse-select").forEach((sel) => { selMap[+sel.getAttribute("data-idx")] = sel.value; });
    const { allOk, rowOk } = checkConfusableSelections(card, selMap);
    r.confuseRowOk = rowOk;
    if (allOk) {
      const q = r.attempts === 0 ? 5 : 3;
      State.srsRate(card.id, q);
      r.builtResult = "correct";
      Sound.correct();
    } else {
      r.attempts++;
      r.builtResult = "wrong";
      Sound.wrong();
    }
    render();
  }
  function reviewConfuseRetry() { const r = ui.review; if (!r) return; r.builtResult = null; r.confuseRowOk = null; render(); }
  function reviewConfuseGiveUp() {
    const r = ui.review; if (!r) return;
    const card = r.queue[r.idx];
    State.srsRate(card.id, 1);
    r.builtResult = "gaveup";
    render();
  }
  function reviewStart() {
    const queue = SRS.dueQueue(20); // ограничиваем сессию 20 карточками, чтобы не перегружать за раз
    if (!queue.length) { toast("Сегодня повторять нечего — всё сделано!", "🎉"); return; }
    ui.review = { queue, idx: 0, rated: 0, phase: "running" };
    reviewSetupCard(ui.review);
    ui.view = "review"; render(); window.scrollTo(0, 0);
  }
  /* Отдельная тренировка формул — та же механика "Собери формулу", что и в обычном повторении,
     но берёт ВСЕ разблокированные формулы разом (не по расписанию SRS) и не пишет в него результат —
     как и "На скорость", это самостоятельный, доступный в любой момент режим практики. */
  function formulaPracticeStart() {
    const queue = SRS.allUnlockedFormulas();
    if (!queue.length) { toast("Пока нет открытых формул — пройди хотя бы одну тему!", "🧩"); return; }
    ui.review = { queue, idx: 0, rated: 0, phase: "running", practiceMode: true };
    reviewSetupCard(ui.review);
    ui.view = "review"; render(); window.scrollTo(0, 0);
  }
  function reviewFlip() { if (ui.review && ui.review.phase === "running") { ui.review.flipped = true; render(); } }
  function reviewAdvance() {
    const r = ui.review; if (!r) return;
    r.idx++;
    if (r.idx >= r.queue.length) { r.phase = "done"; render(); return; }
    reviewSetupCard(r);
    render();
  }
  function reviewRate(quality) {
    const r = ui.review; if (!r || !r.flipped) return;
    const card = r.queue[r.idx];
    State.srsRate(card.id, quality);
    r.rated++;
    Sound.correct(); // самооценка, а не проверка "верно/неверно" — используем нейтрально-приятный тон, не "буzzer"
    reviewAdvance();
  }
  function reviewTokenPick(origIdx) {
    const r = ui.review; if (!r || r.phase !== "running") return;
    const card = r.queue[r.idx];
    if (card.kind !== "formulaBuild" || r.builtResult) return;
    if (r.built.includes(origIdx)) return;
    r.built.push(origIdx);
    if (r.built.length === card.tokens.length) {
      const correct = r.built.every((v, i) => v === i);
      if (correct) {
        const q = r.attempts === 0 ? 5 : 3;
        if (!r.practiceMode) State.srsRate(card.id, q);
        r.builtResult = "correct";
        Sound.correct();
      } else {
        r.attempts++;
        r.builtResult = "wrong";
        Sound.wrong();
      }
    }
    render();
  }
  function reviewTokenRemove(origIdx) {
    const r = ui.review; if (!r || r.phase !== "running" || r.builtResult) return;
    r.built = r.built.filter((i) => i !== origIdx);
    render();
  }
  function reviewFormulaRetry() {
    const r = ui.review; if (!r) return;
    r.built = []; r.builtResult = null;
    render();
  }
  function reviewFormulaGiveUp() {
    const r = ui.review; if (!r) return;
    const card = r.queue[r.idx];
    if (!r.practiceMode) State.srsRate(card.id, 1);
    r.built = card.tokens.map((_, i) => i);
    r.builtResult = "gaveup";
    render();
  }
  function reviewCardNext() { const r = ui.review; if (!r) return; r.rated++; reviewAdvance(); }
  function reviewExit() { ui.review = null; ui.view = "dashboard"; render(); window.scrollTo(0, 0); }

  /* ---------- "На скорость": 60 секунд быстрой самооценки, личный рекорд ---------- */
  /* Намеренно НЕ трогает State.data.srs — это отдельный, весёлый режим на беглость
     припоминания, а не часть расписания интервального повторения (SM-2). Смешивать их
     означало бы портить аккуратно выстроенное расписание поспешными оценками "на бегу". */
  let speedTimer = null;
  function speedStart() {
    const deck = SRS.allUnlockedSimple();
    if (!deck.length) { toast("Пока нечего повторять на скорость — пройди хотя бы одну тему!", "⚡"); return; }
    ui.speed = { deck, idx: 0, timeLeft: 60, correct: 0, total: 0, flipped: false, phase: "running" };
    if (speedTimer) clearInterval(speedTimer);
    speedTimer = setInterval(() => {
      if (!ui.speed || ui.speed.phase !== "running") return;
      ui.speed.timeLeft--;
      if (ui.speed.timeLeft <= 0) { speedFinish(); return; }
      const el = document.querySelector(".speed-timer");
      if (el) el.textContent = `⏱ ${ui.speed.timeLeft}с`;
    }, 1000);
    ui.view = "speed"; render(); window.scrollTo(0, 0);
  }
  function speedFinish() {
    if (speedTimer) { clearInterval(speedTimer); speedTimer = null; }
    const s = ui.speed; if (!s) return;
    s.phase = "done";
    s.isNewBest = s.correct > (State.data.speedBest || 0);
    if (s.isNewBest) { State.data.speedBest = s.correct; State.save(); }
    if (s.total > 0) streakTouch();
    render();
  }
  function speedFlip() { if (ui.speed && ui.speed.phase === "running") { ui.speed.flipped = true; render(); } }
  function speedAnswer(known) {
    const s = ui.speed; if (!s || !s.flipped || s.phase !== "running") return;
    s.total++;
    if (known) s.correct++;
    s.idx++;
    if (s.idx >= s.deck.length) { s.deck = SRS.shuffle(s.deck); s.idx = 0; } // колода кончилась раньше таймера — перемешиваем и крутим по новой
    s.flipped = false;
    render();
  }
  function speedExit() {
    if (speedTimer) { clearInterval(speedTimer); speedTimer = null; }
    ui.speed = null; ui.view = "dashboard"; render(); window.scrollTo(0, 0);
  }
  function screenSpeed() {
    const s = ui.speed;
    if (!s) return screenDashboard();
    if (s.phase === "done") {
      return `<div class="panel dash-hero">
          <h2>⚡ Время вышло!</h2>
          <p>Верно вспомнено: <b class="num">${s.correct}</b> из <span class="num">${s.total}</span></p>
          ${s.isNewBest ? `<p class="tr-fb ok" role="status">🏆 Новый личный рекорд!</p>` : `<p class="creation-sub">Личный рекорд: <span class="num">${State.data.speedBest}</span></p>`}
          <button class="btn btn-gold" data-act="speed-start">Ещё раз →</button>
          <button class="btn btn-ghost" data-act="speed-exit">← На главную</button>
        </div>`;
    }
    const card = s.deck[s.idx];
    return `
      <div class="mq-top"><button class="btn btn-ghost" data-act="speed-exit">✕ Закончить</button><span class="mq-badge speed-timer num">⏱ ${s.timeLeft}с</span></div>
      <h2>⚡ На скорость</h2>
      <p class="creation-sub">Верно: <span class="num">${s.correct}</span> · Рекорд: <span class="num">${State.data.speedBest || 0}</span></p>
      <div class="panel review-card">
        <div class="review-front">${esc(card.front)}</div>
        ${card.kind === "figure" ? `<div class="fig-mount" data-figure='${JSON.stringify(card.figure)}'></div>` : ""}
        ${!s.flipped ? `<button class="btn btn-primary" data-act="speed-flip">👆 Показать</button>` : `<div class="review-back">${esc(card.back)}</div>`}
      </div>
      ${s.flipped ? `<div class="review-rate-row">
          <button class="btn btn-bad" data-act="speed-answer" data-known="0">❌ Не знал</button>
          <button class="btn btn-gold" data-act="speed-answer" data-known="1">✅ Знал</button>
        </div>` : ""}`;
  }

  /* ---------- Сертификат: печатная/PDF-версия через window.print(), без единой новой библиотеки ---------- */
  function gradeTasksSolved(g) {
    let n = 0;
    topicsForGrade(g).forEach((t) => {
      const p = State.data.progress[t.id];
      if (p) n += Object.keys(p.doneTasks).length;
    });
    return n;
  }
  function screenCertificate() {
    const g = ui.certGrade;
    const world = (GAME.worlds || []).find((w) => w.grade === g);
    const tps = topicsForGrade(g);
    const done = tps.length && tps.every((t) => State.isTopicDone(t.id));
    if (!world || !done) {
      return `<div class="mq-top"><button class="btn btn-ghost" data-act="nav" data-view="dashboard">← Главная</button></div>
        <div class="panel"><p>Сначала заверши все темы ${g || ""} класса.</p></div>`;
    }
    const hero = State.data.hero || { name: "Исследователь" };
    const dateStr = new Date().toLocaleDateString("ru-RU", { year: "numeric", month: "long", day: "numeric" });
    const tasksSolved = gradeTasksSolved(g);
    const achCount = Object.keys(State.data.achievements || {}).length;
    return `
      <div class="mq-top no-print"><button class="btn btn-ghost" data-act="nav" data-view="dashboard">← Главная</button>
        <button class="btn btn-gold" data-act="print-certificate">🖨 Сохранить как PDF / Распечатать</button></div>
      <div class="cert-sheet">
        <div class="cert-border">
          <div class="cert-ico">🎓</div>
          <div class="cert-kicker">Интерактивная геометрия</div>
          <h1 class="cert-title">Сертификат</h1>
          <p class="cert-sub">настоящим подтверждается, что</p>
          <p class="cert-name">${esc(hero.name)}</p>
          <p class="cert-sub">успешно завершил(а) полный курс геометрии</p>
          <p class="cert-grade">${g} класса</p>
          <div class="cert-stats">
            <div class="cert-stat"><b>${tps.length}</b><span>тем изучено</span></div>
            <div class="cert-stat"><b>${tasksSolved}</b><span>заданий решено</span></div>
            <div class="cert-stat"><b>${achCount}</b><span>достижений получено</span></div>
          </div>
          <p class="cert-date">${dateStr}</p>
        </div>
      </div>`;
  }

  function screenReview() {
    const r = ui.review;
    if (!r) return screenDashboard();
    if (r.phase === "done") {
      return `<div class="panel dash-hero">
          <h2>${r.practiceMode ? "🧩 Тренировка формул окончена!" : "🔁 Повторение окончено!"}</h2>
          <p>Карточек повторено: <b>${r.rated}</b></p>
          <button class="btn btn-gold" data-act="${r.practiceMode ? "formula-practice-start" : "review-start"}">Ещё карточек, если есть</button>
          <button class="btn btn-ghost" data-act="review-exit">← На главную</button>
        </div>`;
    }
    const card = r.queue[r.idx];
    const kindLabel = { formula: "📐 Формула", remember: "🧠 Ключевой факт", figure: "👁 Узнай по чертежу", theorem: "📜 Теорема", formulaBuild: "🧩 Собери формулу", confusable: "🔀 Не перепутай" }[card.kind] || "Карточка";
    const top = `<div class="mq-top"><button class="btn btn-ghost" data-act="review-exit">✕ Закончить</button><span class="mq-badge num">${r.idx + 1} / ${r.queue.length}</span></div>
      <h2>${r.practiceMode ? "🧩 Тренировка формул" : "🔁 Повторение"}</h2>
      <p class="creation-sub">${r.practiceMode ? "Без спешки — не влияет на расписание повторения." : kindLabel}</p>`;

    if (card.kind === "confusable") {
      const rows = card.pairs.map((p, i) => {
        const rowState = r.confuseRowOk ? (r.confuseRowOk[i] ? "row-ok" : "row-bad") : "";
        const opts = r.rightShuffled.map((j) => `<option value="${j}" ${r.builtResult === "gaveup" && j === i ? "selected" : ""}>${esc(card.pairs[j].right)}</option>`).join("");
        return `<div class="confuse-row ${rowState}">
            <span class="confuse-left">${esc(p.left)}</span>
            <select class="confuse-select" data-idx="${i}" ${r.builtResult ? "disabled" : ""}>
              <option value="">— выбери —</option>${opts}
            </select>
          </div>`;
      }).join("");
      let statusHTML = "";
      if (r.builtResult === "correct") statusHTML = `<div class="tr-fb ok" role="status">✅ Всё верно, не перепутал!</div><button class="btn btn-primary" data-act="review-card-next">Дальше →</button>`;
      else if (r.builtResult === "gaveup") statusHTML = `<div class="tr-fb bad" role="status">Вот верные пары — присмотрись, где путаница.</div><button class="btn btn-primary" data-act="review-card-next">Дальше →</button>`;
      else if (r.builtResult === "wrong") statusHTML = `<div class="tr-fb bad" role="status">Что-то перепутано — красным отмечены неверные строки.</div><button class="btn btn-ghost btn-sm" data-act="review-confuse-retry">↺ Попробовать снова</button>`;
      return `${top}
        <div class="panel review-card confuse-card">
          <div class="review-front">${esc(card.front)}</div>
          <div class="confuse-rows">${rows}</div>
          ${!r.builtResult ? `<button class="btn btn-primary" data-act="review-confuse-check">Проверить</button>` : ""}
          ${statusHTML}
          ${!r.builtResult ? `<button class="btn btn-ghost btn-sm formula-giveup-btn" data-act="review-confuse-giveup">Не помню — показать</button>` : ""}
        </div>`;
    }

    if (card.kind === "formulaBuild") {
      const builtRow = r.built.length
        ? r.built.map((origIdx) => `<button class="token-chip built ${r.builtResult === "wrong" ? "wrong" : ""}" data-act="${r.builtResult ? "" : "review-token-remove"}" data-idx="${origIdx}">${esc(card.tokens[origIdx])}</button>`).join("")
        : `<span class="formula-placeholder">— тапай токены снизу, чтобы собрать формулу —</span>`;
      const poolRow = (!r.builtResult || r.builtResult === "wrong")
        ? r.shuffledOrder.filter((origIdx) => !r.built.includes(origIdx)).map((origIdx) => `<button class="token-chip" data-act="review-token-pick" data-idx="${origIdx}">${esc(card.tokens[origIdx])}</button>`).join("")
        : "";
      let statusHTML = "";
      if (r.builtResult === "correct") statusHTML = `<div class="tr-fb ok" role="status">✅ Верно!</div><button class="btn btn-primary" data-act="review-card-next">Дальше →</button>`;
      else if (r.builtResult === "gaveup") statusHTML = `<div class="tr-fb bad" role="status">Вот правильный порядок — запомни его.</div><button class="btn btn-primary" data-act="review-card-next">Дальше →</button>`;
      else if (r.builtResult === "wrong") statusHTML = `<div class="tr-fb bad" role="status">Пока не так.</div><button class="btn btn-ghost btn-sm" data-act="review-formula-retry">↺ Собрать заново</button>`;
      return `${top}
        <div class="panel review-card formula-build-card">
          <div class="review-front">${esc(card.front)}</div>
          <div class="formula-built-row">${builtRow}</div>
          ${poolRow ? `<div class="formula-pool-row">${poolRow}</div>` : ""}
          ${statusHTML}
          ${!r.builtResult ? `<button class="btn btn-ghost btn-sm formula-giveup-btn" data-act="review-formula-giveup">Не помню — показать</button>` : ""}
        </div>`;
    }

    return `${top}
      <div class="panel review-card">
        <div class="review-front">${esc(card.front)}</div>
        ${card.kind === "figure" ? `<div class="fig-mount" data-figure='${JSON.stringify(card.figure)}'></div>` : ""}
        ${!r.flipped ? `<button class="btn btn-primary" data-act="review-flip">👆 Показать ответ</button>` : `<div class="review-back">${esc(card.back)}</div>`}
      </div>
      ${r.flipped ? `<div class="review-rate-row">
          <button class="btn btn-bad" data-act="review-rate" data-q="1">😵 Забыл</button>
          <button class="btn btn-ghost" data-act="review-rate" data-q="3">🤔 Трудно</button>
          <button class="btn btn-gold" data-act="review-rate" data-q="5">😎 Легко</button>
        </div>
        <p class="review-hint">Оцени честно — это влияет только на то, когда карточка вернётся снова.</p>` : ""}`;
  }

  /* ---------- Разминка: 2 минуты, лёгкое повторение — карточки главы + пара быстрых вопросов ---------- */
  let warmupTimer = null;
  function startWarmup(chId) {
    const ch = (GAME.chapters || []).find((c) => c.id === chId);
    if (!ch) return;
    const cards = shuffleArr((ch.review || []).slice());
    ui.warmup = { chId, cards, idx: 0, flipped: false, seen: 0, timeLeft: 120, phase: "running" };
    if (warmupTimer) clearInterval(warmupTimer);

  /* ---------- Практика по главе (после каждой темы можно порешать вперемешку) ---------- */
  function chapterTaskPool(chId, grade) {
    const pool = [];
    topicsOfChapter(chId, grade).forEach((t) => t.tasks.forEach((task) => {
      if (task.type === "choice" || task.type === "input") pool.push({ task: materialize(task), topic: t });
    }));
    return pool;
  }
  function shuffleArr(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
    return a;
  }

  let teacherDemo = null;
  function getTeacherDemo() {
    if (teacherDemo) return teacherDemo;
    const names = ["Аня К.", "Игорь П.", "Марат С.", "Соня Д.", "Тимур Б."];
    teacherDemo = names.map((n) => {

  }
  /* ================= Генератор контрольных работ =================
     Банк — это все уже существующие задания курса (GAME.topics), без отдельного
     хранилища. Печатаются только типы, не требующие интерактива: choice, input,
     proof, match — плюс error (с фигурой, если она есть, отрендеренной в PNG). */
  const TESTGEN_TYPES = ["choice", "input", "proof", "error", "match"];

  const TestGen = {
    /* Собирает пул подходящих заданий по фильтрам. Каждый элемент — {task, topic}. */
    pool(filters) {
      const chSet = filters.chapters && filters.chapters.length ? new Set(filters.chapters) : null;
      const diffSet = filters.difficulties && filters.difficulties.length ? new Set(filters.difficulties) : null;
      const typeSet = filters.types && filters.types.length ? new Set(filters.types) : new Set(TESTGEN_TYPES);
      const out = [];
      GAME.topics.forEach((t) => {
        if (filters.grade && t.grade !== filters.grade) return;
        if (chSet && !chSet.has(t.chapter)) return;
        t.tasks.forEach((task) => {
          if (!TESTGEN_TYPES.includes(task.type)) return;
          if (!typeSet.has(task.type)) return;
          const diff = task.difficulty || "medium";
          if (diffSet && !diffSet.has(diff)) return;
          out.push({ task, topic: t });
        });
      });
      return out;
    },

    /* Случайно выбирает count заданий из пула, стараясь не брать больше 2 подряд
       из одной темы (простое перемешивание с лёгким ограничением на кучность). */
    pick(pool, count) {
      const shuffled = pool.slice();
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled.slice(0, Math.min(count, shuffled.length));
    },

    /* Материализует задание: если fresh=true и есть generate(), берёт свежий вариант,
       иначе — как есть. Возвращает плоский объект со всем нужным для печати. */
    materialize(entry, fresh) {
      const { task, topic } = entry;
      const gen = fresh && task.generate ? task.generate() : null;
      const merged = gen ? Object.assign({}, task, gen) : task;
      return { id: task.id, type: task.type, topicTitle: topic.title, q: merged.q, options: merged.options,
        correct: merged.correct, unit: merged.unit, answer: merged.answer, labels: merged.labels,
        pairs: merged.pairs, figure: task.figure, difficulty: task.difficulty || "medium" };
    },
  };
  window.TestGen = TestGen; // для отладки/тестов

        for (let s = shuffledRight.length - 1; s > 0; s--) { const j = Math.floor(Math.random() * (s + 1));[shuffledRight[s], shuffledRight[j]] = [shuffledRight[j], shuffledRight[s]]; }
        it._shuffledRight = shuffledRight; // сохраняем порядок для листа ответов
        inner += `<div class="tg-match"><div>${it.pairs.map((p, pi) => `<div>${pi + 1}. ${esc(p.left)}</div>`).join("")}</div>

        <div class="tg-header">
