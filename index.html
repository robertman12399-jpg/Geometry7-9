        <span class="topic-ico">🧩</span><span class="topic-title">${esc(th.title)}</span><span class="topic-st">${th.grade} кл.</span>
      </button>`).join("");
    return `<div class="mq-top"><button class="btn btn-ghost" data-act="nav" data-view="dashboard">← Главная</button></div>
      <h2>Симуляции теорем</h2><p class="creation-sub">Запусти анимацию и посмотри, почему теорема верна — не просто выучи формулировку.</p>
      <div class="topic-list">${rows}</div>`;
  }

  function screenTheorem() {
    const th = GAME.theorems.find((x) => x.id === ui.thId) || GAME.theorems[0];
    return `<div class="mq-top"><button class="btn btn-ghost" data-act="nav" data-view="theorems">← К теоремам</button></div>
      <h2>🧩 ${esc(th.title)}</h2>
      <p class="creation-sub">${esc(th.text)}</p>
      <div class="fig-mount" data-theorem="${th.anim}"></div>`;
  }

  function screenReference() {
    const secs = GAME.worlds.map((w) => {
      const tps = topicsForGrade(w.grade);
      const rows = tps.map((t) => `
        <div class="ref-row">
          <button class="ref-formula" data-act="ref-toggle" data-topic="${t.id}">${t.ico} <b>${esc(t.title)}:</b> ${esc(t.formula)}</button>
          <button class="btn btn-ghost btn-sm" data-act="ref-copy" data-copy="${esc(t.formula)}">⧉ Скопировать</button>
          ${ui.refOpen === t.id ? `<div class="fig-mount" data-figure='${JSON.stringify(t.figure || { type: "triangle" })}'></div>` : ""}
        </div>`).join("");
      return `<div class="panel"><h3>${w.ico} ${w.grade} класс — ${esc(w.title)}</h3>${rows}</div>`;
    }).join("");
    return `<div class="mq-top"><button class="btn btn-ghost" data-act="nav" data-view="dashboard">← Главная</button></div>
      <h2>📖 Справочник формул</h2>${secs}`;
  }

  /* ---------- Экзамен ---------- */
  function allTasksPool() {
    const pool = [];
    GAME.topics.forEach((t) => t.tasks.forEach((task) => { if (task.type === "choice" || task.type === "input") pool.push({ task, topic: t }); }));
    return pool;
  }
  function buildExam() {
    const pool = allTasksPool().slice();
    for (let i = pool.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [pool[i], pool[j]] = [pool[j], pool[i]]; }
    const n = Math.min(APP.examQuestions, pool.length);
    return pool.slice(0, n);
  }
  function screenExam() {
    const ex = ui.exam;
    if (!ex || ex.phase === "intro") {
      return `<div class="mq-top"><button class="btn btn-ghost" data-act="nav" data-view="dashboard">← Главная</button></div>
        <div class="panel dash-hero">
          <h2>⏱ Режим «Экзамен»</h2>
          <p>${APP.examQuestions} случайных заданий из всех пройденных тем. Время: ${APP.examMinutes} минут. Лучший результат: ${State.data.stats.bestExamPct}%.</p>
          <button class="btn btn-gold" data-act="exam-start">Начать экзамен →</button>
        </div>`;
    }
    if (ex.phase === "running") {
      const q = ex.items[ex.idx];
      const t = q.task;
      const mins = Math.floor(ex.timeLeft / 60), secs = String(ex.timeLeft % 60).padStart(2, "0");
      let body = "";
      if (t.type === "choice") {
        body = `<div class="task-opts">${t.options.map((op, i) =>
          `<button class="task-opt ${ex.answered != null ? (i === t.correct ? "opt-correct" : (i === ex.answered ? "opt-wrong" : "")) : ""}" data-act="exam-answer" data-idx="${i}" ${ex.answered != null ? "disabled" : ""}>${esc(op)}</button>`).join("")}</div>`;
      } else {
        body = `<div class="task-input-row"><input type="text" inputmode="decimal" class="task-input" id="exam-input" placeholder="Ответ${t.unit ? " (" + t.unit + ")" : ""}" ${ex.answered != null ? "disabled" : ""}>
          <button class="btn btn-primary btn-sm" data-act="exam-answer-input" ${ex.answered != null ? "disabled" : ""}>Ответить</button></div>`;
      }
      return `
        <div class="exam-top"><span>Вопрос ${ex.idx + 1} / ${ex.items.length}</span><span class="exam-timer">⏳ ${mins}:${secs}</span></div>
        <div class="panel"><div class="task-q">${esc(t.q)}</div>${body}</div>
        ${ex.answered != null ? `<button class="btn btn-primary" data-act="exam-next">${ex.idx + 1 < ex.items.length ? "Следующий вопрос →" : "Завершить экзамен"}</button>` : ""}`;
    }
    // result
    const pct = Math.round((ex.score / ex.items.length) * 100);
    return `<div class="panel dash-hero">
        <h2>Экзамен завершён!</h2>
        <p>Правильных ответов: <b>${ex.score}</b> из ${ex.items.length} (${pct}%)</p>
        <button class="btn btn-gold" data-act="exam-start">Пройти ещё раз</button>
        <button class="btn btn-ghost" data-act="nav" data-view="dashboard">К главной</button>
      </div>
      ${ex.mistakes.length ? `<div class="panel"><h3>Ошибки для повторения</h3><ul>${ex.mistakes.map((m) => `<li>${esc(m.q)} — правильный ответ: ${m.correctText}</li>`).join("")}</ul></div>` : ""}`;
  }

  let examTimer = null;
  function startExam() {
    ui.exam = { phase: "running", items: buildExam(), idx: 0, score: 0, answered: null, timeLeft: APP.examMinutes * 60, mistakes: [] };
    if (examTimer) clearInterval(examTimer);
    examTimer = setInterval(() => {
      if (!ui.exam || ui.exam.phase !== "running") return;
      ui.exam.timeLeft--;
      if (ui.exam.timeLeft <= 0) { finishExam(); return; }
      renderTimerOnly();
    }, 1000);
    render();
  }
  function renderTimerOnly() {
    const el = document.querySelector(".exam-timer");
    if (el && ui.exam) { const m = Math.floor(ui.exam.timeLeft / 60), s = String(ui.exam.timeLeft % 60).padStart(2, "0"); el.textContent = `⏳ ${m}:${s}`; }
  }
  function finishExam() {
    if (examTimer) { clearInterval(examTimer); examTimer = null; }
    ui.exam.phase = "result";
    const pct = Math.round((ui.exam.score / ui.exam.items.length) * 100);
    const unlocked = State.recordExam(pct, ui.exam.mistakes);
    announceUnlocks(unlocked);
    render();
  }

  /* ---------- Практика по главе (после каждой темы можно порешать вперемешку) ---------- */
  function chapterTaskPool(chId) {
    const pool = [];
    topicsOfChapter(chId).forEach((t) => t.tasks.forEach((task) => {
      if (task.type === "choice" || task.type === "input") pool.push({ task, topic: t });
    }));
    return pool;
  }
  function shuffleArr(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
    return a;
  }
  function startChapterPractice(chId) {
    ui.chPractice = { chId, items: shuffleArr(chapterTaskPool(chId)), idx: 0, score: 0, answered: null };
    go("chapterPractice");
  }
  function screenChapterPractice() {
    const cp = ui.chPractice;
    if (!cp || !cp.items.length) return screenChapters();
    const q = cp.items[cp.idx];
    const t = q.task;
    let body = "";
    if (t.type === "choice") {
      body = `<div class="task-opts">${t.options.map((op, i) =>
        `<button class="task-opt ${cp.answered != null ? (i === t.correct ? "opt-correct" : (i === cp.answered ? "opt-wrong" : "")) : ""}" data-act="cp-answer" data-idx="${i}" ${cp.answered != null ? "disabled" : ""}>${esc(op)}</button>`).join("")}</div>`;
    } else {
      body = `<div class="task-input-row"><input type="text" inputmode="decimal" class="task-input" id="cp-input" placeholder="Ответ${t.unit ? " (" + t.unit + ")" : ""}" ${cp.answered != null ? "disabled" : ""}>
        <button class="btn btn-primary btn-sm" data-act="cp-answer-input" ${cp.answered != null ? "disabled" : ""}>Ответить</button></div>`;
    }
    const ch = (GAME.chapters || []).find((c) => c.id === cp.chId);
    return `
      <div class="mq-top">
        <button class="btn btn-ghost" data-act="open-chapter" data-ch="${cp.chId}">← К главе</button>
        <span class="mq-badge">${cp.idx + 1}/${cp.items.length} · верно ${cp.score}</span>
      </div>
      <h2>🎯 Практика: ${esc(ch ? ch.title : "")}</h2>
      <div class="panel">
        <div class="task-type">${esc(q.topic.title)}</div>
        <div class="task-q">${esc(t.q)}</div>
        ${body}
        ${cp.answered != null ? `<div class="task-fb ${cp.correct ? "fb-ok" : "fb-bad"}">${cp.correct ? "Верно! ✅" : "Неверно"}</div>` : ""}
      </div>
      ${cp.answered != null ? `<button class="btn btn-primary" data-act="cp-next">${cp.idx + 1 < cp.items.length ? "Следующее задание →" : "Завершить практику"}</button>` : ""}`;
  }
  function cpAnswer(idx) {
    const cp = ui.chPractice; const q = cp.items[cp.idx]; const t = q.task;
    cp.answered = idx; cp.correct = idx === t.correct;
    if (cp.correct) { cp.score++; const res = State.completeTask(t, q.topic.id); if (res && !res.already) announceUnlocks(res.unlocked); }
    render();
  }
  function cpAnswerInput(val) {
    const cp = ui.chPractice; const q = cp.items[cp.idx]; const t = q.task;
    const num = parseFloat(String(val).replace(",", "."));
    cp.correct = !isNaN(num) && Math.abs(num - t.answer) <= (t.tol || 0.5);
    cp.answered = "ok";
    if (cp.correct) { cp.score++; const res = State.completeTask(t, q.topic.id); if (res && !res.already) announceUnlocks(res.unlocked); }
    render();
  }
  function cpNext() {
    const cp = ui.chPractice;
    if (cp.idx + 1 < cp.items.length) { cp.idx++; cp.answered = null; render(); }
    else { toast(`Практика завершена: ${cp.score}/${cp.items.length}`, "🎯"); go("chapter", { chapterId: cp.chId }); }
  }

  /* ---------- Итоговый тест по главе: короткий (5 вопросов), со счётом и разбором ошибок ---------- */
  function startChapterTest(chId) {
    const items = shuffleArr(chapterTaskPool(chId)).slice(0, 5);
    ui.chapterTest = { chId, items, idx: 0, score: 0, answered: null, mistakes: [] };
    go("chapterTest");
  }
  function screenChapterTest() {
    const t = ui.chapterTest;
    if (!t) return screenChapters();
    if (t.phase === "result") {
      const pct = Math.round((t.score / t.items.length) * 100);
      const ch = (GAME.chapters || []).find((c) => c.id === t.chId);
      return `<div class="panel dash-hero">
          <h2>📝 Итоговый тест завершён!</h2>
          <p>${esc(ch ? ch.title : "")}</p>
          <p>Правильных ответов: <b>${t.score}</b> из ${t.items.length} (${pct}%)</p>
          <button class="btn btn-gold" data-act="chapter-test-start" data-ch="${t.chId}">Пройти ещё раз</button>
          <button class="btn btn-ghost" data-act="open-chapter" data-ch="${t.chId}">← К главе</button>
        </div>
        ${t.mistakes.length ? `<div class="panel"><h3>Разбор ошибок</h3><ul>${t.mistakes.map((m) => `<li>${esc(m.q)} — правильный ответ: ${esc(m.correctText)}</li>`).join("")}</ul></div>` : ""}`;
    }
    const q = t.items[t.idx]; const task = q.task;
    let body = "";
    if (task.type === "choice" || task.type === "proof") {
      body = `<div class="task-opts">${task.options.map((op, i) =>
        `<button class="task-opt ${t.answered != null ? (i === task.correct ? "opt-correct" : (i === t.answered ? "opt-wrong" : "")) : ""}" data-act="ct-answer" data-idx="${i}" ${t.answered != null ? "disabled" : ""}>${esc(op)}</button>`).join("")}</div>`;
    } else {
      body = `<div class="task-input-row"><input type="text" inputmode="decimal" class="task-input" id="ct-input" placeholder="Ответ${task.unit ? " (" + task.unit + ")" : ""}" ${t.answered != null ? "disabled" : ""}>
        <button class="btn btn-primary btn-sm" data-act="ct-answer-input" ${t.answered != null ? "disabled" : ""}>Ответить</button></div>`;
    }
    return `
      <div class="mq-top">
        <button class="btn btn-ghost" data-act="open-chapter" data-ch="${t.chId}">← К главе</button>
        <span class="mq-badge">Вопрос ${t.idx + 1}/${t.items.length} · верно ${t.score}</span>
      </div>
      <h2>📝 Итоговый тест</h2>
      <div class="panel"><div class="task-type">${esc(q.topic.title)}</div><div class="task-q">${esc(task.q)}</div>${body}</div>
      ${t.answered != null ? `<button class="btn btn-primary" data-act="ct-next">${t.idx + 1 < t.items.length ? "Следующий вопрос →" : "Завершить тест"}</button>` : ""}`;
  }
  function ctAnswer(idx) {
    const t = ui.chapterTest; const q = t.items[t.idx]; const task = q.task;
    t.answered = idx;
    if (idx === task.correct) t.score++;
    else t.mistakes.push({ q: task.q, correctText: task.options[task.correct] });
    render();
  }
  function ctAnswerInput(val) {
    const t = ui.chapterTest; const q = t.items[t.idx]; const task = q.task;
    const num = parseFloat(String(val).replace(",", "."));
    const ok = !isNaN(num) && Math.abs(num - task.answer) <= (task.tol || 0.5);
    t.answered = "ok";
    if (ok) t.score++;
    else t.mistakes.push({ q: task.q, correctText: String(task.answer) + (task.unit || "") });
    render();
  }
  function ctNext() {
    const t = ui.chapterTest;
    if (t.idx + 1 < t.items.length) { t.idx++; t.answered = null; render(); }
    else { t.phase = "result"; render(); }
  }


  let teacherDemo = null;
  function getTeacherDemo() {
    if (teacherDemo) return teacherDemo;
    const names = ["Аня К.", "Игорь П.", "Марат С.", "Соня Д.", "Тимур Б."];
    teacherDemo = names.map((n) => {
      const progress = {};
      GAME.topics.forEach((t) => { progress[t.id] = Math.random() < 0.5 ? Math.round(Math.random() * 100) : (Math.random() < 0.5 ? 100 : 0); });
      return { name: n, progress };
    });
    return teacherDemo;
  }
  function screenTeacher() {
    const students = getTeacherDemo();
    const rows = students.map((s) => {
      const vals = Object.values(s.progress);
      const avg = Math.round(vals.reduce((a, b) => a + b, 0) / vals.length);
      return `<tr><td>${esc(s.name)}</td><td><div class="hud-bar sm"><div class="hud-fill" style="width:${avg}%"></div></div> ${avg}%</td>
        <td><button class="btn btn-ghost btn-sm" data-act="teacher-assign" data-name="${esc(s.name)}">Назначить тему</button></td></tr>`;
    }).join("");
    // сложные темы: где средний прогресс ниже всего
    const hard = GAME.topics.map((t) => {
      const avg = students.reduce((sum, s) => sum + s.progress[t.id], 0) / students.length;
      return { t, avg };
    }).sort((a, b) => a.avg - b.avg).slice(0, 3);
    return `<div class="mq-top"><button class="btn btn-ghost" data-act="nav" data-view="dashboard">← Главная</button></div>
      <h2>🧑‍🏫 Кабинет учителя (демо-данные)</h2>
      <p class="creation-sub">Демонстрационные ученики — данные условные, для показа на уроке.</p>
      <div class="panel"><table class="teacher-table"><thead><tr><th>Ученик</th><th>Прогресс</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
      <div class="panel"><h3>📉 Темы, вызывающие больше всего затруднений</h3>
        <ul>${hard.map((h) => `<li>${esc(h.t.title)} — средний прогресс ${Math.round(h.avg)}%</li>`).join("")}</ul></div>`;
  }

  function screenSettings() {
    const s = State.data.settings;
    return `<div class="mq-top"><button class="btn btn-ghost" data-act="nav" data-view="dashboard">← Главная</button></div>
      <h2>⚙️ Настройки</h2>
      <div class="panel">
        <label class="fig-chk"><input type="checkbox" data-act="toggle-theme" ${s.theme === "dark" ? "checked" : ""}> Тёмная тема</label><br>
        <label class="fig-chk"><input type="checkbox" data-act="toggle-sound" ${s.sound ? "checked" : ""}> Звук</label>
      </div>
      <div class="panel">
        <h3>Сохранение</h3>
        <button class="btn btn-ghost btn-sm" data-act="export-save">⬇ Скачать сохранение</button>
        <label class="btn btn-ghost btn-sm" style="cursor:pointer">⬆ Загрузить сохранение<input type="file" id="import-file" accept="application/json" style="display:none"></label>
        <br><br>
        <button class="btn btn-ghost btn-sm" data-act="reset-progress">🗑 Сбросить весь прогресс</button>
      </div>`;
  }

  /* ================= рендер / роутинг ================= */
  function screenHTML() {
    switch (ui.view) {
      case "dashboard": return screenDashboard();
      case "chapters": return screenChapters();
      case "chapter": return screenChapter();
      case "chapterPractice": return screenChapterPractice();
      case "chapterTest": return screenChapterTest();
      case "topic": return screenTopic();
      case "theorems": return screenTheorems();
      case "theorem": return screenTheorem();
      case "reference": return screenReference();
      case "exam": return screenExam();
      case "teacher": return screenTeacher();
      case "settings": return screenSettings();
      default: return screenDashboard();
    }
  }

  function render() {
    destroyFigures();
    if (!State.data.hero) {
      root.innerHTML = screenCreation();
      return;
    }
    root.innerHTML = hud() + navTabs() + `<main class="screen">${screenHTML()}</main>`;
    // монтируем чертежи темы/reference
    root.querySelectorAll(".fig-mount[data-figure]").forEach((el) => {
      let spec; try { spec = JSON.parse(el.getAttribute("data-figure")); } catch (e) { spec = { type: "triangle" }; }
      App.trackFigure(Figures.mount(el, spec));
    });
    root.querySelectorAll(".fig-mount[data-theorem]").forEach((el) => {
      App.trackFigure(Theorems.mount(el, el.getAttribute("data-theorem")));
    });
    Tasks.mountFigures(root);
  }

  function go(view, opts) {
    ui.view = view;
    if (opts) Object.assign(ui, opts);
    render();
    window.scrollTo(0, 0);
  }

  document.documentElement.setAttribute("data-theme", State.data && State.data.settings ? State.data.settings.theme : "light");

  root.addEventListener("click", function (e) {
    const node = e.target.closest("[data-act]");
    if (!node) return;
    const act = node.getAttribute("data-act");

    if (act === "pick-grade") {
      root.querySelectorAll(".grade-btn").forEach((b) => b.classList.remove("active"));
      node.classList.add("active");
      node.dataset.picked = "1";
      root.querySelectorAll(".grade-btn").forEach((b) => { if (b !== node) delete b.dataset.picked; });
      return;
    }
    if (act === "create-hero") {
      const nameEl = document.getElementById("hero-name");
      const gradeBtn = root.querySelector(".grade-btn.active");
      State.createHero(nameEl ? nameEl.value.trim() : "", gradeBtn ? +gradeBtn.dataset.g : 7);
      ui.grade = State.data.hero.grade;
      go("dashboard");
      return;
    }
    if (act === "nav") { go(node.getAttribute("data-view")); return; }
    if (act === "open-grade") { go("chapters", { grade: +node.getAttribute("data-g") }); return; }
    if (act === "open-chapter") { go("chapter", { chapterId: node.getAttribute("data-ch") }); return; }
    if (act === "chapter-practice-start") { startChapterPractice(node.getAttribute("data-ch")); return; }
    if (act === "chapter-test-start") { startChapterTest(node.getAttribute("data-ch")); return; }
    if (act === "ct-answer") { ctAnswer(+node.getAttribute("data-idx")); return; }
    if (act === "ct-answer-input") { const input = document.getElementById("ct-input"); ctAnswerInput(input ? input.value : ""); return; }
    if (act === "ct-next") { ctNext(); return; }
    if (act === "cp-answer") { cpAnswer(+node.getAttribute("data-idx")); return; }
    if (act === "cp-answer-input") { const input = document.getElementById("cp-input"); cpAnswerInput(input ? input.value : ""); return; }
    if (act === "cp-next") { cpNext(); return; }
    if (act === "open-topic") { go("topic", { topicId: node.getAttribute("data-topic") }); return; }
    if (act === "open-theorem") { go("theorem", { thId: node.getAttribute("data-th") }); return; }
    if (act === "ref-toggle") {
      const id = node.getAttribute("data-topic");
      ui.refOpen = ui.refOpen === id ? null : id;
      render();
      return;
    }
    if (act === "ref-copy") {
      const txt = node.getAttribute("data-copy");
      if (navigator.clipboard) navigator.clipboard.writeText(txt).then(() => toast("Формула скопирована", "⧉")).catch(() => {});
      else toast("Формула: " + txt, "⧉");
      return;
    }

    /* --- задания --- */
    if (act === "task-choice") {
      const task = findTask(node.getAttribute("data-task"));
      const res = Tasks.checkChoice(task, node.getAttribute("data-topic"), +node.getAttribute("data-idx"), ui);
      if (res && !res.already) { toast(`+${res.xp} XP`, "⭐"); announceUnlocks(res.unlocked); }
      render();
      return;
    }
    if (act === "task-error") {
      const task = findTask(node.getAttribute("data-task"));
      const res = Tasks.checkError(task, node.getAttribute("data-topic"), +node.getAttribute("data-idx"), ui);
      if (res && !res.already) { toast(`+${res.xp} XP`, "⭐"); announceUnlocks(res.unlocked); }
      render();
      return;
    }
    if (act === "task-input") {
      const taskId = node.getAttribute("data-task"), topicId = node.getAttribute("data-topic");
      const input = root.querySelector(`.task-input[data-task="${taskId}"]`);
      const task = findTask(taskId);
      const res = Tasks.checkInput(task, topicId, input ? input.value : "", ui);
      if (res && !res.already) { toast(`+${res.xp} XP`, "⭐"); announceUnlocks(res.unlocked); }
      render();
      return;
    }
    if (act === "task-explore") {
      const taskId = node.getAttribute("data-task"), topicId = node.getAttribute("data-topic");
      const ta = root.querySelector(`.task-note[data-task="${taskId}"]`);
      const text = ta ? ta.value.trim() : "";
      if (!text) { toast("Сначала запиши свой вывод", "✏️"); return; }
      const task = findTask(taskId);
      const res = Tasks.saveExplore(task, topicId, text);
      if (res && !res.already) { toast(`+${res.xp} XP`, "⭐"); announceUnlocks(res.unlocked); }
      render();
      return;
    }
    if (act === "task-build") {
      const taskId = node.getAttribute("data-task"), topicId = node.getAttribute("data-topic");
      const card = node.closest(".task-card");
      const figEl = card ? card.querySelector(".task-figure") : null;
      const task = findTask(taskId);
      const res = Tasks.checkBuild(task, topicId, figEl, ui);
      if (res && !res.already) { toast(`+${res.xp} XP`, "⭐"); announceUnlocks(res.unlocked); }
      render();
      return;
    }
    if (act === "task-match") {
      const taskId = node.getAttribute("data-task"), topicId = node.getAttribute("data-topic");
      const card = node.closest(".task-card");
      const selMap = {};
      if (card) card.querySelectorAll(".match-select").forEach((sel) => { selMap[+sel.getAttribute("data-idx")] = sel.value; });
      const task = findTask(taskId);
      const res = Tasks.checkMatch(task, topicId, selMap, ui);
      if (res && !res.already) { toast(`+${res.xp} XP`, "⭐"); announceUnlocks(res.unlocked); }
      render();
      return;
    }

    /* --- экзамен --- */
    if (act === "exam-start") { startExam(); return; }
    if (act === "exam-answer") {
      const ex = ui.exam; const q = ex.items[ex.idx].task;
      const idx = +node.getAttribute("data-idx");
      ex.answered = idx;
      if (idx === q.correct) ex.score++; else ex.mistakes.push({ q: q.q, correctText: q.options[q.correct] });
      render();
      return;
    }
    if (act === "exam-answer-input") {
      const ex = ui.exam; const q = ex.items[ex.idx].task;
      const input = document.getElementById("exam-input");
      const val = parseFloat(String(input ? input.value : "").replace(",", "."));
      const ok = !isNaN(val) && Math.abs(val - q.answer) <= (q.tol || 0.5);
      ex.answered = ok ? "ok" : "bad";
      if (ok) ex.score++; else ex.mistakes.push({ q: q.q, correctText: String(q.answer) });
      render();
      return;
    }
    if (act === "exam-next") {
      const ex = ui.exam;
      if (ex.idx + 1 < ex.items.length) { ex.idx++; ex.answered = null; render(); }
      else finishExam();
      return;
    }

    /* --- учитель --- */
    if (act === "teacher-assign") { toast(`Тема назначена ученику ${node.getAttribute("data-name")}`, "📌"); return; }

    /* --- настройки --- */
    if (act === "export-save") {
      const blob = new Blob([JSON.stringify(State.data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "geometry-save.json"; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 2000);
      return;
    }
    if (act === "reset-progress") {
      if (confirm("Точно сбросить весь прогресс?")) { State.reset(); go("dashboard"); }
      return;
    }
  });

  root.addEventListener("change", function (e) {
    if (e.target.getAttribute("data-act") === "toggle-theme") {
      const th = State.toggleTheme();
      document.documentElement.setAttribute("data-theme", th);
    }
    if (e.target.getAttribute("data-act") === "toggle-sound") { State.toggleSound(); }
    if (e.target.id === "import-file" && e.target.files && e.target.files[0]) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          State.data = Object.assign(State.defaults(), parsed);
          State.save();
          toast("Сохранение загружено", "⬆");
          go("dashboard");
        } catch (err) { toast("Не удалось прочитать файл", "⚠️"); }
      };
      reader.readAsText(e.target.files[0]);
    }
  });

  function findTask(id) {
    for (const t of GAME.topics) { const f = t.tasks.find((x) => x.id === id); if (f) return f; }
    return null;
  }

  /* ---------- запуск ---------- */
  State.load();
  document.documentElement.setAttribute("data-theme", State.data.settings.theme);
  if (State.data.hero) ui.grade = State.data.hero.grade;
  render();

  window.GeomApp = { ui, render, reset: () => { State.reset(); render(); } };
})();

</script>
</body>
</html>
