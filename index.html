      Figures.wrapText(ctx, "Три отрезка из центра O подписаны как радиусы окружности", w / 2, h * 0.06, w * 0.94, { color: Geo.ink() });
    }
    render();
    return { render, destroy: () => {}, metrics: () => ({}) };
  },

  coordPoint(ctx, canvas, ctrl, spec, w, h) {
    const cs = Figures.coordSys(w, h, 6);
    const start = cs.toPx(3, 4);
    const A = { x: start.x, y: start.y };
    function render() {
      Figures.drawGrid(ctx, w, h, cs);
      const O = cs.toPx(0, 0);
      const m = cs.toMath(A.x, A.y);
      const mx = cs.snap(m.x), my = cs.snap(m.y);
      const snapped = cs.toPx(mx, my);
      Figures.line(ctx, O, snapped, { stroke: Geo.blue(), lw: 2 });
      ctx.save(); ctx.setLineDash([4, 4]); ctx.strokeStyle = Geo.orange(); ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(snapped.x, snapped.y); ctx.lineTo(snapped.x, O.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(snapped.x, snapped.y); ctx.lineTo(O.x, snapped.y); ctx.stroke();
      ctx.restore();
      Figures.dot(ctx, snapped, { r: 6, fill: Geo.blue() });
      Figures.label(ctx, snapped, `A(${mx}; ${my})`, { dy: -14, color: Geo.blue() });
      const len = Math.sqrt(mx * mx + my * my);
      Figures.wrapText(ctx, `|OA| = √(${mx}² + ${my}²) = ${Geo.fmt(len)}   середина OA: (${Geo.fmt(mx / 2)}; ${Geo.fmt(my / 2)})`,
        w / 2, h - 16, w * 0.96, { color: Geo.ink() });
    }
    const unbind = Figures.wireDrag(canvas, [A], render);
    return { render, destroy: unbind, metrics: () => {
      const m = cs.toMath(A.x, A.y);
      const mx = cs.snap(m.x), my = cs.snap(m.y);
      return { "x": mx, "y": my, "|OA|": Math.sqrt(mx * mx + my * my) };
    } };
  },

  circleEquation(ctx, canvas, ctrl, spec, w, h) {
    const cs = Figures.coordSys(w, h, 6);
    const cStart = cs.toPx(1, 1), pStart = cs.toPx(4, 1);
    const C = { x: cStart.x, y: cStart.y };
    const P = { x: pStart.x, y: pStart.y };
    function render() {
      Figures.drawGrid(ctx, w, h, cs);
      const mc = cs.toMath(C.x, C.y);
      const a = cs.snap(mc.x), b = cs.snap(mc.y);
      const cPx = cs.toPx(a, b);
      const mp = cs.toMath(P.x, P.y);
      const R = Math.max(0.5, Math.round(Math.hypot(mp.x - a, mp.y - b) * 2) / 2);
      const Rpx = R * cs.unit;
      ctx.beginPath(); ctx.arc(cPx.x, cPx.y, Rpx, 0, Math.PI * 2);
      ctx.strokeStyle = Geo.blue(); ctx.lineWidth = 2.2; ctx.stroke();
      const onCircle = { x: cPx.x + Rpx, y: cPx.y };
      Figures.line(ctx, cPx, onCircle, { stroke: Geo.orange(), lw: 2 });
      Figures.label(ctx, { x: (cPx.x + onCircle.x) / 2, y: cPx.y }, `R=${Geo.fmt(R)}`, { dy: -10, color: Geo.orange() });
      Figures.dot(ctx, cPx, { r: 5, fill: Geo.green() });
      Figures.label(ctx, cPx, `C(${a}; ${b})`, { dy: 18, color: Geo.green() });
      const sa = a === 0 ? "x" : (a > 0 ? `(x−${a})` : `(x+${-a})`);
      const sb = b === 0 ? "y" : (b > 0 ? `(y−${b})` : `(y+${-b})`);
      Figures.wrapText(ctx, `${sa}² + ${sb}² = ${Geo.fmt(R * R)}`, w / 2, h - 16, w * 0.96, { color: Geo.ink() });
    }
    const unbind = Figures.wireDrag(canvas, [C, P], render);
    return { render, destroy: unbind, metrics: () => {
      const mc = cs.toMath(C.x, C.y);
      const a = cs.snap(mc.x), b = cs.snap(mc.y);
      const mp = cs.toMath(P.x, P.y);
      const R = Math.max(0.5, Math.round(Math.hypot(mp.x - a, mp.y - b) * 2) / 2);
      return { "центр x": a, "центр y": b, "R": R, "R²": R * R };
    } };
  },

  lineEquation(ctx, canvas, ctrl, spec, w, h) {
    const cs = Figures.coordSys(w, h, 6);
    const aStart = cs.toPx(-3, -2), bStart = cs.toPx(2, 3);
    const A = { x: aStart.x, y: aStart.y };
    const B = { x: bStart.x, y: bStart.y };
    function render() {
      Figures.drawGrid(ctx, w, h, cs);
      const ma = cs.toMath(A.x, A.y), mb = cs.toMath(B.x, B.y);
      const ax = cs.snap(ma.x), ay = cs.snap(ma.y);
      const bx = cs.snap(mb.x), by = cs.snap(mb.y);
      const aPx = cs.toPx(ax, ay), bPx = cs.toPx(bx, by);
      let eq;
      if (ax === bx) {
        const top = cs.toPx(ax, cs.range), bot = cs.toPx(ax, -cs.range);
        Figures.line(ctx, top, bot, { stroke: Geo.blue(), lw: 2.2 });
        eq = `x = ${ax}   (вертикальная: k не существует)`;
      } else {
        const k = (by - ay) / (bx - ax);
        const m = ay - k * ax;
        const yAt = (x) => k * x + m;
        const left = cs.toPx(-cs.range, yAt(-cs.range));
        const right = cs.toPx(cs.range, yAt(cs.range));
        Figures.line(ctx, left, right, { stroke: Geo.blue(), lw: 2.2 });
        eq = `y = ${Geo.fmt(k)}x ${m >= 0 ? "+" : "−"} ${Geo.fmt(Math.abs(m))}`;
      }
      Figures.dot(ctx, aPx, { r: 5, fill: Geo.orange() });
      Figures.label(ctx, aPx, `A(${ax}; ${ay})`, { dy: -14, color: Geo.orange() });
      Figures.dot(ctx, bPx, { r: 5, fill: Geo.green() });
      Figures.label(ctx, bPx, `B(${bx}; ${by})`, { dy: -14, color: Geo.green() });
      Figures.wrapText(ctx, eq, w / 2, h - 16, w * 0.96, { color: Geo.ink() });
    }
    const unbind = Figures.wireDrag(canvas, [A, B], render);
    return { render, destroy: unbind, metrics: () => {
      const ma = cs.toMath(A.x, A.y), mb = cs.toMath(B.x, B.y);
      const ax = cs.snap(ma.x), ay = cs.snap(ma.y), bx = cs.snap(mb.x), by = cs.snap(mb.y);
      if (ax === bx) return { "тип": "вертикальная", "x": ax };
      const k = (by - ay) / (bx - ax);
      return { "k": k, "m": ay - k * ax };
    } };
  },

  /* ============================================================
     ГЛАВА XI. Соотношения между сторонами и углами треугольника.
     ============================================================ */

  /* Синус/косинус для углов 0°-180° через полуокружность единичного радиуса.
     Ключевая новая идея главы: cos становится ОТРИЦАТЕЛЬНЫМ для тупых углов,
     а sin остаётся положительным на всём диапазоне 0°-180°. */
  trigExtended(ctx, canvas, ctrl, spec, w, h) {
    const O = { x: w * 0.5, y: h * 0.8, fixed: true };
    const R = Math.min(w, h) * 0.36;
    const P = { x: O.x + R * Math.cos(50 * Math.PI / 180), y: O.y - R * Math.sin(50 * Math.PI / 180) };
    function render() {
      Figures.drawBase(ctx, w, h);
      let theta = Math.atan2(-(P.y - O.y), P.x - O.x) * 180 / Math.PI;
      // atan2 возвращает (-180,180]; около самой границы 180° погрешность плавающей точки
      // может дать чуть МЕНЬШЕ -180 вместо чуть больше -180, и наивный clamp(0,180) обрежет
      // это в 0° вместо 180°. Разрешаем через ближайшую границу, а не слепым clamp.
      theta = theta < 0 ? (theta < -90 ? 180 : 0) : Geo.clamp(theta, 0, 180);
      P.x = O.x + R * Math.cos(theta * Math.PI / 180);
      P.y = O.y - R * Math.sin(theta * Math.PI / 180);
      // полуокружность (верхняя половина)
      ctx.beginPath(); ctx.arc(O.x, O.y, R, 0, Math.PI, true);
      ctx.strokeStyle = Geo.ink(); ctx.lineWidth = 1.5; ctx.stroke();
      // диаметр
      Figures.line(ctx, { x: O.x - R, y: O.y }, { x: O.x + R, y: O.y }, { stroke: Geo.ink(), lw: 1 });
      const sinV = Math.sin(theta * Math.PI / 180), cosV = Math.cos(theta * Math.PI / 180);
      const footX = O.x + cosV * R;
      // проекции: sin (вертикаль) и cos (горизонталь до O)
      ctx.save(); ctx.setLineDash([4, 4]);
      ctx.strokeStyle = Geo.green(); ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(P.x, P.y); ctx.lineTo(footX, O.y); ctx.stroke();
      ctx.strokeStyle = Geo.orange();
      ctx.beginPath(); ctx.moveTo(O.x, O.y); ctx.lineTo(footX, O.y); ctx.stroke();
      ctx.restore();
      Figures.line(ctx, O, P, { stroke: Geo.blue(), lw: 2.2 });
      Figures.dot(ctx, P, { r: 5, fill: Geo.blue() });
      Figures.dot(ctx, O, { r: 3 });
      Figures.label(ctx, { x: O.x + 30, y: O.y - 10 }, `${Geo.fmt(theta)}°`, { color: Geo.blue() });
      Figures.wrapText(ctx, `sin ${Geo.fmt(theta)}° = ${Geo.fmt(sinV)}     cos ${Geo.fmt(theta)}° = ${Geo.fmt(cosV)}`,
        w / 2, h * 0.08, w * 0.96, { color: Geo.ink() });
    }
    const unbind = Figures.wireDrag(canvas, [P], render);
    return { render, destroy: unbind, metrics: () => {
      let theta = Math.atan2(-(P.y - O.y), P.x - O.x) * 180 / Math.PI;
      // atan2 возвращает (-180,180]; около самой границы 180° погрешность плавающей точки
      // может дать чуть МЕНЬШЕ -180 вместо чуть больше -180, и наивный clamp(0,180) обрежет
      // это в 0° вместо 180°. Разрешаем через ближайшую границу, а не слепым clamp.
      theta = theta < 0 ? (theta < -90 ? 180 : 0) : Geo.clamp(theta, 0, 180);
      return { "угол": theta, "sin": Math.sin(theta * Math.PI / 180), "cos": Math.cos(theta * Math.PI / 180) };
    } };
  },

  /* Теорема косинусов: тянешь вершины, c² и a²+b²−2ab·cosC пересчитываются вживую и совпадают. */
  lawOfCosines(ctx, canvas, ctrl, spec, w, h) {
    const A = { x: w * 0.18, y: h * 0.8 }, B = { x: w * 0.82, y: h * 0.78 }, C = { x: w * 0.55, y: h * 0.18 };
    function render() {
      Figures.drawBase(ctx, w, h);
      Figures.poly(ctx, [A, B, C], { fill: "rgba(120,140,255,0.06)", stroke: Geo.blue() });
      [["A", A], ["B", B], ["C", C]].forEach(([nm, p]) => { Figures.dot(ctx, p); Figures.label(ctx, p, nm, { dy: p.y < h / 2 ? -14 : 20 }); });
      const a = Geo.dist(B, C), b = Geo.dist(A, C), c = Geo.dist(A, B);
      const angC = Geo.angleDeg(C, A, B); // угол при вершине C, в градусах
      const rhs = a * a + b * b - 2 * a * b * Math.cos(angC * Math.PI / 180);
      Figures.wrapText(ctx, `c²=${Geo.fmt(c * c)}   a²+b²−2ab·cosC=${Geo.fmt(rhs)}   ∠C=${Geo.fmt(angC)}°`,
        w / 2, h * 0.06, w * 0.96, { color: Geo.ink() });
    }
    const unbind = Figures.wireDrag(canvas, [A, B, C], render);
    return { render, destroy: unbind, metrics: () => {
      const a = Geo.dist(B, C), b = Geo.dist(A, C), c = Geo.dist(A, B);
      const angC = Geo.angleDeg(C, A, B);
      return { "a": a, "b": b, "c": c, "∠C": angC, "c²": c * c, "a²+b²−2ab·cosC": a * a + b * b - 2 * a * b * Math.cos(angC * Math.PI / 180) };
    } };
  },

  /* Теорема синусов: тянешь вершины треугольника — a/sinA сравнивается с 2R (диаметром описанной окружности). */
  lawOfSines(ctx, canvas, ctrl, spec, w, h) {
    const A = { x: w * 0.5, y: h * 0.16 }, B = { x: w * 0.16, y: h * 0.8 }, C = { x: w * 0.84, y: h * 0.8 };
    function circumcenter(P1, P2, P3) {
      const ax = P1.x, ay = P1.y, bx = P2.x, by = P2.y, cx = P3.x, cy = P3.y;
      const d = 2 * (ax * (by - cy) + bx * (cy - ay) + cx * (ay - by));
      if (Math.abs(d) < 1e-6) return null;
      const ux = ((ax * ax + ay * ay) * (by - cy) + (bx * bx + by * by) * (cy - ay) + (cx * cx + cy * cy) * (ay - by)) / d;
      const uy = ((ax * ax + ay * ay) * (cx - bx) + (bx * bx + by * by) * (ax - cx) + (cx * cx + cy * cy) * (bx - ax)) / d;
      return { x: ux, y: uy };
    }
    function render() {
      Figures.drawBase(ctx, w, h);
      const O = circumcenter(A, B, C);
      if (O) {
        const R = Geo.dist(O, A);
        ctx.beginPath(); ctx.arc(O.x, O.y, R, 0, Math.PI * 2);
        ctx.strokeStyle = Geo.periwinkle(); ctx.lineWidth = 1.5; ctx.stroke();
        Figures.dot(ctx, O, { r: 3, fill: Geo.periwinkle() });
      }
      Figures.poly(ctx, [A, B, C], { fill: "rgba(120,140,255,0.06)", stroke: Geo.blue() });
      [["A", A], ["B", B], ["C", C]].forEach(([nm, p]) => { Figures.dot(ctx, p); Figures.label(ctx, p, nm, { dy: p.y < h / 2 ? -14 : 20 }); });
      const a = Geo.dist(B, C);
      const angA = Geo.angleDeg(A, B, C);
      const ratio = a / Math.sin(angA * Math.PI / 180);
      const twoR = O ? 2 * Geo.dist(O, A) : NaN;
      Figures.wrapText(ctx, `a/sinA = ${Geo.fmt(ratio)}     2R = ${Geo.fmt(twoR)}`, w / 2, h * 0.06, w * 0.96, { color: Geo.ink() });
    }
    const unbind = Figures.wireDrag(canvas, [A, B, C], render);
    return { render, destroy: unbind, metrics: () => {
      const O = circumcenter(A, B, C);
      const a = Geo.dist(B, C);
      const angA = Geo.angleDeg(A, B, C);
      return { "a": a, "∠A": angA, "a/sinA": a / Math.sin(angA * Math.PI / 180), "2R": O ? 2 * Geo.dist(O, A) : null };
    } };
  },

  /* Скалярное произведение векторов: a·b = |a||b|cosθ = x1x2+y1y2 — обе формулы вживую и должны совпадать. */
  dotProduct(ctx, canvas, ctrl, spec, w, h) {
    const O = { x: w * 0.22, y: h * 0.78, fixed: true };
    const A = { x: w * 0.62, y: h * 0.35 };
    const B = { x: w * 0.72, y: h * 0.68 };
    function arrow(p1, p2, color) {
      Figures.line(ctx, p1, p2, { stroke: color, lw: 2.5 });
      const ang = Math.atan2(p2.y - p1.y, p2.x - p1.x);
      const s = 10;
      ctx.beginPath(); ctx.moveTo(p2.x, p2.y);
      ctx.lineTo(p2.x - s * Math.cos(ang - 0.4), p2.y - s * Math.sin(ang - 0.4));
      ctx.lineTo(p2.x - s * Math.cos(ang + 0.4), p2.y - s * Math.sin(ang + 0.4));
      ctx.closePath(); ctx.fillStyle = color; ctx.fill();
    }
    function render() {
      Figures.drawBase(ctx, w, h);
      arrow(O, A, Geo.blue()); arrow(O, B, Geo.orange());
      Figures.label(ctx, A, "a", { color: Geo.blue(), dy: -10 });
      Figures.label(ctx, B, "b", { color: Geo.orange(), dy: 16 });
      const ax = A.x - O.x, ay = -(A.y - O.y), bx = B.x - O.x, by = -(B.y - O.y); // мат. координаты (y инвертирован)
      const la = Math.hypot(ax, ay), lb = Math.hypot(bx, by);
      const dotCoord = ax * bx + ay * by;
      // угол измеряем НЕЗАВИСИМО по самой геометрии (как в теореме косинусов/синусов),
      // а не выводим обратно из dotCoord — иначе сверка формул превращается в тавтологию
      const theta = Geo.angleDeg(O, A, B);
      const dotFormula = la * lb * Math.cos(theta * Math.PI / 180);
      Figures.wrapText(ctx, `a·b = |a||b|cosθ = ${Geo.fmt(dotFormula)}     a·b (по координатам) = ${Geo.fmt(dotCoord)}     θ=${Geo.fmt(theta)}°`,
        w / 2, h * 0.06, w * 0.96, { color: Geo.ink() });
    }
    const unbind = Figures.wireDrag(canvas, [A, B], render);
    return { render, destroy: unbind, metrics: () => {
      const ax = A.x - O.x, ay = -(A.y - O.y), bx = B.x - O.x, by = -(B.y - O.y);
      const la = Math.hypot(ax, ay), lb = Math.hypot(bx, by);
      const dotCoord = ax * bx + ay * by;
      const theta = Geo.angleDeg(O, A, B);
      return { "a·b": dotCoord, "|a|": la, "|b|": lb, "θ": theta, "|a||b|cosθ": la * lb * Math.cos(theta * Math.PI / 180) };
    } };
  },

  /* Площадь кругового сектора: тянешь луч (второй зафиксирован справа, угол 0°) — угол сектора
     ограничен верхней полуокружностью 0°-180° (тот же приём, что в trigExtended, — иначе рисуемая
     дуга могла бы стать рефлексной >180°, а показанный угол через angleDeg всегда даёт ≤180°,
     и они бы разошлись). Площадь сектора (α/360)·πR² пересчитывается вживую. */
  circleSector(ctx, canvas, ctrl, spec, w, h) {
    const O = { x: w * 0.5, y: h * 0.58, fixed: true };
    const R = Math.min(w, h) * 0.34;
    const fixedEnd = { x: O.x + R, y: O.y, fixed: true };
    const K = { x: O.x + R * Math.cos(70 * Math.PI / 180), y: O.y - R * Math.sin(70 * Math.PI / 180) };
    function render() {
      Figures.drawBase(ctx, w, h);
      let theta = Math.atan2(-(K.y - O.y), K.x - O.x) * 180 / Math.PI; // мат.угол от положительной оси x
      theta = theta < 0 ? (theta < -90 ? 180 : 0) : Geo.clamp(theta, 0, 180);
      K.x = O.x + R * Math.cos(theta * Math.PI / 180);
      K.y = O.y - R * Math.sin(theta * Math.PI / 180);
      const screenAng = -theta * Math.PI / 180; // экранный угол для ctx.arc (Y инвертирован)
      ctx.beginPath(); ctx.arc(O.x, O.y, R, 0, Math.PI * 2);
      ctx.strokeStyle = Geo.ink(); ctx.lineWidth = 1; ctx.globalAlpha = 0.35; ctx.stroke(); ctx.globalAlpha = 1;
      ctx.beginPath(); ctx.moveTo(O.x, O.y); ctx.arc(O.x, O.y, R, 0, screenAng, true); ctx.closePath();
      ctx.fillStyle = "rgba(255,159,67,0.28)"; ctx.fill();
      ctx.strokeStyle = Geo.orange(); ctx.lineWidth = 2; ctx.stroke();
      Figures.line(ctx, O, fixedEnd, { stroke: Geo.blue(), lw: 2 });
      Figures.line(ctx, O, K, { stroke: Geo.blue(), lw: 2 });
      Figures.dot(ctx, O, { r: 4 });
      Figures.dot(ctx, K, { r: 5, fill: Geo.blue() });
      const rUnits = R / Geo.UNIT;
      const fullArea = Math.PI * rUnits * rUnits;
      const sectorArea = (theta / 360) * fullArea;
      Figures.wrapText(ctx, `α=${Geo.fmt(theta)}°   S_сектора=(α/360)·πR²=${Geo.fmt(sectorArea)}   S_круга=${Geo.fmt(fullArea)}`,
        w / 2, h * 0.92, w * 0.96, { color: Geo.ink() });
    }
    const unbind = Figures.wireDrag(canvas, [K], render);
    return { render, destroy: unbind, metrics: () => {
      let theta = Math.atan2(-(K.y - O.y), K.x - O.x) * 180 / Math.PI;
      theta = theta < 0 ? (theta < -90 ? 180 : 0) : Geo.clamp(theta, 0, 180);
      const rUnits = R / Geo.UNIT;
      const fullArea = Math.PI * rUnits * rUnits;
      return { "α": theta, "R": rUnits, "S_круга": fullArea, "S_сектора": (theta / 360) * fullArea };
    } };
  },

  /* ============================================================
     ГЛАВА XIII. ДВИЖЕНИЯ.
     ============================================================ */

  /* Поворот вокруг точки O на угол θ (полный диапазон 0°-360°, задаётся отдельной
     ручкой-маркером на маленькой вспомогательной окружности вокруг O — треугольник
     при этом можно двигать независимо). Проверяется: OA=OA' и угол(A,O,A')=θ. */
  rotation(ctx, canvas, ctrl, spec, w, h) {
    const O = { x: w * 0.3, y: h * 0.55, fixed: true };
    const handleR = Math.min(w, h) * 0.16;
    const K = { x: O.x + handleR * Math.cos(40 * Math.PI / 180), y: O.y - handleR * Math.sin(40 * Math.PI / 180) };
    const A = { x: w * 0.68, y: h * 0.28 }, B = { x: w * 0.58, y: h * 0.5 }, C = { x: w * 0.82, y: h * 0.58 };
    function rot(p, thetaDeg) {
      const rad = thetaDeg * Math.PI / 180;
      const dx = p.x - O.x, dy = p.y - O.y;
      // вращение в экранных координатах (Y вниз) на математический угол theta против часовой:
      // экранный поворот на -theta даёт математический поворот против часовой на +theta
      const cs = Math.cos(-rad), sn = Math.sin(-rad);
      return { x: O.x + dx * cs - dy * sn, y: O.y + dx * sn + dy * cs };
    }
    function render() {
      Figures.drawBase(ctx, w, h);
      let theta = Math.atan2(-(K.y - O.y), K.x - O.x) * 180 / Math.PI;
      if (theta < 0) theta += 360;
      K.x = O.x + handleR * Math.cos(theta * Math.PI / 180);
      K.y = O.y - handleR * Math.sin(theta * Math.PI / 180);
      // подсказка-окружность для ручки угла
      ctx.beginPath(); ctx.arc(O.x, O.y, handleR, 0, Math.PI * 2);
      ctx.strokeStyle = Geo.ink(); ctx.lineWidth = 1; ctx.globalAlpha = 0.3; ctx.stroke(); ctx.globalAlpha = 1;
      Figures.line(ctx, O, K, { stroke: Geo.periwinkle(), lw: 1.5 });
      Figures.dot(ctx, K, { r: 4, fill: Geo.periwinkle() });
      Figures.dot(ctx, O, { r: 5, fill: Geo.blue() }); Figures.label(ctx, O, "O", { dy: -14, color: Geo.blue() });
      const A2 = rot(A, theta), B2 = rot(B, theta), C2 = rot(C, theta);
      Figures.poly(ctx, [A, B, C], { fill: "rgba(91,107,214,0.12)" });
      Figures.poly(ctx, [A2, B2, C2], { fill: "rgba(255,159,67,0.12)", stroke: Geo.orange() });
      [A, B, C].forEach((p, i) => { Figures.dot(ctx, p); Figures.label(ctx, p, "ABC"[i], { dy: -12 }); });
      [A2, B2, C2].forEach((p, i) => { Figures.dot(ctx, p, { fill: Geo.orange() }); Figures.label(ctx, p, ["A'", "B'", "C'"][i], { dy: 14, color: Geo.orange() }); });
      const oa = Geo.dist(O, A), oa2 = Geo.dist(O, A2);
      Figures.wrapText(ctx, `θ=${Geo.fmt(theta)}°   OA=${Geo.fmt(oa / Geo.UNIT)}  OA'=${Geo.fmt(oa2 / Geo.UNIT)} (равны — центр сохраняет расстояние)`,
        w / 2, h * 0.92, w * 0.96, { color: Geo.ink() });
    }
    const unbind = Figures.wireDrag(canvas, [K, A, B, C], render);
    return { render, destroy: unbind, metrics: () => {
      let theta = Math.atan2(-(K.y - O.y), K.x - O.x) * 180 / Math.PI;
      if (theta < 0) theta += 360;
      return { "θ": theta, "OA": Geo.dist(O, A) / Geo.UNIT, "OA'": Geo.dist(O, rot(A, theta)) / Geo.UNIT };
    } };
  },

  /* Параллельный перенос на вектор (задаётся стрелкой). Проверяется: AA'=BB'=CC' —
     все три «соединительных» отрезка равны по длине И параллельны (одно и то же смещение). */
  parallelTranslation(ctx, canvas, ctrl, spec, w, h) {
    const vecStart = { x: w * 0.12, y: h * 0.85, fixed: true };
    const vecEnd = { x: w * 0.32, y: h * 0.62 };
    const A = { x: w * 0.55, y: h * 0.18 }, B = { x: w * 0.42, y: h * 0.4 }, C = { x: w * 0.68, y: h * 0.42 };
    function arrow(p1, p2, color) {
      Figures.line(ctx, p1, p2, { stroke: color, lw: 2.5 });
      const ang = Math.atan2(p2.y - p1.y, p2.x - p1.x);
      const s = 10;
      ctx.beginPath(); ctx.moveTo(p2.x, p2.y);
      ctx.lineTo(p2.x - s * Math.cos(ang - 0.4), p2.y - s * Math.sin(ang - 0.4));
      ctx.lineTo(p2.x - s * Math.cos(ang + 0.4), p2.y - s * Math.sin(ang + 0.4));
      ctx.closePath(); ctx.fillStyle = color; ctx.fill();
    }
    function render() {
      Figures.drawBase(ctx, w, h);
      const dx = vecEnd.x - vecStart.x, dy = vecEnd.y - vecStart.y;
      arrow(vecStart, vecEnd, Geo.green());
      Figures.label(ctx, { x: (vecStart.x + vecEnd.x) / 2, y: (vecStart.y + vecEnd.y) / 2 }, "вектор", { dy: -12, color: Geo.green() });
      const A2 = { x: A.x + dx, y: A.y + dy }, B2 = { x: B.x + dx, y: B.y + dy }, C2 = { x: C.x + dx, y: C.y + dy };
      Figures.poly(ctx, [A, B, C], { fill: "rgba(91,107,214,0.12)" });
      Figures.poly(ctx, [A2, B2, C2], { fill: "rgba(255,159,67,0.12)", stroke: Geo.orange() });
      [A, B, C].forEach((p, i) => { Figures.dot(ctx, p); Figures.label(ctx, p, "ABC"[i], { dy: -12 }); });
      [A2, B2, C2].forEach((p, i) => { Figures.dot(ctx, p, { fill: Geo.orange() }); Figures.label(ctx, p, ["A'", "B'", "C'"][i], { dy: 14, color: Geo.orange() }); });
      [[A, A2], [B, B2], [C, C2]].forEach(([p, q]) => Figures.line(ctx, p, q, { stroke: Geo.periwinkle(), lw: 1, dash: [4, 4] }));
      const lenAA = Geo.dist(A, A2) / Geo.UNIT, lenBB = Geo.dist(B, B2) / Geo.UNIT, lenCC = Geo.dist(C, C2) / Geo.UNIT;
      Figures.wrapText(ctx, `AA'=${Geo.fmt(lenAA)}  BB'=${Geo.fmt(lenBB)}  CC'=${Geo.fmt(lenCC)} (все равны — один и тот же вектор сдвига)`,
        w / 2, h * 0.06, w * 0.96, { color: Geo.ink() });
    }
    const unbind = Figures.wireDrag(canvas, [vecEnd, A, B, C], render);
    return { render, destroy: unbind, metrics: () => {
      const dx = vecEnd.x - vecStart.x, dy = vecEnd.y - vecStart.y;
      const A2 = { x: A.x + dx, y: A.y + dy }, B2 = { x: B.x + dx, y: B.y + dy }, C2 = { x: C.x + dx, y: C.y + dy };
      return { "AA'": Geo.dist(A, A2) / Geo.UNIT, "BB'": Geo.dist(B, B2) / Geo.UNIT, "CC'": Geo.dist(C, C2) / Geo.UNIT };
    } };
  },

  /* ============================================================
     ОСОБЫЙ ФАКТ: прямая Эйлера. Центроид, центр описанной окружности и
     ортоцентр ЛЮБОГО треугольника всегда лежат на одной прямой — не совпадение,
     а теорема. Показываем все три точки сразу и честно проверяем коллинеарность
     (расстояние от центроида до прямой через две другие точки должно быть ~0).
     ============================================================ */
  eulerLine(ctx, canvas, ctrl, spec, w, h) {
    const A = { x: w * 0.5, y: h * 0.15 }, B = { x: w * 0.14, y: h * 0.85 }, C = { x: w * 0.9, y: h * 0.7 };
    function perpBisectorLine(P, Q) { const M = Geo.midpoint(P, Q); const dx = Q.x - P.x, dy = Q.y - P.y; return [{ x: M.x - dy, y: M.y + dx }, { x: M.x + dy, y: M.y - dx }]; }
    function altitudeLine(V, P, Q) { const dx = Q.x - P.x, dy = Q.y - P.y; return [{ x: V.x - dy, y: V.y + dx }, { x: V.x + dy, y: V.y - dx }]; }
    function render() {
      Figures.drawBase(ctx, w, h);
      Figures.poly(ctx, [A, B, C], { fill: "rgba(91,107,214,0.07)" });
      [["A", A], ["B", B], ["C", C]].forEach(([nm, p]) => { Figures.dot(ctx, p, { r: 3 }); Figures.label(ctx, p, nm, { dy: p.y < h / 2 ? -12 : 16 }); });
      const G = { x: (A.x + B.x + C.x) / 3, y: (A.y + B.y + C.y) / 3 };
      const [p1a, p1b] = perpBisectorLine(A, B), [p2a, p2b] = perpBisectorLine(B, C);
      const O = Geo.lineIntersect(p1a, p1b, p2a, p2b);
      const [a1, a2] = altitudeLine(A, B, C), [b1, b2] = altitudeLine(B, A, C);
      const H = Geo.lineIntersect(a1, a2, b1, b2);
      if (O && H) {
        // прямая Эйлера продлена за пределы отрезка OH для наглядности
        const dx = H.x - O.x, dy = H.y - O.y;
        Figures.line(ctx, { x: O.x - dx * 0.3, y: O.y - dy * 0.3 }, { x: H.x + dx * 0.3, y: H.y + dy * 0.3 }, { stroke: Geo.ink(), lw: 1.5, dash: [5, 5] });
      }
      Figures.dot(ctx, G, { r: 5, fill: Geo.green() }); Figures.label(ctx, G, "G (центроид)", { dy: 16, color: Geo.green() });
      if (O) { Figures.dot(ctx, O, { r: 5, fill: Geo.blue() }); Figures.label(ctx, O, "O (центр описанной)", { dy: -14, color: Geo.blue() }); }
      if (H) { Figures.dot(ctx, H, { r: 5, fill: Geo.orange() }); Figures.label(ctx, H, "H (ортоцентр)", { dy: 16, color: Geo.orange() }); }
      let devText = "";
      if (O && H) {
        const dx = H.x - O.x, dy = H.y - O.y;
        const lineLen = Math.hypot(dx, dy);
        const cross = Math.abs((G.x - O.x) * dy - (G.y - O.y) * dx);
        const distToLine = lineLen > 1e-6 ? (cross / lineLen) / Geo.UNIT : 0;
        devText = `отклонение центроида от прямой OH: ${Geo.fmt(distToLine)} (≈0 — все три точки на одной прямой)`;
      }
      Figures.wrapText(ctx, devText, w / 2, h * 0.94, w * 0.96, { color: Geo.ink() });
    }
    const unbind = Figures.wireDrag(canvas, [A, B, C], render);
    return { render, destroy: unbind, metrics: () => {
      const G = { x: (A.x + B.x + C.x) / 3, y: (A.y + B.y + C.y) / 3 };
      const [p1a, p1b] = perpBisectorLine(A, B), [p2a, p2b] = perpBisectorLine(B, C);
      const O = Geo.lineIntersect(p1a, p1b, p2a, p2b);
      const [a1, a2] = altitudeLine(A, B, C), [b1, b2] = altitudeLine(B, A, C);
      const H = Geo.lineIntersect(a1, a2, b1, b2);
      let dist = null;
      if (O && H) {
        const dx = H.x - O.x, dy = H.y - O.y;
        const lineLen = Math.hypot(dx, dy);
        dist = lineLen > 1e-6 ? Math.abs((G.x - O.x) * dy - (G.y - O.y) * dx) / lineLen / Geo.UNIT : 0;
      }
      return { "G": G, "O": O, "H": H, "deviation": dist };
    } };
  },
};

</script>
<script>
/* theorems.js — анимации-симуляции ключевых теорем на Canvas */
const Theorems = {
  mount(container, anim) {
    const w = Math.max(260, Math.min(560, container.clientWidth || 520)), h = Math.max(280, Math.min(380, Math.round(w * 0.68)));
    container.innerHTML = `
      <div class="fig-wrap">
        <canvas class="fig-canvas" width="${w}" height="${h}"></canvas>
        <div class="fig-controls">
          <button class="btn btn-primary btn-sm" data-act="th-play">▶ Запустить анимацию</button>
          <button class="btn btn-ghost btn-sm" data-act="th-reset">⟲ Сброс</button>
        </div>
      </div>`;
    const canvas = container.querySelector(".fig-canvas");
    const ctx = canvas.getContext("2d");
    const fn = ANIMATORS[anim] || ANIMATORS.pythagoras;
    const inst = fn(ctx, canvas, w, h);
    let raf = null;
    function loop(ts) {
      const done = inst.step(ts);
      inst.draw();
      if (!done) raf = requestAnimationFrame(loop);
      else raf = null;
    }
    container.querySelector('[data-act="th-play"]').addEventListener("click", () => {
      inst.play();
      if (!raf) raf = requestAnimationFrame(loop);
    });
    container.querySelector('[data-act="th-reset"]').addEventListener("click", () => {
      if (raf) cancelAnimationFrame(raf);
      raf = null;
      inst.reset();
      inst.draw();
    });
    inst.draw();
    return { destroy: () => { if (raf) cancelAnimationFrame(raf); } };
  },
};

function easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }
function rotatePt(p, pivot, angle) {
  const dx = p.x - pivot.x, dy = p.y - pivot.y;
  const c = Math.cos(angle), s = Math.sin(angle);
  return { x: pivot.x + dx * c - dy * s, y: pivot.y + dx * s + dy * c };
}
/* Дуга угла кратчайшим путём (не Math.min/max от сырых atan2-углов — та формула ломается,
   если два угла оказываются по разные стороны от границы ±180°; поймано и исправлено на
   признаках равенства треугольников, тут используем сразу верную версию). */
function arcAngleGlobal(ctx, vertex, p1, p2, color, r) {
  r = r || 16;
  const a1 = Math.atan2(p1.y - vertex.y, p1.x - vertex.x), a2 = Math.atan2(p2.y - vertex.y, p2.x - vertex.x);
  let diff = a2 - a1;
  while (diff > Math.PI) diff -= 2 * Math.PI;
  while (diff < -Math.PI) diff += 2 * Math.PI;
  ctx.beginPath(); ctx.arc(vertex.x, vertex.y, r, a1, a1 + diff, diff < 0);
  ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();
}
/* Общий "приезжает и накладывается" для признаков равенства треугольников: треугольник DEF
   стартует повёрнутым и сдвинутым (но заведомо конгруэнтным ABC), и ИСТИННЫМ жёстким вращением
   (единая формула поворота+сдвига на каждом кадре, не покомпонентная интерполяция вершин
   по отдельности — та не сохраняла бы жёсткость фигуры в середине пути) едет и совмещается
   с ABC день в день. marks задаёт, что именно подсвечивать (по условию признака). */
function congruenceOverlay(ctx, canvas, w, h, ABC, marks, critLabel) {
  const [A, B, C] = ABC;
  const pivot = { x: (A.x + B.x + C.x) / 3, y: (A.y + B.y + C.y) / 3 };
  const fullAngle = 2.35, shift = { x: w * 0.02, y: -h * 0.06 };
  let t0 = null, prog = 0, playing = false;
  function frame(p) {
    const ang = fullAngle * (1 - p), sx = shift.x * (1 - p), sy = shift.y * (1 - p);
    return ABC.map((pt) => { const r = rotatePt(pt, pivot, ang); return { x: r.x + sx, y: r.y + sy }; });
  }
  function tickSide(p1, p2, count, color) { Figures.tickMarks(ctx, p1, p2, count, color); }
  function arcAngle(vertex, p1, p2, color) {
    const a1 = Math.atan2(p1.y - vertex.y, p1.x - vertex.x), a2 = Math.atan2(p2.y - vertex.y, p2.x - vertex.x);
    let diff = a2 - a1;
    while (diff > Math.PI) diff -= 2 * Math.PI;
    while (diff < -Math.PI) diff += 2 * Math.PI;
    ctx.beginPath(); ctx.arc(vertex.x, vertex.y, 16, a1, a1 + diff, diff < 0);
    ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();
  }
  function draw() {
    Figures.drawBase(ctx, w, h);
    const local = easeInOut(prog);
    const [D, E, F] = frame(local);
    Figures.poly(ctx, [A, B, C], { fill: "rgba(91,107,214,0.10)", stroke: Geo.blue() });
    Figures.poly(ctx, [D, E, F], { fill: "rgba(255,159,67,0.16)", stroke: Geo.orange() });
    [["A", A], ["B", B], ["C", C]].forEach(([nm, p]) => Figures.label(ctx, p, nm, { dy: -12, color: Geo.blue() }));
    [["D", D], ["E", E], ["F", F]].forEach(([nm, p]) => Figures.label(ctx, p, nm, { dy: 14, color: Geo.orange() }));
    marks.forEach((m) => {
      if (m.type === "side") { tickSide(ABC[m.i1], ABC[m.i2], m.count, Geo.green()); tickSide([D, E, F][m.i1], [D, E, F][m.i2], m.count, Geo.green()); }
      else { arcAngle(ABC[m.v], ABC[m.i1], ABC[m.i2], Geo.purple()); arcAngle([D, E, F][m.v], [D, E, F][m.i1], [D, E, F][m.i2], Geo.purple()); }
    });
    let caption;
    if (prog < 0.05) caption = `${critLabel}: отмеченные элементы равны`;
    else if (prog < 0.95) caption = "Переносим DEF на ABC поворотом — форма не меняется…";
    else caption = "…и они совпали точно — треугольники равны";
    Figures.wrapText(ctx, caption, w / 2, h * 0.06, w * 0.94, { color: Geo.ink(), font: "700 13.5px Rubik, sans-serif" });
  }
  return {
    play() { playing = true; t0 = null; prog = 0; },
    reset() { playing = false; prog = 0; },
    step(ts) {
      if (!playing) return true;
      if (t0 == null) t0 = ts;
      prog = Geo.clamp((ts - t0) / 2600, 0, 1);
      if (prog >= 1) playing = false;
      return !playing;
    },
    draw,
  };
}

const ANIMATORS = {
  /* --- Теорема Пифагора: классическое доказательство перестановкой 4 треугольников.
     Одни и те же 4 треугольника внутри ОДНОГО И ТОГО ЖЕ большого квадрата сначала
     окружают наклонный квадрат c², а после перестановки — ровно квадраты a² и b².
     Соответствие вершин подобрано (и проверено численно на 21 точке пути) так,
     чтобы движение было ЖЁСТКИМ поворотом каждого треугольника, без "сплющивания". */
  pythagoras(ctx, canvas, w, h) {
    const S = Math.min(w, h) * 0.6;
    const ox = (w - S) / 2, oy = h * 0.86 - S;
    const aU = 4, bU = 3, uPx = S / (aU + bU); // катеты 4:3 (единицы), гипотенуза 5 - классическая тройка, даёт круглые числа
    const a = aU * uPx, b = bU * uPx;
    function pt(x, y) { return { x: ox + x, y: oy + S - y }; }
    const Q1 = pt(0, 0), Q2 = pt(S, 0), Q3 = pt(S, S), Q4 = pt(0, S);
    const Pb = pt(b, 0), Pr = pt(S, b), Ptp = pt(a, S), Pl = pt(0, a), Pm = pt(b, b);
    const Pl2 = pt(0, b), Pt2 = pt(b, S);
    const T1 = [Q1, Pb, Pl], T2 = [Q2, Pr, Pb], T3 = [Q3, Ptp, Pr], T4 = [Q4, Pl, Ptp];
    const G1 = [Pb, Pr, Pm], G2 = [Q2, Pr, Pb], G3 = [Pt2, Pl2, Pm], G4 = [Q4, Pl2, Pt2];
    function lerpPt(p1, p2, t) { return { x: p1.x + (p2.x - p1.x) * t, y: p1.y + (p2.y - p1.y) * t }; }
    function lerpTri(t1, t2, t) { return [lerpPt(t1[0], t2[0], t), lerpPt(t1[1], t2[1], t), lerpPt(t1[2], t2[2], t)]; }
    let t0 = null, prog = 0, playing = false;
    function draw() {
      Figures.drawBase(ctx, w, h);
      const showStart = Geo.clamp(prog / 0.18, 0, 1);
      const moveT = Geo.clamp((prog - 0.18) / 0.62, 0, 1);
      const moveEase = easeInOut(moveT);
      Figures.poly(ctx, [Q1, Q2, Q3, Q4], { fill: "rgba(120,140,255,0.04)", stroke: Geo.ink() });
      if (moveT < 1) {
        const alphaC = Math.max(0, showStart - moveEase);
        if (alphaC > 0.02) Figures.poly(ctx, [Pb, Pr, Ptp, Pl], { fill: `rgba(91,107,214,${0.10 + 0.28 * alphaC})`, stroke: Geo.blue() });
      }
      if (moveEase > 0.05) {
        Figures.poly(ctx, [Q1, Pb, Pm, Pl2], { fill: `rgba(46,204,113,${0.10 + 0.28 * moveEase})`, stroke: Geo.green() });
        Figures.poly(ctx, [Pm, Pr, Q3, Pt2], { fill: `rgba(255,159,67,${0.10 + 0.28 * moveEase})`, stroke: Geo.orange() });
      }
      [[T1, G1], [T2, G2], [T3, G3], [T4, G4]].forEach(([src, tgt]) => {
        Figures.poly(ctx, lerpTri(src, tgt, moveEase), { fill: "rgba(253,252,247,0.85)", stroke: Geo.ink() });
      });
      if (showStart > 0.4 && moveT < 0.35) {
        const cen = { x: (Pb.x + Pr.x + Ptp.x + Pl.x) / 4, y: (Pb.y + Pr.y + Ptp.y + Pl.y) / 4 };
        Figures.label(ctx, cen, `c²=${aU * aU + bU * bU}`, { color: Geo.blue(), font: "700 14px Rubik, sans-serif" });
      }
      if (moveEase > 0.65) {
        Figures.label(ctx, { x: (Q1.x + Pb.x + Pm.x + Pl2.x) / 4, y: (Q1.y + Pb.y + Pm.y + Pl2.y) / 4 }, `b²=${bU * bU}`, { color: Geo.green(), font: "700 13px Rubik, sans-serif" });
        Figures.label(ctx, { x: (Pm.x + Pr.x + Q3.x + Pt2.x) / 4, y: (Pm.y + Pr.y + Q3.y + Pt2.y) / 4 }, `a²=${aU * aU}`, { color: Geo.orange(), font: "700 13px Rubik, sans-serif" });
      }
      let caption;
      if (prog < 0.18) caption = "Четыре одинаковых треугольника окружают квадрат гипотенузы: площадь c²";
      else if (prog < 0.8) caption = "Переставляем те же четыре треугольника внутри того же большого квадрата…";
      else caption = `…и они освобождают ровно два квадрата: a² + b² = ${aU * aU} + ${bU * bU} = ${aU * aU + bU * bU} = c²`;
      Figures.wrapText(ctx, caption, w / 2, h * 0.06, w * 0.94, { color: Geo.ink(), font: "700 13.5px Rubik, sans-serif" });
    }
    return {
      play() { playing = true; t0 = null; prog = 0; },
      reset() { playing = false; prog = 0; },
      step(ts) {
        if (!playing) return true;
        if (t0 == null) t0 = ts;
        prog = Geo.clamp((ts - t0) / 4200, 0, 1);
        if (prog >= 1) playing = false;
        return !playing;
      },
      draw,
    };
  },

  /* --- Сумма углов треугольника: углы «переносятся» к развёрнутому углу --- */
  /* --- Сумма углов треугольника: через вершину A проводим прямую, параллельную BC.
     Она делит развёрнутый угол при A на три части — и ДВЕ ИЗ НИХ ТОЧНО РАВНЫ углам
     B и C (накрест лежащие с параллелью BC), что видно рядом с исходными вершинами,
     а не где-то на отдельной линии в стороне. Тот же принцип, что уже проверен для
     теоремы о внешнем угле — переиспользуем и здесь. */
  anglesum(ctx, canvas, w, h) {
    const A = { x: w * 0.5, y: h * 0.16 }, B = { x: w * 0.16, y: h * 0.82 }, C = { x: w * 0.84, y: h * 0.82 };
    const dirBC = { x: C.x - B.x, y: C.y - B.y };
    let t0 = null, prog = 0, playing = false;
    function draw() {
      Figures.drawBase(ctx, w, h);
      Figures.poly(ctx, [A, B, C], { fill: "rgba(91,107,214,0.06)", stroke: Geo.ink() });
      const angA = Geo.angleDeg(A, B, C), angB = Geo.angleDeg(B, A, C), angC = Geo.angleDeg(C, A, B);
      // исходные углы у СВОИХ вершин — видно с самого начала, что это углы именно нашего треугольника
      arcAngleGlobal(ctx, A, B, C, Geo.blue(), 20);
      arcAngleGlobal(ctx, B, A, C, Geo.orange(), 18);
      arcAngleGlobal(ctx, C, A, B, Geo.green(), 18);
      [["A", A], ["B", B], ["C", C]].forEach(([nm, p]) => Figures.label(ctx, p, nm, { dy: p.y < h / 2 ? -16 : 20, color: Geo.ink() }));
      const lineGrow = Geo.clamp(prog / 0.42, 0, 1);
      const copyGrow = Geo.clamp((prog - 0.42) / 0.4, 0, 1);
      if (lineGrow > 0.02) {
        const E = { x: A.x - dirBC.x * 0.42 * lineGrow, y: A.y - dirBC.y * 0.42 * lineGrow }; // в сторону B
        const F = { x: A.x + dirBC.x * 0.42 * lineGrow, y: A.y + dirBC.y * 0.42 * lineGrow }; // в сторону C
        Figures.line(ctx, E, F, { stroke: Geo.periwinkle(), lw: 1.5, dash: [4, 4] });
        if (copyGrow > 0.02) {
          // копия угла B рядом с A (накрест лежащий с ∠B через параллель) — тот же цвет, что и у B
          arcAngleGlobal(ctx, A, E, B, Geo.orange(), 34);
          arcAngleGlobal(ctx, A, F, C, Geo.green(), 34);
          if (copyGrow > 0.5) {
            Figures.line(ctx, B, { x: B.x + (A.x - B.x) * 0.15, y: B.y + (A.y - B.y) * 0.15 }, { stroke: Geo.orange(), lw: 1, dash: [2, 3] });
          }
        }
      }
      let caption;
      if (prog < 0.1) caption = "Три угла нашего треугольника — A, B и C";
      else if (prog < 0.42) caption = "Через A проводим прямую, параллельную BC…";
      else if (prog < 0.82) caption = "…накрест лежащие углы равны B и C — вот они, рядом с A";
      else caption = `∠B + ∠A + ∠C = ${Geo.fmt(angB)}+${Geo.fmt(angA)}+${Geo.fmt(angC)} = 180° — это развёрнутый угол при A`;
      Figures.wrapText(ctx, caption, w / 2, h * 0.94, w * 0.96, { color: Geo.ink(), font: "700 13px Rubik, sans-serif" });
    }
    return {
      play() { playing = true; t0 = null; prog = 0; },
      reset() { playing = false; prog = 0; },
      step(ts) {
        if (!playing) return true;
        if (t0 == null) t0 = ts;
        prog = Geo.clamp((ts - t0) / 3600, 0, 1);
        if (prog >= 1) playing = false;
        return !playing;
      },
      draw,
    };
  },

  /* --- Теорема Фалеса: точка скользит, отношения сохраняются --- */
  /* --- Теорема Фалеса: ДВЕ параллельные прямые (обе явно нарисованы и помечены
     одинаковыми стрелками параллельности) пересекают стороны угла — подвижная
     скользит вдоль лучей, оставаясь параллельной неподвижной. Раньше вторая
     (неподвижная) прямая не была нарисована вовсе — сравнивать было не с чем. */
  thales(ctx, canvas, w, h) {
    const O = { x: w * 0.12, y: h * 0.88 };
    const P2 = { x: w * 0.9, y: h * 0.08 };
    const Q2 = { x: w * 0.92, y: h * 0.5 };
    let t0 = null, prog = 0, playing = false;
    function parallelTick(p1, p2, offset) {
      const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
      const dx = p2.x - p1.x, dy = p2.y - p1.y, len = Math.hypot(dx, dy) || 1;
      const ux = dx / len, uy = dy / len;
      const tx = mx + ux * offset, ty = my + uy * offset;
      const s = 6;
      ctx.beginPath(); ctx.moveTo(tx - uy * s - ux * s, ty + ux * s - uy * s); ctx.lineTo(tx, ty); ctx.lineTo(tx - uy * s + ux * s, ty + ux * s + uy * s);
      ctx.strokeStyle = Geo.blue(); ctx.lineWidth = 1.5; ctx.stroke();
    }
    function draw() {
      Figures.drawBase(ctx, w, h);
      Figures.line(ctx, O, P2, { stroke: Geo.ink(), lw: 1.5 });
      Figures.line(ctx, O, Q2, { stroke: Geo.ink(), lw: 1.5 });
      Figures.line(ctx, P2, Q2, { stroke: Geo.blue(), lw: 2.5 });
      parallelTick(P2, Q2, 0);
      Figures.label(ctx, P2, "B", { dy: -12 }); Figures.label(ctx, Q2, "C", { dy: -12 }); Figures.label(ctx, O, "O", { dy: 16 });
      const t = 0.3 + 0.4 * prog;
      const P1 = { x: O.x + t * (P2.x - O.x), y: O.y + t * (P2.y - O.y) };
      const Q1 = { x: O.x + t * (Q2.x - O.x), y: O.y + t * (Q2.y - O.y) };
      Figures.line(ctx, P1, Q1, { stroke: Geo.orange(), lw: 2.5 });
      parallelTick(P1, Q1, 0);
      Figures.label(ctx, P1, "B'", { dy: -12, color: Geo.orange() }); Figures.label(ctx, Q1, "C'", { dy: -12, color: Geo.orange() });
      [O, P1, P2, Q1, Q2].forEach((p) => Figures.dot(ctx, p, { r: 4 }));
      const OB = Geo.dist(O, P1), BC = Geo.dist(P1, P2), OC = Geo.dist(O, Q1), CC = Geo.dist(Q1, Q2);
      Figures.wrapText(ctx, `OB'/B'B = ${Geo.fmt(OB / (BC || 1))}   OC'/C'C = ${Geo.fmt(OC / (CC || 1))} — равны, пока B'C' ∥ BC`, w * 0.5, h * 0.06, w * 0.94, { color: Geo.ink(), font: "700 12.5px Rubik, sans-serif" });
    }
    return {
      play() { playing = true; t0 = null; prog = 0; },
      reset() { playing = false; prog = 0; },
      step(ts) {
        if (!playing) return true;
        if (t0 == null) t0 = ts;
        prog = Geo.clamp((ts - t0) / 3200, 0, 1);
        if (prog >= 1) playing = false;
        return !playing;
      },
      draw,
    };
  },

  /* --- Площадь параллелограмма: треугольник переносится, получаем прямоугольник --- */
  /* --- Площадь параллелограмма: треугольник переносится, получаем прямоугольник.
     Добавлены подписи вершин (их не было вовсе) и метка прямого угла у основания
     высоты — чтобы было видно, ПОЧЕМУ разрез идёт именно по высоте, а не абы где. */
  parallelogram(ctx, canvas, w, h) {
    const A = { x: w * 0.3, y: h * 0.22 }, B = { x: w * 0.82, y: h * 0.22 }, C = { x: w * 0.66, y: h * 0.8 }, D = { x: w * 0.14, y: h * 0.8 };
    let t0 = null, prog = 0, playing = false;
    const dx = B.x - A.x, dy = B.y - A.y;
    const tproj = ((D.x - A.x) * dx + (D.y - A.y) * dy) / (dx * dx + dy * dy);
    const Dp = { x: A.x + tproj * dx, y: A.y + tproj * dy };
    const shift = { x: C.x - D.x, y: C.y - D.y };
    function draw() {
      Figures.drawBase(ctx, w, h);
      const e = easeInOut(prog);
      Figures.poly(ctx, [A, B, C, D], { fill: "rgba(91,107,214,0.06)", stroke: "#c8c8e6" });
      const An = { x: A.x + shift.x * e, y: A.y + shift.y * e };
      const Dn = { x: D.x + shift.x * e, y: D.y + shift.y * e };
      const Dpn = { x: Dp.x + shift.x * e, y: Dp.y + shift.y * e };
      if (e < 0.05) {
        Figures.line(ctx, D, Dp, { stroke: Geo.purple(), lw: 2, dash: [4, 3] });
        ctx.strokeStyle = Geo.purple(); ctx.lineWidth = 1.5;
        const s = 8, ang = Math.atan2(A.y - Dp.y, A.x - Dp.x), ang2 = Math.atan2(D.y - Dp.y, D.x - Dp.x);
        ctx.strokeRect(Dp.x - s / 2, Dp.y - s, s, s);
        Figures.label(ctx, { x: (D.x + Dp.x) / 2, y: (D.y + Dp.y) / 2 }, "высота", { color: Geo.purple(), dy: 0, align: "left" });
      }
      Figures.poly(ctx, [A, D, Dp], { fill: "rgba(255,159,67,0.10)", stroke: "#dfe1f5" });
      Figures.poly(ctx, [An, Dn, Dpn], { fill: "rgba(255,159,67,0.35)", stroke: Geo.orange() });
      Figures.poly(ctx, [Dp, B, C, D], { fill: "rgba(91,107,214,0.18)", stroke: Geo.blue() });
      [["A", A, An], ["D", D, Dn]].forEach(([nm, orig, moved]) => {
        const p = { x: orig.x + (moved.x - orig.x) * e, y: orig.y + (moved.y - orig.y) * e };
        Figures.label(ctx, p, nm, { dy: -12, color: Geo.orange() });
      });
      Figures.label(ctx, B, "B", { dy: -12, color: Geo.blue() }); Figures.label(ctx, C, "C", { dy: 16, color: Geo.blue() }); Figures.label(ctx, D, "D", { dy: 16, color: Geo.ink() });
      const area = Geo.areaShoelace([A, B, C, D]);
      let caption;
      if (e < 0.05) caption = "Проводим высоту DDp — она перпендикулярна AB (отмечено прямым углом)";
      else if (e < 0.95) caption = "Отрезаем треугольник ADDp и прикладываем его справа, к стороне BC…";
      else caption = `…получился прямоугольник той же площади: S = ${Geo.fmt(area)}`;
      Figures.wrapText(ctx, caption, w / 2, h * 0.06, w * 0.94, { color: Geo.ink(), font: "700 13px Rubik, sans-serif" });
    }
    return {
      play() { playing = true; t0 = null; prog = 0; },
      reset() { playing = false; prog = 0; },
      step(ts) {
        if (!playing) return true;
        if (t0 == null) t0 = ts;
        prog = Geo.clamp((ts - t0) / 2200, 0, 1);
        if (prog >= 1) playing = false;
        return !playing;
      },
      draw,
    };
  },

  /* --- Признаки равенства треугольников: DEF доезжает и совмещается с ABC --- */
  criterionSAS(ctx, canvas, w, h) {
    const ABC = [{ x: w * 0.22, y: h * 0.82 }, { x: w * 0.5, y: h * 0.8 }, { x: w * 0.3, y: h * 0.3 }];
    return congruenceOverlay(ctx, canvas, w, h, ABC,
      [{ type: "side", i1: 0, i2: 2, count: 1 }, { type: "side", i1: 0, i2: 1, count: 2 }, { type: "angle", v: 0, i1: 1, i2: 2 }],
      "I признак (СУС): две стороны и угол между ними");
  },
  criterionASA(ctx, canvas, w, h) {
    const ABC = [{ x: w * 0.22, y: h * 0.82 }, { x: w * 0.5, y: h * 0.8 }, { x: w * 0.3, y: h * 0.3 }];
    return congruenceOverlay(ctx, canvas, w, h, ABC,
      [{ type: "side", i1: 0, i2: 1, count: 1 }, { type: "angle", v: 0, i1: 1, i2: 2 }, { type: "angle", v: 1, i1: 0, i2: 2 }],
      "II признак (УСУ): сторона и два прилежащих угла");
  },
  criterionSSS(ctx, canvas, w, h) {
    const ABC = [{ x: w * 0.22, y: h * 0.82 }, { x: w * 0.5, y: h * 0.8 }, { x: w * 0.3, y: h * 0.3 }];
    return congruenceOverlay(ctx, canvas, w, h, ABC,
      [{ type: "side", i1: 0, i2: 1, count: 1 }, { type: "side", i1: 1, i2: 2, count: 2 }, { type: "side", i1: 2, i2: 0, count: 3 }],
      "III признак (ССС): все три стороны");
  },

  /* --- Свойства параллелограмма: диагональ делит его на 2 треугольника, связанных
     поворотом на 180° вокруг центра (точки пересечения диагоналей) — частный случай
     центральной симметрии. Явно показывает, ПОЧЕМУ противоположные стороны/углы равны. */
  parallelogramProps(ctx, canvas, w, h) {
    const A = { x: w * 0.16, y: h * 0.78 }, B = { x: w * 0.42, y: h * 0.82 };
    const C = { x: w * 0.82, y: h * 0.26 }, D = { x: A.x + C.x - B.x, y: A.y + C.y - B.y };
    const O = { x: (A.x + C.x) / 2, y: (A.y + C.y) / 2 };
    let t0 = null, prog = 0, playing = false;
    function draw() {
      Figures.drawBase(ctx, w, h);
      const local = easeInOut(prog);
      const ang = Math.PI * local;
      const [C2, D2, A2] = [C, D, A].map((p) => rotatePt(p, O, ang));
      Figures.poly(ctx, [A, B, C, D], { fill: "rgba(120,140,255,0.05)", stroke: Geo.ink() });
      Figures.line(ctx, A, C, { stroke: Geo.ink(), lw: 1 });
      Figures.poly(ctx, [A, B, C], { fill: "rgba(91,107,214,0.14)", stroke: Geo.blue() });
      Figures.poly(ctx, [C2, D2, A2], { fill: "rgba(255,159,67,0.16)", stroke: Geo.orange() });
      Figures.dot(ctx, O, { r: 3 });
      [["A", A], ["B", B], ["C", C], ["D", D]].forEach(([nm, p]) => Figures.label(ctx, p, nm, { dy: p.y < h / 2 ? -12 : 16, color: Geo.ink() }));
      let caption;
      if (prog < 0.05) caption = "Диагональ AC делит параллелограмм на два треугольника: ABC и CDA";
      else if (prog < 0.95) caption = "Поворачиваем CDA на 180° вокруг центра O — куда попадут его вершины?";
      else caption = "C→A, D→B, A→C: треугольники совпали — значит AB=CD, BC=DA, ∠B=∠D";
      Figures.wrapText(ctx, caption, w / 2, h * 0.06, w * 0.94, { color: Geo.ink(), font: "700 13.5px Rubik, sans-serif" });
    }
    return {
      play() { playing = true; t0 = null; prog = 0; },
      reset() { playing = false; prog = 0; },
      step(ts) {
        if (!playing) return true;
        if (t0 == null) t0 = ts;
        prog = Geo.clamp((ts - t0) / 2400, 0, 1);
        if (prog >= 1) playing = false;
        return !playing;
      },
      draw,
    };
  },

  /* --- Средняя линия: поворачиваем отрезок AM (M — середина AB) на 180° вокруг N
     (середина AC) — он переходит в CP, достраивая параллелограмм MBCP. Раз MBCP —
     параллелограмм, MP=BC и MP∥BC, а MN — ровно половина MP, то есть половина BC. */
  midlineRotate(ctx, canvas, w, h) {
    const A = { x: w * 0.3, y: h * 0.85 }, B = { x: w * 0.1, y: h * 0.24 }, C = { x: w * 0.86, y: h * 0.3 };
    const M = { x: (A.x + B.x) / 2, y: (A.y + B.y) / 2 }, N = { x: (A.x + C.x) / 2, y: (A.y + C.y) / 2 };
    let t0 = null, prog = 0, playing = false;
    function draw() {
      Figures.drawBase(ctx, w, h);
      const local = easeInOut(prog);
      const ang = Math.PI * local;
      const A2 = rotatePt(A, N, ang), M2 = rotatePt(M, N, ang); // A2->C (при local=1), M2->P
      Figures.poly(ctx, [A, B, C], { fill: "rgba(120,140,255,0.05)", stroke: Geo.ink() });
      Figures.line(ctx, M, N, { stroke: Geo.green(), lw: 2.5 });
      Figures.line(ctx, A, M2, { stroke: Geo.orange(), lw: 2, dash: [4, 4] });
      Figures.dot(ctx, N, { r: 3 });
      if (local > 0.9) {
        Figures.line(ctx, B, M2, { stroke: Geo.purple(), lw: 1.5, dash: [3, 3] });
        Figures.line(ctx, C, M2, { stroke: Geo.purple(), lw: 1.5, dash: [3, 3] });
        Figures.label(ctx, M2, "P", { color: Geo.orange(), dy: 14 });
      }
      [["A", A], ["B", B], ["C", C], ["M", M], ["N", N]].forEach(([nm, p]) => Figures.label(ctx, p, nm, { dy: p.y < h / 2 ? -12 : 16, color: Geo.ink() }));
      let caption;
      if (prog < 0.05) caption = "MN — средняя линия (M, N — середины AB и AC)";
      else if (prog < 0.95) caption = "Поворачиваем отрезок AM на 180° вокруг N…";
      else caption = "…получили P: MBCP — параллелограмм, значит MN = ½BC и MN∥BC";
      Figures.wrapText(ctx, caption, w / 2, h * 0.06, w * 0.94, { color: Geo.ink(), font: "700 13.5px Rubik, sans-serif" });
    }
    return {
      play() { playing = true; t0 = null; prog = 0; },
      reset() { playing = false; prog = 0; },
      step(ts) {
        if (!playing) return true;
        if (t0 == null) t0 = ts;
        prog = Geo.clamp((ts - t0) / 2400, 0, 1);
        if (prog >= 1) playing = false;
        return !playing;
      },
      draw,
    };
  },

  /* --- Равнобедренный треугольник: складываем по оси симметрии A-M (M — середина
     основания). B отражается точно в C, показывая, что углы при основании равны.
     Раскладка "вдоль оси / поперёк оси" со сжатием поперечной составляющей по
     cos(πt) — честная 2D-проекция 3D-переворота (как в CSS-flip), а не то же самое,
     что жёсткое вращение в плоскости: расстояние до A закономерно "проседает" на
     середине пути, ровно как у переворачивающейся карточки. */
  isoscelesFold(ctx, canvas, w, h) {
    const A = { x: w * 0.5, y: h * 0.18 };
    const B = { x: w * 0.2, y: h * 0.82 };
    const C = { x: 2 * A.x - B.x, y: B.y };
    const M = { x: (B.x + C.x) / 2, y: (B.y + C.y) / 2 };
    function fold(P, t) {
      const ax = M.x - A.x, ay = M.y - A.y, alen = Math.hypot(ax, ay) || 1;
      const ux = ax / alen, uy = ay / alen, nx = -uy, ny = ux;
      const dx = P.x - A.x, dy = P.y - A.y;
      const along = dx * ux + dy * uy, perp = (dx * nx + dy * ny) * Math.cos(Math.PI * t);
      return { x: A.x + along * ux + perp * nx, y: A.y + along * uy + perp * ny };
    }
    let t0 = null, prog = 0, playing = false;
    function draw() {
      Figures.drawBase(ctx, w, h);
      const local = easeInOut(prog);
      const Bf = fold(B, local);
      Figures.line(ctx, A, M, { stroke: Geo.ink(), lw: 1, dash: [4, 4] });
      Figures.poly(ctx, [A, B, C], { fill: "rgba(120,140,255,0.06)", stroke: Geo.blue() });
      Figures.poly(ctx, [A, Bf, M], { fill: "rgba(255,159,67,0.22)", stroke: Geo.orange() });
      [["A", A], ["B", B], ["C", C], ["M", M]].forEach(([nm, p]) => Figures.label(ctx, p, nm, { dy: p.y < h / 2 ? -12 : 16, color: Geo.ink() }));
      if (local > 0.02 && local < 0.98) Figures.label(ctx, Bf, "B'", { dy: -12, color: Geo.orange() });
      let caption;
      if (prog < 0.05) caption = "AB = AC (дано). Складываем треугольник по оси AM…";
      else if (prog < 0.95) caption = "…сторона AB накладывается на AC…";
      else caption = "…B точно совпал с C — значит ∠B = ∠C (углы при основании равны)";
      Figures.wrapText(ctx, caption, w / 2, h * 0.06, w * 0.94, { color: Geo.ink(), font: "700 13.5px Rubik, sans-serif" });
    }
    return {
      play() { playing = true; t0 = null; prog = 0; },
      reset() { playing = false; prog = 0; },
      step(ts) {
        if (!playing) return true;
        if (t0 == null) t0 = ts;
        prog = Geo.clamp((ts - t0) / 2400, 0, 1);
        if (prog >= 1) playing = false;
        return !playing;
      },
      draw,
    };
  },

  /* --- Вписанный угол: A скользит по большой дуге, ∠BAC остаётся неизменным
     (проверено численно: 70.00° на всём диапазоне A=0°..180°, ровно половина
     центрального угла BOC=140°). */
  inscribedSlide(ctx, canvas, w, h) {
    const cx = w * 0.5, cy = h * 0.56, R = Math.min(w, h) * 0.32;
    const angB = 200 * Math.PI / 180, angC = 340 * Math.PI / 180;
    const B = { x: cx + R * Math.cos(angB), y: cy + R * Math.sin(angB) };
    const C = { x: cx + R * Math.cos(angC), y: cy + R * Math.sin(angC) };
    const O = { x: cx, y: cy };
    let t0 = null, prog = 0, playing = false;
    function draw() {
      Figures.drawBase(ctx, w, h);
      ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.strokeStyle = Geo.ink(); ctx.lineWidth = 1; ctx.globalAlpha = 0.4; ctx.stroke(); ctx.globalAlpha = 1;
      const angA = (15 + 165 * prog) * Math.PI / 180; // от 15° до 180° - безопасно внутри большой дуги
      const A = { x: cx + R * Math.cos(angA), y: cy + R * Math.sin(angA) };
      Figures.line(ctx, O, B, { stroke: Geo.periwinkle(), lw: 1.5, dash: [3, 3] });
      Figures.line(ctx, O, C, { stroke: Geo.periwinkle(), lw: 1.5, dash: [3, 3] });
      Figures.line(ctx, A, B, { stroke: Geo.blue(), lw: 2 });
      Figures.line(ctx, A, C, { stroke: Geo.blue(), lw: 2 });
      Figures.dot(ctx, O, { r: 3 }); Figures.dot(ctx, B, { r: 4 }); Figures.dot(ctx, C, { r: 4 }); Figures.dot(ctx, A, { r: 5, fill: Geo.orange() });
      [["A", A], ["B", B], ["C", C], ["O", O]].forEach(([nm, p]) => Figures.label(ctx, p, nm, { dy: -12, color: Geo.ink() }));
      const inscribedAng = Geo.angleDeg(A, B, C), centralAng = Geo.angleDeg(O, B, C);
      Figures.wrapText(ctx, `∠BAC = ${Geo.fmt(inscribedAng)}°   ∠BOC (центральный) = ${Geo.fmt(centralAng)}°`, w / 2, h * 0.94, w * 0.94, { color: Geo.ink() });
      let caption = prog < 0.05 ? "A — на окружности, скользит по дуге, не содержащей B и C" : "Вписанный угол не меняется — всегда вдвое меньше центрального";
      Figures.wrapText(ctx, caption, w / 2, h * 0.06, w * 0.94, { color: Geo.ink(), font: "700 13.5px Rubik, sans-serif" });
    }
    return {
      play() { playing = true; t0 = null; prog = 0; },
      reset() { playing = false; prog = 0; },
      step(ts) {
        if (!playing) return true;
        if (t0 == null) t0 = ts;
        prog = Geo.clamp((ts - t0) / 3000, 0, 1);
        if (prog >= 1) playing = false;
        return !playing;
      },
      draw,
    };
  },

  /* --- Внешний угол: через C проводим прямую, параллельную AB. Она делит внешний
     угол на 2 части — ∠ACE (накрест лежащий с ∠A) и ∠ECC' (соответственный с ∠B).
     Численно проверено: части совпадают с ∠A и ∠B по отдельности, а не просто их сумма. */
  exteriorSplit(ctx, canvas, w, h) {
    const A = { x: w * 0.2, y: h * 0.24 }, B = { x: w * 0.1, y: h * 0.84 }, C = { x: w * 0.72, y: h * 0.78 };
    const Cp = { x: C.x + (C.x - B.x) * 0.55, y: C.y + (C.y - B.y) * 0.55 };
    const dirAB = { x: A.x - B.x, y: A.y - B.y };
    let t0 = null, prog = 0, playing = false;
    function draw() {
      Figures.drawBase(ctx, w, h);
      const local = easeInOut(prog);
      Figures.poly(ctx, [A, B, C], { fill: "rgba(120,140,255,0.06)", stroke: Geo.ink() });
      Figures.line(ctx, B, Cp, { stroke: Geo.ink(), lw: 1.5 });
      if (local > 0.02) {
        const E = { x: C.x + dirAB.x * 0.55 * local, y: C.y + dirAB.y * 0.55 * local };
        const Eneg = { x: C.x - dirAB.x * 0.4 * local, y: C.y - dirAB.y * 0.4 * local };
        Figures.line(ctx, Eneg, E, { stroke: Geo.periwinkle(), lw: 1.5, dash: [4, 4] });
        if (local > 0.3) {
          arcAngleGlobal(ctx, C, A, E, Geo.green());
          arcAngleGlobal(ctx, C, E, Cp, Geo.orange());
        }
      }
      arcAngleGlobal(ctx, A, B, C, Geo.green());
      arcAngleGlobal(ctx, B, A, C, Geo.orange());
      [["A", A], ["B", B], ["C", C]].forEach(([nm, p]) => Figures.label(ctx, p, nm, { dy: p.y < h / 2 ? -12 : 16, color: Geo.ink() }));
      const angA = Geo.angleDeg(A, B, C), angB = Geo.angleDeg(B, A, C), ext = Geo.angleDeg(C, A, Cp);
      let caption;
      if (prog < 0.05) caption = `∠A=${Geo.fmt(angA)}°  ∠B=${Geo.fmt(angB)}°  внешний угол при C=${Geo.fmt(ext)}°`;
      else if (prog < 0.95) caption = "Проводим через C прямую, параллельную AB…";
      else caption = `…она делит внешний угол ровно на ∠A и ∠B: ${Geo.fmt(angA)}+${Geo.fmt(angB)}=${Geo.fmt(angA + angB)}°`;
      Figures.wrapText(ctx, caption, w / 2, h * 0.06, w * 0.94, { color: Geo.ink(), font: "700 13px Rubik, sans-serif" });
    }
    return {
      play() { playing = true; t0 = null; prog = 0; },
      reset() { playing = false; prog = 0; },
      step(ts) {
        if (!playing) return true;
        if (t0 == null) t0 = ts;
        prog = Geo.clamp((ts - t0) / 2800, 0, 1);
        if (prog >= 1) playing = false;
        return !playing;
      },
      draw,
    };
  },

  /* --- Признак параллельности: верхняя прямая поворачивается вокруг точки на секущей.
     Направление интерполируется к направлению нижней прямой (= параллельность по
     определению); накрест лежащие углы отдельно ИЗМЕРЯЮТСЯ на каждом кадре (не задают
     движение) — показывают, что они становятся равны РОВНО в момент параллельности. */
  parallelSweep(ctx, canvas, w, h) {
    const P1 = { x: w * 0.5, y: h * 0.78 }, P2 = { x: w * 0.5, y: h * 0.22 };
    const lowerAngle = 8 * Math.PI / 180, startUpperAngle = lowerAngle + 32 * Math.PI / 180;
    const lowerA = { x: P1.x - w * 0.38 * Math.cos(lowerAngle), y: P1.y - w * 0.38 * Math.sin(lowerAngle) };
    const lowerB = { x: P1.x + w * 0.38 * Math.cos(lowerAngle), y: P1.y + w * 0.38 * Math.sin(lowerAngle) };
    let t0 = null, prog = 0, playing = false;
    function draw() {
      Figures.drawBase(ctx, w, h);
      const local = easeInOut(prog);
      const curAngle = startUpperAngle + (lowerAngle - startUpperAngle) * local;
      const upperA = { x: P2.x - w * 0.38 * Math.cos(curAngle), y: P2.y - w * 0.38 * Math.sin(curAngle) };
      const upperB = { x: P2.x + w * 0.38 * Math.cos(curAngle), y: P2.y + w * 0.38 * Math.sin(curAngle) };
      Figures.line(ctx, { x: w * 0.5, y: h * 0.06 }, { x: w * 0.5, y: h * 0.94 }, { stroke: Geo.ink(), lw: 1 });
      Figures.line(ctx, lowerA, lowerB, { stroke: Geo.blue(), lw: 2.2 });
      Figures.line(ctx, upperA, upperB, { stroke: Geo.orange(), lw: 2.2 });
      arcAngleGlobal(ctx, P2, { x: w * 0.5, y: h }, upperB, Geo.green(), 20);
      arcAngleGlobal(ctx, P1, { x: w * 0.5, y: 0 }, lowerA, Geo.green(), 20);
      const isParallel = Math.abs(curAngle - lowerAngle) < 0.01;
      const angTop = Geo.angleDeg(P2, { x: w * 0.5, y: h }, upperB), angBottom = Geo.angleDeg(P1, { x: w * 0.5, y: 0 }, lowerA);
      let caption;
      if (prog < 0.05) caption = `Накрест лежащие: ${Geo.fmt(angTop)}° и ${Geo.fmt(angBottom)}° — не равны, прямые не параллельны`;
      else if (!isParallel) caption = "Поворачиваем верхнюю прямую…";
      else caption = `Равны: ${Geo.fmt(angTop)}° = ${Geo.fmt(angBottom)}° — теперь прямые параллельны`;
      Figures.wrapText(ctx, caption, w / 2, h * 0.06, w * 0.94, { color: Geo.ink(), font: "700 13px Rubik, sans-serif" });
    }
    return {
      play() { playing = true; t0 = null; prog = 0; },
      reset() { playing = false; prog = 0; },
      step(ts) {
        if (!playing) return true;
        if (t0 == null) t0 = ts;
        prog = Geo.clamp((ts - t0) / 2600, 0, 1);
        if (prog >= 1) playing = false;
        return !playing;
      },
      draw,
    };
  },

  /* --- Подобие (АА): маленький треугольник растёт и совмещается с большим — угол
     при A остаётся неизменным на всём пути (проверено численно: 77.905° постоянно
     при масштабе+повороте+сдвиге), демонстрируя, что одинаковые углы не меняются
     от масштаба — только пропорция сторон. */
  similarGrow(ctx, canvas, w, h) {
    const A = { x: w * 0.14, y: h * 0.82 }, B = { x: w * 0.34, y: h * 0.84 }, C = { x: w * 0.22, y: h * 0.5 };
    const targetScale = 1.9, targetAngle = -0.12, targetShift = { x: w * 0.36, y: -h * 0.06 };
    let t0 = null, prog = 0, playing = false;
    function transform(p, t) {
      const scale = 1 + (targetScale - 1) * t, ang = targetAngle * t;
      const sx = targetShift.x * t, sy = targetShift.y * t;
      const dx = (p.x - A.x) * scale, dy = (p.y - A.y) * scale;
      const c = Math.cos(ang), s = Math.sin(ang);
      return { x: A.x + dx * c - dy * s + sx, y: A.y + dx * s + dy * c + sy };
    }
    function draw() {
      Figures.drawBase(ctx, w, h);
      const local = easeInOut(prog);
      const A2 = transform(A, local), B2 = transform(B, local), C2 = transform(C, local);
      Figures.poly(ctx, [A2, B2, C2], { fill: "rgba(255,159,67,0.14)", stroke: Geo.orange() });
      Figures.poly(ctx, [A, B, C], { fill: "rgba(91,107,214,0.14)", stroke: Geo.blue() });
      arcAngleGlobal(ctx, A, B, C, Geo.green());
      arcAngleGlobal(ctx, A2, B2, C2, Geo.green());
      [["A", A], ["B", B], ["C", C]].forEach(([nm, p]) => Figures.label(ctx, p, nm, { dy: 14, color: Geo.blue() }));
      const angA = Geo.angleDeg(A, B, C), angA2 = Geo.angleDeg(A2, B2, C2);
      let caption;
      if (prog < 0.05) caption = `∠A=${Geo.fmt(angA)}° — два треугольника с одинаковыми углами`;
      else if (prog < 0.95) caption = "Маленький растёт и сдвигается на большой — форма не меняется…";
      else caption = `…угол остался тем же (${Geo.fmt(angA2)}°) — треугольники подобны, стороны пропорциональны`;
      Figures.wrapText(ctx, caption, w / 2, h * 0.06, w * 0.94, { color: Geo.ink(), font: "700 13px Rubik, sans-serif" });
    }
    return {
      play() { playing = true; t0 = null; prog = 0; },
      reset() { playing = false; prog = 0; },
      step(ts) {
        if (!playing) return true;
        if (t0 == null) t0 = ts;
        prog = Geo.clamp((ts - t0) / 2800, 0, 1);
        if (prog >= 1) playing = false;
        return !playing;
      },
      draw,
    };
  },

  /* --- Касательная: секущая из внешней точки P поворачивается, две точки пересечения
     с окружностью сближаются и сливаются в одну ровно в момент касания — угол между
     линией и радиусом в этот момент становится 90°. Угол касания найден аналитически
     (sin α = R/D) и проверен: даёт дискриминант ровно 0 (одна точка). */
  tangentPivot(ctx, canvas, w, h) {
    const O = { x: w * 0.32, y: h * 0.55 }, R = Math.min(w, h) * 0.24;
    const P = { x: w * 0.86, y: h * 0.2 };
    const D = Math.hypot(O.x - P.x, O.y - P.y); // сырые пиксели — совпадает по масштабу с R (Geo.dist делит на UNIT, здесь это неверно)
    const alpha = Math.asin(Math.min(1, R / D));
    const angleOP = Math.atan2(O.y - P.y, O.x - P.x);
    const tangentDir = angleOP + alpha;
    const startDir = angleOP + alpha * 2.6; // секущая, пересекающая в 2 точках
    let t0 = null, prog = 0, playing = false;
    function intersections(dirAngle) {
      const dx = Math.cos(dirAngle), dy = Math.sin(dirAngle);
      const fx = P.x - O.x, fy = P.y - O.y;
      const a = dx * dx + dy * dy, b = 2 * (fx * dx + fy * dy), c = fx * fx + fy * fy - R * R;
      const disc = b * b - 4 * a * c;
      if (disc < 0) return [];
      const sq = Math.sqrt(Math.max(0, disc));
      const t1 = (-b - sq) / (2 * a), t2 = (-b + sq) / (2 * a);
      return [{ x: P.x + dx * t1, y: P.y + dy * t1 }, { x: P.x + dx * t2, y: P.y + dy * t2 }];
    }
    function draw() {
      Figures.drawBase(ctx, w, h);
      const local = easeInOut(prog);
      const curDir = startDir + (tangentDir - startDir) * local;
      const pts = intersections(curDir);
      ctx.beginPath(); ctx.arc(O.x, O.y, R, 0, Math.PI * 2); ctx.strokeStyle = Geo.ink(); ctx.lineWidth = 1.5; ctx.stroke();
      const far = { x: P.x + Math.cos(curDir) * (D + R * 1.4), y: P.y + Math.sin(curDir) * (D + R * 1.4) };
      Figures.line(ctx, P, far, { stroke: Geo.blue(), lw: 2 });
      Figures.dot(ctx, O, { r: 3 }); Figures.dot(ctx, P, { r: 4, fill: Geo.ink() }); Figures.label(ctx, P, "P", { dy: -12 });
      pts.forEach((pt) => Figures.dot(ctx, pt, { r: 4, fill: Geo.orange() }));
      if (local > 0.9 && pts.length) {
        Figures.line(ctx, O, pts[0], { stroke: Geo.green(), lw: 2 });
        arcAngleGlobal(ctx, pts[0], O, P, Geo.purple(), 18);
      }
      let caption;
      if (prog < 0.05) caption = "Секущая из P пересекает окружность в двух точках";
      else if (prog < 0.9) caption = "Поворачиваем — точки пересечения сближаются…";
      else caption = "…слились в одну: это касательная, и радиус к ней перпендикулярен (90°)";
      Figures.wrapText(ctx, caption, w / 2, h * 0.06, w * 0.94, { color: Geo.ink(), font: "700 13px Rubik, sans-serif" });
    }
    return {
      play() { playing = true; t0 = null; prog = 0; },
      reset() { playing = false; prog = 0; },
      step(ts) {
        if (!playing) return true;
        if (t0 == null) t0 = ts;
        prog = Geo.clamp((ts - t0) / 3000, 0, 1);
        if (prog >= 1) playing = false;
        return !playing;
      },
      draw,
    };
  },

  /* --- Теорема косинусов: угол при C качается от острого через прямой к тупому при
     ФИКСИРОВАННЫХ длинах сторон CB=a, CA=b. c² по формуле сверяется с c² напрямую по
     координатам на каждом кадре — проверено: расхождение 0.000000 на всём диапазоне,
     и точное совпадение с a²+b² ровно в момент, когда угол становится прямым. */
  lawCosSweep(ctx, canvas, w, h) {
    const C = { x: w * 0.22, y: h * 0.8 };
    const aLen = Math.min(w, h) * 0.5, bLen = Math.min(w, h) * 0.36;
    const B = { x: C.x + aLen, y: C.y };
    let t0 = null, prog = 0, playing = false;
    function draw() {
      Figures.drawBase(ctx, w, h);
      const thetaDeg = 25 + 130 * prog; // от 25° до 155°, проходя через 90°
      const theta = thetaDeg * Math.PI / 180;
      const A = { x: C.x + bLen * Math.cos(theta), y: C.y - bLen * Math.sin(theta) };
      Figures.poly(ctx, [A, B, C], { fill: "rgba(91,107,214,0.10)", stroke: Geo.blue() });
      const isRight = Math.abs(thetaDeg - 90) < 2;
      if (isRight) { ctx.strokeStyle = Geo.green(); ctx.lineWidth = 1.5; ctx.strokeRect(C.x - 12, C.y - 12, 12, 12); }
      else arcAngleGlobal(ctx, C, A, B, Geo.purple(), 20);
      [["A", A], ["B", B], ["C", C]].forEach(([nm, p]) => Figures.label(ctx, p, nm, { dy: p.y < h / 2 ? -12 : 16, color: Geo.ink() }));
      const c2 = Geo.dist(A, B) ** 2, formula = (aLen / Geo.UNIT) ** 2 + (bLen / Geo.UNIT) ** 2 - 2 * (aLen / Geo.UNIT) * (bLen / Geo.UNIT) * Math.cos(theta);
      const capt1 = `∠C=${Geo.fmt(thetaDeg)}°   c²(по координатам)=${Geo.fmt(c2)}   формула=${Geo.fmt(formula)}`;
      Figures.wrapText(ctx, capt1, w / 2, h * 0.06, w * 0.94, { color: Geo.ink(), font: "700 12.5px Rubik, sans-serif" });
      const capt2 = isRight ? "∠C=90° — это ровно теорема Пифагора: c²=a²+b²" : (thetaDeg < 90 ? "Острый угол: c² меньше a²+b²" : "Тупой угол: c² больше a²+b²");
      Figures.wrapText(ctx, capt2, w / 2, h * 0.94, w * 0.94, { color: isRight ? Geo.green() : Geo.ink() });
    }
    return {
      play() { playing = true; t0 = null; prog = 0; },
      reset() { playing = false; prog = 0; },
      step(ts) {
        if (!playing) return true;
        if (t0 == null) t0 = ts;
        prog = Geo.clamp((ts - t0) / 4000, 0, 1);
        if (prog >= 1) playing = false;
        return !playing;
      },
      draw,
    };
  },

  /* --- Скалярное произведение: вектор b вращается вокруг общего начала с a. Знак
     a·b виден живьём — переходит через ноль ровно на 90° (проверено: cos90°≈6e-17,
     ноль с точностью до погрешности плавающей точки). */
  dotSweep(ctx, canvas, w, h) {
    const O = { x: w * 0.28, y: h * 0.75 };
    const angA = -25 * Math.PI / 180, la = Math.min(w, h) * 0.4;
    const A = { x: O.x + la * Math.cos(angA), y: O.y + la * Math.sin(angA) };
    const lb = Math.min(w, h) * 0.32;
    let t0 = null, prog = 0, playing = false;
    function arrow(p1, p2, color) {
      Figures.line(ctx, p1, p2, { stroke: color, lw: 2.5 });
      const ang = Math.atan2(p2.y - p1.y, p2.x - p1.x), s = 10;
      ctx.beginPath(); ctx.moveTo(p2.x, p2.y);
      ctx.lineTo(p2.x - s * Math.cos(ang - 0.4), p2.y - s * Math.sin(ang - 0.4));
      ctx.lineTo(p2.x - s * Math.cos(ang + 0.4), p2.y - s * Math.sin(ang + 0.4));
      ctx.closePath(); ctx.fillStyle = color; ctx.fill();
    }
    function draw() {
      Figures.drawBase(ctx, w, h);
      const deltaDeg = prog * 180;
      const angB = angA - deltaDeg * Math.PI / 180; // вращаем вверх (экранный минус = математический плюс)
      const B = { x: O.x + lb * Math.cos(angB), y: O.y + lb * Math.sin(angB) };
      arrow(O, A, Geo.blue()); arrow(O, B, Geo.orange());
      Figures.label(ctx, A, "a", { color: Geo.blue(), dy: -10 });
      Figures.label(ctx, B, "b", { color: Geo.orange(), dy: -10 });
      const isPerp = Math.abs(deltaDeg - 90) < 1.5;
      if (isPerp) { const mid = { x: O.x + 14 * Math.cos((angA + angB) / 2), y: O.y + 14 * Math.sin((angA + angB) / 2) }; ctx.strokeStyle = Geo.green(); ctx.strokeRect(O.x + 10 * Math.cos(angB), O.y + 10 * Math.sin(angB), 1, 1); arcAngleGlobal(ctx, O, A, B, Geo.green(), 18); }
      else arcAngleGlobal(ctx, O, A, B, Geo.purple(), 18);
      const laU = la / Geo.UNIT, lbU = lb / Geo.UNIT;
      const dot = laU * lbU * Math.cos(deltaDeg * Math.PI / 180);
      const sign = dot > 0.05 ? "острый угол, a·b > 0" : dot < -0.05 ? "тупой угол, a·b < 0" : "перпендикулярны, a·b = 0";
      Figures.wrapText(ctx, `θ=${Geo.fmt(deltaDeg)}°   a·b=${Geo.fmt(dot)}   (${sign})`, w / 2, h * 0.06, w * 0.94, { color: isPerp ? Geo.green() : Geo.ink(), font: "700 13px Rubik, sans-serif" });
    }
    return {
      play() { playing = true; t0 = null; prog = 0; },
      reset() { playing = false; prog = 0; },
      step(ts) {
        if (!playing) return true;
        if (t0 == null) t0 = ts;
        prog = Geo.clamp((ts - t0) / 3600, 0, 1);
        if (prog >= 1) playing = false;
        return !playing;
      },
      draw,
    };
  },

  /* --- Теорема синусов: A скользит по дуге окружности (B, C фиксированы, задают
     сторону a=BC). Отношение a/sinA сверяется с 2R на каждом кадре — проверено:
     200.000=2R точно на всём диапазоне A=10°..160°. */
  lawSinSweep(ctx, canvas, w, h) {
    const cx = w * 0.5, cy = h * 0.56, R = Math.min(w, h) * 0.32;
    const angB = 200 * Math.PI / 180, angC = 340 * Math.PI / 180;
    const O = { x: cx, y: cy };
    const B = { x: cx + R * Math.cos(angB), y: cy + R * Math.sin(angB) };
    const C = { x: cx + R * Math.cos(angC), y: cy + R * Math.sin(angC) };
    let t0 = null, prog = 0, playing = false;
    function draw() {
      Figures.drawBase(ctx, w, h);
      ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.strokeStyle = Geo.ink(); ctx.lineWidth = 1; ctx.globalAlpha = 0.4; ctx.stroke(); ctx.globalAlpha = 1;
      const angA = (10 + 150 * prog) * Math.PI / 180;
      const A = { x: cx + R * Math.cos(angA), y: cy + R * Math.sin(angA) };
      Figures.poly(ctx, [A, B, C], { fill: "rgba(91,107,214,0.08)", stroke: Geo.blue() });
      Figures.line(ctx, O, B, { stroke: Geo.periwinkle(), lw: 1, dash: [3, 3] });
      Figures.line(ctx, O, C, { stroke: Geo.periwinkle(), lw: 1, dash: [3, 3] });
      Figures.dot(ctx, O, { r: 3 });
      [["A", A], ["B", B], ["C", C]].forEach(([nm, p]) => Figures.label(ctx, p, nm, { dy: -12, color: Geo.ink() }));
      const a = Geo.dist(B, C), angADeg = Geo.angleDeg(A, B, C);
      const ratio = a / Math.sin(angADeg * Math.PI / 180), twoR = 2 * (R / Geo.UNIT);
      Figures.wrapText(ctx, `a/sinA = ${Geo.fmt(ratio)}   2R = ${Geo.fmt(twoR)} — совпадают на любом положении A`, w / 2, h * 0.06, w * 0.94, { color: Geo.ink(), font: "700 12.5px Rubik, sans-serif" });
    }
    return {
      play() { playing = true; t0 = null; prog = 0; },
      reset() { playing = false; prog = 0; },
      step(ts) {
        if (!playing) return true;
        if (t0 == null) t0 = ts;
        prog = Geo.clamp((ts - t0) / 3600, 0, 1);
        if (prog >= 1) playing = false;
        return !playing;
      },
      draw,
    };
  },

  /* --- Прямая Эйлера, в движении: C скользит по дуге, а A и B фиксированы. G, O, H
     пересчитываются каждый кадр — отклонение центроида от прямой O-H проверено:
     0.000000 на полном обороте C (не просто в одной статичной позиции). */
  eulerSweep(ctx, canvas, w, h) {
    const A = { x: w * 0.5, y: h * 0.16 }, B = { x: w * 0.16, y: h * 0.55 };
    const orbitCx = w * 0.62, orbitCy = h * 0.55, orbitR = Math.min(w, h) * 0.2;
    function perpBisectorLine(P, Q) { const M = Geo.midpoint(P, Q); const dx = Q.x - P.x, dy = Q.y - P.y; return [{ x: M.x - dy, y: M.y + dx }, { x: M.x + dy, y: M.y - dx }]; }
    function altitudeLine(V, P, Q) { const dx = Q.x - P.x, dy = Q.y - P.y; return [{ x: V.x - dy, y: V.y + dx }, { x: V.x + dy, y: V.y - dx }]; }
    let t0 = null, prog = 0, playing = false;
    function draw() {
      Figures.drawBase(ctx, w, h);
      const C = { x: orbitCx + orbitR * Math.cos(prog * 2 * Math.PI), y: orbitCy + orbitR * Math.sin(prog * 2 * Math.PI) };
      ctx.beginPath(); ctx.arc(orbitCx, orbitCy, orbitR, 0, Math.PI * 2); ctx.strokeStyle = Geo.ink(); ctx.lineWidth = 1; ctx.globalAlpha = 0.25; ctx.stroke(); ctx.globalAlpha = 1;
      Figures.poly(ctx, [A, B, C], { fill: "rgba(91,107,214,0.06)" });
      [["A", A], ["B", B], ["C", C]].forEach(([nm, p]) => Figures.dot(ctx, p, { r: 3 }));
      const G = { x: (A.x + B.x + C.x) / 3, y: (A.y + B.y + C.y) / 3 };
      const [p1a, p1b] = perpBisectorLine(A, B), [p2a, p2b] = perpBisectorLine(B, C);
      const O = Geo.lineIntersect(p1a, p1b, p2a, p2b);
      const [a1, a2] = altitudeLine(A, B, C), [b1, b2] = altitudeLine(B, A, C);
      const H = Geo.lineIntersect(a1, a2, b1, b2);
      let devText = "";
      if (O && H) {
        const dx = H.x - O.x, dy = H.y - O.y, lineLen = Math.hypot(dx, dy);
        Figures.line(ctx, { x: O.x - dx * 0.3, y: O.y - dy * 0.3 }, { x: H.x + dx * 0.3, y: H.y + dy * 0.3 }, { stroke: Geo.ink(), lw: 1.5, dash: [5, 5] });
        Figures.dot(ctx, G, { r: 5, fill: Geo.green() }); Figures.dot(ctx, O, { r: 5, fill: Geo.blue() }); Figures.dot(ctx, H, { r: 5, fill: Geo.orange() });
        const cross = lineLen > 1e-6 ? Math.abs((G.x - O.x) * dy - (G.y - O.y) * dx) / lineLen / Geo.UNIT : 0;
        devText = `G, O, H — отклонение от общей прямой: ${Geo.fmt(cross)} (≈0 при любом положении C)`;
      }
      Figures.wrapText(ctx, devText, w / 2, h * 0.94, w * 0.96, { color: Geo.ink() });
      Figures.wrapText(ctx, "C движется по дуге — G, O, H пересчитываются, но остаются на одной прямой", w / 2, h * 0.06, w * 0.94, { color: Geo.ink(), font: "700 13px Rubik, sans-serif" });
    }
    return {
      play() { playing = true; t0 = null; prog = 0; },
      reset() { playing = false; prog = 0; },
      step(ts) {
        if (!playing) return true;
        if (t0 == null) t0 = ts;
        prog = Geo.clamp((ts - t0) / 6000, 0, 1);
        if (prog >= 1) playing = false;
        return !playing;
      },
      draw,
    };
  },
};

</script>
<script>
/* tasks.js — рендер и проверка заданий: choice / input / explore / build / error / match / proof / proofSteps */
const TYPE_LABEL = { choice: "Выбор ответа", input: "Введи число", explore: "Исследование", build: "Построение", error: "Найди ошибку", match: "Соотнеси", proof: "Докажи", proofSteps: "Собери доказательство" };
const TYPE_ICO = { choice: "🎯", input: "🔢", explore: "🔬", build: "📐", error: "🕵️", match: "🔗", proof: "🧠", proofSteps: "🧩" };
const DIFF_STARS = { easy: "★☆☆", medium: "★★☆", hard: "★★★" };

const Tasks = {
  render(task, topicId, ui) {
    const done = State.taskDone(task.id, topicId);
    const fb = ui.taskFb && ui.taskFb[task.id];
    const diff = task.difficulty ? `<span class="task-diff" title="Сложность">${DIFF_STARS[task.difficulty] || ""}</span>` : "";
    const head = `<div class="task-head"><span class="task-type">${TYPE_ICO[task.type]} ${TYPE_LABEL[task.type]}</span>${diff}${done ? '<span class="task-done">✓ выполнено</span>' : ""}</div>`;
    const q = `<div class="task-q">${esc2(task.q)}</div>`;
    let body = "";
    if (task.type === "choice" || task.type === "proof") {
      body = `<div class="task-opts">${(task.options || []).map((op, i) => {
        let cls = "task-opt", icon = "";
        if (fb) {
          if (i === task.correct) { cls += " opt-correct"; icon = '<span class="opt-icon">✓</span>'; }
          else if (i === fb.choice) { cls += " opt-wrong"; icon = '<span class="opt-icon">✗</span>'; }
        }
        return `<button class="${cls}" data-act="task-choice" data-task="${task.id}" data-topic="${topicId}" data-idx="${i}" ${fb ? "disabled" : ""}>${icon}${esc2(op)}</button>`;
      }).join("")}</div>
        ${fb ? `<div class="task-fb ${fb.correct ? "fb-ok" : "fb-bad"}" role="status">${fb.correct ? "Верно! ✅" : "Неверно — правильный ответ отмечен ✓"}</div>` : ""}`;
    } else if (task.type === "input") {
      body = `${task.figure ? `<div class="task-figure" data-figure='${JSON.stringify(task.figure)}'></div>` : ""}
        <div class="task-input-row">
          <input type="text" inputmode="decimal" class="task-input ${fb && !fb.correct ? "input-wrong" : ""}" data-task="${task.id}" placeholder="Ответ${task.unit ? " (" + task.unit + ")" : ""}" ${fb && fb.correct ? "disabled" : ""} value="${fb ? esc2(fb.val || "") : ""}">
          <button class="btn btn-primary btn-sm" data-act="task-input" data-task="${task.id}" data-topic="${topicId}">Проверить</button>
        </div>
        ${fb ? `<div class="task-fb ${fb.correct ? "fb-ok" : "fb-bad"}" role="status">${fb.correct ? "Верно! ✅" : "Пока не так, попробуй ещё раз"}</div>` : ""}`;
    } else if (task.type === "error") {
      body = `<div class="task-figure" data-figure='${JSON.stringify(task.figure || { type: "triangle" })}'></div>
        <div class="task-labels">${(task.labels || []).map((l, i) => {
          let cls = "task-label", icon = "";
          if (fb) {
            if (l.wrong) { cls += " opt-correct"; icon = '<span class="opt-icon">✓</span>'; }
            else if (i === fb.choice && !l.wrong) { cls += " opt-wrong"; icon = '<span class="opt-icon">✗</span>'; }
          }
          return `<button class="${cls}" data-act="task-error" data-task="${task.id}" data-topic="${topicId}" data-idx="${i}" ${fb ? "disabled" : ""}>${icon}${esc2(l.text)}</button>`;
        }).join("")}</div>
        ${fb ? `<div class="task-fb ${fb.correct ? "fb-ok" : "fb-bad"}" role="status">${fb.correct ? "Точно, это и есть ошибка! ✅" : "Это утверждение верное — ищи другое"}</div>` : ""}`;
    } else if (task.type === "explore") {
      const note = State.data.exploreNotes[task.id] || "";
      const predictNote = State.data.exploreNotes[task.id + "_predict"] || "";
      body = `<div class="predict-box">
          <div class="predict-label">🔮 Прежде чем двигать фигуру — запиши, как думаешь, что произойдёт:</div>
          <textarea class="task-predict" data-task="${task.id}" placeholder="Моё предположение…">${esc2(predictNote)}</textarea>
        </div>
        <div class="task-figure" data-figure='${JSON.stringify(task.figure || { type: "triangle" })}'></div>
        ${task.hints ? `<details class="task-hints"><summary>💡 Подсказки</summary><ul>${task.hints.map((hnt) => `<li>${esc2(hnt)}</li>`).join("")}</ul></details>` : ""}
