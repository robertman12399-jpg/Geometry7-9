<title>Интерактивная геометрия</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
/* style.css — «Интерактивная геометрия» */
:root {
  --bg: #f3f4fb;
  --panel: #ffffff;
  --ink: #1b1f3b;
  --ink-soft: #565c8a;
  --primary: #5b6bd6;
  --primary-dark: #3a4bcf;
  --accent: #ff9f43;
  --good: #2ecc71;
  --good-dark: #199a53;
  --bad: #e6572e;
  --border: #e1e3f5;
  --radius: 16px;
  --font-display: "Russo One", "Rubik", sans-serif;
  --font-body: "Rubik", sans-serif;
}
[data-theme="dark"] {
  --bg: #0f1226;
  --panel: #171a38;
  --ink: #eef0ff;
  --ink-soft: #a4a9df;
  --border: #2b2f5c;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  line-height: 1.5;
  min-height: 100vh;
}
h1, h2, h3 { font-family: var(--font-display); font-weight: 400; letter-spacing: 0.2px; margin: 0 0 8px; }
h2 { font-size: clamp(20px, 4vw, 28px); }
h3 { font-size: clamp(16px, 3vw, 19px); }
p { margin: 0 0 10px; color: var(--ink-soft); }
ul { margin: 6px 0; padding-left: 20px; color: var(--ink-soft); }
a { color: var(--primary); }

button { font-family: inherit; color: inherit; }
input, select, textarea { font-family: inherit; color: inherit; }
:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }

.app-wrap { max-width: 760px; margin: 0 auto; padding: 14px 14px 60px; }

/* ---------- кнопки ---------- */
.btn {
  border: none; border-radius: 12px; padding: 12px 18px; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: transform 0.12s ease, opacity 0.12s ease; display: inline-flex; align-items: center; gap: 6px;
}
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn:disabled:active { transform: none; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-gold { background: linear-gradient(135deg, var(--accent), #ffb066); color: #402400; }
.btn-ghost { background: var(--panel); color: var(--ink); border: 1px solid var(--border); }
.btn-sm { padding: 8px 12px; font-size: 13px; }

/* ---------- шапка / прогресс ---------- */
.hud {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 10px 16px; margin-bottom: 10px; position: sticky; top: 8px; z-index: 5;
}
.hud-hero { font-weight: 600; }
.hud-progress { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 120px; }
.hud-bar { flex: 1; height: 8px; background: var(--border); border-radius: 6px; overflow: hidden; }
.hud-bar.sm { height: 6px; width: 100px; display: inline-block; }
.hud-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 6px; transition: width 0.4s ease; }
.hud-xp { font-weight: 700; color: var(--accent); }

.nav-tabs { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 12px; padding-bottom: 4px; }
.nav-tab {
  background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 9px 13px;
  font-size: 13px; font-weight: 600; color: var(--ink-soft); cursor: pointer; white-space: nowrap;
}
.nav-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* ---------- панели / карточки ---------- */
.panel { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
.dash-hero { background: linear-gradient(135deg, rgba(91,107,214,0.10), rgba(255,159,67,0.10)); }

.grade-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 14px; }
.grade-card {
  background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px;
  text-align: left; cursor: pointer; display: flex; flex-direction: column; gap: 4px;
}
.grade-card:hover { border-color: var(--primary); }
.gc-ico { font-size: 26px; }
.gc-title { font-weight: 700; }
.gc-sub { color: var(--ink-soft); font-size: 13px; }

.ach-row { display: flex; flex-wrap: wrap; gap: 8px; }
.ach-badge { display: flex; align-items: center; gap: 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 999px; padding: 6px 12px; font-size: 12px; opacity: 0.4; }
.ach-badge.got { opacity: 1; border-color: var(--accent); }

.mq-top {
  display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap;
  position: sticky; top: 60px; z-index: 4; background: var(--bg); padding: 8px 0; margin-bottom: 6px;
}
.mq-badge { font-size: 12px; font-weight: 700; color: var(--good-dark); background: rgba(46,204,113,0.15); padding: 4px 10px; border-radius: 999px; }

.scroll-top-btn {
  position: fixed; right: 16px; bottom: 22px; width: 46px; height: 46px; border-radius: 50%;
  background: var(--primary); color: #fff; border: none; box-shadow: 0 4px 14px rgba(20,20,60,0.28);
  font-size: 20px; line-height: 1; display: flex; align-items: center; justify-content: center;
  cursor: pointer; opacity: 0; pointer-events: none; transform: translateY(8px);
  transition: opacity 0.2s ease, transform 0.2s ease; z-index: 30;
}
.scroll-top-btn.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
.scroll-top-btn:active { transform: scale(0.94); }

.topic-list { display: flex; flex-direction: column; gap: 8px; }
.chapter-cards { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
.chapter-cta-row { display: flex; gap: 10px; flex-wrap: wrap; }
.chapter-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; text-align: left; cursor: pointer; display: flex; flex-direction: column; gap: 8px; }
.chapter-card:hover { border-color: var(--primary); }
.cc-title { font-weight: 700; }
.cc-progress { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-soft); }
.cc-progress .hud-bar { flex: 1; }
.topic-row {
  display: flex; align-items: center; gap: 10px; background: var(--panel); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 14px; cursor: pointer; text-align: left; width: 100%;
}
.topic-row.done { border-color: var(--good); }
.topic-ico { font-size: 20px; }
.topic-title { flex: 1; font-weight: 600; }
.topic-st { font-size: 13px; color: var(--ink-soft); font-weight: 700; }

.theory-block p { color: var(--ink); }
.formula-box { background: rgba(91,107,214,0.10); border: 1px dashed var(--primary); border-radius: 12px; padding: 10px 14px; font-weight: 700; margin-bottom: 12px; }
.remember-box { background: rgba(255,159,67,0.10); border-radius: 12px; padding: 10px 14px; margin-bottom: 12px; }
.remember-box ul { color: var(--ink); }
.example-box { background: rgba(46,204,113,0.08); border: 1px solid rgba(46,204,113,0.3); border-radius: 12px; padding: 12px 14px; margin-bottom: 14px; }
.example-h { font-weight: 700; color: var(--good-dark); margin-bottom: 6px; }
.example-q { font-weight: 600; margin-bottom: 6px; }
.example-steps { margin: 0; padding-left: 20px; color: var(--ink); }
.example-steps li { margin-bottom: 4px; }
.review-item { border-bottom: 1px solid var(--border); padding: 8px 0; font-size: 14px; }
.review-item summary { cursor: pointer; font-weight: 600; }
.review-a { margin-top: 6px; color: var(--ink-soft); }

/* ---------- чертежи (canvas) ---------- */
.fig-mount, .task-figure { margin: 10px 0 14px; }
.fig-error { padding: 20px; text-align: center; color: var(--ink-soft); background: var(--panel); border: 1px dashed var(--border); border-radius: var(--radius); font-size: 13px; }
.fig-wrap { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; }
.fig-canvas { width: 100%; height: auto; touch-action: none; border-radius: 10px; background: #fdfdff; cursor: grab; }
[data-theme="dark"] .fig-canvas { background: #10142c; }
.fig-controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 8px; font-size: 13px; }
.fig-chk { display: flex; align-items: center; gap: 5px; cursor: pointer; }
.fig-select { border-radius: 8px; border: 1px solid var(--border); padding: 5px 8px; background: var(--panel); color: var(--ink); }

.fd-toolbar { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.fd-tool {
  width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--border); background: var(--panel);
  color: var(--ink); font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.fd-tool.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.fd-finish, .fd-undo, .fd-clear {
  border-radius: 10px; border: 1px solid var(--border); background: var(--panel); color: var(--ink);
  font-size: 13px; font-weight: 600; padding: 0 12px; height: 40px; cursor: pointer;
}
.fd-finish { background: rgba(46,204,113,0.15); border-color: var(--good); color: var(--good-dark); }
.fd-hint { font-size: 12px; color: var(--ink-soft); margin-top: 6px; }

/* ---------- задания ---------- */
.task-list { display: flex; flex-direction: column; gap: 12px; }
.task-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.task-card-done { border-color: var(--good); }
.task-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.task-type { font-size: 12px; font-weight: 700; color: var(--ink-soft); }
.task-diff { font-size: 11px; color: var(--accent); margin-left: 6px; letter-spacing: 1px; }
.task-done { font-size: 12px; font-weight: 700; color: var(--good-dark); }
.task-q { font-weight: 600; margin-bottom: 10px; }
.task-opts { display: flex; flex-direction: column; gap: 8px; }
.task-opt, .task-label {
  background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px;
  text-align: left; cursor: pointer; font-size: 14px;
}
.task-opt.opt-correct, .task-label.opt-correct { border-color: var(--good); background: rgba(46,204,113,0.14); }
.task-opt.opt-wrong, .task-label.opt-wrong { border-color: var(--bad); background: rgba(230,87,46,0.14); }
.opt-icon { display: inline-block; width: 18px; font-weight: 900; margin-right: 6px; }
.opt-correct .opt-icon { color: var(--good-dark); }
.opt-wrong .opt-icon { color: var(--bad); }
.task-input-row { display: flex; gap: 8px; flex-wrap: wrap; }
.task-input { flex: 1; min-width: 140px; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--ink); font-size: 14px; }
.task-fb { margin-top: 8px; font-weight: 700; font-size: 13px; }
.fb-ok { color: var(--good-dark); }
.fb-bad { color: var(--bad); }
.task-labels { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
.task-hints { margin: 8px 0; font-size: 13px; color: var(--ink-soft); }
.task-note { width: 100%; min-height: 70px; border-radius: 10px; border: 1px solid var(--border); padding: 10px; font-family: inherit; background: var(--bg); color: var(--ink); margin-bottom: 8px; }
.task-explain { margin-top: 10px; padding: 10px 12px; background: rgba(255,159,67,0.10); border-radius: 10px; font-size: 13px; color: var(--ink); }
.match-rows { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
.match-row { display: flex; align-items: center; gap: 10px; justify-content: space-between; }
.match-left { flex: 1; font-size: 14px; }
.match-select { min-width: 130px; padding: 8px 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--ink); font-size: 13px; }
.match-select.match-ok { border-color: var(--good); }
.match-select.match-bad { border-color: var(--bad); }
.match-hint { font-size: 12px; color: var(--good-dark); white-space: nowrap; }

/* ---------- экзамен ---------- */
.exam-top { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 10px; }
.exam-timer { color: var(--accent); }

/* ---------- учитель ---------- */
.teacher-table { width: 100%; border-collapse: collapse; }
.teacher-table th, .teacher-table td { text-align: left; padding: 8px 6px; border-bottom: 1px solid var(--border); font-size: 13px; }

/* ---------- справочник ---------- */
.ref-row { border-bottom: 1px solid var(--border); padding: 10px 0; }
.ref-row:last-child { border-bottom: none; }
.ref-formula { background: none; border: none; color: var(--ink); text-align: left; cursor: pointer; font-size: 14px; padding: 0; display: block; margin-bottom: 6px; }
.ref-formula:hover { color: var(--primary); }

/* ---------- создание героя ---------- */
.creation { max-width: 480px; margin: 40px auto; text-align: center; padding: 0 14px; }
.creation-hero { font-size: 40px; margin-bottom: 6px; }
.creation-sub { margin-bottom: 18px; }
.creation-form { display: flex; flex-direction: column; gap: 12px; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
.grade-pick { display: flex; align-items: center; gap: 8px; justify-content: center; }
.creation-hint { font-size: 12px; color: var(--ink-soft); margin: 0; }
.grade-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* ---------- тосты ---------- */
#toasts { position: fixed; top: 16px; right: 16px; z-index: 50; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px;
  box-shadow: 0 8px 24px rgba(20,20,50,0.15); display: flex; gap: 8px; align-items: center; font-size: 13px; font-weight: 600;
  animation: toast-in 0.25s ease;
}
.toast.out { opacity: 0; transform: translateX(20px); transition: all 0.3s ease; }
@keyframes toast-in { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

@media (prefers-reduced-motion: reduce) {
  .hud-fill, .toast, .scroll-top-btn { transition: none; animation: none; }
}

@media (max-width: 480px) {
  .app-wrap { padding: 10px 8px 50px; }
  .hud { flex-direction: row; flex-wrap: wrap; }
}

</style>
</head>
<body>
<div class="app-wrap"><div id="app"></div></div>
<script>
/* config.js — базовые константы приложения */
const APP = {
  name: "Интерактивная геометрия",
  version: "1.0.0",
  storageKey: "geomrpg_save_v1",
  taskXP: { choice: 10, input: 12, build: 18, explore: 15, error: 12, match: 14 },
  examMinutes: 10,
  examQuestions: 12,
};

</script>
<script>
/* data.js — весь учебный контент: темы, задания, теоремы, достижения */
/* Вспомогательная функция для параметрической генерации заданий (task.generate) —
   даёт случайное целое в диапазоне [min,max] включительно. */
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

const GAME = {

  worlds: [
    { id: "w7", grade: 7, title: "Основы", ico: "📐" },
    { id: "w8", grade: 8, title: "Теоремы", ico: "🧩" },
    { id: "w9", grade: 9, title: "Тригонометрия и векторы", ico: "🧭" },
  ],

  /* Главы точно по учебнику: Атанасян Л.С. и др. «Геометрия. 7—9 классы».
     Наполняем содержимым постепенно, по главам — раздел за разделом.
     У тем, ещё не привязанных к главе, стоит chapter: "misc" (см. ниже, временный раздел). */
  chapters: [
    { id: "g7_ch1", grade: 7, order: 1, title: "Глава I. Начальные геометрические сведения",
      review: [
        { q: "Сколько прямых можно провести через две точки?", a: "Ровно одну — это основное свойство прямой." },
        { q: "Чем отличается луч от отрезка?", a: "У луча есть начало, но нет конца; у отрезка есть два конца (начало и конец)." },
        { q: "Что такое биссектриса угла?", a: "Луч из вершины угла, делящий его на два равных угла." },
        { q: "Как связаны AB, BC и AC, если точка B лежит между A и C?", a: "AC = AB + BC — длина отрезка равна сумме длин его частей." },
        { q: "Чему равен развёрнутый угол? А прямой?", a: "Развёрнутый угол — 180°, прямой угол — 90°." },
        { q: "Чем отличаются смежные углы от вертикальных?", a: "Смежные углы имеют общую сторону и в сумме дают 180°; вертикальные — стороны одного являются продолжением сторон другого, и они равны между собой." },
      ] },
    { id: "g7_ch2", grade: 7, order: 2, title: "Глава II. Треугольники",
      review: [
        { q: "Что нужно, чтобы два треугольника были равны по первому признаку?", a: "Две стороны и угол между ними должны быть соответственно равны (СУС)." },
        { q: "Чем отличается медиана от биссектрисы и высоты?", a: "Медиана идёт к середине стороны, биссектриса делит угол пополам, высота — перпендикуляр к противоположной стороне." },
        { q: "Какое свойство углов равнобедренного треугольника?", a: "Углы при основании равны между собой." },
        { q: "Назови все три признака равенства треугольников.", a: "По двум сторонам и углу между ними (I), по стороне и двум прилежащим углам (II), по трём сторонам (III)." },
        { q: "Чем хорда отличается от диаметра?", a: "Диаметр — это хорда, проходящая через центр окружности; обычная хорда может не проходить через центр." },
      ] },
    { id: "g7_ch3", grade: 7, order: 3, title: "Глава III. Параллельные прямые",
      review: [
        { q: "Что значит, что две прямые параллельны?", a: "Они лежат в одной плоскости и не пересекаются, сколько бы их ни продолжать." },
        { q: "Назови три признака параллельности прямых по углам с секущей.", a: "Равенство накрест лежащих углов, равенство соответственных углов, сумма односторонних углов равна 180°." },
        { q: "Что такое аксиома?", a: "Утверждение, которое принимается без доказательства и лежит в основе теории." },
        { q: "Сформулируй аксиому параллельных прямых.", a: "Через точку, не лежащую на данной прямой, можно провести только одну прямую, параллельную данной." },
        { q: "Чем отличаются признаки параллельности от свойств параллельных прямых?", a: "Признаки — это условия, по которым МОЖНО установить параллельность (от углов к параллельности); свойства — это следствия ИЗ параллельности (от параллельности к углам)." },
      ] },
    { id: "g7_ch4", grade: 7, order: 4, title: "Глава IV. Соотношения между сторонами и углами треугольника",

<script>
/* shapes.js — интерактивные чертежи на Canvas: перетаскивание точек, живые метрики */
const Geo = {
  UNIT: 40, // px на условную единицу длины
  dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y) / this.UNIT; },
  distPx(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); },
  angleDeg(vertex, p1, p2) {
    const v1 = { x: p1.x - vertex.x, y: p1.y - vertex.y };
    const v2 = { x: p2.x - vertex.x, y: p2.y - vertex.y };
    const dot = v1.x * v2.x + v1.y * v2.y;
    const m1 = Math.hypot(v1.x, v1.y), m2 = Math.hypot(v2.x, v2.y);
    if (m1 < 1e-6 || m2 < 1e-6) return 0;
    let c = dot / (m1 * m2);
    c = Math.max(-1, Math.min(1, c));
    return Math.acos(c) * 180 / Math.PI;
  },
  areaShoelace(pts) {
    let s = 0;
    for (let i = 0; i < pts.length; i++) {
      const p1 = pts[i], p2 = pts[(i + 1) % pts.length];
      s += p1.x * p2.y - p2.x * p1.y;
    }
    return Math.abs(s) / 2 / (this.UNIT * this.UNIT);
  },
  midpoint(a, b) { return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 }; },
  fmt(n) { return (Math.round(n * 100) / 100).toString().replace(".", ","); },
  clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); },
  isDark() {
    return typeof document !== "undefined" && document.documentElement.getAttribute("data-theme") === "dark";
  },
  ink() { return this.isDark() ? "#eef0ff" : "#1b1f3b"; },
  dotFill() { return this.isDark() ? "#aab4ff" : "#2b3a8f"; },
  /* Направление дуги (anticlockwise-флаг для ctx.arc), чтобы дуга всегда
     шла по МЕНЬШЕЙ (внутренней) стороне угла между двумя лучами, а не по большей. */
  arcSweep(a1, a2) {
    let d = a2 - a1;
    d = ((d % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
    return d > Math.PI;
  },
  /* Пересечение двух бесконечных прямых p1p2 и p3p4 (для ортоцентра и т.п.) */
  lineIntersect(p1, p2, p3, p4) {
    const d1x = p2.x - p1.x, d1y = p2.y - p1.y;
    const d2x = p4.x - p3.x, d2y = p4.y - p3.y;
    const denom = d1x * d2y - d1y * d2x;
    if (Math.abs(denom) < 1e-9) return null;
    const t = ((p3.x - p1.x) * d2y - (p3.y - p1.y) * d2x) / denom;
    return { x: p1.x + t * d1x, y: p1.y + t * d1y };
  },
};

const Figures = {
  active: null,

  /* Универсальное подключение перетаскивания точек к canvas */
  wireDrag(canvas, points, onMove) {
    let dragIdx = -1;
    const rectOf = () => canvas.getBoundingClientRect();
    const posFromEvt = (e) => {
      const r = rectOf();
      const cx = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
      const cy = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
      return { x: cx * (canvas.width / r.width), y: cy * (canvas.height / r.height) };
    };
    const findNear = (p) => {
      let best = -1, bd = 26 * 26;
      points.forEach((pt, i) => {
        if (pt.fixed) return;
        const d = (pt.x - p.x) ** 2 + (pt.y - p.y) ** 2;
        if (d < bd) { bd = d; best = i; }
      });
      return best;
    };
    const down = (e) => {
      const p = posFromEvt(e);
      dragIdx = findNear(p);
      if (dragIdx >= 0) e.preventDefault();
    };
    const move = (e) => {
      if (dragIdx < 0) return;
      e.preventDefault();
      const p = posFromEvt(e);
      points[dragIdx].x = Geo.clamp(p.x, 24, canvas.width - 24);
      points[dragIdx].y = Geo.clamp(p.y, 24, canvas.height - 24);
      onMove();
    };
    const up = () => { dragIdx = -1; };
    canvas.addEventListener("mousedown", down);
    canvas.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
    canvas.addEventListener("touchstart", down, { passive: false });
    canvas.addEventListener("touchmove", move, { passive: false });
    window.addEventListener("touchend", up);
    return () => {
      canvas.removeEventListener("mousedown", down);
      canvas.removeEventListener("mousemove", move);
      window.removeEventListener("mouseup", up);
      canvas.removeEventListener("touchstart", down);
      canvas.removeEventListener("touchmove", move);
      window.removeEventListener("touchend", up);
    };
  },

  drawBase(ctx, w, h) {
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = "rgba(120,140,255,0.05)";
    ctx.fillRect(0, 0, w, h);
  },
  poly(ctx, pts, opts) {
    opts = opts || {};
    ctx.beginPath();
    pts.forEach((p, i) => (i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y)));
    ctx.closePath();
    if (opts.fill) { ctx.fillStyle = opts.fill; ctx.fill(); }
    ctx.strokeStyle = opts.stroke || "#5b6bd6";
    ctx.lineWidth = opts.lw || 2.5;
    ctx.stroke();
  },
  line(ctx, a, b, opts) {
    opts = opts || {};
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = opts.stroke || "#5b6bd6"; ctx.lineWidth = opts.lw || 2;
    if (opts.dash) ctx.setLineDash(opts.dash); else ctx.setLineDash([]);
    ctx.stroke(); ctx.setLineDash([]);
  },
  dot(ctx, p, opts) {
    opts = opts || {};
    ctx.beginPath(); ctx.arc(p.x, p.y, opts.r || 7, 0, Math.PI * 2);
    ctx.fillStyle = opts.fill || Geo.dotFill(); ctx.fill();
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
  },
  label(ctx, p, text, opts) {
    opts = opts || {};
    ctx.font = opts.font || "600 14px Rubik, sans-serif";
    ctx.fillStyle = opts.color || Geo.ink();
    ctx.textAlign = opts.align || "center";
    ctx.fillText(text, p.x + (opts.dx || 0), p.y + (opts.dy || 0));
  },
  /* Подпись с переносом по словам: измеряет РЕАЛЬНУЮ ширину текста (ctx.measureText) и
     переносит строки так, чтобы не выходить за maxWidth — иначе длинные подписи на узком
     мобильном canvas обрезаются по краям и становятся невидимы. Возвращает число строк. */
  wrapText(ctx, text, cx, cy, maxWidth, opts) {
    opts = opts || {};
    const font = opts.font || "600 13px Rubik, sans-serif";
    ctx.font = font;
    ctx.fillStyle = opts.color || Geo.ink();
    ctx.textAlign = "center";
    const lineHeight = opts.lineHeight || (parseInt(font, 10) || 13) + 4;
    const words = String(text).split(" ");
    const lines = [];
    let current = "";
    words.forEach((word) => {
      const test = current ? current + " " + word : word;
      if (current && ctx.measureText(test).width > maxWidth) {
        lines.push(current);
        current = word;
      } else {
        current = test;
      }
    });
    if (current) lines.push(current);
    const startY = cy - ((lines.length - 1) * lineHeight) / 2;
    lines.forEach((line, i) => ctx.fillText(line, cx, startY + i * lineHeight));
    return lines.length;
  },
  /* Штрихи-«галочки» равенства сторон (как в учебнике): count штрихов поперёк отрезка в его середине. */
  tickMarks(ctx, p1, p2, count, color) {
    const mid = Geo.midpoint(p1, p2);
    const dx = p2.x - p1.x, dy = p2.y - p1.y;
    const len = Math.hypot(dx, dy) || 1;
    const ux = dx / len, uy = dy / len;
    const nx = -uy, ny = ux;
    const gap = 5, tickLen = 7;
    for (let i = 0; i < count; i++) {
      const off = (i - (count - 1) / 2) * gap;
      const cx = mid.x + ux * off, cy = mid.y + uy * off;
      ctx.beginPath();
      ctx.moveTo(cx - nx * tickLen - ux * tickLen, cy - ny * tickLen - uy * tickLen);
      ctx.lineTo(cx + nx * tickLen + ux * tickLen, cy + ny * tickLen + uy * tickLen);
      ctx.strokeStyle = color || "#c9740f"; ctx.lineWidth = 2; ctx.stroke();
    }
  },
  /* Дуга(и)-«галочка» равенства углов у вершины между двумя сторонами. */
  angleTicks(ctx, vertex, p1, p2, count, color) {
    const a1 = Math.atan2(p1.y - vertex.y, p1.x - vertex.x), a2 = Math.atan2(p2.y - vertex.y, p2.x - vertex.x);
    for (let i = 0; i < count; i++) {
      ctx.beginPath(); ctx.arc(vertex.x, vertex.y, 16 + i * 6, a1, a2, Geo.arcSweep(a1, a2));
      ctx.strokeStyle = color || "#8b5cf6"; ctx.lineWidth = 2; ctx.stroke();
    }
  },

  /* ------------------------------------------------------------------ */
  /* Точка входа: монтирует конкретный тип чертежа в контейнер           */
  /* ------------------------------------------------------------------ */
  mount(container, spec, opts) {
    spec = spec || { type: "triangle" };
    const w = (opts && opts.w) || Math.max(260, Math.min(560, container.clientWidth || 520));
    const h = (opts && opts.h) || 360;
    container.innerHTML = `
      <div class="fig-wrap">
        <canvas class="fig-canvas" width="${w}" height="${h}"></canvas>
        <div class="fig-controls"></div>
      </div>`;
    const canvas = container.querySelector(".fig-canvas");
    const ctrl = container.querySelector(".fig-controls");
    const ctx = canvas.getContext("2d");
    const builder = BUILDERS[spec.type] || BUILDERS.triangle;
    const inst = builder(ctx, canvas, ctrl, spec, w, h);
    inst.render();
    return inst;
  },
};

const BUILDERS = {
  segment(ctx, canvas, ctrl, spec, w, h) {
    const rulerY = h * 0.75;
    let A, B;
    if (spec.withRuler) {
      // «Отрезок на линейке»: A закреплён на нуле, B можно тянуть вдоль линейки —
      // ответ проверяется по текущему положению, а не по «зашитому» числу.
      A = { x: w * 0.15, y: rulerY, fixed: true };
      const lenPx = (spec.fixedLen != null ? spec.fixedLen : 5.5) * Geo.UNIT;
      B = { x: A.x + lenPx, y: rulerY };
    } else {
      A = { x: w * 0.22, y: h * 0.55 };
      B = { x: w * 0.78, y: h * 0.45 };
    }
    const pts = [A, B];
    let unbind;
    function render() {
      if (spec.withRuler) { A.y = rulerY; B.y = rulerY; if (B.x < A.x + Geo.UNIT * 0.3) B.x = A.x + Geo.UNIT * 0.3; }
      Figures.drawBase(ctx, w, h);
      Figures.line(ctx, A, B, { stroke: "#5b6bd6", lw: 3 });
      if (spec.withRuler) {
        // деления линейки — сантиметры, с более длинными штрихами на целых см
        const lenUnits = Geo.dist(A, B);
        const rulerLen = Math.ceil(lenUnits) + 3;
        const start = { x: A.x, y: rulerY };
        for (let cm = 0; cm <= rulerLen; cm++) {
          const p = { x: start.x + cm * Geo.UNIT, y: rulerY };
          if (p.x > w - 10) break; // не рисуем деления, которые не поместятся на узком экране
          const tick = cm % 5 === 0 ? 14 : 8;
          Figures.line(ctx, { x: p.x, y: p.y - tick }, { x: p.x, y: p.y + tick }, { stroke: Geo.ink(), lw: 1.5 });
          Figures.label(ctx, { x: p.x, y: p.y + 26 }, String(cm), { font: "11px Rubik, sans-serif", color: Geo.ink() });
        }
        Figures.line(ctx, { x: start.x, y: rulerY }, { x: start.x + rulerLen * Geo.UNIT, y: rulerY }, { stroke: Geo.ink(), lw: 2 });
        Figures.line(ctx, { x: A.x, y: rulerY - 22 }, { x: B.x, y: rulerY - 22 }, { stroke: "#5b6bd6", lw: 4 });
        Figures.label(ctx, { x: A.x, y: rulerY - 30 }, "A", { color: "#3a4bcf" });
        Figures.label(ctx, { x: B.x, y: rulerY - 30 }, "B", { color: "#3a4bcf" });
      }
      Figures.dot(ctx, A); Figures.dot(ctx, B);
      Figures.label(ctx, A, "A", { dy: -14 });
      Figures.label(ctx, B, "B", { dy: -14 });
      if (!spec.withRuler) {
        const mid = Geo.midpoint(A, B);
        Figures.label(ctx, mid, `AB = ${Geo.fmt(Geo.dist(A, B))}`, { dy: -12, color: "#3a4bcf" });
      }
    }
    unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => ({ AB: Geo.dist(A, B) }) };
  },

  /* Три точки на прямой — для задания «отметь точки так, чтобы B лежала между A и C».
     Проверка построения (checkBuild): коллинеарны ли A, B, C и лежит ли B между A и C. */
  collinear3(ctx, canvas, ctrl, spec, w, h) {
    const A = { x: w * 0.15, y: h * 0.6 };
    const B = { x: w * 0.5, y: h * 0.45 };
    const C = { x: w * 0.85, y: h * 0.3 };
    const pts = [A, B, C];
    function render() {
      Figures.drawBase(ctx, w, h);
      Figures.line(ctx, A, C, { stroke: "#dfe1f5", lw: 1.5, dash: [4, 4] });
      Figures.line(ctx, A, B, { stroke: "#5b6bd6", lw: 3 });
      Figures.line(ctx, B, C, { stroke: "#5b6bd6", lw: 3 });
      [["A", A], ["B", B], ["C", C]].forEach(([nm, p]) => { Figures.dot(ctx, p); Figures.label(ctx, p, nm, { dy: -14 }); });
      Figures.label(ctx, Geo.midpoint(A, B), `AB=${Geo.fmt(Geo.dist(A, B))}`, { dy: 18, color: "#3a4bcf" });
      Figures.label(ctx, Geo.midpoint(B, C), `BC=${Geo.fmt(Geo.dist(B, C))}`, { dy: 18, color: "#3a4bcf" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return {
      render, destroy: unbind,
      metrics: () => {
        // "коллинеарность" через площадь треугольника ABC: чем ближе к 0, тем точнее на одной прямой
        const area = Geo.areaShoelace([A, B, C]);
        const ab = Geo.dist(A, B), bc = Geo.dist(B, C), ac = Geo.dist(A, C);
        return { area, ab, bc, ac, betweenB: Math.abs(ab + bc - ac) < 0.15 * ac };
      },
    };
  },

  /* Два фиксированных отрезка-образца + один растягиваемый — для задания "построй отрезок,
     равный сумме двух данных". */
  segmentSum(ctx, canvas, ctrl, spec, w, h) {
    const len1 = spec.len1 || 3, len2 = spec.len2 || 5;
    const S1a = { x: w * 0.12, y: h * 0.2, fixed: true };
    const S1b = { x: S1a.x + len1 * Geo.UNIT, y: h * 0.2, fixed: true };
    const S2a = { x: w * 0.12, y: h * 0.42, fixed: true };
    const S2b = { x: S2a.x + len2 * Geo.UNIT, y: h * 0.42, fixed: true };
    const P = { x: w * 0.12, y: h * 0.75, fixed: true };
    const Q = { x: w * 0.12 + 2 * Geo.UNIT, y: h * 0.75 };
    const pts = [S1a, S1b, S2a, S2b, P, Q];
    function render() {
      Figures.drawBase(ctx, w, h);
      Figures.line(ctx, S1a, S1b, { stroke: "#2ecc71", lw: 3 });
      Figures.label(ctx, Geo.midpoint(S1a, S1b), `AB = ${Geo.fmt(len1)}`, { dy: -12, color: "#199a53" });
      Figures.line(ctx, S2a, S2b, { stroke: "#ff9f43", lw: 3 });
      Figures.label(ctx, Geo.midpoint(S2a, S2b), `CD = ${Geo.fmt(len2)}`, { dy: -12, color: "#c9740f" });
      Figures.line(ctx, P, Q, { stroke: "#5b6bd6", lw: 3 });
      Figures.dot(ctx, Q);
      Figures.label(ctx, Geo.midpoint(P, Q), `Твой отрезок = ${Geo.fmt(Geo.dist(P, Q))}`, { dy: 20, color: "#3a4bcf" });
      Figures.label(ctx, { x: w / 2, y: h * 0.95 }, `Цель: AB + CD = ${Geo.fmt(len1 + len2)}`, { color: Geo.ink() });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => ({ length: Geo.dist(P, Q), target: len1 + len2 }) };
  },

  /* Прямая m (фиксирована) и точка P вне неё; ученик тянет точку Q, строя прямую PQ,
     перпендикулярную m — классическая задача на построение перпендикуляра из внешней точки. */
  perpFromPoint(ctx, canvas, ctrl, spec, w, h) {
    const M1 = { x: w * 0.1, y: h * 0.75, fixed: true };
    const M2 = { x: w * 0.9, y: h * 0.68, fixed: true };
    const P = { x: w * 0.62, y: h * 0.22, fixed: true };
    const Q = { x: w * 0.3, y: h * 0.45 };
    const pts = [M1, M2, P, Q];
    function render() {
      Figures.drawBase(ctx, w, h);
      Figures.line(ctx, M1, M2, { stroke: "#5b6bd6", lw: 3 });
      Figures.label(ctx, M2, "m", { dy: -12, color: "#3a4bcf" });
      Figures.line(ctx, P, Q, { stroke: "#ff9f43", lw: 3 });
      Figures.dot(ctx, P, { r: 6 }); Figures.dot(ctx, Q, { r: 6 });
      Figures.label(ctx, P, "P", { dy: -14 });
      Figures.label(ctx, Q, "Q", { dy: -14 });
      const dm = Math.atan2(M2.y - M1.y, M2.x - M1.x);
      const dq = Math.atan2(Q.y - P.y, Q.x - P.x);
      let diff = Math.abs((dm - dq) * 180 / Math.PI) % 180;
      if (diff > 90) diff = 180 - diff;
      Figures.wrapText(ctx, `Угол между PQ и m: ${Geo.fmt(diff)}° (цель — 90°)`, w / 2, h * 0.06, w * 0.92, { color: Geo.ink() });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return {
      render, destroy: unbind,
      metrics: () => {
        const dm = Math.atan2(M2.y - M1.y, M2.x - M1.x);
        const dq = Math.atan2(Q.y - P.y, Q.x - P.x);
        let diff = Math.abs((dm - dq) * 180 / Math.PI) % 180;
        if (diff > 90) diff = 180 - diff;
        return { angleToLine: diff };
      },
    };
  },

  /* Две пересекающиеся прямые: 4 угла — смежные (в сумме 180°) и вертикальные (равны).
     Отдельный чертёж именно под §6 «Перпендикулярные прямые», а не общий "angle". */
  linepair(ctx, canvas, ctrl, spec, w, h) {
    const O = { x: w / 2, y: h / 2, fixed: true };
    const R = Math.min(w, h) * 0.38;
    let a0 = -0.35, a1 = 1.15; // начальные направления двух прямых (радианы)
    const A = { x: O.x + R * Math.cos(a0), y: O.y + R * Math.sin(a0) };
    const B = { x: O.x + R * Math.cos(a1), y: O.y + R * Math.sin(a1) };
    const pts = [O, A, B];
    let perp = false;
    ctrl.innerHTML = `<label class="fig-chk"><input type="checkbox" data-k="perp"> Сделать прямые перпендикулярными</label>`;
    ctrl.querySelector('[data-k="perp"]').addEventListener("change", (e) => { perp = e.target.checked; render(); });
    function render() {
      Figures.drawBase(ctx, w, h);
      let dirA = Math.atan2(A.y - O.y, A.x - O.x);
      let dirB = Math.atan2(B.y - O.y, B.x - O.x);
      if (perp) {
        dirB = dirA + Math.PI / 2;
        B.x = O.x + Geo.distPx(O, B) * Math.cos(dirB);
        B.y = O.y + Geo.distPx(O, B) * Math.sin(dirB);
      }
      const far = Math.max(w, h);
      const Aext = { x: O.x - far * Math.cos(dirA), y: O.y - far * Math.sin(dirA) };
      const Bext = { x: O.x - far * Math.cos(dirB), y: O.y - far * Math.sin(dirB) };
      const A2 = { x: O.x + far * Math.cos(dirA), y: O.y + far * Math.sin(dirA) };
      const B2 = { x: O.x + far * Math.cos(dirB), y: O.y + far * Math.sin(dirB) };
      Figures.line(ctx, Aext, A2, { stroke: "#5b6bd6", lw: 2.5 });
      Figures.line(ctx, Bext, B2, { stroke: "#5b6bd6", lw: 2.5 });
      // 4 направления вокруг точки O, отсортированные по углу
      const rays = [dirA, dirB, dirA + Math.PI, dirB + Math.PI].map((a) => ((a % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI));
      rays.sort((x, y) => x - y);
      const colors = ["#ff9f43", "#2ecc71", "#ff9f43", "#2ecc71"]; // соседние сектора чередуются (смежные), через один — совпадают (вертикальные)
      for (let i = 0; i < 4; i++) {
        const s = rays[i], e = i < 3 ? rays[i + 1] : rays[0] + 2 * Math.PI;
        const mid = (s + e) / 2;
        const deg = Geo.fmt((e - s) * 180 / Math.PI);
        ctx.beginPath(); ctx.arc(O.x, O.y, 30, s, e, false);
        ctx.strokeStyle = colors[i]; ctx.lineWidth = 2.5; ctx.stroke();
        Figures.label(ctx, { x: O.x + 52 * Math.cos(mid), y: O.y + 52 * Math.sin(mid) }, `${deg}°`, { color: colors[i], font: "700 13px Rubik, sans-serif" });
      }
      Figures.dot(ctx, O, { r: 6 });
      Figures.dot(ctx, A); Figures.dot(ctx, B);
      Figures.label(ctx, A, "A", { dy: A.y < O.y ? -14 : 20 });
      Figures.label(ctx, B, "B", { dy: B.y < O.y ? -14 : 20 });
      if (perp) Figures.wrapText(ctx, "прямые перпендикулярны (⊥) — все 4 угла по 90°", O.x, O.y - R - 20, w * 0.94, { color: Geo.ink() });
      else Figures.wrapText(ctx, "одинаковый цвет — вертикальные углы (равны); соседние цвета — смежные (в сумме 180°)", O.x, O.y - R - 20, w * 0.94, { color: Geo.ink(), font: "600 12px Rubik, sans-serif" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => ({}) };
  },

  /* Задание "построй биссектрису": угол AOC фиксирован (несимметрично), K — draggable,
     проверка — совпадает ли луч OK с биссектрисой (∠AOK ≈ ∠KOC). */
  bisectorBuild(ctx, canvas, ctrl, spec, w, h) {
    const O = { x: w * 0.25, y: h * 0.78, fixed: true };
    const degA = spec.degA != null ? spec.degA : 8, degC = spec.degC != null ? spec.degC : 78;
    const R = Math.min(w, h) * 0.55;
    const A = { x: O.x + R * Math.cos(-degA * Math.PI / 180), y: O.y + R * Math.sin(-degA * Math.PI / 180), fixed: true };
    const C = { x: O.x + R * Math.cos(-degC * Math.PI / 180), y: O.y + R * Math.sin(-degC * Math.PI / 180), fixed: true };
    const K = { x: O.x + R * 0.75 * Math.cos(-30 * Math.PI / 180), y: O.y + R * 0.75 * Math.sin(-30 * Math.PI / 180) };
    const pts = [O, A, C, K];
    function render() {
      Figures.drawBase(ctx, w, h);
      Figures.line(ctx, O, A, { stroke: "#5b6bd6", lw: 3 });
      Figures.line(ctx, O, C, { stroke: "#5b6bd6", lw: 3 });
      Figures.line(ctx, O, K, { stroke: "#2ecc71", lw: 2, dash: [7, 5] });
      Figures.dot(ctx, O, { r: 6 }); Figures.dot(ctx, A, { r: 6 }); Figures.dot(ctx, C, { r: 6 }); Figures.dot(ctx, K, { r: 6 });
      Figures.label(ctx, A, "A", { dy: -12 });
      Figures.label(ctx, C, "C", { dy: -12 });
      Figures.label(ctx, K, "K", { dy: -12, color: "#199a53" });
      const a1 = Geo.angleDeg(O, A, K), a2 = Geo.angleDeg(O, K, C);
      Figures.wrapText(ctx, `∠AOK = ${Geo.fmt(a1)}°   ∠KOC = ${Geo.fmt(a2)}°`, w / 2, h * 0.08, w * 0.92, { color: Geo.ink() });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return {
      render, destroy: unbind,
      metrics: () => ({ a1: Geo.angleDeg(O, A, K), a2: Geo.angleDeg(O, K, C), full: Geo.angleDeg(O, A, C) }),
    };
  },

  /* Разбиение угла AOC лучом OB (B — draggable, между сторонами) — для исследования
     основного свойства измерения углов: ∠AOB + ∠BOC = ∠AOC при любом положении B. */
  angleSplit(ctx, canvas, ctrl, spec, w, h) {
    const O = { x: w * 0.25, y: h * 0.78, fixed: true };
    const R = Math.min(w, h) * 0.55;
    const A = { x: O.x + R, y: O.y, fixed: true };
    const degC = spec.degC != null ? spec.degC : 100;
    const C = { x: O.x + R * Math.cos(-degC * Math.PI / 180), y: O.y + R * Math.sin(-degC * Math.PI / 180), fixed: true };
    const B = { x: O.x + R * 0.8 * Math.cos(-40 * Math.PI / 180), y: O.y + R * 0.8 * Math.sin(-40 * Math.PI / 180) };
    const pts = [O, A, C, B];
    function render() {
      Figures.drawBase(ctx, w, h);
      Figures.line(ctx, O, A, { stroke: "#5b6bd6", lw: 3 });
      Figures.line(ctx, O, C, { stroke: "#5b6bd6", lw: 3 });
      Figures.line(ctx, O, B, { stroke: "#ff9f43", lw: 2.5 });
      Figures.dot(ctx, O, { r: 6 }); Figures.dot(ctx, A, { r: 6 }); Figures.dot(ctx, C, { r: 6 }); Figures.dot(ctx, B, { r: 6 });
      Figures.label(ctx, A, "A", { dy: -12 }); Figures.label(ctx, C, "C", { dy: -12 });
      Figures.label(ctx, B, "B", { dy: -12, color: "#c9740f" });
      const aob = Geo.angleDeg(O, A, B), boc = Geo.angleDeg(O, B, C), aoc = Geo.angleDeg(O, A, C);
      Figures.wrapText(ctx,
        `∠AOB=${Geo.fmt(aob)}° + ∠BOC=${Geo.fmt(boc)}° = ${Geo.fmt(aob + boc)}°   (∠AOC=${Geo.fmt(aoc)}°)`,
        w / 2, h * 0.08, w * 0.92,
        { color: Geo.ink(), font: "600 13px Rubik, sans-serif" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => ({}) };
  },

  angle(ctx, canvas, ctrl, spec, w, h) {
    const O = { x: (spec.withProtractor ? w * 0.5 : w * 0.28), y: h * 0.72, fixed: true };
    // радиус транспортира подстраивается под доступную ширину — иначе на узком мобильном
    // экране дуга/деления/подписи градусов уезжают за левый или правый край и становятся невидимы
    const protR = Math.max(50, Math.min(100, O.x - 18, w - O.x - 18));
    let A, B;
    if (spec.withProtractor) {
      const deg = spec.fixedDeg != null ? spec.fixedDeg : 45;
      A = { x: O.x + protR, y: O.y, fixed: true };
      const rad = deg * Math.PI / 180;
      B = { x: O.x + protR * Math.cos(-rad), y: O.y + protR * Math.sin(-rad) };
    } else {
      A = { x: w * 0.85, y: h * 0.72 };
      B = { x: w * 0.4, y: h * 0.18 };
    }
    const pts = [O, A, B];
    let showBisector = false;
    if (!spec.withProtractor) {
      ctrl.innerHTML = `<label class="fig-chk"><input type="checkbox" data-k="bis"> Показать биссектрису</label>`;
      ctrl.querySelector('[data-k="bis"]').addEventListener("change", (e) => { showBisector = e.target.checked; render(); });
    }
    function render() {
      if (spec.withProtractor && B.y > O.y - 6) B.y = O.y - 6; // держим сторону B над линейкой транспортира, где нанесены деления
      Figures.drawBase(ctx, w, h);
      if (spec.withProtractor) {
        // полукруг транспортира с делениями по 10°, ноль совмещён со стороной OA
        ctx.beginPath(); ctx.arc(O.x, O.y, protR, -Math.PI, 0, false);
        ctx.strokeStyle = Geo.ink(); ctx.lineWidth = 1.5; ctx.stroke();
        for (let d = 0; d <= 180; d += 10) {
          const rad = d * Math.PI / 180;
          const r1 = protR, r2 = d % 30 === 0 ? protR * 0.86 : protR * 0.92;
          const p1 = { x: O.x + r1 * Math.cos(-rad), y: O.y + r1 * Math.sin(-rad) };
          const p2 = { x: O.x + r2 * Math.cos(-rad), y: O.y + r2 * Math.sin(-rad) };
          Figures.line(ctx, p1, p2, { stroke: Geo.ink(), lw: 1 });
          if (d % 30 === 0) Figures.label(ctx, { x: O.x + protR * 1.12 * Math.cos(-rad), y: O.y + protR * 1.12 * Math.sin(-rad) }, String(d), { font: "10px Rubik, sans-serif", color: Geo.ink() });
        }
      }
      Figures.line(ctx, O, A, { stroke: "#5b6bd6", lw: 3 });
      Figures.line(ctx, O, B, { stroke: "#5b6bd6", lw: 3 });
      const ang = Geo.angleDeg(O, A, B);
      // дуга угла
      const a1 = Math.atan2(A.y - O.y, A.x - O.x), a2 = Math.atan2(B.y - O.y, B.x - O.x);
      ctx.beginPath(); ctx.arc(O.x, O.y, 34, a1, a2, Geo.arcSweep(a1, a2)); ctx.strokeStyle = "#ff9f43"; ctx.lineWidth = 2.5; ctx.stroke();
      if (showBisector) {
        const mid = { x: (Math.cos(a1) + Math.cos(a2)) / 2, y: (Math.sin(a1) + Math.sin(a2)) / 2 };
        const len = Math.hypot(mid.x, mid.y) || 1;
        const K = { x: O.x + mid.x / len * 140, y: O.y + mid.y / len * 140 };
        Figures.line(ctx, O, K, { stroke: "#2ecc71", lw: 2, dash: [6, 4] });
        Figures.label(ctx, K, "K", { dy: -10, color: "#199a53" });
      }
      Figures.dot(ctx, O, { r: 6 }); Figures.dot(ctx, A, { r: 6 }); Figures.dot(ctx, B, { r: 6 });
      Figures.label(ctx, O, "O", { dy: 20 });
      Figures.label(ctx, A, "A", { dy: 20 });
      Figures.label(ctx, B, "B", { dy: -12 });
      if (!spec.withProtractor) Figures.label(ctx, { x: O.x + 46, y: O.y - 26 }, `∠AOB = ${Geo.fmt(ang)}°`, { color: "#c9740f", align: "left" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => ({ angle: Geo.angleDeg(O, A, B) }) };
  },

  /* Два треугольника рядом с «галочками» равенства сторон/углов — как в учебнике,
     для наглядного узнавания признаков равенства треугольников (SAS/ASA/SSS). */
  triangleDual(ctx, canvas, ctrl, spec, w, h) {
    const crit = spec.criterion || "sas";
    let A, B, C, D, E, F;
    if (crit === "hl") {
      // Прямоугольные треугольники: right angle всегда в B и в E, за счёт "осевой фиксации"
      // (A двигается только по вертикали от B, C — только по горизонтали от B, и аналогично D/F от E).
      B = { x: w * 0.14, y: h * 0.82 }; A = { x: w * 0.14, y: h * 0.25 }; C = { x: w * 0.42, y: h * 0.82 };
      E = { x: w * 0.64, y: h * 0.65 }; D = { x: w * 0.64, y: h * 0.18 }; F = { x: w * 0.94, y: h * 0.65 };
    } else {
      A = { x: w * 0.12, y: h * 0.85 }; B = { x: w * 0.36, y: h * 0.85 }; C = { x: w * 0.22, y: h * 0.25 };
      D = { x: w * 0.62, y: h * 0.8 }; E = { x: w * 0.94, y: h * 0.62 }; F = { x: w * 0.7, y: h * 0.2 };
    }
    const pts = [A, B, C, D, E, F];

    // Переносит треугольник ABC вправо (с поворотом), сохраняя все длины и углы —
    // гарантированно даёт НАСТОЯЩИЙ конгруэнтный треугольник, а не просто "похожий".
    function alignToCongruent() {
      if (crit === "hl") {
        const legAB = Geo.distPx(A, B), hypAC = Geo.distPx(A, C);
        const legEF = Math.sqrt(Math.max(hypAC * hypAC - legAB * legAB, 1));
        D.x = E.x; D.y = E.y - legAB; F.x = E.x + legEF; F.y = E.y;
        return;
      }
      const cx = (A.x + B.x + C.x) / 3, cy = (A.y + B.y + C.y) / 3;
      const ang = 0.3, shiftX = w * 0.4;
      const tf = (p) => {
        const rx = p.x - cx, ry = p.y - cy;
        return { x: cx + rx * Math.cos(ang) - ry * Math.sin(ang) + shiftX, y: cy + rx * Math.sin(ang) + ry * Math.cos(ang) };
      };
      const nd = tf(A), ne = tf(B), nf = tf(C);
      D.x = nd.x; D.y = nd.y; E.x = ne.x; E.y = ne.y; F.x = nf.x; F.y = nf.y;
    }
    if (spec.startCongruent) alignToCongruent();

    ctrl.innerHTML = `<button class="btn btn-primary btn-sm" data-td-act="align">🔗 Совместить (сделать равными)</button>`;
    ctrl.querySelector('[data-td-act="align"]').addEventListener("click", () => { alignToCongruent(); render(); });

    function closeL(x, y) { return Math.abs(x - y) <= 0.06 * Math.max(x, y, 0.01); }
    function closeA(x, y) { return Math.abs(x - y) <= 3; }

    function render() {
      if (crit === "hl") { A.x = B.x; C.y = B.y; D.x = E.x; F.y = E.y; }
      Figures.drawBase(ctx, w, h);
      Figures.poly(ctx, [A, B, C], { fill: "rgba(91,107,214,0.08)" });
      Figures.poly(ctx, [D, E, F], { fill: "rgba(255,159,67,0.08)", stroke: "#ff9f43" });
      [["A", A], ["B", B], ["C", C], ["D", D], ["E", E], ["F", F]].forEach(([nm, p]) => {
        Figures.dot(ctx, p); Figures.label(ctx, p, nm, { dy: p.y > h / 2 ? 20 : -14 });
      });

      const AB = Geo.dist(A, B), AC = Geo.dist(A, C), BC = Geo.dist(B, C);
      const DE = Geo.dist(D, E), DF = Geo.dist(D, F), EF = Geo.dist(E, F);
      const angA = Geo.angleDeg(A, B, C), angB = Geo.angleDeg(B, A, C);
      const angD = Geo.angleDeg(D, E, F), angE2 = Geo.angleDeg(E, D, F);

      // Штрихи-«галочки» рисуем ВСЕГДА (это условные обозначения задачи — какие именно
      // элементы сравниваем), а зелёным/оранжевым красим их в зависимости от того,
      // совпадают ли они СЕЙЧАС на самом деле — это и есть честная сверка.
      let ok;
      if (crit === "sas") {
        const okAB = closeL(AB, DE), okAC = closeL(AC, DF), okA = closeA(angA, angD);
        Figures.tickMarks(ctx, A, B, 1, okAB ? "#2ecc71" : "#e6572e"); Figures.tickMarks(ctx, D, E, 1, okAB ? "#2ecc71" : "#e6572e");
        Figures.tickMarks(ctx, A, C, 2, okAC ? "#2ecc71" : "#e6572e"); Figures.tickMarks(ctx, D, F, 2, okAC ? "#2ecc71" : "#e6572e");
        Figures.angleTicks(ctx, A, B, C, 1, okA ? "#2ecc71" : "#e6572e"); Figures.angleTicks(ctx, D, E, F, 1, okA ? "#2ecc71" : "#e6572e");
        ok = okAB && okAC && okA;
        Figures.wrapText(ctx, "По двум сторонам и углу между ними (SAS): AB=DE, AC=DF, ∠A=∠D", w / 2, h * 0.06, w * 0.92, { color: Geo.ink(), font: "600 13px Rubik, sans-serif" });
      } else if (crit === "asa") {
        const okAB = closeL(AB, DE), okA = closeA(angA, angD), okB = closeA(angB, angE2);
        Figures.angleTicks(ctx, A, B, C, 1, okA ? "#2ecc71" : "#e6572e"); Figures.angleTicks(ctx, D, E, F, 1, okA ? "#2ecc71" : "#e6572e");
        Figures.angleTicks(ctx, B, A, C, 2, okB ? "#2ecc71" : "#e6572e"); Figures.angleTicks(ctx, E, D, F, 2, okB ? "#2ecc71" : "#e6572e");
        Figures.tickMarks(ctx, A, B, 1, okAB ? "#2ecc71" : "#e6572e"); Figures.tickMarks(ctx, D, E, 1, okAB ? "#2ecc71" : "#e6572e");
        ok = okAB && okA && okB;
        Figures.wrapText(ctx, "По стороне и двум прилежащим углам (ASA): AB=DE, ∠A=∠D, ∠B=∠E", w / 2, h * 0.06, w * 0.92, { color: Geo.ink(), font: "600 13px Rubik, sans-serif" });
      } else if (crit === "hl") {
        const okHyp = closeL(AC, DF), okLeg = closeL(AB, DE);
        ctx.strokeStyle = Geo.ink(); ctx.lineWidth = 1.5;
        ctx.strokeRect(B.x - 12 * Math.sign(C.x - B.x || 1), B.y - 12, 12 * Math.sign(C.x - B.x || 1), 12);
        ctx.strokeRect(E.x - 12 * Math.sign(F.x - E.x || 1), E.y - 12, 12 * Math.sign(F.x - E.x || 1), 12);
        Figures.tickMarks(ctx, A, C, 1, okHyp ? "#2ecc71" : "#e6572e"); Figures.tickMarks(ctx, D, F, 1, okHyp ? "#2ecc71" : "#e6572e");
        Figures.tickMarks(ctx, A, B, 2, okLeg ? "#2ecc71" : "#e6572e"); Figures.tickMarks(ctx, D, E, 2, okLeg ? "#2ecc71" : "#e6572e");
        ok = okHyp && okLeg;
        Figures.wrapText(ctx, "По гипотенузе и катету (HL): прямые углы при B и E, AC=DF, AB=DE", w / 2, h * 0.06, w * 0.92, { color: Geo.ink(), font: "600 13px Rubik, sans-serif" });
      } else {
        const okAB = closeL(AB, DE), okBC = closeL(BC, EF), okAC = closeL(AC, DF);
        Figures.tickMarks(ctx, A, B, 1, okAB ? "#2ecc71" : "#e6572e"); Figures.tickMarks(ctx, D, E, 1, okAB ? "#2ecc71" : "#e6572e");
        Figures.tickMarks(ctx, B, C, 2, okBC ? "#2ecc71" : "#e6572e"); Figures.tickMarks(ctx, E, F, 2, okBC ? "#2ecc71" : "#e6572e");
        Figures.tickMarks(ctx, A, C, 3, okAC ? "#2ecc71" : "#e6572e"); Figures.tickMarks(ctx, D, F, 3, okAC ? "#2ecc71" : "#e6572e");
        ok = okAB && okBC && okAC;
        Figures.wrapText(ctx, "По трём сторонам (SSS): AB=DE, BC=EF, AC=DF", w / 2, h * 0.06, w * 0.92, { color: Geo.ink(), font: "600 13px Rubik, sans-serif" });
      }
      Figures.wrapText(ctx, ok ? "✓ Отмеченные элементы совпадают — треугольники равны" : "✗ Пока не совпадают — потяни точки или нажми «Совместить»",
        w / 2, h * 0.94, w * 0.94,
        { color: ok ? "#199a53" : "#c9740f", font: "700 13px Rubik, sans-serif" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return {
      render, destroy: unbind,
      metrics: () => ({
        AB: Geo.dist(A, B), AC: Geo.dist(A, C), BC: Geo.dist(B, C),
        angA: Geo.angleDeg(A, B, C), angB: Geo.angleDeg(B, A, C), angC: Geo.angleDeg(C, A, B),
        DE: Geo.dist(D, E), DF: Geo.dist(D, F), EF: Geo.dist(E, F),
        angD: Geo.angleDeg(D, E, F), angE: Geo.angleDeg(E, D, F), angF: Geo.angleDeg(F, D, E),
      }),
    };
  },

  /* Равнобедренный треугольник: основание BC горизонтально и фиксировано, вершина A может
     двигаться только по вертикали над серединой BC — это автоматически гарантирует AB=AC. */
  isosceles(ctx, canvas, ctrl, spec, w, h) {
    const B = { x: w * 0.2, y: h * 0.8, fixed: true };
    const C = { x: w * 0.8, y: h * 0.8, fixed: true };
    const A = { x: w * 0.5, y: h * 0.18 };
    const pts = [A, B, C];
    let showLine = true;
    ctrl.innerHTML = `<label class="fig-chk"><input type="checkbox" data-k="ln" checked> Показать медиану=биссектрису=высоту</label>`;
    ctrl.querySelector('[data-k="ln"]').addEventListener("change", (e) => { showLine = e.target.checked; render(); });
    function render() {
      const midX = (B.x + C.x) / 2;
      A.x = midX; // симметрия гарантирует AB = AC при любой высоте
      Figures.drawBase(ctx, w, h);
      Figures.poly(ctx, [A, B, C], { fill: "rgba(91,107,214,0.10)" });
      const M = Geo.midpoint(B, C);
      if (showLine) {
        Figures.line(ctx, A, M, { stroke: "#2ecc71", lw: 2, dash: [7, 5] });
        Figures.label(ctx, M, "M", { dy: 18, color: "#199a53" });
        Figures.wrapText(ctx, "AM — одновременно медиана, биссектриса И высота", w / 2, h * 0.06, w * 0.92, { color: "#199a53", font: "600 13px Rubik, sans-serif" });
      }
      [["A", A], ["B", B], ["C", C]].forEach(([nm, p]) => { Figures.dot(ctx, p); Figures.label(ctx, p, nm, { dy: p.y < h / 2 ? -14 : 20 }); });
      Figures.label(ctx, Geo.midpoint(A, B), `${Geo.fmt(Geo.dist(A, B))}`, { color: "#3a4bcf" });
      Figures.label(ctx, Geo.midpoint(A, C), `${Geo.fmt(Geo.dist(A, C))}`, { color: "#3a4bcf" });
      Figures.label(ctx, { x: B.x, y: B.y + 30 }, `∠B=${Geo.fmt(Geo.angleDeg(B, A, C))}°`, { color: "#c9740f" });
      Figures.label(ctx, { x: C.x, y: C.y + 30 }, `∠C=${Geo.fmt(Geo.angleDeg(C, A, B))}°`, { color: "#c9740f" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => ({ ab: Geo.dist(A, B), ac: Geo.dist(A, C), angleB: Geo.angleDeg(B, A, C), angleC: Geo.angleDeg(C, A, B) }) };
  },

  /* Построение серединного перпендикуляра к отрезку AB циркулем: две одинаковые окружности
     с центрами A и B, их точки пересечения задают перпендикуляр к AB через середину. */
  perpBisector(ctx, canvas, ctrl, spec, w, h) {
    const A = { x: w * 0.28, y: h * 0.5, fixed: true };
    const B = { x: w * 0.72, y: h * 0.5, fixed: true };
    const Rpt = { x: w * 0.52, y: h * 0.5 }; // определяет радиус циркуля
    const pts = [A, B, Rpt];
    function render() {
      Figures.drawBase(ctx, w, h);
      const ab = Geo.distPx(A, B);
      let r = Math.max(Geo.distPx(A, Rpt), ab / 2 + 6);
      Figures.line(ctx, A, B, { stroke: "#5b6bd6", lw: 2.5 });
      ctx.beginPath(); ctx.arc(A.x, A.y, r, 0, Math.PI * 2); ctx.strokeStyle = "#ff9f43"; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.beginPath(); ctx.arc(B.x, B.y, r, 0, Math.PI * 2); ctx.strokeStyle = "#ff9f43"; ctx.lineWidth = 1.5; ctx.stroke();
      const d = ab, mid = Geo.midpoint(A, B);
      if (r > d / 2) {
        const h2 = Math.sqrt(r * r - (d / 2) * (d / 2));
        const ux = (B.x - A.x) / d, uy = (B.y - A.y) / d;
        const nx = -uy, ny = ux;
        const P1 = { x: mid.x + nx * h2, y: mid.y + ny * h2 };
        const P2 = { x: mid.x - nx * h2, y: mid.y - ny * h2 };
        Figures.line(ctx, P1, P2, { stroke: "#2ecc71", lw: 2.5 });
        Figures.dot(ctx, P1, { r: 5, fill: "#199a53" }); Figures.dot(ctx, P2, { r: 5, fill: "#199a53" });
        Figures.wrapText(ctx, "Зелёная линия — серединный перпендикуляр к AB", w / 2, h * 0.12, w * 0.92, { color: "#199a53" });
      } else {
        Figures.wrapText(ctx, "Увеличь радиус (потяни точку R) — окружности должны пересечься", w / 2, h * 0.12, w * 0.92, { color: "#c9740f" });
      }
      Figures.dot(ctx, A); Figures.dot(ctx, B); Figures.dot(ctx, Rpt, { r: 5, fill: "#8b93d6" });
      Figures.label(ctx, A, "A", { dy: 18 }); Figures.label(ctx, B, "B", { dy: 18 });
      Figures.label(ctx, Rpt, "R", { dy: -12, color: "#5b6bd6" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => ({}) };
  },

  /* Копирование угла циркулем: слева — образец ∠AOB, справа — новый луч O'A' задан,
     ученик тянет точку B', чтобы угол A'O'B' стал равен образцу. */
  copyAngle(ctx, canvas, ctrl, spec, w, h) {
    const O = { x: w * 0.18, y: h * 0.75, fixed: true };
    const A = { x: w * 0.42, y: h * 0.75, fixed: true };
    const deg = spec.degrees != null ? spec.degrees : 55;
    const B = { x: O.x + 130 * Math.cos(-deg * Math.PI / 180), y: O.y + 130 * Math.sin(-deg * Math.PI / 180), fixed: true };
    const O2 = { x: w * 0.68, y: h * 0.75, fixed: true };
    const A2 = { x: w * 0.94, y: h * 0.75, fixed: true };
    const B2 = { x: w * 0.8, y: h * 0.35 };
    const pts = [O, A, B, O2, A2, B2];
    function render() {
      Figures.drawBase(ctx, w, h);
      Figures.line(ctx, O, A, { stroke: "#5b6bd6", lw: 2.5 }); Figures.line(ctx, O, B, { stroke: "#5b6bd6", lw: 2.5 });
      Figures.line(ctx, O2, A2, { stroke: "#ff9f43", lw: 2.5 }); Figures.line(ctx, O2, B2, { stroke: "#ff9f43", lw: 2.5 });
      const a1 = Math.atan2(A.y - O.y, A.x - O.x), a2 = Math.atan2(B.y - O.y, B.x - O.x);
      ctx.beginPath(); ctx.arc(O.x, O.y, 30, a1, a2, Geo.arcSweep(a1, a2)); ctx.strokeStyle = "#8b5cf6"; ctx.lineWidth = 2; ctx.stroke();
      const b1 = Math.atan2(A2.y - O2.y, A2.x - O2.x), b2 = Math.atan2(B2.y - O2.y, B2.x - O2.x);
      ctx.beginPath(); ctx.arc(O2.x, O2.y, 30, b1, b2, Geo.arcSweep(b1, b2)); ctx.strokeStyle = "#8b5cf6"; ctx.lineWidth = 2; ctx.stroke();
      [["O", O], ["A", A], ["B", B], ["O'", O2], ["A'", A2], ["B'", B2]].forEach(([nm, p]) => { Figures.dot(ctx, p, { r: 6 }); Figures.label(ctx, p, nm, { dy: -12 }); });
      const angRef = Geo.angleDeg(O, A, B), angCopy = Geo.angleDeg(O2, A2, B2);
      Figures.wrapText(ctx, `Образец: ${Geo.fmt(angRef)}°   Твоя копия: ${Geo.fmt(angCopy)}°`, w / 2, h * 0.12, w * 0.92, { color: Geo.ink() });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => ({ angRef: Geo.angleDeg(O, A, B), angCopy: Geo.angleDeg(O2, A2, B2) }) };
  },

  /* Две прямые, пересечённые секущей: показывает соответственные углы в двух точках
     пересечения и честно (по вычисленным величинам) сообщает, параллельны ли прямые. */
  transversal(ctx, canvas, ctrl, spec, w, h) {
    const Ca = { x: w * 0.5, y: h * 0.3, fixed: true };
    const Da = { x: w * 0.86, y: h * 0.3 };
    const Cb = { x: w * 0.5, y: h * 0.72, fixed: true };
    const Db = { x: w * 0.86, y: h * 0.72 };
    const S1 = { x: w * 0.14, y: h * 0.05, fixed: true };
    const S2 = { x: w * 0.86, y: h * 0.97, fixed: true };
    const pts = [Da, Db, Ca, Cb, S1, S2];
    let snapParallel = false;
    ctrl.innerHTML = `<label class="fig-chk"><input type="checkbox" data-k="par"> Сделать прямые параллельными</label>`;
    ctrl.querySelector('[data-k="par"]').addEventListener("change", (e) => { snapParallel = e.target.checked; render(); });

    function extend(p1, p2) {
      const dx = p2.x - p1.x, dy = p2.y - p1.y, len = Math.hypot(dx, dy) || 1;
      const ux = dx / len, uy = dy / len, FAR = 1200;
      return [{ x: p1.x - ux * FAR, y: p1.y - uy * FAR }, { x: p1.x + ux * FAR, y: p1.y + uy * FAR }];
    }
    function render() {
      if (snapParallel) {
        const dirA = Math.atan2(Da.y - Ca.y, Da.x - Ca.x);
        const len = Geo.distPx(Cb, Db);
        Db.x = Cb.x + len * Math.cos(dirA); Db.y = Cb.y + len * Math.sin(dirA);
      }
      Figures.drawBase(ctx, w, h);
      const [a1, a2] = extend(Ca, Da); Figures.line(ctx, a1, a2, { stroke: "#5b6bd6", lw: 2.5 });
      const [b1, b2] = extend(Cb, Db); Figures.line(ctx, b1, b2, { stroke: "#5b6bd6", lw: 2.5 });
      const [s1, s2] = extend(S1, S2); Figures.line(ctx, s1, s2, { stroke: "#ff9f43", lw: 2.5 });
      const X1 = Geo.lineIntersect(a1, a2, s1, s2);
      const X2 = Geo.lineIntersect(b1, b2, s1, s2);
      Figures.label(ctx, Ca, "a", { dx: -14, color: "#3a4bcf" });
      Figures.label(ctx, Cb, "b", { dx: -14, color: "#3a4bcf" });
      let angle1 = null, angle2 = null, parallel = false;
      if (X1 && X2) {
        Figures.dot(ctx, X1, { r: 6 }); Figures.dot(ctx, X2, { r: 6 });
        Figures.label(ctx, X1, "X₁", { dy: -14 }); Figures.label(ctx, X2, "X₂", { dy: -14 });
        angle1 = Geo.angleDeg(X1, Da, S2); angle2 = Geo.angleDeg(X2, Db, S2);
        // дуги соответственных углов — один и тот же (по построению) относительный "угол вправо-вниз" в X1 и X2
        const dA = Math.atan2(Da.y - X1.y, Da.x - X1.x), dS = Math.atan2(S2.y - X1.y, S2.x - X1.x);
        ctx.beginPath(); ctx.arc(X1.x, X1.y, 26, dA, dS, Geo.arcSweep(dA, dS)); ctx.strokeStyle = "#8b5cf6"; ctx.lineWidth = 2.5; ctx.stroke();
        const dB = Math.atan2(Db.y - X2.y, Db.x - X2.x), dS2 = Math.atan2(S2.y - X2.y, S2.x - X2.x);
        ctx.beginPath(); ctx.arc(X2.x, X2.y, 26, dB, dS2, Geo.arcSweep(dB, dS2)); ctx.strokeStyle = "#8b5cf6"; ctx.lineWidth = 2.5; ctx.stroke();
        parallel = Math.abs(angle1 - angle2) <= 1.5;
        Figures.wrapText(ctx, `Соответственные углы: ${Geo.fmt(angle1)}° и ${Geo.fmt(angle2)}°`, w / 2, h * 0.14, w * 0.92, { color: "#8b5cf6", font: "600 13px Rubik, sans-serif" });
        Figures.wrapText(ctx,
          parallel ? "✓ Углы равны ⟹ прямые a и b параллельны" : "✗ Углы не равны ⟹ прямые a и b НЕ параллельны",
          w / 2, h * 0.9, w * 0.94,
          { color: parallel ? "#199a53" : "#c9740f", font: "700 13px Rubik, sans-serif" });
      }
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return {
      render, destroy: unbind,
      metrics: () => {
        const [a1, a2] = extend(Ca, Da), [b1, b2] = extend(Cb, Db), [s1, s2] = extend(S1, S2);
        const X1 = Geo.lineIntersect(a1, a2, s1, s2), X2 = Geo.lineIntersect(b1, b2, s1, s2);
        if (!X1 || !X2) return { parallel: false };
        const angle1 = Geo.angleDeg(X1, Da, S2), angle2 = Geo.angleDeg(X2, Db, S2);
        return { angle1, angle2, parallel: Math.abs(angle1 - angle2) <= 1.5 };
      },
    };
  },

  /* Внешний угол треугольника: сторона BC продлена за точку C до D (D вычисляется, не двигается
     отдельно). Показывает, что внешний угол ACD = ∠A + ∠B (сумма несмежных внутренних). */
  exteriorAngle(ctx, canvas, ctrl, spec, w, h) {
    const A = { x: w * 0.3, y: h * 0.18 };
    const B = { x: w * 0.1, y: h * 0.8 };
    const C = { x: w * 0.55, y: h * 0.8 };
    const pts = [A, B, C];
    function render() {
      Figures.drawBase(ctx, w, h);
      const dx = C.x - B.x, dy = C.y - B.y, len = Math.hypot(dx, dy) || 1;
      const D = { x: C.x + (dx / len) * (len * 0.7), y: C.y + (dy / len) * (len * 0.7) };
      Figures.poly(ctx, [A, B, C], { fill: "rgba(91,107,214,0.10)" });
      Figures.line(ctx, C, D, { stroke: "#5b6bd6", lw: 2, dash: [6, 4] });
      Figures.dot(ctx, D, { r: 5, fill: "#8b93d6" });
      Figures.label(ctx, D, "D", { dy: 18 });
      [["A", A], ["B", B], ["C", C]].forEach(([nm, p]) => { Figures.dot(ctx, p); Figures.label(ctx, p, nm, { dy: p.y < h / 2 ? -14 : 20 }); });
      const angA = Geo.angleDeg(A, B, C), angB = Geo.angleDeg(B, A, C);
      const ext = Geo.angleDeg(C, A, D);
      const a1r = Math.atan2(A.y - C.y, A.x - C.x), a2r = Math.atan2(D.y - C.y, D.x - C.x);
      ctx.beginPath(); ctx.arc(C.x, C.y, 30, a1r, a2r, Geo.arcSweep(a1r, a2r)); ctx.strokeStyle = "#8b5cf6"; ctx.lineWidth = 2.5; ctx.stroke();
      Figures.wrapText(ctx, `Внешний угол ACD=${Geo.fmt(ext)}°   ∠A+∠B=${Geo.fmt(angA + angB)}°`, w / 2, h * 0.06, w * 0.92, { color: "#8b5cf6", font: "600 13px Rubik, sans-serif" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => {
      const dx = C.x - B.x, dy = C.y - B.y, len = Math.hypot(dx, dy) || 1;
      const D = { x: C.x + (dx / len) * (len * 0.7), y: C.y + (dy / len) * (len * 0.7) };
      return { ext: Geo.angleDeg(C, A, D), angA: Geo.angleDeg(A, B, C), angB: Geo.angleDeg(B, A, C) };
    } };
  },

  /* Неравенство треугольника методом двух окружностей: отрезок AB фиксирован, две другие
     стороны заданы радиусами (точки R1, R2). Если окружности пересекаются — треугольник
     существует; если нет — стороны нарушают неравенство треугольника. Честная механика:
     совпадение/несовпадение читается из реального пересечения окружностей, а не декларируется. */
  triangleInequalityBuild(ctx, canvas, ctrl, spec, w, h) {
    const A = { x: w * 0.3, y: h * 0.55, fixed: true };
    const B = { x: w * 0.7, y: h * 0.55, fixed: true };
    const R1 = { x: w * 0.3, y: h * 0.2 };
    const R2 = { x: w * 0.7, y: h * 0.25 };
    const pts = [A, B, R1, R2];
    function render() {
      Figures.drawBase(ctx, w, h);
      const ab = Geo.distPx(A, B);
      const rb = Geo.distPx(A, R1), ra = Geo.distPx(B, R2); // rb = сторона AC, ra = сторона BC
      Figures.line(ctx, A, B, { stroke: "#5b6bd6", lw: 2.5 });
      ctx.beginPath(); ctx.arc(A.x, A.y, rb, 0, Math.PI * 2); ctx.strokeStyle = "#ff9f43"; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.beginPath(); ctx.arc(B.x, B.y, ra, 0, Math.PI * 2); ctx.strokeStyle = "#ff9f43"; ctx.lineWidth = 1.5; ctx.stroke();
      const canForm = ra + rb > ab && Math.abs(ra - rb) < ab;
      if (canForm) {
        const h2 = (ab * ab - rb * rb + ra * ra) / (2 * ab);
        const yy = ra * ra - h2 * h2;
        if (yy > 0) {
          const hh = Math.sqrt(yy);
          const ux = (B.x - A.x) / ab, uy = (B.y - A.y) / ab, nx = -uy, ny = ux;
          const C = { x: A.x + h2 * ux + hh * nx, y: A.y + h2 * uy + hh * ny };
          Figures.poly(ctx, [A, B, C], { fill: "rgba(46,204,113,0.15)", stroke: "#2ecc71" });
          Figures.label(ctx, C, "C", { dy: -12 });
        }
      }
      Figures.dot(ctx, A); Figures.dot(ctx, B); Figures.dot(ctx, R1, { r: 5, fill: "#8b93d6" }); Figures.dot(ctx, R2, { r: 5, fill: "#8b93d6" });
      Figures.label(ctx, A, "A", { dy: 18 }); Figures.label(ctx, B, "B", { dy: 18 });
      const abU = ab / Geo.UNIT, raU = ra / Geo.UNIT, rbU = rb / Geo.UNIT;
      Figures.wrapText(ctx, `AB=${Geo.fmt(abU)}, AC=${Geo.fmt(rbU)}, BC=${Geo.fmt(raU)}`, w / 2, h * 0.06, w * 0.92, { color: Geo.ink() });
      Figures.wrapText(ctx, canForm ? "✓ Окружности пересекаются — треугольник существует" : "✗ Не пересекаются — сумма двух сторон не больше третьей, треугольник невозможен",
        w / 2, h * 0.92, w * 0.94,
        { color: canForm ? "#199a53" : "#c9740f", font: "700 12px Rubik, sans-serif" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => {
      const ab = Geo.dist(A, B), rb = Geo.dist(A, R1), ra = Geo.dist(B, R2);
      return { ab, ac: rb, bc: ra, canForm: (ra + rb > ab) && (Math.abs(ra - rb) < ab) };
    } };
  },

  /* Расстояние от точки до прямой: перпендикуляр PH и произвольная наклонная PQ.
     Всегда честно (по теореме Пифагора PQ² = PH² + HQ² ≥ PH²): перпендикуляр не длиннее наклонной. */
  pointToLineDistance(ctx, canvas, ctrl, spec, w, h) {
    const M1 = { x: w * 0.1, y: h * 0.8, fixed: true };
    const M2 = { x: w * 0.9, y: h * 0.7, fixed: true };
    const P = { x: w * 0.55, y: h * 0.2, fixed: true };
    const Q = { x: w * 0.3, y: h * 0.75 };
    const pts = [M1, M2, Q];
    function foot(p, a, b) {
      const dx = b.x - a.x, dy = b.y - a.y, len2 = dx * dx + dy * dy || 1;
      const t = ((p.x - a.x) * dx + (p.y - a.y) * dy) / len2;
      return { x: a.x + t * dx, y: a.y + t * dy };
    }
    function render() {
      Figures.drawBase(ctx, w, h);
      const far1 = { x: M1.x - (M2.x - M1.x) * 3, y: M1.y - (M2.y - M1.y) * 3 };
      const far2 = { x: M2.x + (M2.x - M1.x) * 3, y: M2.y + (M2.y - M1.y) * 3 };
      Figures.line(ctx, far1, far2, { stroke: "#5b6bd6", lw: 2.5 });
      const H = foot(P, M1, M2);
      Figures.line(ctx, P, H, { stroke: "#2ecc71", lw: 2.5 });
      Figures.line(ctx, P, Q, { stroke: "#ff9f43", lw: 2, dash: [6, 4] });
      Figures.dot(ctx, P, { r: 6 }); Figures.dot(ctx, H, { r: 5, fill: "#199a53" }); Figures.dot(ctx, Q, { r: 5, fill: "#c9740f" });
      Figures.label(ctx, P, "P", { dy: -14 }); Figures.label(ctx, H, "H", { dy: 18, color: "#199a53" }); Figures.label(ctx, Q, "Q", { dy: 18, color: "#c9740f" });
      const ph = Geo.dist(P, H), pq = Geo.dist(P, Q);
      Figures.wrapText(ctx, `PH (перпендикуляр) = ${Geo.fmt(ph)}   PQ (наклонная) = ${Geo.fmt(pq)}`, w / 2, h * 0.06, w * 0.92, { color: Geo.ink() });
      if (ph <= pq + 0.01) Figures.wrapText(ctx, "✓ PH ≤ PQ всегда — перпендикуляр самый короткий путь до прямой", w / 2, h * 0.92, w * 0.94, { color: "#199a53", font: "700 12px Rubik, sans-serif" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => {
      const H = foot(P, M1, M2);
      return { ph: Geo.dist(P, H), pq: Geo.dist(P, Q) };
    } };
  },

  /* Расстояние между параллельными прямыми: точка P скользит по прямой a, перпендикуляр
     к прямой b всегда одной длины — но только пока прямые ДЕЙСТВИТЕЛЬНО параллельны. */
  parallelDistance(ctx, canvas, ctrl, spec, w, h) {
    const Ca = { x: w * 0.5, y: h * 0.28, fixed: true };
    const Da = { x: w * 0.9, y: h * 0.28 };
    const Cb = { x: w * 0.5, y: h * 0.75, fixed: true };
    const Db = { x: w * 0.9, y: h * 0.75 };
    const P = { x: w * 0.3, y: h * 0.28 };
    const pts = [Da, Db, P];
    let snapParallel = true;
    ctrl.innerHTML = `<label class="fig-chk"><input type="checkbox" data-k="par" checked> Прямые параллельны</label>`;
    ctrl.querySelector('[data-k="par"]').addEventListener("change", (e) => { snapParallel = e.target.checked; render(); });
    function extend(p1, p2) {
      const dx = p2.x - p1.x, dy = p2.y - p1.y, len = Math.hypot(dx, dy) || 1, ux = dx / len, uy = dy / len, FAR = 1200;
      return [{ x: p1.x - ux * FAR, y: p1.y - uy * FAR }, { x: p1.x + ux * FAR, y: p1.y + uy * FAR }];
    }
    function foot(p, a, b) {
      const dx = b.x - a.x, dy = b.y - a.y, len2 = dx * dx + dy * dy || 1;
      const t = ((p.x - a.x) * dx + (p.y - a.y) * dy) / len2;
      return { x: a.x + t * dx, y: a.y + t * dy };
    }
    function render() {
      P.y = Ca.y; // P всегда лежит ровно на прямой a
      if (snapParallel) {
        const dirA = Math.atan2(Da.y - Ca.y, Da.x - Ca.x), len = Geo.distPx(Cb, Db);
        Db.x = Cb.x + len * Math.cos(dirA); Db.y = Cb.y + len * Math.sin(dirA);
      }
      Figures.drawBase(ctx, w, h);
      const [a1, a2] = extend(Ca, Da); Figures.line(ctx, a1, a2, { stroke: "#5b6bd6", lw: 2.5 });
      const [b1, b2] = extend(Cb, Db); Figures.line(ctx, b1, b2, { stroke: "#5b6bd6", lw: 2.5 });
      const H = foot(P, b1, b2);
      Figures.line(ctx, P, H, { stroke: "#2ecc71", lw: 2.5 });
      Figures.dot(ctx, P, { r: 6 }); Figures.dot(ctx, H, { r: 5, fill: "#199a53" });
      Figures.label(ctx, P, "P", { dy: -14 }); Figures.label(ctx, H, "H", { dy: 18, color: "#199a53" });
      Figures.label(ctx, Ca, "a", { dx: -16, color: "#3a4bcf" }); Figures.label(ctx, Cb, "b", { dx: -16, color: "#3a4bcf" });
      Figures.label(ctx, { x: w / 2, y: h * 0.06 }, `PH = ${Geo.fmt(Geo.dist(P, H))}`, { color: "#199a53", font: "700 14px Rubik, sans-serif" });
      Figures.wrapText(ctx, "Подвигай точку P вдоль прямой a — если прямые параллельны, PH не меняется", w / 2, h * 0.9, w * 0.94, { color: Geo.ink(), font: "600 12px Rubik, sans-serif" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => {
      const [b1, b2] = extend(Cb, Db);
      return { ph: Geo.dist(P, foot(P, b1, b2)) };
    } };
  },

  triangle(ctx, canvas, ctrl, spec, w, h) {
    let A = { x: w * 0.5, y: h * 0.15 };
    let B = { x: w * 0.18, y: h * 0.85 };
    let C = { x: w * 0.82, y: h * 0.85 };
    const pts = [A, B, C];
    const show = Object.assign({ sides: true, angles: false, area: false }, spec.defaultShow || {});
    let lineFrom = null; // 'height' | 'median' | 'bisector' | null
    let fromVertex = "A";
    ctrl.innerHTML = `
      <label class="fig-chk"><input type="checkbox" data-k="sides" checked> Стороны</label>
      <label class="fig-chk"><input type="checkbox" data-k="angles"> Углы</label>
      <label class="fig-chk"><input type="checkbox" data-k="area"> Площадь</label>
      <select class="fig-select" data-k="vertex"><option value="A">из A</option><option value="B">из B</option><option value="C">из C</option></select>
      <select class="fig-select" data-k="line">
        <option value="">Доп. линия…</option>
        <option value="height">Высота</option>
        <option value="median">Медиана</option>
        <option value="bisector">Биссектриса</option>
      </select>`;
    ctrl.querySelector('[data-k="sides"]').addEventListener("change", (e) => { show.sides = e.target.checked; render(); });
    ctrl.querySelector('[data-k="angles"]').addEventListener("change", (e) => { show.angles = e.target.checked; render(); });
    ctrl.querySelector('[data-k="area"]').addEventListener("change", (e) => { show.area = e.target.checked; render(); });
    ctrl.querySelector('[data-k="vertex"]').addEventListener("change", (e) => { fromVertex = e.target.value; render(); });
    ctrl.querySelector('[data-k="line"]').addEventListener("change", (e) => { lineFrom = e.target.value || null; render(); });

    function vmap() { return { A, B, C }; }
    function extraLine() {
      if (!lineFrom) return;
      const V = vmap()[fromVertex];
      const others = ["A", "B", "C"].filter((k) => k !== fromVertex).map((k) => vmap()[k]);
      const [P, Q] = others;
      if (lineFrom === "median") {
        const M = Geo.midpoint(P, Q);
        Figures.line(ctx, V, M, { stroke: "#2ecc71", lw: 2, dash: [7, 5] });
        Figures.label(ctx, M, "M", { dy: 16, color: "#199a53" });
      } else if (lineFrom === "height") {
        // проекция V на прямую PQ
        const dx = Q.x - P.x, dy = Q.y - P.y;
        const t = ((V.x - P.x) * dx + (V.y - P.y) * dy) / (dx * dx + dy * dy || 1);
        const H = { x: P.x + t * dx, y: P.y + t * dy };
        Figures.line(ctx, V, H, { stroke: "#e6572e", lw: 2, dash: [7, 5] });
        Figures.label(ctx, H, "H", { dy: 16, color: "#c8451f" });
      } else if (lineFrom === "bisector") {
        const dP = Geo.distPx(V, P), dQ = Geo.distPx(V, Q);
        const t = dP / (dP + dQ);
        const K = { x: P.x + t * (Q.x - P.x), y: P.y + t * (Q.y - P.y) };
        Figures.line(ctx, V, K, { stroke: "#8b5cf6", lw: 2, dash: [7, 5] });
        Figures.label(ctx, K, "K", { dy: 16, color: "#6d3fd6" });
      }
    }
    function render() {
      Figures.drawBase(ctx, w, h);
      Figures.poly(ctx, [A, B, C], { fill: "rgba(91,107,214,0.10)" });
      extraLine();
      [["A", A], ["B", B], ["C", C]].forEach(([name, p]) => {
        Figures.dot(ctx, p);
        Figures.label(ctx, p, name, { dy: p.y < h / 2 ? -14 : 20 });
      });
      if (show.sides) {
        const pairs = [["c", A, B], ["a", B, C], ["b", C, A]];
        pairs.forEach(([nm, p1, p2]) => {
          const mid = Geo.midpoint(p1, p2);
          Figures.label(ctx, mid, `${nm}=${Geo.fmt(Geo.dist(p1, p2))}`, { color: "#3a4bcf" });
        });
      }
      if (show.angles) {
        Figures.label(ctx, { x: A.x, y: A.y + (A.y < h / 2 ? 34 : -30) }, `${Geo.fmt(Geo.angleDeg(A, B, C))}°`, { color: "#c9740f" });
        Figures.label(ctx, { x: B.x, y: B.y + (B.y < h / 2 ? 34 : -30) }, `${Geo.fmt(Geo.angleDeg(B, A, C))}°`, { color: "#c9740f" });
        Figures.label(ctx, { x: C.x, y: C.y + (C.y < h / 2 ? 34 : -30) }, `${Geo.fmt(Geo.angleDeg(C, A, B))}°`, { color: "#c9740f" });
      }
      if (show.area) {
        const cen = { x: (A.x + B.x + C.x) / 3, y: (A.y + B.y + C.y) / 3 };
        Figures.label(ctx, cen, `S=${Geo.fmt(Geo.areaShoelace([A, B, C]))}`, { color: "#199a53", font: "700 15px Rubik, sans-serif" });
      }
    }
    if (spec.showHeightFrom) { lineFrom = "height"; fromVertex = spec.showHeightFrom; }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return {
      render, destroy: unbind,
      metrics: () => ({
        a: Geo.dist(B, C), b: Geo.dist(C, A), c: Geo.dist(A, B), area: Geo.areaShoelace([A, B, C]),
        perimeter: Geo.dist(B, C) + Geo.dist(C, A) + Geo.dist(A, B),
        angleA: Geo.angleDeg(A, B, C), angleB: Geo.angleDeg(B, A, C), angleC: Geo.angleDeg(C, A, B),
      }),
    };
  },

  /* Произвольный n-угольник: слайдер числа сторон, вершины свободно двигаются.
     Честно считает реальную сумму углов (всегда совпадает с 180°(n-2) для простого
     многоугольника — это математический инвариант, не декларация) и проверяет выпуклость. */
  /* Разбиение многоугольника диагоналями из одной вершины на треугольники — основное
     свойство площади: площадь целого равна сумме площадей частей. Честно суммирует
     площади реальных треугольников (шоулейс) и сравнивает с площадью всей фигуры. */
  areaTriangulation(ctx, canvas, ctrl, spec, w, h) {
    let n = spec.n || 5;
    const pts = [];
    function layout(nn) {
      pts.length = 0;
      const R = Math.min(w, h) * 0.32, cx = w / 2, cy = h / 2;
      for (let i = 0; i < nn; i++) {
        const a = -Math.PI / 2 + i * (2 * Math.PI / nn);
        pts.push({ x: cx + R * Math.cos(a), y: cy + R * Math.sin(a) });
      }
    }
    layout(n);
    ctrl.innerHTML = `<label class="fig-chk">Число сторон: <input type="range" min="4" max="8" value="${n}" data-k="n"> <span data-k="nval">${n}</span></label>`;
    ctrl.querySelector('[data-k="n"]').addEventListener("input", (e) => {
      n = +e.target.value; ctrl.querySelector('[data-k="nval"]').textContent = n; layout(n); render();
    });
    const palette = ["rgba(91,107,214,0.20)", "rgba(255,159,67,0.20)", "rgba(46,204,113,0.20)", "rgba(139,92,246,0.20)", "rgba(230,87,46,0.20)", "rgba(46,204,113,0.35)"];
    function render() {
      Figures.drawBase(ctx, w, h);
      let sum = 0;
      for (let i = 1; i < pts.length - 1; i++) {
        const tri = [pts[0], pts[i], pts[i + 1]];
        const area = Geo.areaShoelace(tri);
        sum += area;
        Figures.poly(ctx, tri, { fill: palette[(i - 1) % palette.length], stroke: "rgba(120,120,160,0.4)" });
        const cen = { x: (tri[0].x + tri[1].x + tri[2].x) / 3, y: (tri[0].y + tri[1].y + tri[2].y) / 3 };
        Figures.label(ctx, cen, Geo.fmt(area), { font: "600 11px Rubik, sans-serif", color: "#3a3a5a" });
      }
      pts.forEach((p, i) => { Figures.dot(ctx, p); Figures.label(ctx, p, String.fromCharCode(65 + i), { dy: p.y < h / 2 ? -14 : 18 }); });
      const total = Geo.areaShoelace(pts);
      Figures.wrapText(ctx, `Сумма площадей треугольников: ${Geo.fmt(sum)}   Площадь всей фигуры: ${Geo.fmt(total)}`, w / 2, h * 0.94, w * 0.94, { color: Math.abs(sum - total) < 0.01 ? "#199a53" : "#c9740f", font: "600 12px Rubik, sans-serif" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => ({ total: Geo.areaShoelace(pts) }) };
  },

  /* Честная проверка формул площади параллелограмма/трапеции: рисуем явный отрезок высоты
     (перпендикуляр к основанию) и сравниваем "формула = основание×высота" с реальной
     площадью фигуры (по шоулейсу) — совпадают только когда фигура ДЕЙСТВИТЕЛЬНО парал./трап. */
  /* Подобные треугольники: НЕ используем метки равенства длин (стороны разные!) — вместо
     этого честно считаем и показываем реальные отношения сторон k1,k2,k3 и совпадают ли они
     (это и есть подобие). Кнопка «Сделать подобными» масштабирует ABC с коэффициентом 1.5. */
  similarTriangles(ctx, canvas, ctrl, spec, w, h) {
    const crit = spec.criterion || "sss";
    const A = { x: w * 0.1, y: h * 0.85 }, B = { x: w * 0.32, y: h * 0.85 }, C = { x: w * 0.18, y: h * 0.3 };
    const D = { x: w * 0.55, y: h * 0.85 }, E = { x: w * 0.95, y: h * 0.85 }, F = { x: w * 0.7, y: h * 0.15 };
    const pts = [A, B, C, D, E, F];
    function closeR(x, y) { return Math.abs(x - y) <= 0.07 * Math.max(x, y, 0.01); }
    function closeA(x, y) { return Math.abs(x - y) <= 3; }
    function makeSimilar() {
      const k = 1.5, cx = (A.x + B.x + C.x) / 3, cy = (A.y + B.y + C.y) / 3;
      const ang = 0.25, shiftX = w * 0.4;
      const tf = (p) => {
        const rx = (p.x - cx) * k, ry = (p.y - cy) * k;
        return { x: cx + rx * Math.cos(ang) - ry * Math.sin(ang) + shiftX, y: cy + rx * Math.sin(ang) + ry * Math.cos(ang) };
      };
      const nd = tf(A), ne = tf(B), nf = tf(C);
      D.x = nd.x; D.y = nd.y; E.x = ne.x; E.y = ne.y; F.x = nf.x; F.y = nf.y;
    }
