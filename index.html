    if (spec.startSimilar) makeSimilar();
    ctrl.innerHTML = `<button class="btn btn-primary btn-sm" data-td-act="align">🔗 Сделать подобными (k=1.5)</button>`;
    ctrl.querySelector('[data-td-act="align"]').addEventListener("click", () => { makeSimilar(); render(); });
    function render() {
      Figures.drawBase(ctx, w, h);
      Figures.poly(ctx, [A, B, C], { fill: "rgba(91,107,214,0.08)" });
      Figures.poly(ctx, [D, E, F], { fill: "rgba(255,159,67,0.08)", stroke: "#ff9f43" });
      [["A", A], ["B", B], ["C", C], ["D", D], ["E", E], ["F", F]].forEach(([nm, p]) => {
        Figures.dot(ctx, p); Figures.label(ctx, p, nm, { dy: p.y > h / 2 ? 20 : -14 });
      });
      const AB = Geo.dist(A, B), BC = Geo.dist(B, C), AC = Geo.dist(A, C);
      const DE = Geo.dist(D, E), EF = Geo.dist(E, F), DF = Geo.dist(D, F);
      const angA = Geo.angleDeg(A, B, C), angB = Geo.angleDeg(B, A, C);
      const angD = Geo.angleDeg(D, E, F), angE2 = Geo.angleDeg(E, D, F);
      const k1 = DE / (AB || 0.01), k2 = EF / (BC || 0.01), k3 = DF / (AC || 0.01);
      let ok;
      if (crit === "aa") {
        const okA = closeA(angA, angD), okB = closeA(angB, angE2);
        Figures.angleTicks(ctx, A, B, C, 1, okA ? "#2ecc71" : "#e6572e"); Figures.angleTicks(ctx, D, E, F, 1, okA ? "#2ecc71" : "#e6572e");
        Figures.angleTicks(ctx, B, A, C, 2, okB ? "#2ecc71" : "#e6572e"); Figures.angleTicks(ctx, E, D, F, 2, okB ? "#2ecc71" : "#e6572e");
        ok = okA && okB;
        Figures.wrapText(ctx, "По двум углам (АА): ∠A=∠D, ∠B=∠E", w / 2, h * 0.06, w * 0.92, { color: Geo.ink(), font: "600 13px Rubik, sans-serif" });
      } else if (crit === "sas") {
        const okA = closeA(angA, angD), okK = closeR(k1, k3);
        Figures.angleTicks(ctx, A, B, C, 1, okA ? "#2ecc71" : "#e6572e"); Figures.angleTicks(ctx, D, E, F, 1, okA ? "#2ecc71" : "#e6572e");
        Figures.label(ctx, Geo.midpoint(A, B), `k≈${Geo.fmt(k1)}`, { color: okK ? "#199a53" : "#c9740f" });
        Figures.label(ctx, Geo.midpoint(A, C), `k≈${Geo.fmt(k3)}`, { color: okK ? "#199a53" : "#c9740f" });
        ok = okA && okK;
        Figures.wrapText(ctx, "По двум сторонам и углу между ними (SAS подобия): AB/DE=AC/DF, ∠A=∠D", w / 2, h * 0.06, w * 0.92, { color: Geo.ink(), font: "600 13px Rubik, sans-serif" });
      } else {
        const okK = closeR(k1, k2) && closeR(k2, k3);
        Figures.label(ctx, Geo.midpoint(A, B), `k≈${Geo.fmt(k1)}`, { color: okK ? "#199a53" : "#c9740f" });
        Figures.label(ctx, Geo.midpoint(B, C), `k≈${Geo.fmt(k2)}`, { color: okK ? "#199a53" : "#c9740f" });
        Figures.label(ctx, Geo.midpoint(A, C), `k≈${Geo.fmt(k3)}`, { color: okK ? "#199a53" : "#c9740f" });
        ok = okK;
        Figures.wrapText(ctx, "По трём сторонам (SSS подобия): все три отношения сторон равны", w / 2, h * 0.06, w * 0.92, { color: Geo.ink(), font: "600 13px Rubik, sans-serif" });
      }
      Figures.wrapText(ctx, ok ? `✓ Треугольники подобны, k≈${Geo.fmt((k1 + k2 + k3) / 3)}` : "✗ Пока не подобны — потяни точки или нажми кнопку",
        w / 2, h * 0.94, w * 0.94, { color: ok ? "#199a53" : "#c9740f", font: "700 13px Rubik, sans-serif" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return {
      render, destroy: unbind,
      metrics: () => ({
        AB: Geo.dist(A, B), BC: Geo.dist(B, C), AC: Geo.dist(A, C),
        DE: Geo.dist(D, E), EF: Geo.dist(E, F), DF: Geo.dist(D, F),
        angA: Geo.angleDeg(A, B, C), angB: Geo.angleDeg(B, A, C),
        angD: Geo.angleDeg(D, E, F), angE: Geo.angleDeg(E, D, F),
        areaABC: Geo.areaShoelace([A, B, C]), areaDEF: Geo.areaShoelace([D, E, F]),
      }),
    };
  },

  /* Средняя линия треугольника: M,N — середины сторон AB, AC (вычисляются, а не двигаются
     отдельно). Честно проверяет MN ∥ BC и MN = BC/2 при любой форме треугольника. */
  triangleMidline(ctx, canvas, ctrl, spec, w, h) {
    const A = { x: w * 0.5, y: h * 0.15 }, B = { x: w * 0.15, y: h * 0.85 }, C = { x: w * 0.85, y: h * 0.85 };
    const pts = [A, B, C];
    function render() {
      Figures.drawBase(ctx, w, h);
      const M = Geo.midpoint(A, B), N = Geo.midpoint(A, C);
      Figures.poly(ctx, [A, B, C], { fill: "rgba(91,107,214,0.08)" });
      Figures.line(ctx, M, N, { stroke: "#2ecc71", lw: 3 });
      Figures.line(ctx, B, C, { stroke: "#5b6bd6", lw: 2, dash: [5, 4] });
      [["A", A], ["B", B], ["C", C]].forEach(([nm, p]) => { Figures.dot(ctx, p); Figures.label(ctx, p, nm, { dy: p.y < h / 2 ? -14 : 20 }); });
      Figures.dot(ctx, M, { r: 5, fill: "#199a53" }); Figures.dot(ctx, N, { r: 5, fill: "#199a53" });
      Figures.label(ctx, M, "M", { dy: -12, color: "#199a53" }); Figures.label(ctx, N, "N", { dy: -12, color: "#199a53" });
      const mn = Geo.dist(M, N), bc = Geo.dist(B, C);
      const dMN = Math.atan2(N.y - M.y, N.x - M.x), dBC = Math.atan2(C.y - B.y, C.x - B.x);
      let diff = Math.abs((dMN - dBC) * 180 / Math.PI) % 180; if (diff > 90) diff = 180 - diff;
      const parallel = diff < 2, halfOk = Math.abs(mn - bc / 2) < 0.05 * bc;
      Figures.wrapText(ctx, `MN = ${Geo.fmt(mn)}   BC/2 = ${Geo.fmt(bc / 2)}`, w / 2, h * 0.06, w * 0.92, { color: Geo.ink() });
      Figures.wrapText(ctx, (parallel && halfOk) ? "✓ MN ∥ BC и MN = BC/2 — свойство средней линии" : "✗ Проверь снова", w / 2, h * 0.94, w * 0.94, { color: (parallel && halfOk) ? "#199a53" : "#c9740f", font: "700 12px Rubik, sans-serif" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => ({ mn: Geo.dist(Geo.midpoint(A, B), Geo.midpoint(A, C)), bc: Geo.dist(B, C) }) };
  },

  /* Медианы и центроид: все три медианы треугольника, точка пересечения (центроид)
     проверяется двумя независимыми способами — как (A+B+C)/3 и как реальное пересечение
     двух медиан — и делит каждую медиану в отношении 2:1 от вершины. */
  centroidDemo(ctx, canvas, ctrl, spec, w, h) {
    const A = { x: w * 0.5, y: h * 0.14 }, B = { x: w * 0.12, y: h * 0.88 }, C = { x: w * 0.88, y: h * 0.88 };
    const pts = [A, B, C];
    function render() {
      Figures.drawBase(ctx, w, h);
      const Ma = Geo.midpoint(B, C), Mb = Geo.midpoint(A, C), Mc = Geo.midpoint(A, B);
      Figures.poly(ctx, [A, B, C], { fill: "rgba(91,107,214,0.08)" });
      Figures.line(ctx, A, Ma, { stroke: "#ff9f43", lw: 2 });
      Figures.line(ctx, B, Mb, { stroke: "#2ecc71", lw: 2 });
      Figures.line(ctx, C, Mc, { stroke: "#8b5cf6", lw: 2 });
      const G = { x: (A.x + B.x + C.x) / 3, y: (A.y + B.y + C.y) / 3 };
      const Gcheck = Geo.lineIntersect(A, Ma, B, Mb);
      [["A", A], ["B", B], ["C", C]].forEach(([nm, p]) => { Figures.dot(ctx, p); Figures.label(ctx, p, nm, { dy: p.y < h / 2 ? -14 : 20 }); });
      Figures.dot(ctx, G, { r: 6, fill: "#e6572e" }); Figures.label(ctx, G, "G", { dy: -14, color: "#c8451f" });
      const dAG = Geo.dist(A, G), dGMa = Geo.dist(G, Ma);
      const ratio = dAG / (dGMa || 0.01);
      const okPoint = Gcheck && Geo.distPx(G, Gcheck) < 3;
      const okRatio = Math.abs(ratio - 2) < 0.1;
      Figures.wrapText(ctx, `AG = ${Geo.fmt(dAG)}   G-Ma = ${Geo.fmt(dGMa)}   AG/GMa ≈ ${Geo.fmt(ratio)}`, w / 2, h * 0.06, w * 0.92, { color: Geo.ink() });
      Figures.wrapText(ctx, (okPoint && okRatio) ? "✓ Все три медианы пересекаются в одной точке, деля её 2:1 от вершины" : "Двигай вершины и смотри на отношение",
        w / 2, h * 0.95, w * 0.94, { color: okPoint && okRatio ? "#199a53" : Geo.ink(), font: "600 11px Rubik, sans-serif" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => {
      const G = { x: (A.x + B.x + C.x) / 3, y: (A.y + B.y + C.y) / 3 };
      const Ma = Geo.midpoint(B, C);
      return { ratio: Geo.dist(A, G) / (Geo.dist(G, Ma) || 0.01) };
    } };
  },

  /* Пропорциональные отрезки в прямоугольном треугольнике: высота из прямого угла на
     гипотенузу делит её на два отрезка. Честно проверяет h²=p·q и оба "катет²=гипотенуза×
     прилежащий отрезок" — прямой угол гарантирован построением (как в pytriangle). */
  altitudeHypotenuse(ctx, canvas, ctrl, spec, w, h) {
    const C = { x: w * 0.2, y: h * 0.85, fixed: true };
    const A = { x: w * 0.8, y: h * 0.85 };
    const B = { x: w * 0.2, y: h * 0.15 };
    const pts = [C, A, B];
    function foot(p, a, b) {
      const dx = b.x - a.x, dy = b.y - a.y, len2 = dx * dx + dy * dy || 1;
      const t = ((p.x - a.x) * dx + (p.y - a.y) * dy) / len2;
      return { x: a.x + t * dx, y: a.y + t * dy };
    }
    function render() {
      A.y = C.y; B.x = C.x; // прямой угол при C гарантирован всегда
      Figures.drawBase(ctx, w, h);
      const H = foot(C, A, B);
      Figures.poly(ctx, [A, B, C], { fill: "rgba(91,107,214,0.08)" });
      Figures.line(ctx, C, H, { stroke: "#e6572e", lw: 2.5, dash: [6, 4] });
      [["A", A], ["B", B], ["C", C]].forEach(([nm, p]) => { Figures.dot(ctx, p); Figures.label(ctx, p, nm, { dy: p.y < h / 2 ? -14 : 20 }); });
      Figures.dot(ctx, H, { r: 5, fill: "#c8451f" }); Figures.label(ctx, H, "H", { dy: 16, color: "#c8451f" });
      const p = Geo.dist(B, H), q = Geo.dist(A, H), hgt = Geo.dist(C, H);
      const bc = Geo.dist(B, C), ac = Geo.dist(A, C), ab = Geo.dist(A, B);
      const okH = Math.abs(hgt * hgt - p * q) < 0.08 * Math.max(hgt * hgt, 0.01);
      const okLeg = Math.abs(bc * bc - ab * p) < 0.08 * Math.max(bc * bc, 0.01);
      Figures.wrapText(ctx, `h²=${Geo.fmt(hgt * hgt)}  p·q=${Geo.fmt(p * q)}   BC²=${Geo.fmt(bc * bc)}  AB·BH=${Geo.fmt(ab * p)}`, w / 2, h * 0.06, w * 0.94, { color: Geo.ink(), font: "600 11px Rubik, sans-serif" });
      Figures.wrapText(ctx, (okH && okLeg) ? "✓ Высота и катеты — среднее пропорциональное отрезков гипотенузы" : "Двигай точки, сверяясь с числами выше",
        w / 2, h * 0.95, w * 0.94, { color: (okH && okLeg) ? "#199a53" : Geo.ink(), font: "600 11px Rubik, sans-serif" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => {
      const H = foot(C, A, B);
      return { p: Geo.dist(B, H), q: Geo.dist(A, H), height: Geo.dist(C, H), bc: Geo.dist(B, C), ac: Geo.dist(A, C), ab: Geo.dist(A, B) };
    } };
  },

  /* Касательная к окружности: прямая через точку A (draggable направление), честно
     считает расстояние от центра до прямой и сравнивает с радиусом — классифицирует
     как "не пересекает / касается / пересекает", а не декларирует. */
  tangentLine(ctx, canvas, ctrl, spec, w, h) {
    const O = { x: w * 0.5, y: h * 0.5, fixed: true };
    const R = { x: w * 0.5 + 90, y: h * 0.5, fixed: true }; // задаёт радиус окружности
    const L1 = { x: w * 0.15, y: h * 0.2 }, L2 = { x: w * 0.85, y: h * 0.65 }; // прямая
    const pts = [L1, L2];
    function render() {
      Figures.drawBase(ctx, w, h);
      const r = Geo.distPx(O, R);
      ctx.beginPath(); ctx.arc(O.x, O.y, r, 0, Math.PI * 2); ctx.strokeStyle = "#5b6bd6"; ctx.lineWidth = 2.5; ctx.stroke();
      Figures.dot(ctx, O, { r: 5 }); Figures.label(ctx, O, "O", { dy: -12, color: "#3a4bcf" });
      const dx = L2.x - L1.x, dy = L2.y - L1.y, len = Math.hypot(dx, dy) || 1, ux = dx / len, uy = dy / len, FAR = 800;
      const a1 = { x: L1.x - ux * FAR, y: L1.y - uy * FAR }, a2 = { x: L2.x + ux * FAR, y: L2.y + uy * FAR };
      // расстояние от O до прямой (проекция)
      const t = ((O.x - L1.x) * dx + (O.y - L1.y) * dy) / (len * len);
      const foot = { x: L1.x + t * dx, y: L1.y + t * dy };
      const d = Geo.distPx(O, foot);
      let status, color;
      if (Math.abs(d - r) < 4) { status = "✓ Касательная: d = r, одна общая точка"; color = "#199a53"; }
      else if (d < r) { status = "Секущая: d < r, две общие точки"; color = "#c9740f"; }
      else { status = "Не пересекает окружность: d > r"; color = "#e6572e"; }
      Figures.line(ctx, a1, a2, { stroke: color, lw: 2.5 });
      Figures.line(ctx, O, foot, { stroke: "#8b93d6", lw: 1.5, dash: [4, 4] });
      Figures.dot(ctx, foot, { r: 4, fill: "#8b93d6" });
      Figures.dot(ctx, L1, { r: 5 }); Figures.dot(ctx, L2, { r: 5 });
      Figures.wrapText(ctx, `Расстояние от центра до прямой: d=${Geo.fmt(d / Geo.UNIT)}   Радиус: r=${Geo.fmt(r / Geo.UNIT)}`, w / 2, h * 0.06, w * 0.94, { color: Geo.ink(), font: "600 12px Rubik, sans-serif" });
      Figures.wrapText(ctx, status, w / 2, h * 0.94, w * 0.94, { color, font: "700 12px Rubik, sans-serif" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => {
      const dx = L2.x - L1.x, dy = L2.y - L1.y, len = Math.hypot(dx, dy) || 1;
      const t = ((O.x - L1.x) * dx + (O.y - L1.y) * dy) / (len * len);
      const foot = { x: L1.x + t * dx, y: L1.y + t * dy };
      return { d: Geo.distPx(O, foot), r: Geo.distPx(O, R) };
    } };
  },

  /* Вписанный угол: вершина C на окружности, стороны — хорды CA, CB. Честно проверяет,
     что вписанный угол равен половине центрального угла AOB, опирающегося на ту же дугу. */
  inscribedAngle(ctx, canvas, ctrl, spec, w, h) {
    const O = { x: w * 0.5, y: h * 0.52, fixed: true };
    const Rr = Math.min(w, h) * 0.34;
    let degA = -150, degB = -30, degC = 100;
    const A = { x: O.x + Rr * Math.cos(degA * Math.PI / 180), y: O.y + Rr * Math.sin(degA * Math.PI / 180) };
    const B = { x: O.x + Rr * Math.cos(degB * Math.PI / 180), y: O.y + Rr * Math.sin(degB * Math.PI / 180) };
    const C = { x: O.x + Rr * Math.cos(degC * Math.PI / 180), y: O.y + Rr * Math.sin(degC * Math.PI / 180) };
    const pts = [A, B, C];
    function snapToCircle(p) {
      const d = Geo.distPx(O, p) || 1;
      p.x = O.x + (p.x - O.x) / d * Rr; p.y = O.y + (p.y - O.y) / d * Rr;
    }
    function render() {
      pts.forEach(snapToCircle); // все три точки всегда строго на окружности
      Figures.drawBase(ctx, w, h);
      ctx.beginPath(); ctx.arc(O.x, O.y, Rr, 0, Math.PI * 2); ctx.strokeStyle = "#5b6bd6"; ctx.lineWidth = 2; ctx.stroke();
      Figures.line(ctx, O, A, { stroke: "#8b93d6", lw: 1.5, dash: [4, 4] });
      Figures.line(ctx, O, B, { stroke: "#8b93d6", lw: 1.5, dash: [4, 4] });
      Figures.line(ctx, C, A, { stroke: "#ff9f43", lw: 2.5 });
      Figures.line(ctx, C, B, { stroke: "#ff9f43", lw: 2.5 });
      Figures.dot(ctx, O, { r: 4 }); [["A", A], ["B", B], ["C", C]].forEach(([nm, p]) => { Figures.dot(ctx, p); Figures.label(ctx, p, nm, { dy: p.y < O.y ? -14 : 18 }); });
      const central = Geo.angleDeg(O, A, B), inscribed = Geo.angleDeg(C, A, B);
      const ok = Math.abs(inscribed - central / 2) < 2;
      Figures.wrapText(ctx, `Центральный угол AOB=${Geo.fmt(central)}°   Вписанный угол ACB=${Geo.fmt(inscribed)}°`, w / 2, h * 0.06, w * 0.94, { color: Geo.ink(), font: "600 12px Rubik, sans-serif" });
      Figures.wrapText(ctx, ok ? "✓ Вписанный угол = половина центрального" : "Двигай C по окружности", w / 2, h * 0.94, w * 0.94, { color: ok ? "#199a53" : Geo.ink(), font: "700 12px Rubik, sans-serif" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => ({ central: Geo.angleDeg(O, A, B), inscribed: Geo.angleDeg(C, A, B) }) };
  },

  /* Пересекающиеся хорды: честно проверяет AK·KB = CK·KD для точки пересечения K. */
  intersectingChords(ctx, canvas, ctrl, spec, w, h) {
    const O = { x: w * 0.5, y: h * 0.5, fixed: true };
    const Rr = Math.min(w, h) * 0.34;
    let A = { x: O.x - Rr * 0.9, y: O.y - Rr * 0.4 }, B = { x: O.x + Rr * 0.7, y: O.y + Rr * 0.6 };
    let C = { x: O.x - Rr * 0.6, y: O.y + Rr * 0.7 }, D = { x: O.x + Rr * 0.85, y: O.y - Rr * 0.35 };
    const pts = [A, B, C, D];
    function snapToCircle(p) { const d = Geo.distPx(O, p) || 1; p.x = O.x + (p.x - O.x) / d * Rr; p.y = O.y + (p.y - O.y) / d * Rr; }
    function render() {
      pts.forEach(snapToCircle);
      Figures.drawBase(ctx, w, h);
      ctx.beginPath(); ctx.arc(O.x, O.y, Rr, 0, Math.PI * 2); ctx.strokeStyle = "#5b6bd6"; ctx.lineWidth = 2; ctx.stroke();
      Figures.line(ctx, A, B, { stroke: "#ff9f43", lw: 2.5 });
      Figures.line(ctx, C, D, { stroke: "#2ecc71", lw: 2.5 });
      const K = Geo.lineIntersect(A, B, C, D);
      [["A", A], ["B", B], ["C", C], ["D", D]].forEach(([nm, p]) => { Figures.dot(ctx, p); Figures.label(ctx, p, nm, { dy: p.y < O.y ? -14 : 18 }); });
      let text2 = "Хорды не пересекаются внутри круга — подвигай точки", ok = false, prod1 = 0, prod2 = 0;
      if (K) {
        Figures.dot(ctx, K, { r: 5, fill: "#c8451f" }); Figures.label(ctx, K, "K", { dy: -12, color: "#c8451f" });
        prod1 = Geo.dist(A, K) * Geo.dist(K, B); prod2 = Geo.dist(C, K) * Geo.dist(K, D);
        ok = Math.abs(prod1 - prod2) < 0.08 * Math.max(prod1, prod2, 0.01);
        text2 = `AK·KB=${Geo.fmt(prod1)}   CK·KD=${Geo.fmt(prod2)}`;
      }
      Figures.wrapText(ctx, text2, w / 2, h * 0.06, w * 0.94, { color: Geo.ink(), font: "600 12px Rubik, sans-serif" });
      Figures.wrapText(ctx, ok ? "✓ Произведения отрезков хорд равны" : "", w / 2, h * 0.94, w * 0.94, { color: "#199a53", font: "700 12px Rubik, sans-serif" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => {
      const K = Geo.lineIntersect(A, B, C, D);
      if (!K) return { hasIntersection: false };
      return { hasIntersection: true, prod1: Geo.dist(A, K) * Geo.dist(K, B), prod2: Geo.dist(C, K) * Geo.dist(K, D) };
    } };
  },

  /* Инцентр: три биссектрисы углов треугольника пересекаются в одной точке, равноудалённой
     от всех трёх сторон (центр вписанной окружности). Опционально рисует саму окружность. */
  incenterDemo(ctx, canvas, ctrl, spec, w, h) {
    const A = { x: w * 0.5, y: h * 0.14 }, B = { x: w * 0.12, y: h * 0.88 }, C = { x: w * 0.88, y: h * 0.88 };
    const pts = [A, B, C];
    function foot(p, a, b) { const dx = b.x - a.x, dy = b.y - a.y, len2 = dx * dx + dy * dy || 1; const t = ((p.x - a.x) * dx + (p.y - a.y) * dy) / len2; return { x: a.x + t * dx, y: a.y + t * dy }; }
    function bisectorPoint(V, P, Q) { // точка на биссектрисе угла V (между лучами VP, VQ), пропорционально делящая противоположную сторону
      const dP = Geo.distPx(V, P), dQ = Geo.distPx(V, Q); const t = dP / (dP + dQ);
      return { x: P.x + t * (Q.x - P.x), y: P.y + t * (Q.y - P.y) };
    }
    function render() {
      Figures.drawBase(ctx, w, h);
      Figures.poly(ctx, [A, B, C], { fill: "rgba(91,107,214,0.08)" });
      const Ka = bisectorPoint(A, B, C), Kb = bisectorPoint(B, A, C), Kc = bisectorPoint(C, A, B);
      Figures.line(ctx, A, Ka, { stroke: "#ff9f43", lw: 2 });
      Figures.line(ctx, B, Kb, { stroke: "#2ecc71", lw: 2 });
      Figures.line(ctx, C, Kc, { stroke: "#8b5cf6", lw: 2 });
      const I = Geo.lineIntersect(A, Ka, B, Kb);
      [["A", A], ["B", B], ["C", C]].forEach(([nm, p]) => { Figures.dot(ctx, p); Figures.label(ctx, p, nm, { dy: p.y < h / 2 ? -14 : 20 }); });
      if (I) {
        Figures.dot(ctx, I, { r: 6, fill: "#e6572e" }); Figures.label(ctx, I, "I", { dy: -14, color: "#c8451f" });
        const dAB = Geo.dist(I, foot(I, A, B)), dBC = Geo.dist(I, foot(I, B, C)), dAC = Geo.dist(I, foot(I, A, C));
        const ok = Math.abs(dAB - dBC) < 0.06 * dBC && Math.abs(dBC - dAC) < 0.06 * dAC;
        if (spec.showCircle) {
          const r = Geo.distPx(I, foot(I, A, B));
          ctx.beginPath(); ctx.arc(I.x, I.y, r, 0, Math.PI * 2); ctx.strokeStyle = "#199a53"; ctx.lineWidth = 2; ctx.stroke();
        }
        Figures.wrapText(ctx, `Расстояния от I до сторон: ${Geo.fmt(dAB)}, ${Geo.fmt(dBC)}, ${Geo.fmt(dAC)}`, w / 2, h * 0.06, w * 0.94, { color: Geo.ink(), font: "600 12px Rubik, sans-serif" });
        Figures.wrapText(ctx, ok ? "✓ I равноудалена от всех трёх сторон — центр вписанной окружности" : "", w / 2, h * 0.95, w * 0.94, { color: "#199a53", font: "600 11px Rubik, sans-serif" });
      }
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => {
      const Ka = bisectorPoint(A, B, C), Kb = bisectorPoint(B, A, C);
      const I = Geo.lineIntersect(A, Ka, B, Kb);
      if (!I) return {};
      return { dAB: Geo.dist(I, foot(I, A, B)), dBC: Geo.dist(I, foot(I, B, C)), dAC: Geo.dist(I, foot(I, A, C)) };
    } };
  },

  /* Циркумцентр: три серединных перпендикуляра пересекаются в одной точке, равноудалённой
     от всех трёх ВЕРШИН (центр описанной окружности). */
  circumcenterDemo(ctx, canvas, ctrl, spec, w, h) {
    const A = { x: w * 0.5, y: h * 0.16 }, B = { x: w * 0.14, y: h * 0.82 }, C = { x: w * 0.86, y: h * 0.82 };
    const pts = [A, B, C];
    function perpBisectorLine(P, Q) {
      const M = Geo.midpoint(P, Q); const dx = Q.x - P.x, dy = Q.y - P.y;
      return [{ x: M.x - dy, y: M.y + dx }, { x: M.x + dy, y: M.y - dx }];
    }
    function render() {
      Figures.drawBase(ctx, w, h);
      Figures.poly(ctx, [A, B, C], { fill: "rgba(91,107,214,0.08)" });
      const [p1a, p1b] = perpBisectorLine(A, B), [p2a, p2b] = perpBisectorLine(B, C), [p3a, p3b] = perpBisectorLine(A, C);
      Figures.line(ctx, p1a, p1b, { stroke: "#ff9f43", lw: 2 });
      Figures.line(ctx, p2a, p2b, { stroke: "#2ecc71", lw: 2 });
      Figures.line(ctx, p3a, p3b, { stroke: "#8b5cf6", lw: 2 });
      const Ctr = Geo.lineIntersect(p1a, p1b, p2a, p2b);
      [["A", A], ["B", B], ["C", C]].forEach(([nm, p]) => { Figures.dot(ctx, p); Figures.label(ctx, p, nm, { dy: p.y < h / 2 ? -14 : 20 }); });
      if (Ctr) {
        Figures.dot(ctx, Ctr, { r: 6, fill: "#e6572e" }); Figures.label(ctx, Ctr, "O", { dy: -14, color: "#c8451f" });
        const dA = Geo.dist(Ctr, A), dB = Geo.dist(Ctr, B), dC = Geo.dist(Ctr, C);
        const ok = Math.abs(dA - dB) < 0.06 * dB && Math.abs(dB - dC) < 0.06 * dC;
        if (spec.showCircle) { ctx.beginPath(); ctx.arc(Ctr.x, Ctr.y, Geo.distPx(Ctr, A), 0, Math.PI * 2); ctx.strokeStyle = "#199a53"; ctx.lineWidth = 2; ctx.stroke(); }
        Figures.wrapText(ctx, `Расстояния от O до вершин: ${Geo.fmt(dA)}, ${Geo.fmt(dB)}, ${Geo.fmt(dC)}`, w / 2, h * 0.06, w * 0.94, { color: Geo.ink(), font: "600 12px Rubik, sans-serif" });
        Figures.wrapText(ctx, ok ? "✓ O равноудалена от всех трёх вершин — центр описанной окружности" : "", w / 2, h * 0.95, w * 0.94, { color: "#199a53", font: "600 11px Rubik, sans-serif" });
      }
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => {
      const [p1a, p1b] = perpBisectorLine(A, B), [p2a, p2b] = perpBisectorLine(B, C);
      const Ctr = Geo.lineIntersect(p1a, p1b, p2a, p2b);
      if (!Ctr) return {};
      return { dA: Geo.dist(Ctr, A), dB: Geo.dist(Ctr, B), dC: Geo.dist(Ctr, C) };
    } };
  },

  /* Ортоцентр: три высоты треугольника (или их продолжения) пересекаются в одной точке. */
  orthocenterDemo(ctx, canvas, ctrl, spec, w, h) {
    const A = { x: w * 0.55, y: h * 0.14 }, B = { x: w * 0.12, y: h * 0.85 }, C = { x: w * 0.88, y: h * 0.8 };
    const pts = [A, B, C];
    function altitudeLine(V, P, Q) {
      // высота из V перпендикулярна PQ; строим прямую через V в направлении, перпендикулярном PQ
      const dx = Q.x - P.x, dy = Q.y - P.y;
      return [{ x: V.x - dy, y: V.y + dx }, { x: V.x + dy, y: V.y - dx }];
    }
    function render() {
      Figures.drawBase(ctx, w, h);
      Figures.poly(ctx, [A, B, C], { fill: "rgba(91,107,214,0.08)" });
      const [a1, a2] = altitudeLine(A, B, C), [b1, b2] = altitudeLine(B, A, C), [c1, c2] = altitudeLine(C, A, B);
      Figures.line(ctx, a1, a2, { stroke: "#ff9f43", lw: 2 });
      Figures.line(ctx, b1, b2, { stroke: "#2ecc71", lw: 2 });
      Figures.line(ctx, c1, c2, { stroke: "#8b5cf6", lw: 2 });
      const H = Geo.lineIntersect(a1, a2, b1, b2);
      const Hcheck = Geo.lineIntersect(b1, b2, c1, c2);
      [["A", A], ["B", B], ["C", C]].forEach(([nm, p]) => { Figures.dot(ctx, p); Figures.label(ctx, p, nm, { dy: p.y < h / 2 ? -14 : 20 }); });
      if (H) {
        Figures.dot(ctx, H, { r: 6, fill: "#e6572e" }); Figures.label(ctx, H, "H", { dy: -14, color: "#c8451f" });
        const ok = Hcheck && Geo.distPx(H, Hcheck) < 3;
        Figures.wrapText(ctx, ok ? "✓ Все три высоты пересекаются в одной точке H (ортоцентр)" : "Проверяем пересечение высот…",
          w / 2, h * 0.94, w * 0.94, { color: ok ? "#199a53" : Geo.ink(), font: "700 12px Rubik, sans-serif" });
      }
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => {
      const [a1, a2] = altitudeLine(A, B, C), [b1, b2] = altitudeLine(B, A, C), [c1, c2] = altitudeLine(C, A, B);
      const H = Geo.lineIntersect(a1, a2, b1, b2), Hcheck = Geo.lineIntersect(b1, b2, c1, c2);
      return { concurrent: !!(H && Hcheck && Geo.distPx(H, Hcheck) < 3) };
    } };
  },

  heightAreaDemo(ctx, canvas, ctrl, spec, w, h) {
    const variant = spec.variant || "parallelogram";
    let A, B, C, D;
    if (variant === "trapezoid") {
      A = { x: w * 0.15, y: h * 0.8 }; B = { x: w * 0.85, y: h * 0.8 };
      D = { x: w * 0.32, y: h * 0.25 }; C = { x: w * 0.68, y: h * 0.25 };
    } else {
      A = { x: w * 0.18, y: h * 0.8 }; B = { x: w * 0.72, y: h * 0.8 };
      D = { x: w * 0.34, y: h * 0.22 }; C = { x: w * 0.88, y: h * 0.22 };
    }
    const pts = [A, B, C, D];
    function foot(p, a, b) {
      const dx = b.x - a.x, dy = b.y - a.y, len2 = dx * dx + dy * dy || 1;
      const t = ((p.x - a.x) * dx + (p.y - a.y) * dy) / len2;
      return { x: a.x + t * dx, y: a.y + t * dy };
    }
    function render() {
      Figures.drawBase(ctx, w, h);
      Figures.poly(ctx, [A, B, C, D], { fill: "rgba(91,107,214,0.10)" });
      const baseAB = Geo.dist(A, B);
      const H1 = foot(D, A, B);
      Figures.line(ctx, D, H1, { stroke: "#e6572e", lw: 2, dash: [6, 4] });
      Figures.label(ctx, Geo.midpoint(D, H1), "h", { color: "#c8451f", dx: 12 });
      let formulaArea, formulaText;
      if (variant === "trapezoid") {
        const baseDC = Geo.dist(D, C);
        const height = Geo.dist(D, H1);
        formulaArea = (baseAB + baseDC) / 2 * height;
        formulaText = `(a+b)/2·h = (${Geo.fmt(baseAB)}+${Geo.fmt(baseDC)})/2×${Geo.fmt(height)} = ${Geo.fmt(formulaArea)}`;
      } else {
        const height = Geo.dist(D, H1);
        formulaArea = baseAB * height;
        formulaText = `a·h = ${Geo.fmt(baseAB)}×${Geo.fmt(height)} = ${Geo.fmt(formulaArea)}`;
      }
      const realArea = Geo.areaShoelace(pts);
      [["A", A], ["B", B], ["C", C], ["D", D]].forEach(([nm, p]) => { Figures.dot(ctx, p); Figures.label(ctx, p, nm, { dy: p.y < h / 2 ? -14 : 18 }); });
      Figures.label(ctx, Geo.midpoint(A, B), `основание a=${Geo.fmt(baseAB)}`, { color: "#3a4bcf", dy: 20 });
      const ok = Math.abs(formulaArea - realArea) < 0.05 * Math.max(realArea, 0.01);
      Figures.wrapText(ctx, formulaText, w / 2, h * 0.06, w * 0.92, { color: Geo.ink(), font: "600 12px Rubik, sans-serif" });
      Figures.wrapText(ctx, `Реальная площадь фигуры: ${Geo.fmt(realArea)}  ${ok ? "✓ формулы совпадают" : "✗ фигура — уже не настоящий " + (variant === "trapezoid" ? "трапеция" : "параллелограмм")}`,
        w / 2, h * 0.94, w * 0.94, { color: ok ? "#199a53" : "#c9740f", font: "600 11px Rubik, sans-serif" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => ({ area: Geo.areaShoelace(pts) }) };
  },

  polygonGeneral(ctx, canvas, ctrl, spec, w, h) {
    let n = spec.n || 5;
    const pts = [];
    function layout(nn) {
      pts.length = 0;
      const R = Math.min(w, h) * 0.32, cx = w / 2, cy = h / 2;
      for (let i = 0; i < nn; i++) {
        const a = -Math.PI / 2 + i * (2 * Math.PI / nn);
        pts.push({ x: cx + R * Math.cos(a), y: cy + R * Math.sin(a) });
      }
    }
    layout(n);
    ctrl.innerHTML = `<label class="fig-chk">Число сторон: <input type="range" min="3" max="8" value="${n}" data-k="n"> <span data-k="nval">${n}</span></label>`;
    ctrl.querySelector('[data-k="n"]').addEventListener("input", (e) => {
      n = +e.target.value;
      ctrl.querySelector('[data-k="nval"]').textContent = n;
      layout(n);
      render();
    });
    function isConvex() {
      let sign = 0, convex = true;
      for (let i = 0; i < pts.length; i++) {
        const p0 = pts[(i - 1 + pts.length) % pts.length], p1 = pts[i], p2 = pts[(i + 1) % pts.length];
        const cross = (p1.x - p0.x) * (p2.y - p1.y) - (p1.y - p0.y) * (p2.x - p1.x);
        const s = Math.sign(cross);
        if (s !== 0) { if (sign === 0) sign = s; else if (s !== sign) convex = false; }
      }
      return convex;
    }
    function angleSum() {
      // Считаем через углы поворота (внешние углы), а не через Geo.angleDeg напрямую —
      // тот всегда возвращает 0..180°, что даёт неверную сумму для невыпуклых (рефлексных)
      // углов больше 180°. Сумма внешних углов простого многоугольника всегда ±360° —
      // это и используем, чтобы честно посчитать сумму именно внутренних углов.
      const n = pts.length;
      let area2 = 0;
      for (let i = 0; i < n; i++) { const a = pts[i], b = pts[(i + 1) % n]; area2 += a.x * b.y - b.x * a.y; }
      const orientation = area2 > 0 ? 1 : -1;
      let sum = 0;
      for (let i = 0; i < n; i++) {
        const prev = pts[(i - 1 + n) % n], cur = pts[i], next = pts[(i + 1) % n];
        const v1 = { x: cur.x - prev.x, y: cur.y - prev.y }, v2 = { x: next.x - cur.x, y: next.y - cur.y };
        let turn = Math.atan2(v2.y, v2.x) - Math.atan2(v1.y, v1.x);
        while (turn > Math.PI) turn -= 2 * Math.PI;
        while (turn < -Math.PI) turn += 2 * Math.PI;
        sum += 180 - orientation * (turn * 180 / Math.PI);
      }
      return sum;
    }
    function render() {
      Figures.drawBase(ctx, w, h);
      Figures.poly(ctx, pts, { fill: "rgba(91,107,214,0.10)" });
      pts.forEach((p, i) => { Figures.dot(ctx, p); Figures.label(ctx, p, String.fromCharCode(65 + i), { dy: p.y < h / 2 ? -14 : 18 }); });
      const convex = isConvex(), sum = angleSum(), theory = 180 * (pts.length - 2);
      Figures.label(ctx, { x: w / 2, y: h * 0.06 }, `${convex ? "Выпуклый" : "Невыпуклый"} ${pts.length}-угольник`, { color: convex ? "#199a53" : "#c9740f", font: "700 14px Rubik, sans-serif" });
      Figures.wrapText(ctx, `Сумма углов: ${Geo.fmt(sum)}°  (формула 180°×(n−2) = ${theory}°)`, w / 2, h * 0.92, w * 0.94, { color: Geo.ink(), font: "600 12px Rubik, sans-serif" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => ({ n: pts.length, sum: angleSum(), theory: 180 * (pts.length - 2), convex: isConvex() }) };
  },

  /* Осевая симметрия: треугольник и его зеркальное отражение относительно оси (прямой MN).
     P и его образ P' связаны так, что ось — серединный перпендикуляр к PP' (проверяется, не декларируется). */
  axisSymmetry(ctx, canvas, ctrl, spec, w, h) {
    const M = { x: w * 0.5, y: h * 0.05, fixed: true };
    const N = { x: w * 0.5, y: h * 0.95, fixed: true };
    const P1 = { x: w * 0.18, y: h * 0.3 }, P2 = { x: w * 0.32, y: h * 0.65 }, P3 = { x: w * 0.1, y: h * 0.7 };
    const pts = [M, N, P1, P2, P3];
    function reflect(p) {
      const dx = N.x - M.x, dy = N.y - M.y, len2 = dx * dx + dy * dy || 1;
      const t = ((p.x - M.x) * dx + (p.y - M.y) * dy) / len2;
      const foot = { x: M.x + t * dx, y: M.y + t * dy };
      return { x: 2 * foot.x - p.x, y: 2 * foot.y - p.y };
    }
    function render() {
      Figures.drawBase(ctx, w, h);
      const far1 = { x: M.x - (N.x - M.x) * 3, y: M.y - (N.y - M.y) * 3 };
      const far2 = { x: N.x + (N.x - M.x) * 3, y: N.y + (N.y - M.y) * 3 };
      Figures.line(ctx, far1, far2, { stroke: Geo.ink(), lw: 2 });
      Figures.label(ctx, N, "ось", { dy: 16, color: Geo.ink() });
      const Q1 = reflect(P1), Q2 = reflect(P2), Q3 = reflect(P3);
      Figures.poly(ctx, [P1, P2, P3], { fill: "rgba(91,107,214,0.12)" });
      Figures.poly(ctx, [Q1, Q2, Q3], { fill: "rgba(255,159,67,0.12)", stroke: "#ff9f43" });
      [P1, P2, P3].forEach((p, i) => { Figures.dot(ctx, p); Figures.label(ctx, p, "ABC"[i], { dy: -12 }); });
      [Q1, Q2, Q3].forEach((p, i) => { Figures.dot(ctx, p, { fill: "#ff9f43" }); Figures.label(ctx, p, ["A'", "B'", "C'"][i], { dy: 14, color: "#c9740f" }); });
      [[P1, Q1], [P2, Q2], [P3, Q3]].forEach(([p, q]) => Figures.line(ctx, p, q, { stroke: "#8b93d6", lw: 1, dash: [4, 4] }));
      Figures.wrapText(ctx, "Каждая точка и её образ — на равном расстоянии от оси, по разные стороны", w / 2, h * 0.92, w * 0.94, { color: Geo.ink(), font: "600 11px Rubik, sans-serif" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => ({}) };
  },

  /* Центральная симметрия: точка O — центр; для любой точки P её образ P' таков, что
     O — середина отрезка PP'. Проверяется вычислением, а не декларируется. */
  centralSymmetry(ctx, canvas, ctrl, spec, w, h) {
    const O = { x: w * 0.5, y: h * 0.5, fixed: true };
    const P1 = { x: w * 0.2, y: h * 0.25 }, P2 = { x: w * 0.35, y: h * 0.35 }, P3 = { x: w * 0.15, y: h * 0.42 };
    const pts = [O, P1, P2, P3];
    function reflect(p) { return { x: 2 * O.x - p.x, y: 2 * O.y - p.y }; }
    function render() {
      Figures.drawBase(ctx, w, h);
      Figures.dot(ctx, O, { r: 6, fill: "#5b6bd6" }); Figures.label(ctx, O, "O", { dy: -14, color: "#3a4bcf" });
      const Q1 = reflect(P1), Q2 = reflect(P2), Q3 = reflect(P3);
      Figures.poly(ctx, [P1, P2, P3], { fill: "rgba(91,107,214,0.12)" });
      Figures.poly(ctx, [Q1, Q2, Q3], { fill: "rgba(255,159,67,0.12)", stroke: "#ff9f43" });
      [P1, P2, P3].forEach((p, i) => { Figures.dot(ctx, p); Figures.label(ctx, p, ["A", "B", "C"][i], { dy: -12 }); });
      [Q1, Q2, Q3].forEach((p, i) => { Figures.dot(ctx, p, { fill: "#ff9f43" }); Figures.label(ctx, p, ["A'", "B'", "C'"][i], { dy: 14, color: "#c9740f" }); });
      [[P1, Q1], [P2, Q2], [P3, Q3]].forEach(([p, q]) => Figures.line(ctx, p, q, { stroke: "#8b93d6", lw: 1, dash: [4, 4] }));
      Figures.wrapText(ctx, "O — середина каждого отрезка, соединяющего точку и её образ", w / 2, h * 0.07, w * 0.92, { color: Geo.ink(), font: "600 12px Rubik, sans-serif" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => ({}) };
  },

  quad(ctx, canvas, ctrl, spec, w, h) {
    const presets = {
      rectangle: [[0.2, 0.25], [0.8, 0.25], [0.8, 0.78], [0.2, 0.78]],
      square: [[0.28, 0.22], [0.74, 0.22], [0.74, 0.68], [0.28, 0.68]],
      parallelogram: [[0.3, 0.22], [0.82, 0.22], [0.66, 0.8], [0.14, 0.8]],
      trapezoid: [[0.38, 0.18], [0.66, 0.18], [0.86, 0.8], [0.14, 0.8]],
      rhombus: [[0.5, 0.14], [0.85, 0.5], [0.5, 0.86], [0.15, 0.5]],
    };
    const preset = presets[spec.variant] || presets.parallelogram;
    const pts = preset.map(([px, py]) => ({ x: px * w, y: py * h }));
    const [A, B, C, D] = pts;
    const show = Object.assign({ sides: true, diagonals: false, angles: false, area: false }, spec.defaultShow || {});
    ctrl.innerHTML = `
      <label class="fig-chk"><input type="checkbox" data-k="sides" checked> Стороны</label>
      <label class="fig-chk"><input type="checkbox" data-k="diagonals"> Диагонали</label>
      <label class="fig-chk"><input type="checkbox" data-k="angles"> Углы</label>
      <label class="fig-chk"><input type="checkbox" data-k="area"> Площадь</label>`;
    ["sides", "diagonals", "angles", "area"].forEach((k) => {
      ctrl.querySelector(`[data-k="${k}"]`).addEventListener("change", (e) => { show[k] = e.target.checked; render(); });
    });
    function render() {
      Figures.drawBase(ctx, w, h);
      Figures.poly(ctx, pts, { fill: "rgba(91,107,214,0.10)" });
      if (show.diagonals) { Figures.line(ctx, A, C, { stroke: "#ff9f43", dash: [6, 4] }); Figures.line(ctx, B, D, { stroke: "#ff9f43", dash: [6, 4] }); }
      ["A", "B", "C", "D"].forEach((name, i) => {
        Figures.dot(ctx, pts[i]);
        Figures.label(ctx, pts[i], name, { dy: pts[i].y < h / 2 ? -14 : 20 });
      });
      if (show.sides) {
        for (let i = 0; i < 4; i++) {
          const p1 = pts[i], p2 = pts[(i + 1) % 4];
          const mid = Geo.midpoint(p1, p2);
          Figures.label(ctx, mid, Geo.fmt(Geo.dist(p1, p2)), { color: "#3a4bcf" });
        }
      }
      if (show.angles) {
        for (let i = 0; i < 4; i++) {
          const prev = pts[(i + 3) % 4], cur = pts[i], next = pts[(i + 1) % 4];
          Figures.label(ctx, { x: cur.x, y: cur.y + (cur.y < h / 2 ? 30 : -26) }, `${Geo.fmt(Geo.angleDeg(cur, prev, next))}°`, { color: "#c9740f" });
        }
      }
      if (show.area) {
        const cen = { x: pts.reduce((s, p) => s + p.x, 0) / 4, y: pts.reduce((s, p) => s + p.y, 0) / 4 };
        Figures.label(ctx, cen, `S=${Geo.fmt(Geo.areaShoelace(pts))}`, { color: "#199a53", font: "700 15px Rubik, sans-serif" });
      }
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => {
      const AB = Geo.dist(A, B), BC = Geo.dist(B, C), CD = Geo.dist(C, D), DA = Geo.dist(D, A);
      const diag1 = Geo.dist(A, C), diag2 = Geo.dist(B, D);
      const midAC = Geo.midpoint(A, C), midBD = Geo.midpoint(B, D);
      const diagsBisect = Geo.distPx(midAC, midBD) < Geo.UNIT * 0.12;
      const oppEqual = Math.abs(AB - CD) < 0.06 * Math.max(AB, CD, 0.01) && Math.abs(BC - DA) < 0.06 * Math.max(BC, DA, 0.01);
      const oppParallel = (() => {
        const d1 = Math.atan2(B.y - A.y, B.x - A.x), d2 = Math.atan2(C.y - D.y, C.x - D.x);
        let diff = Math.abs((d1 - d2) * 180 / Math.PI) % 180; if (diff > 90) diff = 180 - diff;
        const d3 = Math.atan2(D.y - A.y, D.x - A.x), d4 = Math.atan2(C.y - B.y, C.x - B.x);
        let diff2 = Math.abs((d3 - d4) * 180 / Math.PI) % 180; if (diff2 > 90) diff2 = 180 - diff2;
        return diff < 2 && diff2 < 2;
      })();
      const diagsEqual = Math.abs(diag1 - diag2) < 0.06 * Math.max(diag1, diag2, 0.01);
      const vAC = { x: C.x - A.x, y: C.y - A.y }, vBD = { x: D.x - B.x, y: D.y - B.y };
      const dot = vAC.x * vBD.x + vAC.y * vBD.y;
      const diagsPerp = Math.abs(dot) < Geo.distPx(A, C) * Geo.distPx(B, D) * 0.06;
      return {
        AB, BC, CD, DA, diag1, diag2,
        area: Geo.areaShoelace(pts),
        perimeter: AB + BC + CD + DA,
        isParallelogram: diagsBisect && oppEqual && oppParallel,
        isRectangle: diagsBisect && oppEqual && oppParallel && diagsEqual,
        isRhombus: diagsBisect && oppEqual && oppParallel && diagsPerp,
      };
    } };
  },

  circle(ctx, canvas, ctrl, spec, w, h) {
    const O = { x: w / 2, y: h / 2, fixed: true };
    const R = { x: w / 2 + 120, y: h / 2 };
    const pts = [O, R];
    let n = spec.polygon || 0;
    let mode = spec.mode || "inscribed";
    ctrl.innerHTML = `
      <label class="fig-chk">Вписанный n-угольник:
        <input type="range" min="0" max="8" value="${n}" data-k="n">
        <span data-k="nval">${n || "—"}</span>
      </label>
      <select class="fig-select" data-k="mode">
        <option value="inscribed">Вписан в окружность</option>
        <option value="circumscribed">Описан вокруг окружности</option>
      </select>`;
    ctrl.querySelector('[data-k="n"]').addEventListener("input", (e) => {
      n = +e.target.value; ctrl.querySelector('[data-k="nval"]').textContent = n || "—"; render();
    });
    ctrl.querySelector('[data-k="mode"]').value = mode;
    ctrl.querySelector('[data-k="mode"]').addEventListener("change", (e) => { mode = e.target.value; render(); });
    function render() {
      Figures.drawBase(ctx, w, h);
      const r = Geo.distPx(O, R);
      ctx.beginPath(); ctx.arc(O.x, O.y, r, 0, Math.PI * 2);
      ctx.strokeStyle = "#5b6bd6"; ctx.lineWidth = 2.5; ctx.stroke();
      if (n >= 3) {
        const poly = [];
        const rr = mode === "circumscribed" ? r / Math.cos(Math.PI / n) : r;
        for (let i = 0; i < n; i++) {
          const a = -Math.PI / 2 + i * (2 * Math.PI / n);
          poly.push({ x: O.x + rr * Math.cos(a), y: O.y + rr * Math.sin(a) });
        }
        Figures.poly(ctx, poly, { stroke: "#ff9f43", fill: "rgba(255,159,67,0.08)" });
      }
      Figures.dot(ctx, O, { r: 6 }); Figures.dot(ctx, R, { r: 6 });
      Figures.line(ctx, O, R, { stroke: "#8b93d6", dash: [4, 4] });
      const rUnits = r / Geo.UNIT;
      Figures.wrapText(ctx, `r=${Geo.fmt(rUnits)}  C=${Geo.fmt(2 * Math.PI * rUnits)}  S=${Geo.fmt(Math.PI * rUnits * rUnits)}`, O.x, Math.max(16, O.y - r - 14), w * 0.9, { color: "#3a4bcf" });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => {
      const rUnits = Geo.distPx(O, R) / Geo.UNIT;
      return { r: rUnits, circumference: 2 * Math.PI * rUnits, area: Math.PI * rUnits * rUnits };
    } };
  },

  pytriangle(ctx, canvas, ctrl, spec, w, h) {
    const C = { x: w * 0.22, y: h * 0.82, fixed: true }; // прямой угол
    const A = { x: w * 0.78, y: h * 0.82, dragAxis: "x" };
    const B = { x: w * 0.22, y: h * 0.18, dragAxis: "y" };
    const pts = [C, A, B];
    let showSquares = true;
    ctrl.innerHTML = `<label class="fig-chk"><input type="checkbox" data-k="sq" checked> Квадраты на сторонах</label>`;
    ctrl.querySelector('[data-k="sq"]').addEventListener("change", (e) => { showSquares = e.target.checked; render(); });
    function squareOn(p1, p2, side) {
      const dx = p2.x - p1.x, dy = p2.y - p1.y;
      const nx = -dy, ny = dx; // нормаль
      const sign = side;
      const p3 = { x: p2.x + nx * sign, y: p2.y + ny * sign };
      const p4 = { x: p1.x + nx * sign, y: p1.y + ny * sign };
      return [p1, p2, p3, p4];
    }
    function render() {
      Figures.drawBase(ctx, w, h);
      if (showSquares) {
        Figures.poly(ctx, squareOn(C, A, 1), { fill: "rgba(46,204,113,0.18)", stroke: "#2ecc71" });
        Figures.poly(ctx, squareOn(B, C, 1), { fill: "rgba(255,159,67,0.18)", stroke: "#ff9f43" });
        Figures.poly(ctx, squareOn(A, B, -1), { fill: "rgba(91,107,214,0.18)", stroke: "#5b6bd6" });
      }
      Figures.poly(ctx, [A, B, C], { fill: "rgba(255,255,255,0.5)" });
      // прямой угол — маленький квадратик
      ctx.strokeStyle = Geo.ink(); ctx.lineWidth = 1.5;
      ctx.strokeRect(C.x, C.y - 14, 14, 14);
      [["A", A], ["B", B], ["C", C]].forEach(([nm, p]) => { Figures.dot(ctx, p); Figures.label(ctx, p, nm, { dy: p.y < h / 2 ? -14 : 20 }); });
      const a = Geo.dist(B, C), b = Geo.dist(C, A), c = Geo.dist(A, B);
      Figures.label(ctx, Geo.midpoint(B, C), `a=${Geo.fmt(a)}`, { color: "#199a53" });
      Figures.label(ctx, Geo.midpoint(C, A), `b=${Geo.fmt(b)}`, { color: "#c9740f" });
      Figures.label(ctx, Geo.midpoint(A, B), `c=${Geo.fmt(c)}`, { color: "#3a4bcf" });
      if (spec.showTrig) {
        Figures.wrapText(ctx, `sin α=${Geo.fmt(a / c)}  cos α=${Geo.fmt(b / c)}  tg α=${Geo.fmt(a / b)}`, w * 0.5, h * 0.06, w * 0.92, { color: Geo.ink() });
      } else {
        Figures.label(ctx, { x: w * 0.5, y: h * 0.06 }, `a²+b² = ${Geo.fmt(a * a + b * b)}   c² = ${Geo.fmt(c * c)}`, { color: Geo.ink() });
      }
    }
    // ограничим перетаскивание A по горизонтали, B по вертикали, чтобы угол C оставался прямым
    let unbindBase;
    function wire() {
      unbindBase = Figures.wireDrag(canvas, pts, () => {
        A.y = C.y; B.x = C.x; render();
      });
    }
    wire();
    return { render, destroy: () => unbindBase(), metrics: () => ({ a: Geo.dist(B, C), b: Geo.dist(C, A), c: Geo.dist(A, B) }) };
  },

  thales(ctx, canvas, ctrl, spec, w, h) {
    const O = { x: w * 0.12, y: h * 0.88, fixed: true };
    const P1 = { x: w * 0.5, y: h * 0.42 }; // точка на первом луче (двигаем)
    const P2 = { x: w * 0.9, y: h * 0.08, fixed: true }; // конец первого луча
    const Q2 = { x: w * 0.92, y: h * 0.5, fixed: true }; // конец второго луча
    const pts = [O, P1, P2, Q2];
    function project(pt) {
      // точка на втором луче, соответствующая P1, через сохранение параллельности OP2 к прямым через P1/Q
      const t = Geo.distPx(O, pt) / Geo.distPx(O, P2);
      return { x: O.x + t * (Q2.x - O.x), y: O.y + t * (Q2.y - O.y) };
    }
    function render() {
      Figures.drawBase(ctx, w, h);
      Figures.line(ctx, O, P2, { stroke: "#5b6bd6", lw: 2.5 });
      Figures.line(ctx, O, Q2, { stroke: "#5b6bd6", lw: 2.5 });
      const Q1 = project(P1);
      Figures.line(ctx, P1, Q1, { stroke: "#ff9f43", dash: [6, 4] });
      Figures.line(ctx, P2, Q2, { stroke: "#ff9f43", dash: [6, 4] });
      [O, P1, P2, Q2].forEach((p) => Figures.dot(ctx, p, { r: 6 }));
      Figures.dot(ctx, Q1, { r: 6, fill: "#c9740f" });
      const OB = Geo.dist(O, P1), BC = Geo.dist(P1, P2);
      const OB2 = Geo.dist(O, Q1), BC2 = Geo.dist(Q1, Q2);
      Figures.wrapText(ctx, `OB/BC = ${Geo.fmt(OB / (BC || 1))}   OB'/B'C' = ${Geo.fmt(OB2 / (BC2 || 1))}`, w * 0.5, h * 0.92, w * 0.92, { color: Geo.ink() });
    }
    const unbind = Figures.wireDrag(canvas, pts, render);
    return { render, destroy: unbind, metrics: () => ({}) };
  },

  vectors(ctx, canvas, ctrl, spec, w, h) {
    const O = { x: w * 0.22, y: h * 0.8, fixed: true };
    const A = { x: w * 0.55, y: h * 0.35 };
    const B = { x: w * 0.75, y: h * 0.68 };
    const pts = [O, A, B];
    function arrow(p1, p2, color) {
      Figures.line(ctx, p1, p2, { stroke: color, lw: 2.5 });
      const ang = Math.atan2(p2.y - p1.y, p2.x - p1.x);
      const s = 10;
      ctx.beginPath();
      ctx.moveTo(p2.x, p2.y);
      ctx.lineTo(p2.x - s * Math.cos(ang - 0.4), p2.y - s * Math.sin(ang - 0.4));
      ctx.lineTo(p2.x - s * Math.cos(ang + 0.4), p2.y - s * Math.sin(ang + 0.4));
      ctx.closePath(); ctx.fillStyle = color; ctx.fill();
    }
    function render() {
      Figures.drawBase(ctx, w, h);
      arrow(O, A, "#5b6bd6");
      arrow(O, B, "#ff9f43");
      const sum = { x: A.x + (B.x - O.x), y: A.y + (B.y - O.y) };
      arrow(O, sum, "#2ecc71");
      Figures.label(ctx, A, "a", { color: "#3a4bcf", dy: -10 });
      Figures.label(ctx, B, "b", { color: "#c9740f", dy: 16 });
      const sumLabelX = Geo.clamp(sum.x, 24, w - 24);
      Figures.label(ctx, { x: sumLabelX, y: sum.y }, "a+b", { color: "#199a53", dy: -10 });
      const la = Geo.dist(O, A), lb = Geo.dist(O, B);
      Figures.label(ctx, { x: w * 0.5, y: h * 0.06 }, `|a|=${Geo.fmt(la)}  |b|=${Geo.fmt(lb)}`, { color: Geo.ink() });
    }
    const unbind = Figures.wireDrag(canvas, [O, A, B], render);
    return { render, destroy: unbind, metrics: () => ({}) };
  },

  /* Своя фигура: свободное построение несколькими инструментами — точка, отрезок,
     окружность, многоугольник, удаление. Не привязано к одной заранее заданной форме:
     можно держать на чертеже сколько угодно объектов одновременно. */
  freeDraw(ctx, canvas, ctrl, spec, w, h) {
    let mode = "select";
    let labelIdx = 0;
    const points = [];      // {x,y,label}
    const segments = [];    // {a,b} — индексы точек
    const circles = [];     // {c,e} — центр, точка на окружности
    const polygons = [];    // {pts:[idx,...]}
    let pendingFirst = null;   // первая точка для отрезка/окружности
    let pendingPolygon = null; // список индексов строящегося многоугольника
    const history = []; // для "Отменить" — снимки перед каждым мутирующим действием

    function snapshot() {
      history.push(JSON.stringify({ points, segments, circles, polygons, labelIdx }));
      if (history.length > 30) history.shift();
    }
    function restoreLast() {
      if (!history.length) return;
      const s = JSON.parse(history.pop());
      points.length = 0; points.push(...s.points);
      segments.length = 0; segments.push(...s.segments);
      circles.length = 0; circles.push(...s.circles);
      polygons.length = 0; polygons.push(...s.polygons);
      labelIdx = s.labelIdx;
      pendingFirst = null; pendingPolygon = null;
    }
    function nextLabel() {
      const letter = String.fromCharCode(65 + (labelIdx % 26));
      const suffix = labelIdx >= 26 ? String(Math.floor(labelIdx / 26)) : "";
      labelIdx++;
      return letter + suffix;
    }
    function addPoint(x, y) { points.push({ x, y, label: nextLabel() }); return points.length - 1; }
    function findNear(x, y, maxD) {
      maxD = maxD || 24;
      let best = -1, bd = maxD * maxD;
      points.forEach((p, i) => { const d = (p.x - x) ** 2 + (p.y - y) ** 2; if (d < bd) { bd = d; best = i; } });
      return best;
    }
    function removePointCascade(idx) {
      points.splice(idx, 1);
      const reindex = (i) => (i > idx ? i - 1 : i);
      for (let i = segments.length - 1; i >= 0; i--) {
        if (segments[i].a === idx || segments[i].b === idx) segments.splice(i, 1);
        else { segments[i].a = reindex(segments[i].a); segments[i].b = reindex(segments[i].b); }
      }
      for (let i = circles.length - 1; i >= 0; i--) {
        if (circles[i].c === idx || circles[i].e === idx) circles.splice(i, 1);
        else { circles[i].c = reindex(circles[i].c); circles[i].e = reindex(circles[i].e); }
      }
      for (let i = polygons.length - 1; i >= 0; i--) {
        if (polygons[i].pts.includes(idx)) polygons.splice(i, 1);
        else polygons[i].pts = polygons[i].pts.map(reindex);
      }
    }

    // ---------- панель инструментов ----------
    ctrl.innerHTML = `
      <div class="fd-toolbar">
        <button class="fd-tool active" data-mode="select" title="Двигать">✥</button>
        <button class="fd-tool" data-mode="point" title="Точка">•</button>
        <button class="fd-tool" data-mode="segment" title="Отрезок">╱</button>
        <button class="fd-tool" data-mode="circle" title="Окружность">○</button>
        <button class="fd-tool" data-mode="polygon" title="Многоугольник">⬠</button>
        <button class="fd-tool" data-mode="delete" title="Удалить">🗑</button>
        <button class="fd-finish" style="display:none">✓ Готово</button>
        <button class="fd-undo">↩ Отменить</button>
        <button class="fd-clear">Очистить всё</button>
      </div>
      <div class="fd-hint"></div>`;
    const toolBtns = Array.from(ctrl.querySelectorAll(".fd-tool"));
    const finishBtn = ctrl.querySelector(".fd-finish");
    const hintEl = ctrl.querySelector(".fd-hint");
    const hints = {
      select: "Тяни любую точку, чтобы подвинуть.",
      point: "Тапни по пустому месту — появится точка.",
      segment: "Тапни две точки по очереди — соединятся отрезком.",
      circle: "Тапни центр, потом точку на окружности.",
      polygon: "Тапни 3+ точки по очереди, потом «✓ Готово».",
      delete: "Тапни точку — удалится она и всё, что к ней привязано.",
    };
    function updateHint() {
      hintEl.textContent = hints[mode] || "";
      finishBtn.style.display = (mode === "polygon" && pendingPolygon && pendingPolygon.length >= 3) ? "" : "none";
    }
    toolBtns.forEach((btn) => btn.addEventListener("click", () => {
      mode = btn.getAttribute("data-mode");
      toolBtns.forEach((b) => b.classList.toggle("active", b === btn));
      pendingFirst = null; pendingPolygon = mode === "polygon" ? [] : null;
      updateHint(); render();
    }));
    finishBtn.addEventListener("click", () => {
      if (pendingPolygon && pendingPolygon.length >= 3) { snapshot(); polygons.push({ pts: pendingPolygon }); }
      pendingPolygon = mode === "polygon" ? [] : null;
      updateHint(); render();
    });
    ctrl.querySelector(".fd-undo").addEventListener("click", () => { restoreLast(); updateHint(); render(); });
    ctrl.querySelector(".fd-clear").addEventListener("click", () => {
      snapshot(); points.length = 0; segments.length = 0; circles.length = 0; polygons.length = 0;
      pendingFirst = null; pendingPolygon = mode === "polygon" ? [] : null; render();
    });
    updateHint();

    // ---------- взаимодействие с canvas: тап = действие инструмента, протяжка = перемещение точки ----------
    function posFromEvt(e) {
      const r = canvas.getBoundingClientRect();
      const cx = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
      const cy = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
      return { x: cx * (canvas.width / r.width), y: cy * (canvas.height / r.height) };
    }
    let dragIdx = -1, moved = false, downPt = null;
    function onDown(e) {
      const p = posFromEvt(e); downPt = p; moved = false;
      const near = findNear(p.x, p.y);
      if (near >= 0) dragIdx = near;
      e.preventDefault();
    }
    function onMove(e) {
      if (dragIdx < 0) return;
      const p = posFromEvt(e);
      if (!moved && Geo.distPx(p, downPt) > 5) moved = true;
      if (moved) { points[dragIdx].x = Geo.clamp(p.x, 18, w - 18); points[dragIdx].y = Geo.clamp(p.y, 18, h - 18); render(); }
      e.preventDefault();
    }
    function onUp() {
      if (dragIdx < 0 || !moved) { if (downPt) handleTap(downPt); }
      dragIdx = -1; moved = false; downPt = null;
      updateHint(); render();
    }
    function handleTap(p) {
      if (mode === "select") return;
      if (mode === "point") { snapshot(); addPoint(p.x, p.y); return; }
      if (mode === "delete") {
        const idx = findNear(p.x, p.y);
        if (idx >= 0) { snapshot(); removePointCascade(idx); }
        return;
      }
      if (mode === "segment" || mode === "circle") {
        let idx = findNear(p.x, p.y);
        if (idx < 0) { snapshot(); idx = addPoint(p.x, p.y); } else snapshot();
        if (pendingFirst == null) { pendingFirst = idx; }
        else if (pendingFirst !== idx) {
          if (mode === "segment") segments.push({ a: pendingFirst, b: idx });
          else circles.push({ c: pendingFirst, e: idx });
          pendingFirst = null;
        }
        return;
      }
      if (mode === "polygon") {
        let idx = findNear(p.x, p.y);
        if (idx < 0) { snapshot(); idx = addPoint(p.x, p.y); } else snapshot();
        if (!pendingPolygon) pendingPolygon = [];
        pendingPolygon.push(idx);
      }
    }
    canvas.addEventListener("mousedown", onDown); canvas.addEventListener("mousemove", onMove); window.addEventListener("mouseup", onUp);
    canvas.addEventListener("touchstart", onDown, { passive: false }); canvas.addEventListener("touchmove", onMove, { passive: false }); window.addEventListener("touchend", onUp);

    function render() {
      Figures.drawBase(ctx, w, h);
      polygons.forEach((poly) => {
        const pp = poly.pts.map((i) => points[i]);
        Figures.poly(ctx, pp, { fill: "rgba(46,204,113,0.14)", stroke: "#2ecc71" });
        const cen = { x: pp.reduce((s, p) => s + p.x, 0) / pp.length, y: pp.reduce((s, p) => s + p.y, 0) / pp.length };
        Figures.label(ctx, cen, `S=${Geo.fmt(Geo.areaShoelace(pp))}`, { color: "#199a53", font: "700 12px Rubik, sans-serif" });
      });
      circles.forEach((c) => {
        const O = points[c.c], E = points[c.e], r = Geo.distPx(O, E);
        ctx.beginPath(); ctx.arc(O.x, O.y, r, 0, Math.PI * 2); ctx.strokeStyle = "#ff9f43"; ctx.lineWidth = 2; ctx.stroke();
        Figures.label(ctx, { x: O.x, y: O.y - r - 8 }, `r=${Geo.fmt(r / Geo.UNIT)}`, { color: "#c9740f", font: "600 11px Rubik, sans-serif" });
      });
      segments.forEach((s) => {
        const p1 = points[s.a], p2 = points[s.b];
        Figures.line(ctx, p1, p2, { stroke: "#5b6bd6", lw: 2.5 });
        Figures.label(ctx, Geo.midpoint(p1, p2), Geo.fmt(Geo.dist(p1, p2)), { color: "#3a4bcf", dy: -8, font: "600 11px Rubik, sans-serif" });
      });
      if (pendingPolygon && pendingPolygon.length) {
        const pp = pendingPolygon.map((i) => points[i]);
        for (let i = 0; i < pp.length - 1; i++) Figures.line(ctx, pp[i], pp[i + 1], { stroke: "#2ecc71", lw: 2, dash: [5, 4] });
      }
      points.forEach((p, i) => {
        const highlighted = pendingFirst === i || (pendingPolygon && pendingPolygon.includes(i));
        Figures.dot(ctx, p, { r: 6, fill: highlighted ? "#e6572e" : undefined });
        Figures.label(ctx, p, p.label, { dy: p.y < h / 2 ? -14 : 18 });
      });
      if (!points.length) Figures.wrapText(ctx, "Выбери инструмент внизу и тапни по полю, чтобы начать строить", w / 2, h / 2, w * 0.8, { color: Geo.ink() });
    }
    render();
    return {
      render,
      destroy: () => {
        canvas.removeEventListener("mousedown", onDown); canvas.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp);
        canvas.removeEventListener("touchstart", onDown); canvas.removeEventListener("touchmove", onMove); window.removeEventListener("touchend", onUp);
      },
      metrics: () => ({
        points: points.map((p) => p.label),
        segments: segments.map((s) => ({ from: points[s.a].label, to: points[s.b].label, length: Geo.dist(points[s.a], points[s.b]) })),
        circles: circles.map((c) => ({ center: points[c.c].label, r: Geo.distPx(points[c.c], points[c.e]) / Geo.UNIT })),
        polygons: polygons.map((poly) => ({
          labels: poly.pts.map((i) => points[i].label).join(""),
          perimeter: poly.pts.reduce((s, idx, i) => s + Geo.dist(points[idx], points[poly.pts[(i + 1) % poly.pts.length]]), 0),
          area: Geo.areaShoelace(poly.pts.map((i) => points[i])),
        })),
      }),
    };
  },
};

</script>
<script>
/* theorems.js — анимации-симуляции ключевых теорем на Canvas */
const Theorems = {
  mount(container, anim) {
    const w = Math.max(260, Math.min(560, container.clientWidth || 520)), h = 380;
    container.innerHTML = `
      <div class="fig-wrap">
        <canvas class="fig-canvas" width="${w}" height="${h}"></canvas>
        <div class="fig-controls">
          <button class="btn btn-primary btn-sm" data-act="th-play">▶ Запустить анимацию</button>
          <button class="btn btn-ghost btn-sm" data-act="th-reset">⟲ Сброс</button>
        </div>
      </div>`;
    const canvas = container.querySelector(".fig-canvas");
    const ctx = canvas.getContext("2d");
    const fn = ANIMATORS[anim] || ANIMATORS.pythagoras;
    const inst = fn(ctx, canvas, w, h);
    let raf = null;
    function loop(ts) {
      const done = inst.step(ts);
      inst.draw();
      if (!done) raf = requestAnimationFrame(loop);
      else raf = null;
    }
    container.querySelector('[data-act="th-play"]').addEventListener("click", () => {
      inst.play();
      if (!raf) raf = requestAnimationFrame(loop);
    });
    container.querySelector('[data-act="th-reset"]').addEventListener("click", () => {
      if (raf) cancelAnimationFrame(raf);
      raf = null;
      inst.reset();
      inst.draw();
    });
    inst.draw();
    return { destroy: () => { if (raf) cancelAnimationFrame(raf); } };
  },
};

function easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }

const ANIMATORS = {
  /* --- Теорема Пифагора: квадраты на сторонах заполняются по очереди --- */
  pythagoras(ctx, canvas, w, h) {
    // Раскладка через общий масштаб S=min(w,h): раньше катеты считались отдельно от w
    // и от h, и на непропорциональном холсте (например, узком и высоком) квадраты на
    // катетах выходили за границы canvas — это и было видно как "рисунок вылезает".
    const S = Math.min(w, h);
    const legB = S * 0.30, legA = S * 0.38; // горизонтальный (C→A) и вертикальный (B→C) катеты
    const marginL = legA + 14, marginBottom = legB + 40;
    const C = { x: marginL, y: h - marginBottom }, A = { x: C.x + legB, y: C.y }, B = { x: C.x, y: C.y - legA };
    let t0 = null, prog = 0, playing = false;
    function squareOn(p1, p2, sign) {
      const dx = p2.x - p1.x, dy = p2.y - p1.y;
      const nx = -dy, ny = dx;
      return [p1, p2, { x: p2.x + nx * sign, y: p2.y + ny * sign }, { x: p1.x + nx * sign, y: p1.y + ny * sign }];
    }
    function draw() {
      Figures.drawBase(ctx, w, h);
      const a = Geo.dist(B, C), b = Geo.dist(C, A), c = Geo.dist(A, B);
      const stages = [
        { poly: squareOn(C, A, 1), color: "46,204,113", val: b * b, lbl: "b²" },
        { poly: squareOn(B, C, 1), color: "255,159,67", val: a * a, lbl: "a²" },
        { poly: squareOn(A, B, -1), color: "91,107,214", val: c * c, lbl: "c²" },
      ];
      stages.forEach((s, i) => {
        const local = Geo.clamp(prog * 3 - i, 0, 1);
        Figures.poly(ctx, s.poly, { fill: `rgba(${s.color},${0.10 + 0.35 * local})`, stroke: `rgb(${s.color})` });
        if (local > 0.4) {
          const cen = { x: s.poly.reduce((sum, p) => sum + p.x, 0) / 4, y: s.poly.reduce((sum, p) => sum + p.y, 0) / 4 };
          Figures.label(ctx, cen, `${s.lbl}=${Geo.fmt(s.val)}`, { color: `rgb(${s.color})`, font: "700 15px Rubik, sans-serif" });
        }
      });
      Figures.poly(ctx, [A, B, C], { fill: "rgba(255,255,255,0.6)" });
      ctx.strokeRect(C.x, C.y - 14, 14, 14);
      if (prog >= 1) {
        Figures.wrapText(ctx, `a² + b² = ${Geo.fmt(a * a + b * b)}   c² = ${Geo.fmt(c * c)}  ✓ равны`, w / 2, h * 0.06, w * 0.92, { color: Geo.ink(), font: "700 16px Rubik, sans-serif" });
      } else {
        Figures.wrapText(ctx, "Квадраты на катетах вместе равны квадрату на гипотенузе", w / 2, h * 0.06, w * 0.92, { color: "#5b6bd6" });
      }
    }
    return {
      play() { playing = true; t0 = null; prog = 0; },
      reset() { playing = false; prog = 0; },
      step(ts) {
        if (!playing) return true;
        if (t0 == null) t0 = ts;
        prog = Geo.clamp((ts - t0) / 2400, 0, 1);
        if (prog >= 1) playing = false;
        return !playing;
      },
      draw,
    };
  },

  /* --- Сумма углов треугольника: углы «переносятся» к развёрнутому углу --- */
  anglesum(ctx, canvas, w, h) {
    const A = { x: w * 0.5, y: h * 0.15 }, B = { x: w * 0.15, y: h * 0.82 }, C = { x: w * 0.85, y: h * 0.82 };
    let t0 = null, prog = 0, playing = false;
    const baseY = h * 0.55, baseX0 = w * 0.2, baseLen = w * 0.6;
    function wedge(vertex, p1, p2, r) {
      const a1 = Math.atan2(p1.y - vertex.y, p1.x - vertex.x);
      const a2 = Math.atan2(p2.y - vertex.y, p2.x - vertex.x);
      return { a1, a2, ang: Geo.angleDeg(vertex, p1, p2) };
    }
    function draw() {
      Figures.drawBase(ctx, w, h);
      Figures.poly(ctx, [A, B, C], { fill: "rgba(91,107,214,0.08)" });
      [["A", A, B, C, "#5b6bd6"], ["B", B, A, C, "#ff9f43"], ["C", C, A, B, "#2ecc71"]].forEach(([nm, v, p1, p2]) => {
        Figures.dot(ctx, v); Figures.label(ctx, v, nm, { dy: v.y < h / 2 ? -14 : 20 });
      });
      // линия для сборки углов
      ctx.strokeStyle = "#c8c8e6"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(baseX0, baseY); ctx.lineTo(baseX0 + baseLen, baseY); ctx.stroke();
      const angA = Geo.angleDeg(A, B, C), angB = Geo.angleDeg(B, A, C), angC = Geo.angleDeg(C, A, B);
      const angs = [{ v: angA, color: "#5b6bd6", name: "A" }, { v: angB, color: "#ff9f43", name: "B" }, { v: angC, color: "#2ecc71", name: "C" }];
      const wedgeR = Math.min(46, baseLen / 8); // ограничиваем радиус доступной длиной базовой линии
      let cursor = baseX0;
      angs.forEach((a) => {
        const rad = a.v * Math.PI / 180;
        const localProg = Geo.clamp(prog, 0, 1);
        // рисуем сектор угла, "перелетающий" от исходной вершины на базовую линию
        const cx = cursor, cy = baseY;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, wedgeR, Math.PI, Math.PI - rad * localProg, true);
        ctx.closePath();
        ctx.fillStyle = a.color + "55";
        ctx.fill();
        ctx.strokeStyle = a.color; ctx.lineWidth = 1.5; ctx.stroke();
        cursor += wedgeR * Math.sin(rad * localProg) * 1.15 + 4;
      });
      if (prog >= 1) {
        Figures.wrapText(ctx, `∠A+∠B+∠C = ${Geo.fmt(angA + angB + angC)}° = 180° (развёрнутый угол)`, w / 2, baseY + 34, w * 0.92, { color: Geo.ink(), font: "700 15px Rubik, sans-serif" });
      } else {
        Figures.wrapText(ctx, "Углы треугольника «переносятся» на прямую линию", w / 2, h * 0.06, w * 0.92, { color: "#5b6bd6" });
      }
    }
    return {
      play() { playing = true; t0 = null; prog = 0; },
      reset() { playing = false; prog = 0; },
      step(ts) {
        if (!playing) return true;
        if (t0 == null) t0 = ts;
        prog = Geo.clamp((ts - t0) / 2200, 0, 1);
        if (prog >= 1) playing = false;
        return !playing;
      },
      draw,
    };
  },

  /* --- Теорема Фалеса: точка скользит, отношения сохраняются --- */
  thales(ctx, canvas, w, h) {
    const O = { x: w * 0.12, y: h * 0.88 };
    const P2 = { x: w * 0.9, y: h * 0.08 };
    const Q2 = { x: w * 0.92, y: h * 0.5 };
    let t0 = null, prog = 0, playing = false;
    function draw() {
      Figures.drawBase(ctx, w, h);
      Figures.line(ctx, O, P2, { stroke: "#5b6bd6", lw: 2.5 });
      Figures.line(ctx, O, Q2, { stroke: "#5b6bd6", lw: 2.5 });
      const t = 0.25 + 0.5 * (0.5 - 0.5 * Math.cos(prog * Math.PI * 2)); // туда-обратно
      const P1 = { x: O.x + t * (P2.x - O.x), y: O.y + t * (P2.y - O.y) };
      const Q1 = { x: O.x + t * (Q2.x - O.x), y: O.y + t * (Q2.y - O.y) };
      Figures.line(ctx, P1, Q1, { stroke: "#ff9f43", dash: [6, 4] });
      [O, P1, P2, Q1, Q2].forEach((p) => Figures.dot(ctx, p, { r: 6 }));
      const OB = Geo.dist(O, P1), BC = Geo.dist(P1, P2);
      const OB2 = Geo.dist(O, Q1), BC2 = Geo.dist(Q1, Q2);
      Figures.wrapText(ctx, `OB/BC = ${Geo.fmt(OB / (BC || 1))}   OB'/B'C' = ${Geo.fmt(OB2 / (BC2 || 1))} — равны при любом t`, w * 0.5, h * 0.06, w * 0.92, { color: Geo.ink() });
    }
    return {
      play() { playing = true; t0 = null; prog = 0; },
      reset() { playing = false; prog = 0; },
      step(ts) {
        if (!playing) return true;
        if (t0 == null) t0 = ts;
        prog = Geo.clamp((ts - t0) / 3200, 0, 1);
        if (prog >= 1) playing = false;
        return !playing;
      },
      draw,
    };
  },

  /* --- Площадь параллелограмма: треугольник переносится, получаем прямоугольник --- */
  parallelogram(ctx, canvas, w, h) {
    const A = { x: w * 0.3, y: h * 0.22 }, B = { x: w * 0.82, y: h * 0.22 }, C = { x: w * 0.66, y: h * 0.8 }, D = { x: w * 0.14, y: h * 0.8 };
    // отрезаем треугольник A-D-D' (где D' — проекция D на AB) слева и переносим его вправо
    let t0 = null, prog = 0, playing = false;
    // высота от D к прямой AB
    const dx = B.x - A.x, dy = B.y - A.y;
    const tproj = ((D.x - A.x) * dx + (D.y - A.y) * dy) / (dx * dx + dy * dy);
    const Dp = { x: A.x + tproj * dx, y: A.y + tproj * dy }; // основание высоты из D
    const shift = { x: C.x - D.x, y: C.y - D.y }; // на сколько сдвинуть отрезанный треугольник вправо (чтобы AD встало на BC)
    function draw() {
      Figures.drawBase(ctx, w, h);
      const e = easeInOut(prog);
      // основная часть параллелограмма, которая остаётся на месте (трапеция A' B C D с учётом сдвига)
      Figures.poly(ctx, [A, B, C, D], { fill: "rgba(91,107,214,0.06)", stroke: "#c8c8e6" });
      // отрезанный треугольник A-D-Dp, анимированно сдвигается к месту B-C-(Dp+shift)
      const An = { x: A.x + shift.x * e, y: A.y + shift.y * e };
      const Dn = { x: D.x + shift.x * e, y: D.y + shift.y * e };
      const Dpn = { x: Dp.x + shift.x * e, y: Dp.y + shift.y * e };
      Figures.poly(ctx, [A, D, Dp], { fill: "rgba(255,159,67,0.10)", stroke: "#dfe1f5" });
      Figures.poly(ctx, [An, Dn, Dpn], { fill: "rgba(255,159,67,0.35)", stroke: "#ff9f43" });
      // неподвижная часть (трапеция Dp-B-C-D)
      Figures.poly(ctx, [Dp, B, C, D], { fill: "rgba(91,107,214,0.18)", stroke: "#5b6bd6" });
      const area = Geo.areaShoelace([A, B, C, D]);
      Figures.wrapText(ctx, prog >= 1
        ? `Прямоугольник той же площади: S = ${Geo.fmt(area)}`
        : "Отрезаем треугольник слева и прикладываем справа →", w / 2, h * 0.06, w * 0.92, { color: Geo.ink(), font: "600 14px Rubik, sans-serif" });
    }
    return {
      play() { playing = true; t0 = null; prog = 0; },
      reset() { playing = false; prog = 0; },
      step(ts) {
        if (!playing) return true;
        if (t0 == null) t0 = ts;
        prog = Geo.clamp((ts - t0) / 2200, 0, 1);
        if (prog >= 1) playing = false;
        return !playing;
      },
      draw,
    };
  },
};

</script>
<script>
/* tasks.js — рендер и проверка заданий: choice / input / explore / build / error / match / proof */
const TYPE_LABEL = { choice: "Выбор ответа", input: "Введи число", explore: "Исследование", build: "Построение", error: "Найди ошибку", match: "Соотнеси", proof: "Докажи" };
const TYPE_ICO = { choice: "🎯", input: "🔢", explore: "🔬", build: "📐", error: "🕵️", match: "🔗", proof: "🧠" };
const DIFF_STARS = { easy: "★☆☆", medium: "★★☆", hard: "★★★" };

const Tasks = {
  render(task, topicId, ui) {
    const done = State.taskDone(task.id, topicId);
    const fb = ui.taskFb && ui.taskFb[task.id];
    const diff = task.difficulty ? `<span class="task-diff" title="Сложность">${DIFF_STARS[task.difficulty] || ""}</span>` : "";
    const head = `<div class="task-head"><span class="task-type">${TYPE_ICO[task.type]} ${TYPE_LABEL[task.type]}</span>${diff}${done ? '<span class="task-done">✓ выполнено</span>' : ""}</div>`;
    const q = `<div class="task-q">${esc2(task.q)}</div>`;
    let body = "";
    if (task.type === "choice" || task.type === "proof") {
      body = `<div class="task-opts">${(task.options || []).map((op, i) => {
        let cls = "task-opt", icon = "";
        if (fb) {
          if (i === task.correct) { cls += " opt-correct"; icon = '<span class="opt-icon">✓</span>'; }
          else if (i === fb.choice) { cls += " opt-wrong"; icon = '<span class="opt-icon">✗</span>'; }
        }
        return `<button class="${cls}" data-act="task-choice" data-task="${task.id}" data-topic="${topicId}" data-idx="${i}" ${fb ? "disabled" : ""}>${icon}${esc2(op)}</button>`;
      }).join("")}</div>
        ${fb ? `<div class="task-fb ${fb.correct ? "fb-ok" : "fb-bad"}">${fb.correct ? "Верно! ✅" : "Неверно — правильный ответ отмечен ✓"}</div>` : ""}`;
    } else if (task.type === "input") {
      body = `${task.figure ? `<div class="task-figure" data-figure='${JSON.stringify(task.figure)}'></div>` : ""}
        <div class="task-input-row">
          <input type="text" inputmode="decimal" class="task-input" data-task="${task.id}" placeholder="Ответ${task.unit ? " (" + task.unit + ")" : ""}" ${fb && fb.correct ? "disabled" : ""} value="${fb ? esc2(fb.val || "") : ""}">
          <button class="btn btn-primary btn-sm" data-act="task-input" data-task="${task.id}" data-topic="${topicId}">Проверить</button>
        </div>
        ${fb ? `<div class="task-fb ${fb.correct ? "fb-ok" : "fb-bad"}">${fb.correct ? "Верно! ✅" : "Пока не так, попробуй ещё раз"}</div>` : ""}`;
    } else if (task.type === "error") {
      body = `<div class="task-figure" data-figure='${JSON.stringify(task.figure || { type: "triangle" })}'></div>
        <div class="task-labels">${(task.labels || []).map((l, i) => {
          let cls = "task-label", icon = "";
          if (fb) {
            if (l.wrong) { cls += " opt-correct"; icon = '<span class="opt-icon">✓</span>'; }
            else if (i === fb.choice && !l.wrong) { cls += " opt-wrong"; icon = '<span class="opt-icon">✗</span>'; }
          }
          return `<button class="${cls}" data-act="task-error" data-task="${task.id}" data-topic="${topicId}" data-idx="${i}" ${fb ? "disabled" : ""}>${icon}${esc2(l.text)}</button>`;
        }).join("")}</div>
        ${fb ? `<div class="task-fb ${fb.correct ? "fb-ok" : "fb-bad"}">${fb.correct ? "Точно, это и есть ошибка! ✅" : "Это утверждение верное — ищи другое"}</div>` : ""}`;
    } else if (task.type === "explore") {
      const note = State.data.exploreNotes[task.id] || "";
      body = `<div class="task-figure" data-figure='${JSON.stringify(task.figure || { type: "triangle" })}'></div>
        ${task.hints ? `<details class="task-hints"><summary>💡 Подсказки</summary><ul>${task.hints.map((hnt) => `<li>${esc2(hnt)}</li>`).join("")}</ul></details>` : ""}
        <textarea class="task-note" data-task="${task.id}" placeholder="Запиши свой вывод здесь…">${esc2(note)}</textarea>
        <button class="btn btn-primary btn-sm" data-act="task-explore" data-task="${task.id}" data-topic="${topicId}" ${done ? "disabled" : ""}>${done ? "Вывод сохранён ✓" : "Сохранить вывод"}</button>
        ${done && task.insight ? `<div class="task-explain">📎 Общий вывод: ${esc2(task.insight)}</div>` : ""}`;
    } else if (task.type === "build") {
      body = `<div class="task-figure" data-figure='${JSON.stringify(task.figure || { type: "triangle" })}'></div>
        <button class="btn btn-primary btn-sm" data-act="task-build" data-task="${task.id}" data-topic="${topicId}">Проверить построение</button>
        ${fb ? `<div class="task-fb ${fb.correct ? "fb-ok" : "fb-bad"}">${fb.correct ? "Отлично, построение подходит! ✅" : "Пока не совпадает — подвинь точки ещё"}</div>` : ""}`;
    } else if (task.type === "match") {
      const order = matchOrder(task);
      const rightTexts = order.map((origIdx) => task.pairs[origIdx].right);
      const sel = (fb && fb.sel) || {};
      body = `<div class="match-rows">${task.pairs.map((p, i) => {
        const isWrong = fb && fb.rowCorrect && !fb.rowCorrect[i];
        const rowState = fb ? (fb.rowCorrect && fb.rowCorrect[i] ? "match-ok" : "match-bad") : "";
        return `<div class="match-row">
            <span class="match-left">${esc2(p.left)}</span>
            <select class="match-select ${rowState}" data-task="${task.id}" data-idx="${i}" ${fb && fb.correct ? "disabled" : ""}>
              <option value="">…</option>
              ${rightTexts.map((r, pos) => `<option value="${pos}" ${String(sel[i]) === String(pos) ? "selected" : ""}>${esc2(r)}</option>`).join("")}
            </select>
            ${isWrong ? `<span class="match-hint">верно: «${esc2(p.right)}»</span>` : ""}
          </div>`;
      }).join("")}</div>
        <button class="btn btn-primary btn-sm" data-act="task-match" data-task="${task.id}" data-topic="${topicId}">Проверить</button>
        ${fb ? `<div class="task-fb ${fb.correct ? "fb-ok" : "fb-bad"}">${fb.correct ? "Все пары верны! ✅" : "Есть ошибки — верный ответ подсказан у неверных строк"}</div>` : ""}`;
    }
    const explain = (fb && task.explain) ? `<div class="task-explain">💡 ${esc2(task.explain)}</div>` : "";
    return `<div class="task-card ${done ? "task-card-done" : ""}" data-task-card="${task.id}">${head}${q}${body}${explain}</div>`;
  },

  mountFigures(root, topic) {
    root.querySelectorAll(".task-figure[data-figure]").forEach((el) => {
      let spec;
      try { spec = JSON.parse(el.getAttribute("data-figure")); } catch (e) { spec = { type: "triangle" }; }
      try {
        const inst = Figures.mount(el, spec);
        App.trackFigure(inst);
        el.__figureInst = inst;
      } catch (e) {
        el.innerHTML = '<div class="fig-error">⚠️ Чертёж временно недоступен</div>';
        console.error("Task figure mount failed:", spec, e);
      }
    });
  },

  checkChoice(task, topicId, idx, ui) {
    ui.taskFb = ui.taskFb || {};
    const correct = idx === task.correct;
    ui.taskFb[task.id] = { choice: idx, correct };
    let result = null;
    if (correct) result = State.completeTask(task, topicId);
    return result;
  },

  checkError(task, topicId, idx, ui) {
    ui.taskFb = ui.taskFb || {};
    const correct = !!(task.labels[idx] && task.labels[idx].wrong);
    ui.taskFb[task.id] = { choice: idx, correct };
    let result = null;
    if (correct) result = State.completeTask(task, topicId);
    return result;
  },

  checkInput(task, topicId, rawVal, ui, figEl) {
    ui.taskFb = ui.taskFb || {};
    const val = parseFloat(String(rawVal).replace(",", ".").replace(/\s/g, ""));
    let target = task.answer;
    if (task.readFromFigure && figEl && figEl.__figureInst) {
      const m = figEl.__figureInst.metrics();
      if (m && m[task.metricKey] != null) target = m[task.metricKey];
    }
    const tol = task.tol != null ? task.tol : 0.5;
    const correct = !isNaN(val) && target != null && Math.abs(val - target) <= tol;
    ui.taskFb[task.id] = { val: rawVal, correct };
    let result = null;
    if (correct) result = State.completeTask(task, topicId);
    return result;
  },

  saveExplore(task, topicId, text) {
    State.saveExploreNote(task.id, text);
    return State.completeTask(task, topicId);
  },

  checkBuild(task, topicId, figEl, ui) {
    ui.taskFb = ui.taskFb || {};
    const inst = figEl ? figEl.__figureInst : null;
    const m = inst ? inst.metrics() : {};
    const target = task.target || {};
    let correct = false;
    if (target.type === "triangle" && target.kind === "isosceles" && m.a != null) {
      const sides = [m.a, m.b, m.c].sort((a, b) => a - b);
      correct = Math.abs(sides[0] - sides[1]) <= (task.tol || 0.08) * sides[2] || Math.abs(sides[1] - sides[2]) <= (task.tol || 0.08) * sides[2];
    } else if (target.type === "segment" && target.points === 3) {
      // три точки коллинеарны и B лежит между A и C
      correct = m.area != null && m.area <= (task.tol || 0.15) && !!m.betweenB;
    } else if (target.type === "angle" && target.degrees != null) {
      correct = m.angle != null && Math.abs(m.angle - target.degrees) <= (task.tol || 2);
    } else if (target.type === "segment" && target.operation === "sum") {
      correct = m.length != null && Math.abs(m.length - m.target) <= (task.tol || 0.15) * m.target;
    } else if (target.type === "segment" && target.operation === "length") {
      correct = m.AB != null && Math.abs(m.AB - target.value) <= (task.tol || 0.15);
    } else if (target.type === "perpendicular") {
      correct = m.angleToLine != null && Math.abs(m.angleToLine - 90) <= (task.tol || 2);
    } else if (target.type === "bisector") {
      correct = m.a1 != null && Math.abs(m.a1 - m.a2) <= (task.tol || 2);
    } else if (target.type === "copyAngle") {
      correct = m.angRef != null && Math.abs(m.angRef - m.angCopy) <= (task.tol || 2);
    } else if (target.type === "triangleGiven") {
      // Построение треугольника по трём элементам (стороны и/или углы) — проверяем
      // только те элементы, что заданы в задаче (это позволяет собрать SSS/SAS/ASA одной функцией).
      const tl = task.tol || 0.15, ta = task.tolAng || 4;
      const checks = [];
      if (target.a != null) checks.push(Math.abs(m.a - target.a) <= tl * target.a);
      if (target.b != null) checks.push(Math.abs(m.b - target.b) <= tl * target.b);
      if (target.c != null) checks.push(Math.abs(m.c - target.c) <= tl * target.c);
      if (target.angleA != null) checks.push(Math.abs(m.angleA - target.angleA) <= ta);
      if (target.angleB != null) checks.push(Math.abs(m.angleB - target.angleB) <= ta);
      if (target.angleC != null) checks.push(Math.abs(m.angleC - target.angleC) <= ta);
      correct = checks.length > 0 && checks.every((c) => c);
    } else if (target.type === "triangleInequality") {
      correct = !!m.canForm;
    } else if (target.type === "quadProperty") {
      correct = !!m[target.property];
    } else if (target.type === "areaValue") {
      correct = m.area != null && Math.abs(m.area - target.value) <= (task.tol || 0.15) * target.value;
    } else if (target.type === "similarTriangles") {
      const tl = task.tol || 0.08;
      const k1 = m.DE / (m.AB || 0.01), k2 = m.EF / (m.BC || 0.01), k3 = m.DF / (m.AC || 0.01);
      const closeR = (x, y) => Math.abs(x - y) <= tl * Math.max(x, y, 0.01);
      correct = closeR(k1, k2) && closeR(k2, k3);
    } else if (target.type === "tangent") {
      correct = m.d != null && m.r != null && Math.abs(m.d - m.r) <= (task.tol || 4);
    } else if (target.type === "congruentTriangles") {
      const tl = task.tol || 0.15, ta = task.tolAng || 3;
      const closeL = (x, y) => Math.abs(x - y) <= tl * Math.max(x, y, 0.01);
      const closeA = (x, y) => Math.abs(x - y) <= ta;
      if (target.criterion === "sas") correct = closeL(m.AB, m.DE) && closeL(m.AC, m.DF) && closeA(m.angA, m.angD);
      else if (target.criterion === "asa") correct = closeL(m.AB, m.DE) && closeA(m.angA, m.angD) && closeA(m.angB, m.angE);
