      else if (target.criterion === "sss") correct = closeL(m.AB, m.DE) && closeL(m.BC, m.EF) && closeL(m.AC, m.DF);
      else if (target.criterion === "hl") correct = closeL(m.AC, m.DF) && closeL(m.AB, m.DE);
    }
    ui.taskFb[task.id] = { correct };
    let result = null;
    if (correct) result = State.completeTask(task, topicId);
    return result;
  },

  checkMatch(task, topicId, selMap, ui) {
    ui.taskFb = ui.taskFb || {};
    const order = matchOrder(task);
    const rowCorrect = {};
    let allOk = task.pairs.length > 0;
    task.pairs.forEach((p, i) => {
      const pos = selMap[i];
      const ok = pos != null && pos !== "" && order[+pos] === i;
      rowCorrect[i] = ok;
      if (!ok) allOk = false;
    });
    ui.taskFb[task.id] = { sel: selMap, rowCorrect, correct: allOk };
    let result = null;
    if (allOk) result = State.completeTask(task, topicId);
    return result;
  },
};

/* Порядок правого столбца для задания "match" перемешивается один раз и
   кэшируется на самом объекте задания, чтобы не переме­шиваться заново при каждом рендере. */
function matchOrder(task) {
  if (!task._matchOrder) {
    const idxs = task.pairs.map((_, i) => i);
    for (let i = idxs.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [idxs[i], idxs[j]] = [idxs[j], idxs[i]];
    }
    task._matchOrder = idxs;
  }
  return task._matchOrder;
}

function esc2(s) {
  return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

</script>
<script>
/* state.js — сохранение прогресса пользователя (localStorage) */
const State = {
  data: null,

  defaults() {
    return {
      hero: null, // { name, grade }
      settings: { theme: "light", sound: true },
      progress: {}, // topicId -> { doneTasks: {taskId:true}, completed: bool, stars: 0 }
      achievements: {}, // achId -> true
      stats: { xp: 0, areaTasksSolved: 0, bestExamPct: 0, examsTaken: 0 },
      exploreNotes: {}, // taskId -> текст пользователя
      lastExamMistakes: [],
      lastTopicId: null, // для кнопки "Продолжить" на дашборде
    };
  },

  load() {
    try {
      const raw = localStorage.getItem(APP.storageKey);
      this.data = raw ? Object.assign(this.defaults(), JSON.parse(raw)) : this.defaults();
      // глубокое слияние вложенных объектов на случай старого сохранения
      const d = this.defaults();
      for (const k of Object.keys(d)) {
        if (typeof d[k] === "object" && d[k] !== null && !Array.isArray(d[k])) {
          this.data[k] = Object.assign({}, d[k], this.data[k] || {});
        }
      }
    } catch (e) {
      this.data = this.defaults();
    }
  },

  save() {
    try { localStorage.setItem(APP.storageKey, JSON.stringify(this.data)); } catch (e) { /* хранилище недоступно */ }
  },

  reset() { this.data = this.defaults(); this.save(); },

  createHero(name, grade) {
    this.data.hero = { name: name || "Исследователь", grade: grade || 7 };
    this.save();
  },

  setLastTopic(topicId) { this.data.lastTopicId = topicId; this.save(); },

  /* ---------- прогресс по темам ---------- */
  topicProgress(topicId) {
    if (!this.data.progress[topicId]) this.data.progress[topicId] = { doneTasks: {}, completed: false, stars: 0 };
    return this.data.progress[topicId];
  },
  isTopicDone(topicId) { return !!this.topicProgress(topicId).completed; },
  topicsDone() { return Object.values(this.data.progress).filter((p) => p.completed).length; },

  taskDone(taskId, topicId) { return !!this.topicProgress(topicId).doneTasks[taskId]; },

  completeTask(task, topicId) {
    const p = this.topicProgress(topicId);
    if (p.doneTasks[task.id]) return { already: true, xp: 0 };
    p.doneTasks[task.id] = true;
    const xp = APP.taskXP[task.type] || 10;
    this.data.stats.xp += xp;
    p.stars = Object.keys(p.doneTasks).length;
    if (/area|circlelen|quad|pyth|ch2_s4|ch4_s[23]|ch6/i.test(topicId)) this.data.stats.areaTasksSolved++;
    const topic = GAME.topics.find((t) => t.id === topicId);
    if (topic && topic.tasks.every((t) => p.doneTasks[t.id])) p.completed = true;
    this.save();
    const unlocked = this.checkAchievements();
    return { already: false, xp, unlocked };
  },

  saveExploreNote(taskId, text) { this.data.exploreNotes[taskId] = text; this.save(); },

  checkAchievements() {
    const unlocked = [];
    (GAME.achievements || []).forEach((a) => {
      if (!this.data.achievements[a.id] && a.cond(this)) {
        this.data.achievements[a.id] = true;
        unlocked.push(a);
      }
    });
    if (unlocked.length) this.save();
    return unlocked;
  },

  overallPct() {
    const total = GAME.topics.length;
    return total ? Math.round((this.topicsDone() / total) * 100) : 0;
  },

  /* ---------- настройки ---------- */
  toggleTheme() { this.data.settings.theme = this.data.settings.theme === "dark" ? "light" : "dark"; this.save(); return this.data.settings.theme; },
  toggleSound() { this.data.settings.sound = !this.data.settings.sound; this.save(); return this.data.settings.sound; },

  /* ---------- экзамен ---------- */
  recordExam(pct, mistakes) {
    this.data.stats.examsTaken++;
    if (pct > this.data.stats.bestExamPct) this.data.stats.bestExamPct = pct;
    this.data.lastExamMistakes = mistakes || [];
    this.save();
    return this.checkAchievements();
  },
};

</script>

  /* ---------- звук: короткие тоны через Web Audio, с уважением к настройке "sound" ---------- */
  const Sound = {
    ctx: null,
    ensureCtx() {
      if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (this.ctx.state === "suspended") this.ctx.resume();
      return this.ctx;
    },
    tone(freq, dur, type, peak) {
      if (!State.data.settings.sound) return;
      try {
        const ctx = this.ensureCtx();
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.type = type || "sine"; osc.frequency.value = freq;
        osc.connect(gain); gain.connect(ctx.destination);
        const now = ctx.currentTime;
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.linearRampToValueAtTime(peak || 0.15, now + 0.012);
        gain.gain.linearRampToValueAtTime(0.0001, now + dur);
        osc.start(now); osc.stop(now + dur + 0.02);
      } catch (e) { /* нет Web Audio на устройстве — просто без звука */ }
    },
    correct() { this.tone(660, 0.11, "sine", 0.14); setTimeout(() => this.tone(880, 0.13, "sine", 0.14), 85); },
    wrong() { this.tone(200, 0.16, "sawtooth", 0.09); },

  function chaptersForGrade(g) {

  // grade обязателен для "misc" — иначе темы 7/8/9 класса из общего временного
  // раздела перемешаются и утекут друг в друга (7-классник увидит темы 9 класса и т.п.).
  function topicsOfChapter(chId, grade) {

  function chapterProgress(ch, grade) {

  function renderBlocksText(theory) { return theory.map((p) => `<p>${esc(p)}</p>`).join(""); }

  function screenTopic() {

  /* ---------- Мастерская: свободная зона построения и анализа фигур ---------- */
  function workshopSpec(shape) {
    if (shape === "quad") return { type: "quad", variant: "parallelogram", defaultShow: { sides: true, diagonals: true, angles: true, area: true } };
    if (shape === "circle") return { type: "circle", polygon: 0 };
    if (shape === "angle") return { type: "angle" };
    if (shape === "free") return { type: "freeDraw" };
    return { type: "triangle", variant: "arbitrary", defaultShow: { sides: true, angles: true, area: true } };
  }
  function formatWorkshopStats(shape, m) {
    if (!m) return "…";
    if (shape === "triangle") {
      return `Стороны: a=${Geo.fmt(m.a)}, b=${Geo.fmt(m.b)}, c=${Geo.fmt(m.c)} · Периметр: ${Geo.fmt(m.perimeter)}<br>`
        + `Углы: ∠A=${Geo.fmt(m.angleA)}°, ∠B=${Geo.fmt(m.angleB)}°, ∠C=${Geo.fmt(m.angleC)}° (сумма ${Geo.fmt(m.angleA + m.angleB + m.angleC)}°)<br>`
        + `Площадь: ${Geo.fmt(m.area)}`;
    }
    if (shape === "quad") {
      return `Периметр: ${Geo.fmt(m.perimeter)} · Площадь: ${Geo.fmt(m.area)}<br>Диагонали: ${Geo.fmt(m.diag1)} и ${Geo.fmt(m.diag2)}`;
    }
    if (shape === "circle") {
      return `Радиус: ${Geo.fmt(m.r)} · Длина окружности: ${Geo.fmt(m.circumference)} · Площадь круга: ${Geo.fmt(m.area)}`;
    }
    if (shape === "angle") {
      return `Величина угла: ${Geo.fmt(m.angle)}°`;
    }
    if (shape === "free") {
      if (!m.points || !m.points.length) return "Построй что-нибудь — точки, отрезки, окружности или многоугольники.";
      const parts = [`Точки: ${m.points.join(", ")}`];
      if (m.segments && m.segments.length) parts.push(m.segments.map((s) => `${s.from}${s.to}=${Geo.fmt(s.length)}`).join(", "));
      if (m.circles && m.circles.length) parts.push(m.circles.map((c) => `окружность(${c.center}), r=${Geo.fmt(c.r)}`).join(", "));
      if (m.polygons && m.polygons.length) parts.push(m.polygons.map((p) => `${p.labels}: P=${Geo.fmt(p.perimeter)}, S=${Geo.fmt(p.area)}`).join("; "));
      return parts.join("<br>");
    }
    return "…";
  }

  /* ---------- Экзамен ---------- */
  /* Параметрическая генерация: если у задания есть task.generate(), при каждом построении
     пула практики/экзамена вычисляем СВЕЖИЕ q/answer — числа меняются при каждой попытке,
     а не остаются одними и теми же навсегда. Исходный объект в GAME.topics не трогаем —
     тема при обычном просмотре по-прежнему показывает канонический пример из учебника. */
  function materialize(task) {
    if (!task.generate) return task;
    try { return Object.assign({}, task, task.generate()); }
    catch (e) { console.error("generate() failed for", task.id, e); return task; }
  }
  function allTasksPool() {
    const pool = [];
    GAME.topics.forEach((t) => t.tasks.forEach((task) => { if (task.type === "choice" || task.type === "input") pool.push({ task: materialize(task), topic: t }); }));
    return pool;
  }
  function buildExam() {
    const pool = allTasksPool().slice();
    for (let i = pool.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [pool[i], pool[j]] = [pool[j], pool[i]]; }
    const n = Math.min(APP.examQuestions, pool.length);
    return pool.slice(0, n);
  }
  function screenExam() {
    const ex = ui.exam;
    if (!ex || ex.phase === "intro") {
      return `<div class="mq-top"><button class="btn btn-ghost" data-act="nav" data-view="dashboard">← Главная</button></div>

          <button class="btn btn-gold" data-act="exam-start">Начать экзамен →</button>
        </div>`;
    }
    if (ex.phase === "running") {
      const q = ex.items[ex.idx];
      const t = q.task;
      const mins = Math.floor(ex.timeLeft / 60), secs = String(ex.timeLeft % 60).padStart(2, "0");

      if (t.type === "choice") {
        body = `<div class="task-opts">${t.options.map((op, i) =>
          `<button class="task-opt ${ex.answered != null ? (i === t.correct ? "opt-correct" : (i === ex.answered ? "opt-wrong" : "")) : ""}" data-act="exam-answer" data-idx="${i}" ${ex.answered != null ? "disabled" : ""}>${esc(op)}</button>`).join("")}</div>`;
      } else {
        body = `<div class="task-input-row"><input type="text" inputmode="decimal" class="task-input" id="exam-input" placeholder="Ответ${t.unit ? " (" + t.unit + ")" : ""}" ${ex.answered != null ? "disabled" : ""}>
          <button class="btn btn-primary btn-sm" data-act="exam-answer-input" ${ex.answered != null ? "disabled" : ""}>Ответить</button></div>`;
      }
      return `
        <div class="exam-top"><span>Вопрос ${ex.idx + 1} / ${ex.items.length}</span><span class="exam-timer">⏳ ${mins}:${secs}</span></div>
        <div class="panel"><div class="task-q">${esc(t.q)}</div>${body}</div>
        ${ex.answered != null ? `<button class="btn btn-primary" data-act="exam-next">${ex.idx + 1 < ex.items.length ? "Следующий вопрос →" : "Завершить экзамен"}</button>` : ""}`;

    return `<div class="panel dash-hero">
        <h2>Экзамен завершён!</h2>
        <p>Правильных ответов: <b>${ex.score}</b> из ${ex.items.length} (${pct}%)</p>

      </div>
      ${ex.mistakes.length ? `<div class="panel"><h3>Ошибки для повторения</h3><ul>${ex.mistakes.map((m) => `<li>${esc(m.q)} — правильный ответ: ${m.correctText}</li>`).join("")}</ul></div>` : ""}`;
  }

  let examTimer = null;
  function startExam() {
    ui.exam = { phase: "running", items: buildExam(), idx: 0, score: 0, answered: null, timeLeft: APP.examMinutes * 60, mistakes: [] };
    if (examTimer) clearInterval(examTimer);
    examTimer = setInterval(() => {
      if (!ui.exam || ui.exam.phase !== "running") return;
      ui.exam.timeLeft--;
      if (ui.exam.timeLeft <= 0) { finishExam(); return; }
      renderTimerOnly();
    }, 1000);
    render();
  }
  function renderTimerOnly() {
    const el = document.querySelector(".exam-timer");
    if (el && ui.exam) { const m = Math.floor(ui.exam.timeLeft / 60), s = String(ui.exam.timeLeft % 60).padStart(2, "0"); el.textContent = `⏳ ${m}:${s}`; }
  }
  function finishExam() {
    if (examTimer) { clearInterval(examTimer); examTimer = null; }
    ui.exam.phase = "result";
    const pct = Math.round((ui.exam.score / ui.exam.items.length) * 100);
    const unlocked = State.recordExam(pct, ui.exam.mistakes);
    announceUnlocks(unlocked);
    render();
  }

  function chapterTaskPool(chId, grade) {
    const pool = [];

      if (task.type === "choice" || task.type === "input") pool.push({ task: materialize(task), topic: t });
    }));
    return pool;
  }
  function shuffleArr(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
    return a;
  }

    return `<div class="mq-top"><button class="btn btn-ghost" data-act="nav" data-view="dashboard">← Главная</button></div>
      <h2>⚙️ Настройки</h2>
      <div class="panel">
        <label class="fig-chk"><input type="checkbox" data-act="toggle-theme" ${s.theme === "dark" ? "checked" : ""}> Тёмная тема</label><br>
        <label class="fig-chk"><input type="checkbox" data-act="toggle-sound" ${s.sound ? "checked" : ""}> Звук</label>
      </div>
      <div class="panel">
        <h3>Сохранение</h3>
        <button class="btn btn-ghost btn-sm" data-act="export-save">⬇ Скачать сохранение</button>
        <label class="btn btn-ghost btn-sm" style="cursor:pointer">⬆ Загрузить сохранение<input type="file" id="import-file" accept="application/json" style="display:none"></label>
        <br><br>
        <button class="btn btn-ghost btn-sm" data-act="reset-progress">🗑 Сбросить весь прогресс</button>
      </div>`;
  }

  /* ================= рендер / роутинг ================= */
  function screenHTML() {
    switch (ui.view) {
      case "dashboard": return screenDashboard();
      case "chapters": return screenChapters();
      case "workshop": return screenWorkshop();
      case "chapter": return screenChapter();
      case "chapterPractice": return screenChapterPractice();
      case "chapterTest": return screenChapterTest();
      case "topic": return screenTopic();
      case "theorems": return screenTheorems();
      case "theorem": return screenTheorem();
      case "reference": return screenReference();
      case "exam": return screenExam();
      case "teacher": return screenTeacher();
      case "settings": return screenSettings();
      default: return screenDashboard();
    }
  }

  let workshopTimer = null;
  function stopWorkshopTimer() { if (workshopTimer) { clearInterval(workshopTimer); workshopTimer = null; } }

  function render() {
    destroyFigures();
    stopWorkshopTimer();
    if (!State.data.hero) {
      root.innerHTML = screenCreation();
      return;
    }
    root.innerHTML = hud() + navTabs() + `<main class="screen">${screenHTML()}</main>`;
    // "Назад" (.mq-top) прилипает сразу под шапкой (.hud) — но высота шапки может отличаться
    // (перенос на 2 строки на очень узком экране), поэтому меряем её реально, а не гадаем пикселями.
    const hudEl = root.querySelector(".hud");
    const mqTopEl = root.querySelector(".mq-top");
    if (hudEl && mqTopEl) mqTopEl.style.top = (hudEl.offsetHeight + 16) + "px";
    // монтируем чертежи темы/reference — оборачиваем в try/catch, чтобы сбой одного
    // чертежа не ронял рендер всего экрана
    root.querySelectorAll(".fig-mount[data-figure]").forEach((el) => {
      let spec; try { spec = JSON.parse(el.getAttribute("data-figure")); } catch (e) { spec = { type: "triangle" }; }
      try { const inst = Figures.mount(el, spec); App.trackFigure(inst); el.__figureInst = inst; }
      catch (e) { el.innerHTML = '<div class="fig-error">⚠️ Чертёж временно недоступен</div>'; console.error("Figure mount failed:", spec, e); }
    });
    root.querySelectorAll(".fig-mount[data-theorem]").forEach((el) => {
      try { App.trackFigure(Theorems.mount(el, el.getAttribute("data-theorem"))); }
      catch (e) { el.innerHTML = '<div class="fig-error">⚠️ Анимация временно недоступна</div>'; console.error("Theorem mount failed:", e); }
    });
    try { Tasks.mountFigures(root); } catch (e) { console.error("Task figures mount failed:", e); }
    if (ui.view === "workshop") {
      const mountEl = document.getElementById("workshop-mount");
      const statsEl = document.getElementById("workshop-stats-body");
      if (mountEl && statsEl) {
        workshopTimer = setInterval(() => {
          if (!mountEl.__figureInst) return;
          try { statsEl.innerHTML = formatWorkshopStats(ui.workshopShape || "triangle", mountEl.__figureInst.metrics()); }
          catch (e) { /* игнорируем — просто не обновляем в этом тике */ }
        }, 200);
      }
    }
  }

  function go(view, opts) {
    ui.view = view;
    if (opts) Object.assign(ui, opts);
    render();
    window.scrollTo(0, 0);
  }

  document.documentElement.setAttribute("data-theme", State.data && State.data.settings ? State.data.settings.theme : "light");

  root.addEventListener("click", function (e) {
    const node = e.target.closest("[data-act]");
    if (!node) return;
    const act = node.getAttribute("data-act");

    if (act === "pick-grade") {
      root.querySelectorAll(".grade-btn").forEach((b) => b.classList.remove("active"));
      node.classList.add("active");
      const startBtn = root.querySelector('[data-act="create-hero"]');
      if (startBtn) startBtn.disabled = false;
      const hint = document.getElementById("creation-hint");
      if (hint) hint.style.display = "none";
      return;
    }
    if (act === "create-hero") {
      const gradeBtn = root.querySelector(".grade-btn.active");
      if (!gradeBtn) return; // на всякий случай — кнопка и так должна быть disabled без выбора класса
      const nameEl = document.getElementById("hero-name");
      State.createHero(nameEl ? nameEl.value.trim() : "", +gradeBtn.dataset.g);
      ui.grade = State.data.hero.grade;
      go("dashboard");
      return;
    }
    if (act === "nav") { go(node.getAttribute("data-view")); return; }
    if (act === "open-grade") { go("chapters", { grade: +node.getAttribute("data-g") }); return; }
    if (act === "open-chapter") { go("chapter", { chapterId: node.getAttribute("data-ch") }); return; }
    if (act === "workshop-shape") { ui.workshopShape = node.getAttribute("data-shape"); render(); return; }
    if (act === "chapter-practice-start") { startChapterPractice(node.getAttribute("data-ch")); return; }
    if (act === "chapter-test-start") { startChapterTest(node.getAttribute("data-ch")); return; }
    if (act === "ct-answer") { ctAnswer(+node.getAttribute("data-idx")); return; }
    if (act === "ct-answer-input") { const input = document.getElementById("ct-input"); ctAnswerInput(input ? input.value : ""); return; }
    if (act === "ct-next") { ctNext(); return; }
    if (act === "cp-answer") { cpAnswer(+node.getAttribute("data-idx")); return; }
    if (act === "cp-answer-input") { const input = document.getElementById("cp-input"); cpAnswerInput(input ? input.value : ""); return; }
    if (act === "cp-next") { cpNext(); return; }
    if (act === "open-topic") {
      const tid = node.getAttribute("data-topic");
      const topicObj = topicById(tid);
      if (topicObj) ui.grade = topicObj.grade; // синхронизируем класс — иначе "Продолжить" с главной может открыть тему другого класса, и кнопка "Назад к главе" собьётся
      State.setLastTopic(tid);
      go("topic", { topicId: tid });
      return;
    }
    if (act === "open-theorem") { go("theorem", { thId: node.getAttribute("data-th") }); return; }
    if (act === "ref-toggle") {
      const id = node.getAttribute("data-topic");
      ui.refOpen = ui.refOpen === id ? null : id;
      render();
      return;
    }
    if (act === "ref-copy") {
      const txt = node.getAttribute("data-copy");
      if (navigator.clipboard) navigator.clipboard.writeText(txt).then(() => toast("Формула скопирована", "⧉")).catch(() => {});
      else toast("Формула: " + txt, "⧉");
      return;
    }

    /* --- задания --- */
    if (act === "task-choice") {
      const task = findTask(node.getAttribute("data-task"));
      const res = Tasks.checkChoice(task, node.getAttribute("data-topic"), +node.getAttribute("data-idx"), ui);
      ui.taskFb[task.id].correct ? Sound.correct() : Sound.wrong();
      if (res && !res.already) { toast(`+${res.xp} XP`, "⭐"); announceUnlocks(res.unlocked); }
      render();
      return;
    }
    if (act === "task-error") {
      const task = findTask(node.getAttribute("data-task"));
      const res = Tasks.checkError(task, node.getAttribute("data-topic"), +node.getAttribute("data-idx"), ui);
      ui.taskFb[task.id].correct ? Sound.correct() : Sound.wrong();
      if (res && !res.already) { toast(`+${res.xp} XP`, "⭐"); announceUnlocks(res.unlocked); }
      render();
      return;
    }
    if (act === "task-input") {
      const taskId = node.getAttribute("data-task"), topicId = node.getAttribute("data-topic");
      const card = node.closest(".task-card");
      const input = root.querySelector(`.task-input[data-task="${taskId}"]`);
      const figEl = card ? card.querySelector(".task-figure") : null;
      const task = findTask(taskId);
      const res = Tasks.checkInput(task, topicId, input ? input.value : "", ui, figEl);
      ui.taskFb[taskId].correct ? Sound.correct() : Sound.wrong();
      if (res && !res.already) { toast(`+${res.xp} XP`, "⭐"); announceUnlocks(res.unlocked); }
      render();
      return;
    }
    if (act === "task-explore") {
      const taskId = node.getAttribute("data-task"), topicId = node.getAttribute("data-topic");
      const ta = root.querySelector(`.task-note[data-task="${taskId}"]`);
      const text = ta ? ta.value.trim() : "";
      if (!text) { toast("Сначала запиши свой вывод", "✏️"); return; }
      const task = findTask(taskId);
      const res = Tasks.saveExplore(task, topicId, text);
      if (res && !res.already) { Sound.correct(); toast(`+${res.xp} XP`, "⭐"); announceUnlocks(res.unlocked); }
      render();
      return;
    }
    if (act === "task-build") {
      const taskId = node.getAttribute("data-task"), topicId = node.getAttribute("data-topic");
      const card = node.closest(".task-card");
      const figEl = card ? card.querySelector(".task-figure") : null;
      const task = findTask(taskId);
      const res = Tasks.checkBuild(task, topicId, figEl, ui);
      ui.taskFb[taskId].correct ? Sound.correct() : Sound.wrong();
      if (res && !res.already) { toast(`+${res.xp} XP`, "⭐"); announceUnlocks(res.unlocked); }
      render();
      return;
    }
    if (act === "task-match") {
      const taskId = node.getAttribute("data-task"), topicId = node.getAttribute("data-topic");
      const card = node.closest(".task-card");
      const selMap = {};
      if (card) card.querySelectorAll(".match-select").forEach((sel) => { selMap[+sel.getAttribute("data-idx")] = sel.value; });
      const task = findTask(taskId);
      const res = Tasks.checkMatch(task, topicId, selMap, ui);
      ui.taskFb[taskId].correct ? Sound.correct() : Sound.wrong();
      if (res && !res.already) { toast(`+${res.xp} XP`, "⭐"); announceUnlocks(res.unlocked); }
      render();
      return;
    }

    /* --- экзамен --- */
    if (act === "exam-start") { startExam(); return; }
    if (act === "exam-answer") {
      const ex = ui.exam; const q = ex.items[ex.idx].task;
      const idx = +node.getAttribute("data-idx");
      ex.answered = idx;
      const ok = idx === q.correct;
      Sound[ok ? "correct" : "wrong"]();
      if (ok) ex.score++; else ex.mistakes.push({ q: q.q, correctText: q.options[q.correct] });
      render();
      return;
    }
    if (act === "exam-answer-input") {
      const ex = ui.exam; const q = ex.items[ex.idx].task;
      const input = document.getElementById("exam-input");
      const val = parseFloat(String(input ? input.value : "").replace(",", "."));
      const ok = !isNaN(val) && Math.abs(val - q.answer) <= (q.tol || 0.5);
      ex.answered = ok ? "ok" : "bad";
      Sound[ok ? "correct" : "wrong"]();
      if (ok) ex.score++; else ex.mistakes.push({ q: q.q, correctText: String(q.answer) });
      render();
      return;
    }
    if (act === "exam-next") {
      const ex = ui.exam;
      if (ex.idx + 1 < ex.items.length) { ex.idx++; ex.answered = null; render(); }
      else finishExam();
      return;
    }

    /* --- учитель --- */
    if (act === "teacher-assign") { toast(`Тема назначена ученику ${node.getAttribute("data-name")}`, "📌"); return; }

    /* --- настройки --- */
    if (act === "export-save") {
      const blob = new Blob([JSON.stringify(State.data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "geometry-save.json"; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 2000);
      return;
    }
    if (act === "reset-progress") {
      if (confirm("Точно сбросить весь прогресс?")) { State.reset(); go("dashboard"); }
      return;
    }
  });

  root.addEventListener("change", function (e) {
    if (e.target.getAttribute("data-act") === "toggle-theme") {
      const th = State.toggleTheme();
      document.documentElement.setAttribute("data-theme", th);
    }
    if (e.target.getAttribute("data-act") === "toggle-sound") { State.toggleSound(); }
    if (e.target.id === "import-file" && e.target.files && e.target.files[0]) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          State.data = Object.assign(State.defaults(), parsed);
          State.save();
          toast("Сохранение загружено", "⬆");
          go("dashboard");
        } catch (err) { toast("Не удалось прочитать файл", "⚠️"); }
      };
      reader.readAsText(e.target.files[0]);
    }
  });

  function findTask(id) {
    for (const t of GAME.topics) { const f = t.tasks.find((x) => x.id === id); if (f) return f; }
    return null;
  }

  /* ---------- кнопка "Наверх" — создаётся один раз, не зависит от render() ---------- */
  function setupScrollTopButton() {
    const btn = document.createElement("button");
    btn.id = "scroll-top-btn";
    btn.className = "scroll-top-btn";
    btn.setAttribute("aria-label", "Наверх");
    btn.setAttribute("type", "button");
    btn.textContent = "↑";
    btn.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
    document.body.appendChild(btn);
    window.addEventListener("scroll", () => {
      if (window.scrollY > 420) btn.classList.add("visible");
      else btn.classList.remove("visible");
    }, { passive: true });
  }

  /* ---------- запуск ---------- */
  State.load();
  document.documentElement.setAttribute("data-theme", State.data.settings.theme);
  if (State.data.hero) ui.grade = State.data.hero.grade;
  render();
  setupScrollTopButton();

  window.GeomApp = { ui, render, reset: () => { State.reset(); render(); } };
})();

</script>
</body>
</html>
